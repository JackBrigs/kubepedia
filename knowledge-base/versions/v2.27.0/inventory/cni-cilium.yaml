project: kubespray
kubespray_version: v2.27.0
git_commit: 9ec9b3a
source_type: inventory
source_paths:
  - inventory/sample/group_vars/k8s_cluster/k8s-net-cilium.yml
source_url: https://github.com/kubernetes-sigs/kubespray/tree/v2.27.0
retrieved_at: 2026-07-15
topics: [inventory, cni, cilium]
reliability: authoritative
scope_note: >
  Разбор sample-файла настроек Cilium. Из сетевых плагинов тега проиндексирован
  только Cilium (ограничение проекта). Прочие сетевые sample-файлы
  (k8s-net-calico.yml, k8s-net-flannel.yml, k8s-net-weave.yml, k8s-net-kube-ovn.yml,
  k8s-net-kube-router.yml, k8s-net-macvlan.yml, k8s-net-custom-cni.yml)
  не разбираются по переменным. В файле раскомментирована только одна
  переменная (cilium_l2announcements); остальные приведены как
  закомментированные примеры (is_set: false).
  Источник истины по defaults роли — variables/cni.yaml.
  Отличия от v2.29.1: присутствует закомментированная cilium_version;
  ОТСУТСТВУЮТ cilium_hubble_peer_service_cluster_domain и cilium_extra_values.
  В defaults роли имя переменной шифрования node-to-node — cilium_ipsec_node_encryption
  (совпадает с sample; в v2.29.1 роль использует cilium_encryption_node_encryption).

variables:
  - name: cilium_version
    sample_value: "\"v1.15.9\" (commented)"
    is_set: false
    source_path: inventory/sample/group_vars/k8s_cluster/k8s-net-cilium.yml
    comment: "Версия Cilium (пример v1.15.9). Совпадает с default роли (roles/kubespray-defaults/defaults/main/download.yml). В справочнике v2.29.1 эта переменная в sample не разбиралась."

  # --- базовые ---
  - name: cilium_debug
    sample_value: "false (commented)"
    is_set: false
    source_path: inventory/sample/group_vars/k8s_cluster/k8s-net-cilium.yml
    comment: "Режим отладочного логирования агента Cilium."

  - name: cilium_mtu
    sample_value: "\"\" (commented)"
    is_set: false
    source_path: inventory/sample/group_vars/k8s_cluster/k8s-net-cilium.yml
    comment: "MTU для Cilium; пусто/0 — автоопределение."

  - name: cilium_enable_ipv4
    sample_value: "true (commented)"
    is_set: false
    source_path: inventory/sample/group_vars/k8s_cluster/k8s-net-cilium.yml
    comment: "Включить IPv4 в Cilium."

  - name: cilium_enable_ipv6
    sample_value: "false (commented)"
    is_set: false
    source_path: inventory/sample/group_vars/k8s_cluster/k8s-net-cilium.yml
    comment: "Включить IPv6 в Cilium."

  - name: cilium_l2announcements
    sample_value: "false"
    is_set: true
    source_path: inventory/sample/group_vars/k8s_cluster/k8s-net-cilium.yml
    comment: "Единственная раскомментированная переменная файла. L2-анонсы Cilium (замена MetalLB для LoadBalancer-сервисов в L2-сети). Значение совпадает с default роли (roles/network_plugin/cilium/defaults/main.yml)."

  - name: cilium_agent_health_port
    sample_value: "\"9879\" (commented)"
    is_set: false
    source_path: inventory/sample/group_vars/k8s_cluster/k8s-net-cilium.yml
    comment: "Порт health-check API агента Cilium."

  - name: cilium_identity_allocation_mode
    sample_value: "kvstore (commented)"
    is_set: false
    source_path: inventory/sample/group_vars/k8s_cluster/k8s-net-cilium.yml
    comment: "Режим хранения identity: crd или kvstore. В v2.27.0 пример kvstore СОВПАДАЕТ с default роли (kvstore)."

  - name: cilium_cert_dir
    sample_value: "/etc/cilium/certs (commented)"
    is_set: false
    source_path: inventory/sample/group_vars/k8s_cluster/k8s-net-cilium.yml
    comment: "Каталог etcd-сертификатов Cilium на узле (для kvstore)."

  - name: kube_etcd_cacert_file
    sample_value: "ca.pem (commented)"
    is_set: false
    source_path: inventory/sample/group_vars/k8s_cluster/k8s-net-cilium.yml
    comment: "Имя файла CA-сертификата etcd (для kvstore)."

  - name: kube_etcd_cert_file
    sample_value: "cert.pem (commented)"
    is_set: false
    source_path: inventory/sample/group_vars/k8s_cluster/k8s-net-cilium.yml
    comment: "Имя файла клиентского сертификата etcd (для kvstore)."

  - name: kube_etcd_key_file
    sample_value: "cert-key.pem (commented)"
    is_set: false
    source_path: inventory/sample/group_vars/k8s_cluster/k8s-net-cilium.yml
    comment: "Имя файла клиентского ключа etcd (для kvstore)."

