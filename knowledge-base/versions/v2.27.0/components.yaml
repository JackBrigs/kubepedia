# Механизм разрешения версий в v2.27.0 (отличается от v2.29.x):
# - В этом теге версии компонентов заданы ПРЯМЫМИ ЛИТЕРАЛАМИ в download.yml
#   (например containerd_version: 1.7.24), а не выражением "(X_checksums | dict2items)[0].key".
#   Механизм выбора «самой новой версии из словаря контрольных сумм» появится позже.
# - kube_version задан литералом v1.31.4 (roles/kubespray-defaults/defaults/main/main.yml);
#   минимально поддерживаемая kube_version_min_required = v1.29.0.
# - kube_major_version вычисляется из kube_version регэкспом => v1.31.
# - Компоненты, привязанные к версии Kubernetes, выбираются из словарей
#   *_supported_versions по ключу kube_major_version (etcd, pod_infra, crictl, crio,
#   scheduler_plugins, snapshot_controller).
# - coredns_version выбирается тернарным условием по kube_version:
#   'v1.11.3' если kube_version >= v1.30.5, иначе 'v1.11.1' => для v1.31.4 это v1.11.3.
# - Значения resolved_version приведены без ведущего 'v' для единообразия с v2.29.1;
#   default_expression содержит дословное значение из кода тега.

components:
  # === Ядро кластера ===
  - name: kubernetes
    version_variable: kube_version
    default_expression: "v1.31.4"
    resolved_version: "1.31.4"
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    notes: "Задан литералом. Диапазон поддержки в теге: 1.29.0–1.31.4 (kube_version_min_required = v1.29.0)."

  - name: kubeadm
    version_variable: kube_version
    default_expression: "{{ dl_k8s_io_url }}/release/{{ kube_version }}/bin/linux/{{ image_arch }}/kubeadm"
    resolved_version: "1.31.4"
    source_path: roles/kubespray-defaults/defaults/main/download.yml
    notes: "Отдельной переменной версии нет: kubeadm (как и kubectl, kubelet) скачивается той же версии, что kube_version."

  - name: etcd
    version_variable: etcd_version
    default_expression: "{{ etcd_supported_versions[kube_major_version] }}"
    resolved_version: "3.5.16"
    source_path: roles/kubespray-defaults/defaults/main/download.yml
    notes: "etcd_supported_versions для v1.29/v1.30/v1.31 задаёт v3.5.16; для kube_major_version=v1.31 => v3.5.16."

  - name: pause (pod_infra)
    version_variable: pod_infra_version
    default_expression: "{{ pod_infra_supported_versions[kube_major_version] }}"
    resolved_version: "3.10"
    source_path: roles/kubespray-defaults/defaults/main/download.yml
    notes: "pod_infra_supported_versions: v1.31 => 3.10, v1.30 => 3.9, v1.29 => 3.9."

  # === Container runtime и инструменты ===
