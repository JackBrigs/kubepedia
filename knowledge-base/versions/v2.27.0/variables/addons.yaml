variables:
  # === флаги включения аддонов, определённые ТОЛЬКО в kubespray-defaults ===
  # Эти переключатели отсутствуют в defaults соответствующих ролей kubernetes-apps
  # (в отличие от helm_enabled, krew_enabled, metallb_enabled, argocd_enabled,
  #  local_path_provisioner_enabled, scheduler_plugins_enabled, deploy_netchecker,
  #  которые продублированы в ролях и описаны в своих разделах ниже).
  - name: dashboard_enabled
    default: "false"
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Включает установку Kubernetes Dashboard (требуется RBAC). Ресурсы Dashboard разворачивает роль kubernetes-apps/ansible."
    related: [dashboard_namespace, dashboard_replicas]
  - name: registry_enabled
    default: "false"
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Включает развертывание внутрикластерного Docker registry."
    related: [registry_namespace, registry_service_type]
  - name: metrics_server_enabled
    default: "false"
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Включает установку metrics-server (метрики ресурсов для HPA и kubectl top)."
    related: [metrics_server_replicas]
  - name: local_volume_provisioner_enabled
    default: "false"
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Включает установку local-volume-provisioner (статические локальные PV)."
    related: [local_volume_provisioner_storage_classes]
  - name: local_volume_provisioner_directory_mode
    default: "\"0700\""
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Права доступа на каталоги, создаваемые для local-volume-provisioner."
    conditions: "используется при local_volume_provisioner_enabled"
  - name: cinder_csi_enabled
    default: "false"
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Включает установку OpenStack Cinder CSI-драйвера."
    related: [cinder_auth_url, cinder_csi_controller_replicas]
  - name: aws_ebs_csi_enabled
    default: "false"
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Включает установку AWS EBS CSI-драйвера."
    related: [aws_ebs_csi_controller_replicas]
  - name: azure_csi_enabled
    default: "false"
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Включает установку Azure Disk CSI-драйвера."
    related: [azure_csi_controller_replicas]
  - name: gcp_pd_csi_enabled
    default: "false"
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Включает установку GCP Persistent Disk CSI-драйвера."
    related: [gcp_pd_csi_controller_replicas]
  - name: vsphere_csi_enabled
    default: "false"
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Включает установку vSphere CSI-драйвера."
    related: [vsphere_csi_namespace, vsphere_csi_controller_replicas]
  - name: upcloud_csi_enabled
    default: "false"
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Включает установку UpCloud CSI-драйвера."
    related: [upcloud_csi_controller_replicas]
  - name: csi_snapshot_controller_enabled
    default: "false"
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Включает установку snapshot-controller для CSI-снапшотов."
    related: [snapshot_controller_replicas, snapshot_controller_namespace]
  - name: persistent_volumes_enabled
    default: "false"
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Включает создание StorageClass для облачных провайдеров (роли persistent_volumes)."
    related: [storage_classes, gcp_pd_csi_volume_type, storage_account_type]
  - name: cephfs_provisioner_enabled
    default: "false"
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Включает установку CephFS-провижионера (внешнее хранилище CephFS)."
    related: [cephfs_provisioner_storage_class]
  - name: rbd_provisioner_enabled
    default: "false"
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Включает установку Ceph RBD-провижионера (внешнее блочное хранилище Ceph)."
    related: [rbd_provisioner_storage_class, rbd_provisioner_monitors]
  - name: ingress_nginx_enabled
    default: "false"
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Включает установку ingress-nginx контроллера."
    related: [ingress_nginx_namespace, ingress_nginx_class]
  - name: ingress_alb_enabled
    default: "false"
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Включает установку AWS ALB Ingress Controller."
    related: [alb_ingress_controller_namespace, alb_ingress_aws_region]
  - name: cert_manager_enabled
    default: "false"
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Включает установку cert-manager."
    related: [cert_manager_namespace]
  - name: expand_persistent_volumes
    default: "false"
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Разрешает расширение томов (allowVolumeExpansion) в создаваемых StorageClass."
    conditions: "используется при persistent_volumes_enabled"

  # === общие переменные kubernetes-apps ===
  - name: namespace
    default: "kube-system"
    source_path: roles/kubernetes-apps/defaults/main.yml
    description: "Namespace по умолчанию для базовых объектов kubernetes-apps."

  # === coredns / dns-autoscaler / nodelocaldns (роль kubernetes-apps/ansible) ===
  - name: dns_memory_limit
    default: "300Mi"
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "Лимит памяти контейнера CoreDNS (dns_cpu_limit по умолчанию не задан, закомментирован)."
  - name: dns_cpu_requests
    default: "100m"
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "Запрос CPU контейнера CoreDNS."
  - name: dns_memory_requests
    default: "70Mi"
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "Запрос памяти контейнера CoreDNS."
  - name: dns_min_replicas
    default: "{{ [2, groups['k8s_cluster'] | length] | min }}"
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "Минимальное число реплик CoreDNS для dns-autoscaler (2 или число узлов, если их меньше)."
    related: [dns_nodes_per_replica, dns_cores_per_replica]
  - name: dns_nodes_per_replica
    default: "16"
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "Параметр dns-autoscaler: число узлов на одну реплику CoreDNS."
  - name: dns_cores_per_replica
    default: "256"
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "Параметр dns-autoscaler: число ядер CPU кластера на одну реплику CoreDNS."
  - name: dns_prevent_single_point_failure
    default: "{{ 'true' if dns_min_replicas | int > 1 else 'false' }}"
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "Параметр dns-autoscaler: не допускать единственную реплику CoreDNS, если реплик больше одной."
    related: [dns_min_replicas]
  - name: enable_coredns_reverse_dns_lookups
    default: "true"
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "Включает обратные (PTR) DNS-запросы в конфигурации CoreDNS."
  - name: coredns_ordinal_suffix
    default: "\"\""
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "Суффикс к именам ресурсов CoreDNS (используется при развертывании вторичного экземпляра)."
  - name: coredns_deployment_nodeselector
    default: "kubernetes.io/os: linux"
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "nodeSelector деплоймента CoreDNS."
  - name: coredns_default_zone_cache_block
    default: |-
      cache 30
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "Блок cache в зоне по умолчанию Corefile CoreDNS."
  - name: coredns_pod_disruption_budget
    default: "false"
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "Включает создание PodDisruptionBudget для CoreDNS."
    related: [coredns_pod_disruption_budget_max_unavailable]
  - name: coredns_pod_disruption_budget_max_unavailable
    default: "\"30%\""
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "Значение maxUnavailable для PDB CoreDNS."
    conditions: "используется при coredns_pod_disruption_budget: true"
  - name: old_dns_domains
    default: "[]"
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "Список прежних dns_domain для корректных ответов coredns/nodelocaldns после смены домена кластера."
  - name: nodelocaldns_cpu_requests
    default: "100m"
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "Запрос CPU контейнера nodelocaldns."
  - name: nodelocaldns_memory_limit
    default: "200Mi"
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "Лимит памяти контейнера nodelocaldns."
  - name: nodelocaldns_memory_requests
    default: "70Mi"
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "Запрос памяти контейнера nodelocaldns."
  - name: nodelocaldns_ds_nodeselector
    default: "kubernetes.io/os: linux"
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "nodeSelector DaemonSet nodelocaldns."
  - name: nodelocaldns_prometheus_port
    default: "9253"
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "Порт метрик Prometheus для nodelocaldns."
  - name: nodelocaldns_secondary_prometheus_port
    default: "9255"
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "Порт метрик Prometheus для вторичного nodelocaldns."
  - name: dns_autoscaler_cpu_requests
    default: "20m"
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "Запрос CPU пода dns-autoscaler."
  - name: dns_autoscaler_memory_requests
    default: "10Mi"
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "Запрос памяти пода dns-autoscaler."
  - name: dns_autoscaler_deployment_nodeselector
    default: "kubernetes.io/os: linux"
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "nodeSelector деплоймента dns-autoscaler."

  # === netchecker (роль kubernetes-apps/ansible) ===
  - name: deploy_netchecker
    default: "false"
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "Включает развертывание Netchecker (проверка сетевой связности; дублируется в roles/kubespray-defaults/defaults/main/main.yml с тем же значением)."
    related: [netchecker_port, netcheck_namespace]
  - name: netchecker_port
    default: "31081"
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "NodePort сервиса netchecker-server."
  - name: agent_report_interval
    default: "15"
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "Интервал отчётов агентов Netchecker (сек)."
  - name: netcheck_namespace
    default: "default"
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "Namespace для компонентов Netchecker."
  - name: netchecker_agent_cpu_limit
    default: "30m"
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "Лимит CPU агента Netchecker."
  - name: netchecker_agent_memory_limit
    default: "100M"
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "Лимит памяти агента Netchecker."
  - name: netchecker_agent_cpu_requests
    default: "15m"
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "Запрос CPU агента Netchecker."
  - name: netchecker_agent_memory_requests
    default: "64M"
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "Запрос памяти агента Netchecker."
  - name: netchecker_server_cpu_limit
    default: "100m"
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "Лимит CPU сервера Netchecker."
  - name: netchecker_server_memory_limit
    default: "256M"
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "Лимит памяти сервера Netchecker."
  - name: netchecker_server_cpu_requests
    default: "50m"
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "Запрос CPU сервера Netchecker."
  - name: netchecker_server_memory_requests
    default: "64M"
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "Запрос памяти сервера Netchecker."
  - name: netchecker_etcd_cpu_limit
    default: "200m"
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "Лимит CPU etcd Netchecker."
  - name: netchecker_etcd_memory_limit
    default: "256M"
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "Лимит памяти etcd Netchecker."
  - name: netchecker_etcd_cpu_requests
    default: "100m"
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "Запрос CPU etcd Netchecker."
  - name: netchecker_etcd_memory_requests
    default: "128M"
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "Запрос памяти etcd Netchecker."
  - name: netchecker_agent_user
    default: "1000"
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "UID (securityContext) агента Netchecker."
  - name: netchecker_server_user
    default: "1000"
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "UID (securityContext) сервера Netchecker."
  - name: netchecker_agent_group
    default: "1000"
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "GID (securityContext) агента Netchecker."
  - name: netchecker_server_group
    default: "1000"
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "GID (securityContext) сервера Netchecker."
  - name: netchecker_agent_log_level
    default: "5"
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "Уровень логирования агента Netchecker."
  - name: netchecker_server_log_level
    default: "5"
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "Уровень логирования сервера Netchecker."
  - name: netchecker_etcd_log_level
    default: "info"
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "Уровень логирования etcd Netchecker."

  # === dashboard (роль kubernetes-apps/ansible) ===
  - name: dashboard_replicas
    default: "1"
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "Число реплик Kubernetes Dashboard."
    conditions: "используется при dashboard_enabled"
  - name: dashboard_namespace
    default: "kube-system"
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "Namespace для Kubernetes Dashboard."
    conditions: "используется при dashboard_enabled"
  - name: dashboard_cpu_limit
    default: "100m"
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "Лимит CPU пода Dashboard."
    conditions: "используется при dashboard_enabled"
  - name: dashboard_memory_limit
    default: "256M"
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "Лимит памяти пода Dashboard."
    conditions: "используется при dashboard_enabled"
  - name: dashboard_cpu_requests
    default: "50m"
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "Запрос CPU пода Dashboard."
    conditions: "используется при dashboard_enabled"
  - name: dashboard_memory_requests
    default: "64M"
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "Запрос памяти пода Dashboard."
    conditions: "используется при dashboard_enabled"
  - name: dashboard_use_custom_certs
    default: "false"
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "Использовать пользовательские TLS-сертификаты Dashboard из секрета вместо самоподписанных."
    conditions: "используется при dashboard_enabled"
    related: [dashboard_certs_secret_name, dashboard_tls_key_file, dashboard_tls_cert_file]
  - name: dashboard_certs_secret_name
    default: "kubernetes-dashboard-certs"
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "Имя секрета с TLS-сертификатами Dashboard."
    conditions: "используется при dashboard_enabled"
  - name: dashboard_tls_key_file
    default: "dashboard.key"
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "Имя файла TLS-ключа в секрете Dashboard."
    conditions: "используется при dashboard_enabled"
  - name: dashboard_tls_cert_file
    default: "dashboard.crt"
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "Имя файла TLS-сертификата в секрете Dashboard."
    conditions: "используется при dashboard_enabled"
  - name: dashboard_master_toleration
    default: "true"
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "Добавляет toleration, разрешающий запуск Dashboard на узлах control plane."
    conditions: "используется при dashboard_enabled"
  - name: dashboard_token_ttl
    default: "900"
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "Время жизни токена сессии Dashboard (сек)."
    conditions: "используется при dashboard_enabled"
  - name: dashboard_skip_login
    default: "false"
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "Разрешает пропуск экрана входа в Dashboard."
    conditions: "используется при dashboard_enabled"

  # === helm ===
  - name: helm_enabled
    default: "false"
    source_path: roles/kubernetes-apps/helm/defaults/main.yml
    description: "Включает установку CLI Helm на узлы control plane (дублируется в roles/kubespray-defaults/defaults/main/main.yml с тем же значением)."

  # === krew ===
  - name: krew_enabled
    default: "false"
    source_path: roles/kubernetes-apps/krew/defaults/main.yml
    description: "Включает установку менеджера плагинов kubectl krew (дублируется в roles/kubespray-defaults/defaults/main/main.yml с тем же значением)."
    related: [krew_root_dir, krew_default_index_uri]
  - name: krew_root_dir
    default: "\"/usr/local/krew\""
    source_path: roles/kubernetes-apps/krew/defaults/main.yml
    description: "Корневой каталог установки krew (переменная KREW_ROOT)."
    conditions: "используется при krew_enabled"
  - name: krew_default_index_uri
    default: "https://github.com/kubernetes-sigs/krew-index.git"
    source_path: roles/kubernetes-apps/krew/defaults/main.yml
    description: "URI индекса плагинов krew по умолчанию."
    conditions: "используется при krew_enabled"
  - name: krew_no_upgrade_check
