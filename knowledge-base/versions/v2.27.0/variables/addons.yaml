    description: "StorageClass-ы для UpCloud CSI (переменная storage_classes определена также в persistent_volumes/cinder-csi с другим значением)."
    conditions: "используется при persistent_volumes_enabled и upcloud_csi_enabled"

  # === snapshots / cinder-csi ===
  - name: snapshot_classes
    default: |-
      - name: cinder-csi-snapshot
        is_default: false
        force_create: true
        deletionPolicy: Delete
    source_path: roles/kubernetes-apps/snapshots/cinder-csi/defaults/main.yml
    description: "VolumeSnapshotClass-ы для Cinder CSI."
    conditions: "используется при csi_snapshot_controller_enabled и cinder_csi_enabled"

  # === snapshots / snapshot-controller ===
  - name: snapshot_controller_replicas
    default: "1"
    source_path: roles/kubernetes-apps/snapshots/snapshot-controller/defaults/main.yml
    description: "Число реплик snapshot-controller."
    conditions: "используется при csi_snapshot_controller_enabled"
  - name: snapshot_controller_namespace
    default: "kube-system"
    source_path: roles/kubernetes-apps/snapshots/snapshot-controller/defaults/main.yml
    description: "Namespace для snapshot-controller."
    conditions: "используется при csi_snapshot_controller_enabled"
