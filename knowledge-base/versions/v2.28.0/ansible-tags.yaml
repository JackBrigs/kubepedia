- ansible_tag: system-upgrade
  description: 'Обновление системных пакетов ОС в ходе апгрейда кластера (роль upgrade/system-upgrade).
    Выполняется только в upgrade-cluster.yml — сначала на kube_control_plane (serial: 1), затем на worker-узлах
    (kube_node, батчами). Реально обновляет пакеты через apt/yum и, в зависимости от system_upgrade_reboot,
    может перезагружать узлы; после этого при необходимости повторно запускается download. Управляется
    переменной system_upgrade.

    '
  playbooks:
  - upgrade-cluster.yml
  affected_groups:
  - kube_control_plane
  - kube_node
  roles:
  - upgrade/system-upgrade
  source_paths:
  - playbooks/upgrade_cluster.yml
  - roles/upgrade/system-upgrade/tasks/main.yml
  standalone_run: risky
  notes: 'Осмысленен только при system_upgrade=true и только в рамках upgrade-cluster.yml; может перезагружать
    узлы (system_upgrade_reboot). Изолированный запуск затрагивает пакеты ОС и потенциально доступность
    узла — выполнять в рамках планового обновления. Внутри роль разветвляется на подтеги system-upgrade-apt
    и system-upgrade-yum.

    '
  reliability: authoritative
- ansible_tag: system-upgrade-apt
  description: 'Ветка обновления системных пакетов для Debian-семейства внутри роли upgrade/system-upgrade.
    Под тегом подключается apt.yml (обновление пакетов через apt), выполняется при system_upgrade=true
    и ansible_os_family == "Debian".

    '
  playbooks:
  - upgrade-cluster.yml
  affected_groups:
  - kube_control_plane
  - kube_node
  roles:
  - upgrade/system-upgrade
  source_paths:
  - roles/upgrade/system-upgrade/tasks/main.yml
  - roles/upgrade/system-upgrade/tasks/apt.yml
  standalone_run: risky
  notes: 'Подтег родительского system-upgrade; выполняется только на Debian-узлах и при system_upgrade=true.
    Обновляет пакеты ОС (возможна перезагрузка) — запускать в рамках планового апгрейда кластера. Доступен
    только в upgrade-cluster.yml.

    '
  reliability: authoritative
- ansible_tag: system-upgrade-yum
  description: 'Ветка обновления системных пакетов для RedHat-семейства внутри роли upgrade/system-upgrade.
    Под тегом подключается yum.yml, выполняется при system_upgrade=true, ansible_os_family == "RedHat"
    и не Fedora CoreOS.

    '
  playbooks:
  - upgrade-cluster.yml
  affected_groups:
  - kube_control_plane
  - kube_node
  roles:
  - upgrade/system-upgrade
  source_paths:
  - roles/upgrade/system-upgrade/tasks/main.yml
  - roles/upgrade/system-upgrade/tasks/yum.yml
  standalone_run: risky
  notes: 'Подтег родительского system-upgrade; выполняется только на RHEL-производных (кроме Fedora CoreOS)
    и при system_upgrade=true. Обновляет пакеты ОС (возможна перезагрузка). Доступен только в upgrade-cluster.yml.
    В docs отдельно не описан.

    '
  reliability: authoritative
- ansible_tag: upcloud-csi-driver
  description: 'Разворачивает CSI-драйвер UpCloud. Роль csi_driver/upcloud проверяет наличие учётных данных
    (upcloud_username/upcloud_password), генерирует и применяет манифесты: Secret с учётными данными,
    setup (namespace/RBAC), StatefulSet/Deployment контроллера, DaemonSet node-плагина и объект CSIDriver.
    Тем же тегом помечена роль persistent_volumes/upcloud-csi, создающая StorageClass "upcloud-csi".

    '
  playbooks:
  - cluster.yml
  - upgrade_cluster.yml
  affected_groups:
  - kube_control_plane
  roles:
  - kubernetes-apps/csi_driver/upcloud
  - kubernetes-apps/persistent_volumes/upcloud-csi
  source_paths:
  - roles/kubernetes-apps/csi_driver/upcloud/tasks/main.yml
  - roles/kubernetes-apps/persistent_volumes/upcloud-csi/tasks/main.yml
  - roles/kubernetes-apps/meta/main.yml
  - roles/kubernetes-apps/persistent_volumes/meta/main.yml
  standalone_run: safe
  notes: 'Включается переменной upcloud_csi_enabled. Обязательны переменные upcloud_username и upcloud_password
    (иначе шаги fail останавливают прогон). Задачи только на control_plane[0], идемпотентный kubectl apply
    — изолированный запуск безопасен при живом кластере.

    '
  reliability: authoritative
- ansible_tag: upgrade
  description: 'Сквозной тег обновления бинарей/образов и очистки легаси-аддонов. Навешен на задачи в
    нескольких ролях: roles/etcd/tasks/main.yml (установка etcdctl/etcdutl и install etcd), roles/kubernetes/node/
    tasks/install.yml (копирование бинаря kubelet), roles/kubernetes/control-plane/tasks/main.yml (копирование
    kubectl и настройка completion/alias), roles/kubernetes-apps/metrics_server (удаление старого каталога
    аддона) и roles/kubernetes-apps/ingress_controller/cert_manager (удаление легаси каталога/namespace
    cert-manager перед переустановкой).

    '
  playbooks:
  - cluster.yml
  - upgrade-cluster.yml
  - scale.yml
  affected_groups:
  - etcd
  - k8s_cluster
  - kube_control_plane
  roles:
  - etcd
  - kubernetes/node
  - kubernetes/control-plane
  - kubernetes-apps/metrics_server
  - kubernetes-apps/ingress_controller
  source_paths:
  - roles/etcd/tasks/main.yml
  - roles/kubernetes/node/tasks/install.yml
  - roles/kubernetes/control-plane/tasks/main.yml
  - roles/kubernetes-apps/metrics_server/tasks/main.yml
  - roles/kubernetes-apps/ingress_controller/cert_manager/tasks/main.yml
  standalone_run: risky
  notes: 'Важно: несмотря на пример из docs `--tags download --skip-tags upload,upgrade`, тега upgrade
    в роли download в v2.28.0 нет — в download используется отдельный тег upload; upgrade же затрагивает
    etcd, node, control-plane и часть kubernetes-apps. Часть задач под этим тегом удаляет легаси-каталоги
    аддонов, поэтому изолированный запуск на проде выполнять осознанно.

    '
  reliability: authoritative
- ansible_tag: upload
  description: 'Распространение образов/бинарников по узлам кластера в рамках роли download. Тегом upload
    помечены общие подготовительные шаги роли download (prep_download и получение kubeadm/списка образов
    в main.yml), после которых образы и файлы из кэша раскладываются по узлам (push из download_cache_dir).
    Фактически отвечает за раздачу уже загруженных артефактов на узлы.

    '
  playbooks:
  - cluster.yml
  - upgrade-cluster.yml
  - scale.yml
  affected_groups:
  - k8s_cluster
  - etcd
  - kube_control_plane
  roles:
  - download
  source_paths:
  - roles/download/tasks/main.yml
  standalone_run: risky
  notes: 'Штатно используется в связке/как исключение: docs показывают "--tags download --skip-tags upload,upgrade",
    чтобы только скачать без раздачи на узлы. Тег upload делит подготовительные задачи с download и опирается
    на уже закэшированные артефакты и факты; изолированный запуск без предшествующего download бессмыслен.
    Отключается через skip_downloads.

    '
  reliability: authoritative
- ansible_tag: validate-container-engine
  description: 'Первый шаг роли container-engine (roles/container-engine/validate-container-engine). Определяет
    окружение (Fedora CoreOS/ostree, наличие systemd-юнита kubelet), собирает факты сервисов и проверяет,
    какие движки уже установлены (containerd/docker/crio по наличию соответствующих *.service). Если обнаружен
    движок, отличающийся от выбранного container_manager, и он запущен, выполняет дренаж узла (remove_node/pre_remove),
    останавливает kubelet и удаляет прежний движок, вызывая reset-задачи соответствующей роли (containerd/docker/cri-o)
    — чтобы обеспечить корректное переключение container_manager.

    '
  playbooks:
  - cluster.yml
  - scale.yml
  - upgrade-cluster.yml
  affected_groups:
  - k8s_cluster
  - etcd
  roles:
  - container-engine/validate-container-engine
  source_paths:
  - roles/container-engine/validate-container-engine/tasks/main.yml
  - roles/container-engine/meta/main.yml
  standalone_run: risky
  notes: 'Всегда выполняется в составе роли container-engine (первая зависимость в meta). Часть задач
    помечена тегом facts. Может выполнять дренаж узла, остановку kubelet и деинсталляцию «чужого» движка
    — при изолированном запуске на рабочем узле это потенциально разрушительно, поэтому запуск требует
    понимания текущего состояния узла и собранных фактов сервисов.

    '
  reliability: authoritative
- ansible_tag: vsphere-csi-driver
  description: 'Разворачивает CSI-драйвер vSphere. Роль csi_driver/vsphere проверяет учётные данные vSphere,
    формирует cloud-config (vsphere-csi-cloud-config) и создаёт из него Secret vsphere-config-secret через
    kubectl, затем генерирует и применяет манифесты: namespace, объект CSIDriver, RBAC контроллера и node-плагина,
    ConfigMap, Deployment контроллера, Service и DaemonSet node-плагина. Отдельной роли persistent_volumes
    для vSphere нет.

    '
  playbooks:
  - cluster.yml
  - upgrade_cluster.yml
  affected_groups:
  - kube_control_plane
  roles:
  - kubernetes-apps/csi_driver/vsphere
  source_paths:
  - roles/kubernetes-apps/csi_driver/vsphere/tasks/main.yml
  - roles/kubernetes-apps/meta/main.yml
  standalone_run: safe
  notes: 'Включается переменной vsphere_csi_enabled. Требует корректных переменных подключения к vCenter
    (vsphere-credentials-check.yml). Задачи только на control_plane[0], идемпотентный kubectl apply/секрет
    — изолированный запуск безопасен при живом кластере.

    '
  reliability: authoritative
- ansible_tag: weave
  description: 'Разворачивает CNI-плагин Weave Net (kube_network_plugin == ''weave''). Тег навешен в двух
    местах: на подроль network_plugin/weave (roles/network_plugin/meta/main.yml), которая рендерит манифест
    weave-net.yml и conflist /etc/cni/net.d/10-weave.conflist на узлах, и на подроль kubernetes-apps/network_plugin/weave
    (roles/kubernetes-apps/network_plugin/meta/main.yml), которая применяет DaemonSet weave-net через kubectl
    на первом узле kube_control_plane. Тег также создаёт связанные сетевые каталоги в roles/kubernetes/preinstall/tasks/0050-create_directories.yml.
    Детальный разбор внутренних задач роли в базе знаний не проводился.

    '
  playbooks:
  - cluster.yml
  - scale.yml
  - upgrade-cluster.yml
  affected_groups:
  - k8s_cluster
  - kube_control_plane
  roles:
  - network_plugin/weave
  - kubernetes-apps/network_plugin/weave
  - kubernetes/preinstall
  source_paths:
  - roles/network_plugin/meta/main.yml
  - roles/network_plugin/weave/tasks/main.yml
  - roles/kubernetes-apps/network_plugin/meta/main.yml
  - roles/kubernetes/preinstall/tasks/0050-create_directories.yml
  standalone_run: risky
  notes: 'Условие: kube_network_plugin == ''weave'' (roles/network_plugin/meta/main.yml и roles/kubernetes-apps/network_plugin/meta/main.yml).
    ВАЖНО (отличие версий): Weave присутствует в v2.28.0, но УДАЛЁН в v2.29.1 — там этого тега и плагина
    уже нет. Изолированный запуск risky: зависит от скачанных образов (тег download) и работающего control
    plane для применения манифеста. Плагин не проиндексирован в базе знаний детально.

    '
  reliability: authoritative
- ansible_tag: win_nodes
  description: 'Специфичные для Windows задачи (роль win_nodes/kubernetes_patch, hosts kube_control_plane[0]).
    Создаёт каталог пользовательских манифестов и патчит DaemonSet kube-proxy, добавляя nodeSelector kubernetes.io/os=linux,
    чтобы kube-proxy запускался только на Linux-узлах и не ломал Windows-узлы. Выполняется через kubectl.

    '
  playbooks:
  - cluster.yml
  - upgrade-cluster.yml
  affected_groups:
  - kube_control_plane
  roles:
  - win_nodes/kubernetes_patch
  source_paths:
  - roles/win_nodes/kubernetes_patch/tasks/main.yml
  standalone_run: risky
  notes: 'Требует работающего кластера и доступного kubectl (kube_proxy_deployed), патчит запущенный kube-proxy.
    В cluster.yml роль импортируется с тегами control-plane, win_nodes; в upgrade-cluster.yml — master,win_nodes.
    Фактически тот же набор задач, что и у тега init (они совпадают в этой роли). Зависимостей от download
    нет.

    '
  reliability: authoritative
- ansible_tag: youki
  description: 'Разворачивает низкоуровневый OCI-рантайм youki. На узлах (roles/container-engine/youki)
    скачивается бинарник youki и копируется в youki_bin_dir. На control plane (roles/kubernetes-apps/container_runtimes/youki)
    генерируется и применяется манифест RuntimeClass youki.

    '
  playbooks:
  - cluster.yml
  - scale.yml
  - upgrade-cluster.yml
  affected_groups:
  - k8s_cluster
  - etcd
  - kube_control_plane
  roles:
  - container-engine/youki
  - kubernetes-apps/container_runtimes/youki
  source_paths:
  - roles/container-engine/youki/tasks/main.yml
  - roles/kubernetes-apps/container_runtimes/youki/tasks/main.yaml
  - roles/container-engine/meta/main.yml
  - roles/kubernetes-apps/container_runtimes/meta/main.yml
  standalone_run: risky
  notes: 'И установка на узлах, и применение RuntimeClass выполняются только при youki_enabled и container_manager
    == ''crio'' (youki используется как рантайм CRI-O). Применение манифеста идёт на kube_control_plane[0]
    и требует kubectl/API. Изолированный запуск зависит от скачивания и готового кластера.

    '
  reliability: authoritative
