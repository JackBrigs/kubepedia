  - kubernetes/preinstall
  source_paths:
  - roles/kubernetes/preinstall/tasks/main.yml
  - roles/kubernetes/preinstall/tasks/0020-set_facts.yml
  - roles/kubernetes/preinstall/tasks/0060-resolvconf.yml
