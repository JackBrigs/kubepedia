  - playbooks/reset.yml
  - playbooks/remove_node.yml
  - roles/reset/tasks/main.yml
  standalone_run: unsafe
  notes: 'В reset.yml affected_groups — etcd:k8s_cluster:calico_rr; в remove_node.yml — узлы из переменной
