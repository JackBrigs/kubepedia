    '
  playbooks:
  - cluster.yml
  - upgrade_cluster.yml
  affected_groups:
  - kube_control_plane
  roles:
  - kubernetes-apps/ingress_controller/alb_ingress_controller
  source_paths:
  - roles/kubernetes-apps/ingress_controller/alb_ingress_controller/tasks/main.yml
  - roles/kubernetes-apps/ingress_controller/meta/main.yml
  standalone_run: safe
  notes: 'Включается переменной ingress_alb_enabled; применение манифестов — на первом узле kube_control_plane
    (namespace — alb_ingress_controller_namespace). Рассчитан на кластеры в AWS. Идемпотентный apply.

    '
  reliability: authoritative
- ansible_tag: init
  description: 'Инициализация для Windows-узлов (роль win_nodes/kubernetes_patch, hosts kube_control_plane[0]).
    Создаёт каталог пользовательских манифестов (kubernetes_user_manifests_path) и патчит DaemonSet kube-proxy,
