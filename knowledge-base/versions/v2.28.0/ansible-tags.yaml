- ansible_tag: network
  description: 'Сквозной тег конфигурирования сети кластера. Объединяет: (1) роль network_plugin (play «Invoke
    kubeadm and install a CNI» в cluster.yml, hosts k8s_cluster), которая через roles/network_plugin/meta/main.yml
    подключает network_plugin/cni (распаковка бинарников CNI в /opt/cni/bin) и выбранную по kube_network_plugin
    роль плагина (cilium/calico/flannel/weave/macvlan/kube-ovn/kube-router/custom_cni), а также multus при
    kube_network_plugin_multus; (2) роль kubernetes-apps/network_plugin (play «Install Kubernetes apps»),
    которая применяет kube-объекты выбранного плагина (calico/flannel/kube-ovn/weave/kube-router/multus)
    через kubectl на первом узле kube_control_plane; (3) роль network_plugin/calico/rr на группе calico_rr
    (в cluster.yml тег network указан вместе с calico_rr, в upgrade_cluster.yml — только network); (4) создание
    сетевых каталогов в roles/kubernetes/preinstall/tasks/0050-create_directories.yml; (5) сетевые задачи
    etcd (roles/etcd/tasks/main.yml, roles/kubernetes/control-plane/tasks/kubeadm-etcd.yml, roles/kubernetes/kubeadm/tasks/kubeadm_etcd_node.yml);
    (6) очистку сети при сбросе в roles/reset/tasks/main.yml. Фактически тег network — самый широкий «сетевой»
    тег и разворачивает CNI целиком, независимо от того, какой плагин выбран.

    '
  playbooks:
  - cluster.yml
  - scale.yml
  - upgrade-cluster.yml
  - reset.yml
  affected_groups:
  - k8s_cluster
  - kube_control_plane
  - calico_rr
  - etcd
  roles:
  - network_plugin
  - network_plugin/cni
  - kubernetes-apps/network_plugin
  - network_plugin/calico/rr
  - kubernetes/preinstall
  - etcd
  - reset
  source_paths:
  - playbooks/cluster.yml
  - roles/network_plugin/meta/main.yml
  - roles/network_plugin/cni/tasks/main.yml
  - roles/kubernetes-apps/network_plugin/meta/main.yml
  - roles/kubernetes/preinstall/tasks/0050-create_directories.yml
  - roles/etcd/tasks/main.yml
  - roles/reset/tasks/main.yml
  standalone_run: risky
  notes: 'Тег network охватывает установку CNI (роль network_plugin/cni выполняется без собственного тега
    именно под network), запуск выбранного плагина на узлах и применение его kube-объектов ролью kubernetes-apps/network_plugin
    на control_plane[0]; конкретный плагин определяется kube_network_plugin. Изолированный запуск risky:
    требует выполненного download (бинарники CNI, downloads.cni.dest) и работающего control plane для шагов
    apply. В reset.yml тот же тег отвечает за удаление сетевых интерфейсов/правил — запуск в reset-контексте
    деструктивен. ОТЛИЧИЕ ВЕРСИЙ: в v2.28.0 среди плагинов присутствует weave (в v2.29.1 удалён).

    '
  reliability: authoritative
- ansible_tag: nginx
  description: 'Разворачивает локальный nginx-прокси (LB) к apiserver''ам на узлах, не являющихся контрол-плейном.
    В roles/kubernetes/node/tasks/main.yml подключает loadbalancer/nginx-proxy.yml при loadbalancer_apiserver_localhost
    и loadbalancer_apiserver_type == ''nginx'' (тип по умолчанию), ставя статический под nginx, который
    проксирует запросы к kube-apiserver контрол-плейна.

