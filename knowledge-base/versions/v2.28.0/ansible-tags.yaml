  - playbooks/boilerplate.yml
  - roles/bastion-ssh-config/tasks/main.yml
  standalone_run: safe
  notes: 'Доступен во всех основных плейбуках, так как boilerplate.yml импортируется каждым из них. Выполняется
    только при наличии группы bastion в инвентаре. Изменения ограничены генерацией ssh-конфига, зависимостей
    от download/facts нет — безопасен для изолированного запуска.

    '
  reliability: authoritative
- ansible_tag: bootstrap_os
  description: 'Всё, что связано с первичной подготовкой ОС узлов. Под тегом идёт роль bootstrap_os (плей
    facts.yml): определение дистрибутива, установка python3 при отсутствии, настройка apt/dnf/zypper-прокси,
    установка системных пакетов (через роль system_packages), задание hostname. Также тегом bootstrap_os
    помечены блоки роли kubernetes/preinstall: создание каталогов (0050), применение системных настроек
    sysctl/модулей (0080-system-configurations), NTP (0081), настройка resolv.conf/ systemd-resolved/NetworkManager
    и dhclient-хуков. Реально меняет состояние узлов: ставит пакеты, правит sysctl, hostname, сетевые/DNS-настройки.

    '
  playbooks:
  - cluster.yml
  - upgrade-cluster.yml
  - scale.yml
  - reset.yml
  - remove-node.yml
  affected_groups:
  - k8s_cluster
  - etcd
  - calico_rr
  roles:
  - bootstrap_os
  - system_packages
  - kubernetes/preinstall
  source_paths:
  - playbooks/facts.yml
  - roles/bootstrap_os/tasks/main.yml
  - roles/system_packages/tasks/main.yml
  - roles/kubernetes/preinstall/tasks/0080-system-configurations.yml
  - roles/kubernetes/preinstall/tasks/0050-create_directories.yml
  standalone_run: risky
  notes: 'Делает реальные изменения ОС (пакеты, sysctl, DNS), поэтому изолированный запуск небезопасен
    на живом кластере, хотя штатно идёт первым и как правило идемпотентен. Зависит от фактов (тег always/facts)
    и от определения дистрибутива в bootstrap_os. В reset.yml/remove-node.yml тег доступен только через
    роль bootstrap_os в facts.yml (в самой роли reset его нет).

    '
  reliability: authoritative
