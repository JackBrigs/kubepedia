  - remove-node.yml
  affected_groups:
  - etcd
  - k8s_cluster
  - calico_rr
  roles:
  - reset
  source_paths:
  - roles/reset/tasks/main.yml
  standalone_run: risky
  notes: 'Сбрасывает правила IPv6-фаервола — на действующем узле это может нарушить связность, применять
