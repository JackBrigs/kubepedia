    grace-period/timeout). Тот же тег через include_role применяется в roles/container-engine/validate-container-engine
    при обнаружении смены контейнерного движка, чтобы слить узел перед переустановкой рантайма.

    '
  playbooks:
  - remove-node.yml
  affected_groups:
  - target_nodes
  - k8s_cluster
  roles:
  - remove_node/pre_remove
  - container-engine/validate-container-engine
  source_paths:
  - playbooks/remove_node.yml
  - roles/remove_node/pre_remove/tasks/main.yml
  - roles/container-engine/validate-container-engine/tasks/main.yml
  standalone_run: risky
  notes: 'В таблице docs/ansible/ansible.md отдельно не указан (есть pre-upgrade/post-remove). Операция
    дренирования узла — disruptive (эвакуирует поды). В remove-node.yml affected_groups — узлы из переменной
    node; при смене рантайма — узлы k8s_cluster, где обнаружен работающий старый движок.

    '
  reliability: authoritative
- ansible_tag: pre-upgrade
  description: 'Подготовка узла к обновлению. Роль upgrade/pre-upgrade (в upgrade_cluster.yml) при необходимости
    делает паузу/подтверждение, проверяет состояние узла (Ready/schedulable), вычисляет needs_cordoning
