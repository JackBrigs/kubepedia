  source_paths:
  - roles/container-engine/cri-o/tasks/reset.yml
  standalone_run: unsafe
  notes: 'Тег reset_crio присвоен задачам только внутри cri-o/tasks/reset.yml. В v2.28.0 этот файл подключается
