- ansible_tag: iptables
  description: 'Сброс правил IPv4-фаервола при reset. Под тегом: установка политик ACCEPT для цепочек
    INPUT/FORWARD/OUTPUT, очистка таблиц filter/nat/mangle/raw и удаление пользовательских цепочек (iptables
    -X). Выполняется только при flush_iptables=true и ipv4_stack.

    '
  playbooks:
  - reset.yml
  - remove-node.yml
  affected_groups:
  - etcd
  - k8s_cluster
  - calico_rr
  roles:
  - reset
  source_paths:
  - roles/reset/tasks/main.yml
  standalone_run: risky
  notes: 'Сбрасывает правила IPv4-фаервола — на действующем узле может нарушить сетевую связность. Применять
    только в рамках сброса узла. Требует flush_iptables=true и ipv4_stack. Зависимостей от download/facts
    нет.

    '
  reliability: authoritative
- ansible_tag: k8s-pre-upgrade
  description: 'Предобновление контрол-плейна. В roles/kubernetes/control-plane/tasks/main.yml импортирует
    pre-upgrade.yml, который при изменении etcd-секретов (etcd_secret_changed) удаляет статические манифесты
    kube-apiserver/kube-controller-manager/kube-scheduler из /etc/kubernetes/manifests и принудительно
    удаляет соответствующие docker-контейнеры, чтобы поды перечитали новые сертификаты.

    '
  playbooks:
  - cluster.yml
  - upgrade-cluster.yml
  affected_groups:
  - kube_control_plane
  roles:
  - kubernetes/control-plane
  source_paths:
  - roles/kubernetes/control-plane/tasks/main.yml
  - roles/kubernetes/control-plane/tasks/pre-upgrade.yml
  standalone_run: risky
  notes: 'Задачи выполняются только при etcd_secret_changed | default(false); в обычном прогоне это no-op.
    Форс-удаление контейнеров рассчитано на docker-рантайм. При реальном срабатывании операция кратковременно
    роняет статические поды контрол-плейна, поэтому изолированный запуск потенциально опасен.

    '
  reliability: authoritative
- ansible_tag: kata-containers
  description: 'Разворачивает низкоуровневый рантайм Kata Containers в двух местах. На узлах (roles/container-engine/kata-containers)
