    '
  playbooks:
  - cluster.yml
  - upgrade_cluster.yml
  affected_groups:
  - kube_control_plane
  roles:
  - kubernetes-apps/external_cloud_controller/vsphere
  source_paths:
  - roles/kubernetes-apps/external_cloud_controller/vsphere/tasks/main.yml
  - roles/kubernetes-apps/external_cloud_controller/meta/main.yml
  standalone_run: safe
  notes: 'Условия включения: cloud_provider == "external" и external_cloud_provider == "vsphere". Важно
    не путать с тегом vsphere-csi-driver (это CCM, а не CSI). Задачи только на control_plane[0], идемпотентный
    kubectl apply/ConfigMap — изолированный запуск безопасен при живом кластере.

    '
  reliability: authoritative
- ansible_tag: facts
  description: 'Сбор фактов и вычисление производных переменных без изменений на узлах. Тегом помечены
    многочисленные задачи set_fact/include_vars/проверок по всему набору ролей: preinstall (0020-set_facts),
    bootstrap_os (определение дистрибутива, проверка python3), container-engine (containerd/docker/validate),
    download (prep_download, download_file/container — set_fact флагов и путей), etcd, kubernetes/node,
    control-plane, kubeadm, client, network_plugin/calico. Задачи вычисляют значения, используемые дальше
    остальными ролями.

    '
  playbooks:
  - cluster.yml
  - upgrade-cluster.yml
  - scale.yml
  - reset.yml
  - remove-node.yml
  affected_groups:
  - k8s_cluster
  - etcd
  - calico_rr
  roles:
  - kubernetes/preinstall
  - bootstrap_os
  - container-engine
  - download
  - etcd
  - kubernetes/node
  - kubernetes/control-plane
  - kubernetes/kubeadm
  - network_plugin/calico
  source_paths:
  - roles/kubernetes/preinstall/tasks/0020-set_facts.yml
  - roles/download/tasks/prep_download.yml
  - roles/bootstrap_os/tasks/main.yml
  - roles/etcd/tasks/main.yml
  standalone_run: safe
  notes: 'Только чтение и вычисление переменных, побочных эффектов на узлах нет — безопасен и часто добавляется
    к другим тегам (например preinstall,facts), чтобы обеспечить корректные значения. Часть fact-задач
    находится внутри блоков с тегом download, а минимальный набор фактов уже гарантируется тегом always
    в facts.yml.

    '
  reliability: authoritative
- ansible_tag: files
  description: 'Удаление файлов и каталогов при сбросе узла (роль reset). Под тегом: массовое удаление
    конфигов, данных и бинарников (kube_config_dir, /var/lib/kubelet, данные и конфиги etcd, каталоги
    CNI, сертификаты CA, бинарники kubelet/kubeadm/kubectl/etcd/ helm/calicoctl/crictl/containerd и др.),
    удаление бинарников containerd, удаление DNS-блоков из dhclient.conf и записей из /etc/hosts. Крайне
    деструктивная операция.

    '
  playbooks:
  - reset.yml
  - remove-node.yml
  affected_groups:
  - etcd
  - k8s_cluster
  - calico_rr
  roles:
  - reset
  source_paths:
  - roles/reset/tasks/main.yml
  standalone_run: unsafe
  notes: 'Необратимо удаляет конфигурацию, данные и бинарники Kubernetes/etcd/CNI. Запускать только в
    рамках осознанного сброса узла и никогда на рабочем кластере. Часть задач делит тег с dns. Прямых
    зависимостей от download/facts нет, но перед files в reset обычно останавливаются сервисы (тег services).

    '
  reliability: authoritative
- ansible_tag: flannel
  description: 'Разворачивает CNI-плагин Flannel (роль network_plugin/flannel, подключается при kube_network_plugin
    == ''flannel''). Детальный разбор внутренних задач роли в базе знаний не проводился.

    '
  playbooks:
  - cluster.yml
  - scale.yml
  - upgrade-cluster.yml
  affected_groups:
  - k8s_cluster
  roles:
  - network_plugin/flannel
  source_paths:
  - roles/network_plugin/meta/main.yml
  standalone_run: risky
  notes: 'Условие: kube_network_plugin == ''flannel'' (roles/network_plugin/meta/main.yml). Изолированный
    запуск risky: зависит от скачанных образов (тег download) и работающего control plane. Плагин не проиндексирован
    в базе знаний детально.

    '
  reliability: authoritative
- ansible_tag: gateway_api
  description: 'Устанавливает CRD Gateway API (роль kubernetes-apps/gateway_api). Скачивает манифест gateway-api-<channel>-install.yaml
    (downloads.gateway_api_crds), создаёт каталог addons/gateway_api, копирует туда манифест и применяет
    его через модуль kube (kubectl). Все задачи выполняются на первом узле kube_control_plane.

    '
  playbooks:
  - cluster.yml
  affected_groups:
  - kube_control_plane
  roles:
  - kubernetes-apps/gateway_api
  source_paths:
  - roles/kubernetes-apps/gateway_api/tasks/main.yml
  - playbooks/cluster.yml
  standalone_run: safe
  notes: 'Включается переменной gateway_api_enabled; набор CRD выбирается через gateway_api_channel. Роль
    kubernetes-apps/gateway_api подключена отдельным элементом play "Invoke kubeadm and install a CNI" в
    cluster.yml (delegate_to первого kube_control_plane, run_once). В upgrade_cluster.yml не участвует. Задачи
    сами скачивают манифест — изолированный запуск самодостаточен. ОТЛИЧИЕ ВЕРСИЙ: в v2.28.0 роль лежит
    в roles/kubernetes-apps/gateway_api и подключается на уровне плейбука; в v2.29.1 она перенесена в kubernetes-apps/common_crds/gateway_api.

    '
  reliability: authoritative
- ansible_tag: gcp-pd-csi-driver
  description: 'Разворачивает CSI-драйвер GCP Persistent Disk. Роль csi_driver/gcp_pd обязательно требует
    файл сервисного аккаунта cloud-sa.json, копирует его в kube_config_dir, кладёт в Secret и генерирует/применяет
    манифесты: setup (namespace/RBAC), Deployment контроллера, DaemonSet node-плагина и два StorageClass
    (regional и zonal). Тем же тегом помечена роль persistent_volumes/gcp-pd-csi, создающая StorageClass
    "gcp-pd-csi".

    '
  playbooks:
  - cluster.yml
  - upgrade_cluster.yml
  affected_groups:
  - kube_control_plane
  roles:
  - kubernetes-apps/csi_driver/gcp_pd
  - kubernetes-apps/persistent_volumes/gcp-pd-csi
  source_paths:
  - roles/kubernetes-apps/csi_driver/gcp_pd/tasks/main.yml
  - roles/kubernetes-apps/persistent_volumes/gcp-pd-csi/tasks/main.yml
  - roles/kubernetes-apps/meta/main.yml
  - roles/kubernetes-apps/persistent_volumes/meta/main.yml
  standalone_run: safe
  notes: 'Включается переменной gcp_pd_csi_enabled. Обязательна переменная gcp_pd_csi_sa_cred_file (путь
    к cloud-sa.json) — без неё роль падает на первом же шаге fail. Задачи только на control_plane[0],
    идемпотентный kubectl apply — изолированный запуск безопасен при живом кластере.

    '
  reliability: authoritative
- ansible_tag: gvisor
  description: 'Разворачивает песочничный рантайм gVisor. На узлах (roles/container-engine/gvisor) скачиваются
    бинарники runsc и containerd-shim-runsc-v1 и копируются в bin_dir. На control plane (roles/kubernetes-apps/container_runtimes/gvisor)
    генерируется и применяется манифест RuntimeClass gvisor.

    '
  playbooks:
  - cluster.yml
  - scale.yml
  - upgrade-cluster.yml
  affected_groups:
  - k8s_cluster
  - etcd
  - kube_control_plane
  roles:
  - container-engine/gvisor
  - kubernetes-apps/container_runtimes/gvisor
  source_paths:
  - roles/container-engine/gvisor/tasks/main.yml
  - roles/kubernetes-apps/container_runtimes/gvisor/tasks/main.yaml
  - roles/container-engine/meta/main.yml
  - roles/kubernetes-apps/container_runtimes/meta/main.yml
  standalone_run: risky
  notes: 'Установка на узлах выполняется при gvisor_enabled и только когда container_manager in [''docker'',
