  description: 'Разворачивает CNI-плагин Calico (роль network_plugin/calico, подключается при kube_network_plugin
    == ''calico''). Тег также создаёт связанные сетевые каталоги в roles/kubernetes/preinstall/tasks/0050-create_directories.yml.
    Детальный разбор внутренних задач роли в базе знаний не проводился.

    '
  playbooks:
  - cluster.yml
  - scale.yml
  - upgrade-cluster.yml
  affected_groups:
  - k8s_cluster
  roles:
  - network_plugin/calico
  - kubernetes/preinstall
  source_paths:
  - roles/network_plugin/meta/main.yml
  - roles/kubernetes/preinstall/tasks/0050-create_directories.yml
  standalone_run: risky
  notes: 'Условие подключения: kube_network_plugin == ''calico'' (roles/network_plugin/meta/main.yml).
    Изолированный запуск risky: зависит от скачанных образов/бинарников (тег download) и работающего control
    plane. Плагин не проиндексирован в базе знаний детально.

    '
  reliability: authoritative
- ansible_tag: calico_rr
  description: 'Настраивает Calico Route Reflector: в cluster.yml для группы calico_rr подключается роль
    network_plugin/calico/rr с тегами [''network'', ''calico_rr'']. Отдельная play выполняется на хостах
    группы calico_rr. Детальный разбор задач роли rr в базе знаний не проводился.

    '
  playbooks:
  - cluster.yml
  affected_groups:
  - calico_rr
  roles:
  - network_plugin/calico/rr
  source_paths:
  - playbooks/cluster.yml
  - roles/network_plugin/calico/rr
  standalone_run: risky
  notes: 'Применимо только при использовании Calico с настроенными route reflector''ами и наличии группы
    calico_rr в инвентаре. В upgrade_cluster.yml та же роль подключается только под тегом network (без
    calico_rr), поэтому тег calico_rr доступен фактически лишь в cluster.yml. Изолированный запуск risky:
    требует установленного Calico и работающего кластера. Плагин не проиндексирован в базе знаний детально.

    '
  reliability: authoritative
- ansible_tag: cert-manager
  description: 'Разворачивает cert-manager (роль kubernetes-apps/ingress_controller/cert_manager). Удаляет
    устаревший каталог addons/cert_manager и legacy-namespace, создаёт каталог манифестов, рендерит cert-manager.yml
    (все объекты контроллера) и cert-manager.crds.yml (CRD) и применяет их через kubectl.

    '
  playbooks:
  - cluster.yml
  - upgrade_cluster.yml
  affected_groups:
  - kube_control_plane
  roles:
  - kubernetes-apps/ingress_controller/cert_manager
  source_paths:
  - roles/kubernetes-apps/ingress_controller/cert_manager/tasks/main.yml
  - roles/kubernetes-apps/ingress_controller/meta/main.yml
  standalone_run: safe
  notes: 'Включается переменной cert_manager_enabled; все задачи только на первом узле kube_control_plane.
    Часть задач (удаление legacy-каталога/namespace) также помечена тегом upgrade. Идемпотентный kubectl
    apply на работающем кластере; требует доступного control plane. Образы контроллера подтягиваются kubelet-ом
    при старте подов.

    '
  reliability: authoritative
- ansible_tag: check
  description: 'Предварительные проверки окружения управляющей машины/узлов: соответствие версии Ansible
    диапазону (minimal_ansible_version <= v < maximal_ansible_version), наличие python netaddr и достаточно
    свежей Jinja. Все проверки — assert, выполняются run_once и ничего не меняют (playbooks/ansible_version.yml).

    '
  playbooks:
  - cluster.yml
  - upgrade-cluster.yml
  - scale.yml
  - reset.yml
  - remove-node.yml
  affected_groups:
  - all
  roles: []
  source_paths:
  - playbooks/ansible_version.yml
  standalone_run: safe
  notes: 'Плей ansible_version.yml помечен на уровне плея тегом always, а сами задачи — дополнительно
    тегом check, поэтому эти проверки выполняются при любом запуске и отдельный вызов --tags check лишь
    продублирует их. Только чтение, побочных эффектов нет — полностью безопасен.

    '
  reliability: authoritative
- ansible_tag: cilium
  description: 'Разворачивает CNI-плагин Cilium. В v2.28.0 Cilium устанавливается не из статических манифестов,
    а через бинарник cilium-cli по helm-values, сгенерированным Kubespray. Последовательность задач роли
    network_plugin/cilium (tasks/main.yml): check.yml -> install.yml -> remove_old_resources.yml (при
    cilium_remove_old_resources) -> apply.yml. check.yml выполняет валидацию параметров (assert): проверка
    cilium_ipsec_key для ipsec, совместимости cilium_encryption_type (ipsec|wireguard), минимальной версии
    ядра 5.6.0 для WireGuard, режима cilium_identity_allocation_mode (crd|kvstore), диапазона cilium_cluster_id
    (0-255), минимальной версии Cilium (cilium_min_version_required, в v2.28.0 = 1.15), а также значения
    cilium_hubble_event_buffer_capacity. install.yml: монтирует BPFFS в /sys/fs/bpf; при cilium_identity_allocation_mode
    == kvstore создаёт каталог cilium_cert_dir и жёстко линкует туда etcd-сертификаты (ca/cert/key); при
    cilium_enable_portmap кладёт /etc/cni/net.d/000-cilium-portmap.conflist; на первом узле kube_control_plane
    рендерит {{ kube_config_dir }}/cilium-values.yaml из templates/values.yaml.j2 и cilium-extra-values.yaml
    из cilium_extra_values; копирует бинарник cilium из {{ local_release_dir }} в {{ bin_dir }}. apply.yml:
    на первом control-plane запускает `cilium version` для выбора install|upgrade и выполняет `cilium
    <action> --version {{ cilium_version }} -f cilium-values.yaml -f cilium-extra-values.yaml {{ cilium_install_extra_flags
    }}`; ждёт готовности подов k8s-app=cilium; при заданных cilium_loadbalancer_ip_pools и cilium_bgp_*
    дожидается соответствующих CRD (CiliumLoadBalancerIPPool, CiliumBGPPeeringPolicy, CiliumBGPClusterConfig,
    CiliumBGPPeerConfig, CiliumBGPAdvertisement, CiliumBGPNodeConfigOverride), рендерит и применяет их
    манифесты. Дополнительно тег cilium создаёт сетевые каталоги в roles/kubernetes/preinstall/tasks/0050-create_directories.yml.
    Значения по умолчанию: cilium_identity_allocation_mode=crd, cilium_tunnel_mode=vxlan, cilium_kube_proxy_replacement=false,
    cilium_encryption_enabled=false, cilium_enable_hubble=false.

    '
  playbooks:
