    эвакуировать поды перед обновлением компонентов.

    '
  playbooks:
  - upgrade-cluster.yml
  affected_groups:
  - kube_control_plane
  - kube_node
  roles:
  - upgrade/pre-upgrade
  source_paths:
  - playbooks/upgrade_cluster.yml
  - roles/upgrade/pre-upgrade/tasks/main.yml
  standalone_run: risky
  notes: 'Операция дренирования disruptive. Выставляет факт needs_cordoning, который затем использует
