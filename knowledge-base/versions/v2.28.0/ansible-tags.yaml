    идемпотентный kubectl apply — изолированный запуск безопасен.

    '
  reliability: authoritative
- ansible_tag: external-openstack
  description: 'Разворачивает внешний OpenStack cloud-controller-manager. Подроль external_cloud_controller/openstack
    проверяет учётные данные OpenStack, при наличии external_openstack_cacert готовит base64-cacert, формирует
    cloud-config Secret и генерирует/применяет манифесты: RBAC-роли, привязки ролей и DaemonSet openstack-cloud-controller-manager.

    '
  playbooks:
  - cluster.yml
  - upgrade_cluster.yml
  affected_groups:
  - kube_control_plane
  roles:
  - kubernetes-apps/external_cloud_controller/openstack
  source_paths:
  - roles/kubernetes-apps/external_cloud_controller/openstack/tasks/main.yml
  - roles/kubernetes-apps/external_cloud_controller/meta/main.yml
  standalone_run: safe
  notes: 'Условия включения: cloud_provider == "external" и external_cloud_provider == "openstack". Задачи
    только на control_plane[0], идемпотентный kubectl apply — изолированный запуск безопасен при живом
    кластере и корректном external-openstack-cloud-config.

    '
  reliability: authoritative
- ansible_tag: external-provisioner
  description: 'Зонтичный тег роли kubernetes-apps/external_provisioner. Разворачивает внешние провиженеры
    томов, не относящиеся к облачным CSI: local-volume-provisioner и local-path-provisioner. Через meta-зависимости
    подключает соответствующие подроли в зависимости от их флагов включения; каждая создаёт namespace,
    RBAC, ConfigMap, рабочую нагрузку (DaemonSet/Deployment) и StorageClass.

    '
  playbooks:
  - cluster.yml
  - upgrade_cluster.yml
  affected_groups:
  - kube_control_plane
  - k8s_cluster
  roles:
  - kubernetes-apps/external_provisioner
  - kubernetes-apps/external_provisioner/local_volume_provisioner
  - kubernetes-apps/external_provisioner/local_path_provisioner
  source_paths:
  - roles/kubernetes-apps/external_provisioner/meta/main.yml
  - playbooks/cluster.yml
  - playbooks/upgrade_cluster.yml
  standalone_run: safe
  notes: 'Подроли активируются переменными local_volume_provisioner_enabled и local_path_provisioner_enabled.
    Роль запускается в play на hosts kube_control_plane; local-volume-provisioner дополнительно создаёт
    базовые каталоги на всех узлах k8s_cluster (отсюда k8s_cluster в affected_groups). Идемпотентный kubectl
    apply — изолированный запуск безопасен при живом кластере.

    '
  reliability: authoritative
- ansible_tag: external-vsphere
  description: 'Разворачивает внешний vSphere cloud-controller-manager (CPI). Подроль external_cloud_controller/vsphere
    проверяет учётные данные vSphere, формирует cloud-config (external-vsphere-cpi-cloud-config) и создаёт
    из него ConfigMap cloud-config через kubectl, затем генерирует и применяет манифесты: Secret, RBAC-роли,
