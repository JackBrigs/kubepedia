    '
  playbooks:
  - cluster.yml
  - upgrade-cluster.yml
  affected_groups:
  - kube_control_plane
  roles:
  - win_nodes/kubernetes_patch
  source_paths:
  - roles/win_nodes/kubernetes_patch/tasks/main.yml
  standalone_run: risky
  notes: 'Требует уже работающего кластера и доступного kubectl (kube_proxy_deployed), патчит запущенный
    DaemonSet kube-proxy — на живом кластере запускать осторожно. Роль импортируется с тегами control-plane,win_nodes
