    В отличие от прочих плагинов подключается по отдельному флагу kube_network_plugin_multus (а не по
    kube_network_plugin), то есть может работать поверх основного CNI. Детальный разбор внутренних задач
    роли в базе знаний не проводился.

    '
  playbooks:
  - cluster.yml
  - scale.yml
  - upgrade-cluster.yml
  affected_groups:
  - k8s_cluster
  roles:
  - network_plugin/multus
  source_paths:
  - roles/network_plugin/meta/main.yml
  standalone_run: risky
  notes: 'Условие: kube_network_plugin_multus == true (roles/network_plugin/meta/main.yml). Multus дополняет
    основной CNI, а не заменяет его. Изолированный запуск risky: зависит от работающего control plane
    и основного плагина. Плагин не проиндексирован в базе знаний детально.

    '
  reliability: authoritative
- ansible_tag: netchecker
  description: 'Устанавливает приложение Netchecker для проверки сетевой связности между подами. В roles/kubernetes-apps/ansible/tasks/main.yml
    (тег netchecker, условие deploy_netchecker) применяет набор манифестов через {{ kubectl_apply_stdin
    }} (namespace netcheck_namespace): ns, agent-sa, agent-ds, agent-hostnet-ds, server-sa, server-clusterrole,
    server-clusterrolebinding, server-deployment, server-svc. Выполняется run_once с делегированием на
    первый узел kube_control_plane.

    '
  playbooks:
  - cluster.yml
  - upgrade-cluster.yml
  affected_groups:
  - kube_control_plane
  roles:
  - kubernetes-apps/ansible
  source_paths:
  - roles/kubernetes-apps/ansible/tasks/main.yml
  standalone_run: risky
  notes: 'Применяется только при deploy_netchecker=true (по умолчанию отключён). Изолированный запуск
