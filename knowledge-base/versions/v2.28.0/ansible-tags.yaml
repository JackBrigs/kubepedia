tags:
- ansible_tag: always
  description: 'Специальный тег Ansible: задачи и плеи, помеченные always, выполняются при любом запуске
    независимо от --tags/--skip-tags (отменить можно только явным --skip-tags always). В kubespray v2.28.0
    под always собраны предварительные проверки и подготовка окружения из импортируемых плейбуков: проверка
    версии Ansible и наличия python-netaddr/jinja (playbooks/ansible_version.yml), приведение легаси-имён
    групп инвентаря к каноническим инлайновой задачей group_by и валидация инвентаря ролью validate_inventory
    (плеи "Define groups for legacy less structured inventories" и "Check inventory settings" в playbooks/boilerplate.yml),
    а также сбор минимальных, сетевых и аппаратных фактов и вычисление сетевых фактов ролью network_facts
    (плей "Gather facts" в playbooks/facts.yml). Реальных изменений на узлах эти задачи почти не делают —
    это проверки и подготовка фактов, без которых остальные роли работать не могут.

    '
  playbooks:
  - cluster.yml
  - upgrade-cluster.yml
  - scale.yml
  - reset.yml
  - remove-node.yml
  affected_groups:
  - all
  - k8s_cluster
  - etcd
  - calico_rr
  roles:
  - validate_inventory
  - network_facts
  source_paths:
  - playbooks/ansible_version.yml
  - playbooks/boilerplate.yml
  - playbooks/facts.yml
  standalone_run: safe
  notes: 'Изолированный запуск невозможен по смыслу: always выполняется всегда и в дополнение к любым выбранным
    тегам, а не вместо них. Именно always гарантирует наличие фактов (ansible_default_ipv4/ipv6, *_ipv[46]*,
    *total_mb) для узкоспециализированных запусков вроде --tags resolvconf. ВАЖНО (расхождение с ожиданием):
    роль kubespray_defaults подключается в каждом плее без тега (role: kubespray_defaults), то есть НЕ входит
    в always; при узком наборе --tags её задачи, задающие переменные, могут не выполниться — это известная
    особенность работы с тегами в kubespray. ОТЛИЧИЕ ВЕРСИЙ: в v2.28.0 приведение имён групп выполняется инлайновой
    задачей group_by в boilerplate.yml (в v2.29.1 её заменила отдельная роль dynamic_groups), а плей сбора
    фактов лежит в playbooks/facts.yml (в v2.29.1 — playbooks/internal_facts.yml). В docs/ansible/ansible.md
    тег always отдельно не описан.

    '
  reliability: authoritative
- ansible_tag: annotate
  description: 'Проставляет аннотации узлам для сетевого плагина kube-router. Под тегом идёт импорт roles/network_plugin/kube-router/tasks/annotate.yml,
    где через kubectl annotate навешиваются аннотации на узлы kube_control_plane, kube_node и общие для
    всех (переменные kube_router_annotations_master/node/all). Реально выполняется только если kube_network_plugin
    == kube-router — роль network_plugin диспетчеризует подроль kube-router через meta.

    '
  playbooks:
  - cluster.yml
  - upgrade-cluster.yml
  - scale.yml
  affected_groups:
  - k8s_cluster
  - kube_control_plane
  - kube_node
  roles:
  - network_plugin/kube-router
  source_paths:
  - roles/network_plugin/kube-router/tasks/main.yml
  - roles/network_plugin/kube-router/tasks/annotate.yml
  standalone_run: risky
  notes: 'Требует работающего кластера и доступного kubectl (задачи делегируются на kube_control_plane[0])
    и осмысленен только при kube_network_plugin == kube-router. Изолированный запуск ничего не сломает,
    но и не развернёт kube-router — только обновит аннотации; без остальных задач сети практической ценности
    мало. Роль network_plugin подключена в плеях с тегом network (cluster.yml — hosts k8s_cluster; scale.yml
    — kube_node; upgrade-cluster.yml — kube_control_plane:calico_rr:kube_node).

    '
  reliability: authoritative
- ansible_tag: apps
  description: 'Сквозной тег для развёртывания прикладных дополнений кластера (роль kubernetes-apps в
    плейбуке "Install Kubernetes apps"). Этим тегом помечена сама мета-роль kubernetes-apps, поэтому он
    покрывает весь набор её зависимостей: kubernetes-apps/ansible (CoreDNS, nodelocaldns, dashboard, netchecker,
    etcd-метрики), helm, registry, metrics_server, CSI-драйверы и csi_crd, persistent_volumes, snapshots,
    container_runtimes (kata/gvisor/crun/youki), container_engine_accelerator (nvidia_gpu), kubelet-csr-approver,
    metallb, argocd, scheduler_plugins, node_feature_discovery. Кроме того, тег apps явно проставлен на
    подролях external_provisioner (local-path/local-volume), container_runtimes, container_engine_accelerator
    и ingress_controller (ingress-nginx/cert-manager/ingress_alb). Каждая подроль включается своим собственным
    *_enabled-условием, поэтому фактический состав зависит от inventory.

    '
  playbooks:
  - cluster.yml
  - upgrade_cluster.yml
  affected_groups:
  - kube_control_plane
  roles:
  - kubernetes-apps
  source_paths:
  - playbooks/cluster.yml
  - playbooks/upgrade_cluster.yml
  - roles/kubernetes-apps/meta/main.yml
  - roles/kubernetes-apps/ansible/tasks/main.yml
  - roles/kubernetes-apps/external_provisioner/meta/main.yml
  - roles/kubernetes-apps/container_runtimes/meta/main.yml
  - roles/kubernetes-apps/container_engine_accelerator/meta/main.yml
  - roles/kubernetes-apps/ingress_controller/meta/main.yml
  standalone_run: risky
  notes: 'Очень широкий составной тег. Большинство задач выполняется на первом узле kube_control_plane
    (условие inventory_hostname == groups[''kube_control_plane''][0] или run_once/delegate_to), часть
    (helm) — на всех control-plane узлах. Требует уже работающего control plane, доступного kubectl/kubeconfig
    и обычно предварительно скачанных образов (тег download). Изолированный запуск на живом кластере идемпотентен,
    но затрагивает множество компонентов сразу; на ещё не развёрнутом кластере небезопасен.

    '
  reliability: authoritative
- ansible_tag: argocd
  description: 'Разворачивает Argo CD (роль kubernetes-apps/argocd). Скачивает бинарь yq и удалённый install-манифест
    Argo CD, копирует их на узел, через yq проставляет целевой namespace, рендерит argocd-namespace.yml
    и применяет манифесты через kubectl. При заданной переменной argocd_admin_password дополнительно патчит
    секрет argocd-secret, устанавливая bcrypt-хэш пароля администратора.

    '
  playbooks:
  - cluster.yml
  - upgrade_cluster.yml
  affected_groups:
  - kube_control_plane
  roles:
  - kubernetes-apps/argocd
  source_paths:
  - roles/kubernetes-apps/argocd/tasks/main.yml
  - roles/kubernetes-apps/meta/main.yml
  standalone_run: risky
  notes: 'Включается переменной argocd_enabled; выполняется только на первом узле kube_control_plane.
    При изолированном запуске задачи сами скачивают yq и install-манифест (нужен доступ в сеть/прокси).
    Если задан argocd_admin_password — пароль admin будет перезаписан при каждом прогоне.

    '
  reliability: authoritative
- ansible_tag: asserts
  description: 'Проверочные (assert) задачи без изменений на узлах. Включает проверку корректности пользовательских
    настроек кластера — 0040-verify-settings.yml роли kubernetes/preinstall; предварительные проверки
    для роли download на управляющем узле localhost (наличие доступа к container runtime без sudo или
    возможности стать root при download_localhost) в prep_download.yml; сверку sha256-дайджеста уже загруженного
    образа с требуемым тегом при pull_by_digest в check_pull_required.yml.

    '
  playbooks:
  - cluster.yml
  - upgrade-cluster.yml
  - scale.yml
  affected_groups:
  - k8s_cluster
  - etcd
  - localhost
  roles:
  - kubernetes/preinstall
  - download
  source_paths:
  - roles/kubernetes/preinstall/tasks/main.yml
  - roles/kubernetes/preinstall/tasks/0040-verify-settings.yml
  - roles/download/tasks/prep_download.yml
  - roles/download/tasks/check_pull_required.yml
  standalone_run: safe
  notes: 'Задачи только читают/проверяют и не меняют состояние узлов, поэтому запуск относительно безопасен,
    но требует уже собранных фактов (тег always/facts) — без них проверки настроек упадут. Часть asserts
    в download привязана к download_localhost, часть — к pull_by_digest, поэтому набор выполняемых проверок
    зависит от переменных. В docs описан как "Check tasks for download role", но по коду покрывает также
    verify-settings в preinstall (расхождение отмечено).

    '
  reliability: authoritative
- ansible_tag: aws-ebs-csi-driver
  description: 'Разворачивает CSI-драйвер AWS EBS. Роль csi_driver/aws_ebs генерирует и применяет через
    kubectl манифесты: сам объект CSIDriver (aws-ebs-csi-driver.yml), RBAC и Deployment контроллер-сервиса
    (aws-ebs-csi-controllerservice), а также DaemonSet node-сервиса (aws-ebs-csi-nodeservice). Дополнительно
    этим же тегом помечена роль persistent_volumes/aws-ebs-csi, которая создаёт StorageClass "aws-ebs-csi".

    '
  playbooks:
  - cluster.yml
  - upgrade_cluster.yml
  affected_groups:
  - kube_control_plane
  roles:
  - kubernetes-apps/csi_driver/aws_ebs
  - kubernetes-apps/persistent_volumes/aws-ebs-csi
  source_paths:
  - roles/kubernetes-apps/csi_driver/aws_ebs/tasks/main.yml
  - roles/kubernetes-apps/persistent_volumes/aws-ebs-csi/tasks/main.yml
  - roles/kubernetes-apps/meta/main.yml
  - roles/kubernetes-apps/persistent_volumes/meta/main.yml
  standalone_run: safe
  notes: 'Включается переменной aws_ebs_csi_enabled (StorageClass — дополнительно при persistent_volumes_enabled).
    Все задачи только на control_plane[0], идемпотентный kubectl apply в существующий кластер — изолированный
    запуск безопасен. Требуется работающий кластер и доступ к AWS (IAM у нод/ролей).

    '
  reliability: authoritative
- ansible_tag: azure-csi-driver
  description: 'Разворачивает CSI-драйвер Azure Disk. Роль csi_driver/azuredisk проверяет учётные данные
    Azure (azure-credential-check.yml), формирует cloud-config (azure_csi_cloud_config), кладёт его в
    Secret и генерирует/применяет манифесты: объект CSIDriver, RBAC и Deployment контроллера (azure-csi-azuredisk-controller)
    и DaemonSet node-плагина (azure-csi-azuredisk-node). Тем же тегом помечена роль persistent_volumes/azuredisk-csi,
    создающая StorageClass "azure-csi".

    '
  playbooks:
  - cluster.yml
  - upgrade_cluster.yml
  affected_groups:
  - kube_control_plane
  roles:
  - kubernetes-apps/csi_driver/azuredisk
  - kubernetes-apps/persistent_volumes/azuredisk-csi
  source_paths:
  - roles/kubernetes-apps/csi_driver/azuredisk/tasks/main.yml
  - roles/kubernetes-apps/persistent_volumes/azuredisk-csi/tasks/main.yml
  - roles/kubernetes-apps/meta/main.yml
  - roles/kubernetes-apps/persistent_volumes/meta/main.yml
  standalone_run: safe
  notes: 'Включается переменной azure_csi_enabled (StorageClass — при persistent_volumes_enabled). Требует
    корректных переменных Azure (azure_* cloud-config), иначе шаг проверки учётных данных остановит прогон.
    Задачи только на control_plane[0], идемпотентный kubectl apply — изолированный запуск безопасен при
    живом кластере.

    '
  reliability: authoritative
- ansible_tag: bastion
  description: 'Настраивает SSH-конфигурацию для прыжкового узла (bastion). Под тегом выполняется роль
