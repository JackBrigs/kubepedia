- ansible_tag: haproxy
  description: 'Разворачивает локальный балансировщик apiserver на базе HAProxy. В roles/kubernetes/node/tasks/main.yml
    подключает loadbalancer/haproxy.yml, который ставит статический под haproxy (localhost-прокси к apiserver''ам
    контрол-плейна). Выполняется только при loadbalancer_apiserver_localhost и loadbalancer_apiserver_type
    == ''haproxy'' на узлах, не являющихся контрол-плейном (или при kube_apiserver_bind_address != ''::'').

    '
  playbooks:
  - cluster.yml
  - upgrade-cluster.yml
  - scale.yml
  affected_groups:
  - kube_node
  roles:
  - kubernetes/node
  source_paths:
  - roles/kubernetes/node/tasks/main.yml
  - roles/kubernetes/node/tasks/loadbalancer/haproxy.yml
  standalone_run: risky
  notes: 'В ansible.md отдельной строкой не документирован (описан обобщённо через nginx/LB). Требует
    собранных фактов и созданных каталогов манифестов kubelet; имеет смысл только при выбранном типе LB
    haproxy. Изолированный запуск перезаписывает статический под LB на воркерах.

    '
  reliability: authoritative
- ansible_tag: helm
  description: 'Устанавливает клиент Helm на узлы control-plane (роль kubernetes-apps/helm). Ставит PyYaml,
    скачивает архив Helm, копирует бинарь helm в bin_dir и настраивает bash-автодополнение (/etc/bash_completion.d/helm.sh).
    Сам по себе никаких объектов в кластер не деплоит.

    '
  playbooks:
  - cluster.yml
  - upgrade_cluster.yml
  affected_groups:
  - kube_control_plane
  roles:
  - kubernetes-apps/helm
  source_paths:
  - roles/kubernetes-apps/helm/tasks/main.yml
  - roles/kubernetes-apps/meta/main.yml
  standalone_run: safe
  notes: 'Включается переменной helm_enabled. В отличие от большинства аддонов выполняется на ВСЕХ узлах
    kube_control_plane (нет ограничения на первый узел). Ставит только бинарь Helm, поэтому изолированный
    запуск безопасен; требует доступа к загрузке архива Helm.

    '
  reliability: authoritative
- ansible_tag: ingress-controller
  description: 'Составной тег роли kubernetes-apps/ingress_controller. В зависимости от inventory разворачивает
    один или несколько контроллеров ingress: NGINX Ingress (ingress_nginx_enabled), cert-manager (cert_manager_enabled)
    и AWS ALB Ingress Controller (ingress_alb_enabled). Подроли помечены также тегами apps, ingress-nginx,
    cert-manager, ingress_alb.

    '
  playbooks:
  - cluster.yml
  - upgrade_cluster.yml
  affected_groups:
  - kube_control_plane
  roles:
  - kubernetes-apps/ingress_controller
  source_paths:
  - roles/kubernetes-apps/ingress_controller/meta/main.yml
  - playbooks/cluster.yml
  - playbooks/upgrade_cluster.yml
  standalone_run: safe
  notes: 'Подключается отдельной ролью в cluster.yml и upgrade_cluster.yml на группе kube_control_plane;
    фактические задачи выполняются на первом узле. Состав зависит от *_enabled-переменных; при выключенных
    всех трёх — ничего не деплоит. Идемпотентно на работающем кластере.

    '
  reliability: authoritative
- ansible_tag: ingress-nginx
  description: 'Разворачивает NGINX Ingress Controller (роль kubernetes-apps/ingress_controller/ingress_nginx).
    Создаёт namespace, ConfigMap-ы (основной, tcp-services, udp-services), ServiceAccount, ClusterRole/ClusterRoleBinding,
    Role/RoleBinding, IngressClass и DaemonSet контроллера. При ingress_nginx_host_network=false добавляет
    Service, при ingress_nginx_webhook_enabled — объекты admission-webhook (SA, RBAC, Job, Service).

    '
  playbooks:
  - cluster.yml
  - upgrade_cluster.yml
  affected_groups:
  - kube_control_plane
  roles:
  - kubernetes-apps/ingress_controller/ingress_nginx
  source_paths:
  - roles/kubernetes-apps/ingress_controller/ingress_nginx/tasks/main.yml
  - roles/kubernetes-apps/ingress_controller/meta/main.yml
  standalone_run: safe
  notes: 'Включается переменной ingress_nginx_enabled; все задачи на первом узле kube_control_plane. Набор
    объектов зависит от ingress_nginx_host_network и ingress_nginx_webhook_enabled. Идемпотентный apply;
