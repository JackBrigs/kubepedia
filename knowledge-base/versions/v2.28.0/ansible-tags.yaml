    или csi_snapshot_controller_enabled), а также все включённые драйверы (cinder, aws_ebs, azuredisk,
    gcp_pd, upcloud, vsphere) и роль snapshots. Для каждого включённого драйвера генерирует и применяет
    через kubectl манифесты (Deployment/DaemonSet контроллера и node-плагина, RBAC, секреты cloud-config).
    В upgrade_cluster.yml вынесен отдельным ранним шагом на control-plane, чтобы обновить CSI до остальных
    приложений.

    '
  playbooks:
  - cluster.yml
  - upgrade_cluster.yml
  affected_groups:
  - kube_control_plane
  roles:
  - kubernetes-apps
  - kubernetes-apps/csi_driver/csi_crd
  - kubernetes-apps/csi_driver/cinder
  - kubernetes-apps/csi_driver/aws_ebs
  - kubernetes-apps/csi_driver/azuredisk
  - kubernetes-apps/csi_driver/gcp_pd
  - kubernetes-apps/csi_driver/upcloud
  - kubernetes-apps/csi_driver/vsphere
  - kubernetes-apps/snapshots
  source_paths:
  - roles/kubernetes-apps/meta/main.yml
  - roles/kubernetes-apps/csi_driver/csi_crd/tasks/main.yml
  - playbooks/upgrade_cluster.yml
  standalone_run: safe
  notes: 'Фактически выполняются только те драйверы, чьи флаги включены (cinder_csi_enabled, aws_ebs_csi_enabled,
    azure_csi_enabled, gcp_pd_csi_enabled, upcloud_csi_enabled, vsphere_csi_enabled); csi_crd применяется
    при cinder_csi_enabled или csi_snapshot_controller_enabled. Все задачи выполняются на groups[''kube_control_plane''][0]
    и сводятся к идемпотентному kubectl apply в работающий кластер, поэтому запуск изолированно безопасен
    при условии живого кластера, наличия kubectl/kube_config_dir и корректных облачных учётных данных.
    Образы тянет kubelet, поэтому тег download не обязателен.

    '
  reliability: authoritative
- ansible_tag: custom_cni
  description: 'Разворачивает пользовательский CNI (роль network_plugin/custom_cni, kube_network_plugin
    == ''custom_cni''). По коду tasks/main.yml: при пустом custom_cni_chart_release_name проверяет непустоту
    custom_cni_manifests, копирует пользовательские манифесты в kube_config_dir и применяет их через модуль
    kube на первом узле control plane. Детальный разбор в базе знаний не проводился.

    '
  playbooks:
  - cluster.yml
  - scale.yml
  - upgrade-cluster.yml
  affected_groups:
  - k8s_cluster
  roles:
  - network_plugin/custom_cni
  source_paths:
  - roles/network_plugin/meta/main.yml
  - roles/network_plugin/custom_cni/tasks/main.yml
  standalone_run: risky
  notes: 'Условие: kube_network_plugin == ''custom_cni''. Изолированный запуск risky: применение манифестов
    делегируется на kube_control_plane[0] и требует работающего kubectl/кластера, а также заданных custom_cni_manifests
    или custom_cni_chart_release_name. Плагин не проиндексирован в базе знаний детально.

    '
  reliability: authoritative
- ansible_tag: dashboard
  description: 'Разворачивает Kubernetes Dashboard (задача "Kubernetes Apps | Dashboard" в роли kubernetes-apps/ansible).
    Рендерит шаблон dashboard.yml.j2 и применяет его через kubectl apply в namespace dashboard_namespace.

    '
  playbooks:
  - cluster.yml
  - upgrade_cluster.yml
  affected_groups:
  - kube_control_plane
  roles:
  - kubernetes-apps/ansible
  source_paths:
  - roles/kubernetes-apps/ansible/tasks/main.yml
  - roles/kubernetes-apps/meta/main.yml
  standalone_run: safe
  notes: 'Включается переменной dashboard_enabled. Задача выполняется через run_once и delegate_to первого
    узла kube_control_plane. Роль kubernetes-apps/ansible входит в состав мета-роли kubernetes-apps (тег
    apps). Идемпотентный apply на работающем кластере.

    '
  reliability: authoritative
- ansible_tag: dns
  description: 'Удаление DNS-настроек при сбросе узла (роль reset). Под тегом убираются записи, добавленные
    kubespray: блок Ansible-записей из /etc/dhclient.conf и /etc/dhcp/dhclient.conf, а также блок "Ansible
    inventory hosts" из /etc/hosts. Тег идёт в паре с files.

    '
  playbooks:
  - reset.yml
  - remove-node.yml
  affected_groups:
  - etcd
  - k8s_cluster
  - calico_rr
  roles:
  - reset
  source_paths:
  - roles/reset/tasks/main.yml
  standalone_run: risky
  notes: 'Часть деструктивного сценария reset: удаляет DNS-записи с узлов. Изолированный запуск технически
    возможен и ограничен только правкой dhclient/hosts, но применять его надо осознанно — он предполагает
    вывод узла из кластера. Отдельных зависимостей от download/facts нет.

    '
  reliability: authoritative
- ansible_tag: docker
  description: 'Разворачивает движок Docker и его CRI-обёртку. Роль roles/container-engine/docker подключает
    apt/yum-репозитории Docker CE, ставит пакеты docker-ce/docker-ce-cli и containerd, настраивает systemd
    drop-in (опции демона, DNS, прокси), устанавливает docker-плагины и запускает сервис docker. Дополнительно
    при container_manager == ''docker'' разворачивается cri-dockerd (roles/container-engine/cri-dockerd):
    бинарник cri-dockerd, systemd-юнит и socket, необходимые как CRI для kubelet.

    '
  playbooks:
  - cluster.yml
  - scale.yml
  - upgrade-cluster.yml
  affected_groups:
  - k8s_cluster
  - etcd
  roles:
  - container-engine/docker
  - container-engine/cri-dockerd
  source_paths:
  - roles/container-engine/docker/tasks/main.yml
  - roles/container-engine/cri-dockerd/tasks/main.yml
  - roles/container-engine/meta/main.yml
  standalone_run: risky
  notes: 'Роль cri-dockerd подключается только при container_manager == ''docker'' (roles/container-engine/meta/main.yml);
    сам docker управляется этой же логикой. Имя docker также используется как тег в roles/reset/tasks/main.yml
    (Reset | Remove Docker вызывает container-engine/docker tasks_from: reset при container_manager ==
    ''docker''). Изолированный запуск зависит от фактов ОС, доступа к репозиториям пакетов и скачивания;
    приемлем для переустановки/переконфигурации на подготовленных узлах.

    '
  reliability: authoritative
- ansible_tag: download
  description: 'Загрузка бинарников и container-образов ролью download: подготовка каталогов и переменных
    (prep_download), получение kubeadm и списка нужных образов, скачивание файлов (download_file.yml)
    и образов (download_container.yml) с поддержкой кэша на управляющем узле (download_run_once/download_localhost/download_force_cache).
    Может как скачивать на каждый узел, так и тянуть один раз на делегата и раскладывать по узлам.

    '
  playbooks:
  - cluster.yml
  - upgrade-cluster.yml
  - scale.yml
  affected_groups:
  - k8s_cluster
  - etcd
  - kube_control_plane
  roles:
  - download
  source_paths:
  - roles/download/tasks/main.yml
  - roles/download/tasks/prep_download.yml
  - roles/download/tasks/download_file.yml
  - roles/download/tasks/download_container.yml
  standalone_run: safe
  notes: 'Штатно используется для предзагрузки: docs показывают запуск "--tags download --skip-tags upload,upgrade"
    с download_run_once/download_localhost. Требует собранных фактов и вычисленных переменных из preinstall/set_container_facts
    (в плеях download идёт после preinstall). Отключается через skip_downloads. Само по себе не устанавливает
    и не апгрейдит компоненты — только скачивает/кэширует.

    '
  reliability: authoritative
- ansible_tag: etcd
  description: 'Тег уровня роли etcd (навешен на роль целиком в install_etcd.yml и scale.yml). Разворачивает
    и конфигурирует кластер etcd: проверяет/генерирует сертификаты (при cert_management=="script"), доверяет
    etcd CA, устанавливает бинари etcd и etcdctl/etcdutl, ставит выбранный тип развёртывания (install_{{
    etcd_deployment_type }}.yml — host/docker/kubeadm), генерирует systemd-юниты и конфиг, делает refresh_config
    для идемпотентности начального состояния кластера и при смене сертификатов перезапускает etcd/etcd-events.
    В scale.yml на воркерах ставит только клиентские etcd-сертификаты для CNI, требующих etcd.

    '
  playbooks:
  - cluster.yml
  - upgrade-cluster.yml
  - scale.yml
  affected_groups:
  - etcd
  - kube_control_plane
  - k8s_cluster
  roles:
  - etcd
  - etcdctl_etcdutl
  source_paths:
  - playbooks/install_etcd.yml
  - playbooks/scale.yml
  - roles/etcd/tasks/main.yml
  standalone_run: risky
  notes: 'install_etcd.yml импортируется из cluster.yml, upgrade_cluster.yml и scale.yml. Роль действует
    только при etcd_deployment_type != "kubeadm" (для kubeadm-режима etcd поднимает сам kubeadm). Зависит
    от собранных фактов, скачанных образов/бинарей etcd и наличия сертификатов; изолированный запуск затрагивает
    членство и состояние etcd-кластера, поэтому потенциально опасен на проде.

    '
  reliability: authoritative
- ansible_tag: etcd-secrets
  description: 'Управляет сертификатами и ключами etcd. В roles/etcd/tasks/main.yml выполняет include_tasks
    check_certs.yml и gen_certs_script.yml (проверка и генерация etcd-сертификатов скриптом), а также
    upd_ca_trust.yml — добавление etcd CA в доверенные на узлах etcd и kube_control_plane, а при CNI,
    которым нужен etcd (calico/flannel/cilium), — и на узлах k8s_cluster. Реально меняет файлы сертификатов
    в etcd_cert_dir и системное хранилище доверенных CA.

    '
  playbooks:
  - cluster.yml
  - upgrade-cluster.yml
  - scale.yml
  affected_groups:
  - etcd
  - kube_control_plane
  - k8s_cluster
  roles:
  - etcd
  source_paths:
  - roles/etcd/tasks/main.yml
  standalone_run: risky
  notes: 'Все задачи тега работают только при cert_management == "script". Генерация делегируется на первый
    etcd-узел и требует собранных фактов; изменение сертификатов выставляет etcd_secret_changed и в обычном
    прогоне ведёт к перезапуску etcd, поэтому изолированный запуск для ротации сертификатов следует делать
    осознанно.

    '
  reliability: authoritative
- ansible_tag: etcd_metrics
  description: 'Публикует Endpoints и Service для сбора метрик etcd. В roles/kubernetes-apps/ansible/tasks/main.yml
    применяет шаблоны etcd_metrics-endpoints.yml.j2 и etcd_metrics-service.yml.j2 (kubectl apply, делегировано
    на первый kube_control_plane), создавая в кластере объекты для скрейпинга метрик etcd Prometheus''ом.
    Выполняется только если заданы etcd_metrics_port и etcd_metrics_service_labels.

    '
  playbooks:
  - cluster.yml
  - upgrade-cluster.yml
  affected_groups:
  - kube_control_plane
  roles:
  - kubernetes-apps/ansible
  source_paths:
  - roles/kubernetes-apps/ansible/tasks/main.yml
  standalone_run: risky
  notes: 'Роль kubernetes-apps подключается под тегом apps в cluster.yml и upgrade_cluster.yml. Требует
    работающего apiserver и заданных переменных etcd_metrics_port/etcd_metrics_service_labels — иначе
    задачи пропускаются. Создаёт только объекты API (Endpoints/Service), файлы на узлах не меняет.

    '
  reliability: authoritative
- ansible_tag: etcdctl
  description: 'Устанавливает клиентские утилиты etcd. Через import_role etcdctl_etcdutl (в roles/etcd/tasks/main.yml
    для узлов группы etcd при etcd_cluster_setup и в roles/kubernetes/control-plane/tasks/kubeadm-etcd.yml
    при etcd_deployment_type=="kubeadm") копирует бинари etcdctl и etcdutl в bin_dir (из docker-образа
    etcd либо из скачанного архива для containerd/crio) и создаёт wrapper-скрипт etcdctl.sh с преднастроенными
    сертификатами/эндпоинтами.

    '
  playbooks:
  - cluster.yml
  - upgrade-cluster.yml
  - scale.yml
  affected_groups:
  - etcd
  - kube_control_plane
  roles:
  - etcd
  - etcdctl_etcdutl
  - kubernetes/control-plane
  source_paths:
  - roles/etcd/tasks/main.yml
  - roles/kubernetes/control-plane/tasks/kubeadm-etcd.yml
  - roles/etcdctl_etcdutl/tasks/main.yml
  standalone_run: risky
  notes: 'import_role etcdctl_etcdutl помечен сразу тремя тегами (etcdctl, etcdutl, upgrade), поэтому
    любой из них запускает установку обеих утилит. Требует доступного образа/архива etcd (download); при
    container_manager=="docker" использует запуск временного контейнера etcdxtl-binarycopy. Сам по себе
    операция не разрушающая — только копирование бинарей и скрипта.

    '
  reliability: authoritative
- ansible_tag: etcdutl
  description: 'Полный синоним etcdctl по коду: тот же import_role etcdctl_etcdutl в roles/etcd/tasks/main.yml
    и roles/kubernetes/control-plane/tasks/kubeadm-etcd.yml помечен одновременно тегами etcdctl и etcdutl,
    поэтому запуск с --tags etcdutl устанавливает обе утилиты (etcdctl и etcdutl) в bin_dir и создаёт
    wrapper etcdctl.sh. Отдельного набора задач только под etcdutl нет.

    '
  playbooks:
  - cluster.yml
  - upgrade-cluster.yml
  - scale.yml
  affected_groups:
  - etcd
  - kube_control_plane
  roles:
  - etcd
  - etcdctl_etcdutl
  - kubernetes/control-plane
  source_paths:
  - roles/etcd/tasks/main.yml
  - roles/kubernetes/control-plane/tasks/kubeadm-etcd.yml
  - roles/etcdctl_etcdutl/tasks/main.yml
  standalone_run: risky
  notes: 'Ведёт себя идентично тегу etcdctl (общий import_role с обоими тегами). Требует скачанного образа/архива
    etcd. Не разрушающая операция — копирование бинарей.

    '
  reliability: authoritative
- ansible_tag: etchosts
  description: 'Управляет блоком записей инвентаря в /etc/hosts. В roles/kubernetes/preinstall/tasks/main.yml
    импортирует 0090-etchosts.yml: формирует на localhost блок "Ansible inventory hosts" из адресов и имён
    узлов групп k8s_cluster/etcd/calico_rr (IPv4, при dual-stack — и IPv6) и через blockinfile добавляет
    или удаляет его на узлах (state зависит от populate_inventory_to_hosts_file). Дополнительно обновляет
    запись самого хоста и, при управлении localhost-блоками, соответствующие строки /etc/hosts.

    '
  playbooks:
  - cluster.yml
  - upgrade-cluster.yml
  - scale.yml
  - reset.yml
  - remove-node.yml
  affected_groups:
  - k8s_cluster
  - etcd
  - calico_rr
  roles:
  - kubernetes/preinstall
  source_paths:
  - roles/kubernetes/preinstall/tasks/main.yml
  - roles/kubernetes/preinstall/tasks/0090-etchosts.yml
  standalone_run: safe
  notes: 'Импорт 0090-etchosts.yml помечен сразу двумя тегами — bootstrap_os и etchosts, поэтому эти задачи
    выполняются и при --tags bootstrap_os, и при --tags etchosts. Меняет только /etc/hosts, зависимостей
    от download нет, но требует собранных фактов узлов (always/facts) для вычисления адресов. В таблице docs/ansible/ansible.md
    отдельной строкой не описан.

    '
  reliability: authoritative
- ansible_tag: external-cloud-controller
  description: 'Зонтичный тег роли kubernetes-apps/external_cloud_controller. Разворачивает внешний cloud-controller-manager
    (CCM) для выбранного облака. Через meta-зависимости подключает одну из подролей — openstack, vsphere,
    hcloud, huaweicloud или oci — в зависимости от external_cloud_provider. Каждая подроль формирует cloud-config
    Secret, RBAC (роли и привязки) и DaemonSet/Deployment cloud-controller-manager и применяет их через
    kubectl.

    '
  playbooks:
  - cluster.yml
  - upgrade_cluster.yml
  affected_groups:
  - kube_control_plane
  roles:
  - kubernetes-apps/external_cloud_controller
  - kubernetes-apps/external_cloud_controller/openstack
  - kubernetes-apps/external_cloud_controller/vsphere
  - kubernetes-apps/external_cloud_controller/hcloud
  - kubernetes-apps/external_cloud_controller/huaweicloud
  - kubernetes-apps/external_cloud_controller/oci
  source_paths:
  - roles/kubernetes-apps/external_cloud_controller/meta/main.yml
  - playbooks/cluster.yml
  - playbooks/upgrade_cluster.yml
  standalone_run: safe
  notes: 'Активируется только при cloud_provider == "external"; конкретная подроль выбирается по external_cloud_provider
    (openstack|vsphere|hcloud|huaweicloud|oci). Все задачи гейтятся на control_plane[0]. В upgrade_cluster.yml
    роль вынесена в play на hosts kube_control_plane:calico_rr:kube_node, но фактически работает только
    на первом control-plane. Идемпотентный kubectl apply — изолированный запуск безопасен при живом кластере
    и корректных облачных учётных данных.

    '
  reliability: authoritative
- ansible_tag: external-hcloud
  description: 'Разворачивает внешний Hetzner Cloud (hcloud) cloud-controller-manager. Подроль external_cloud_controller/hcloud
    генерирует и применяет манифесты: Secret с токеном, ServiceAccount, привязки ролей и DaemonSet/Deployment
    hcloud-cloud-controller-manager. Вариант манифеста CCM выбирается по external_hcloud_cloud.with_networks
    (с поддержкой сети или без).

    '
  playbooks:
  - cluster.yml
  - upgrade_cluster.yml
  affected_groups:
  - kube_control_plane
  roles:
  - kubernetes-apps/external_cloud_controller/hcloud
  source_paths:
  - roles/kubernetes-apps/external_cloud_controller/hcloud/tasks/main.yml
  - roles/kubernetes-apps/external_cloud_controller/meta/main.yml
  standalone_run: safe
  notes: 'Условия включения: cloud_provider == "external" и external_cloud_provider == "hcloud". Задачи
    только на control_plane[0], идемпотентный kubectl apply — изолированный запуск безопасен при живом
    кластере и корректных переменных external_hcloud_cloud (токен, with_networks).

    '
  reliability: authoritative
- ansible_tag: external-huaweicloud
  description: 'Разворачивает внешний Huawei Cloud cloud-controller-manager. Подроль external_cloud_controller/huaweicloud
    проверяет учётные данные Huawei, при наличии external_huaweicloud_cacert готовит base64-cacert, формирует
    cloud-config Secret и генерирует/применяет манифесты: RBAC-роли, привязки ролей и DaemonSet huawei-cloud-controller-manager.

    '
  playbooks:
  - cluster.yml
  - upgrade_cluster.yml
  affected_groups:
  - kube_control_plane
  roles:
  - kubernetes-apps/external_cloud_controller/huaweicloud
  source_paths:
  - roles/kubernetes-apps/external_cloud_controller/huaweicloud/tasks/main.yml
  - roles/kubernetes-apps/external_cloud_controller/meta/main.yml
  standalone_run: safe
  notes: 'Условия включения: cloud_provider == "external" и external_cloud_provider == "huaweicloud".
    Задачи только на control_plane[0], идемпотентный kubectl apply — изолированный запуск безопасен при
    живом кластере и корректном external-huawei-cloud-config.

    '
  reliability: authoritative
- ansible_tag: external-oci
  description: 'Разворачивает внешний Oracle Cloud Infrastructure (OCI) cloud-controller-manager. Подроль
    external_cloud_controller/oci проверяет учётные данные и настройки OCI (assert по ключам/региону/тенанту,
    компартменту, VCN, подсетям балансировщика), формирует cloud-config Secret и генерирует/применяет
    манифесты: RBAC и сам oci-cloud-controller-manager.

    '
  playbooks:
  - cluster.yml
  - upgrade_cluster.yml
  affected_groups:
  - kube_control_plane
  roles:
  - kubernetes-apps/external_cloud_controller/oci
  source_paths:
  - roles/kubernetes-apps/external_cloud_controller/oci/tasks/main.yml
  - roles/kubernetes-apps/external_cloud_controller/meta/main.yml
  standalone_run: safe
  notes: 'Условия включения: cloud_provider == "external" и external_cloud_provider == "oci". Обязательны
    переменные external_oracle_* (учётные данные при external_oracle_auth_use_instance_principals=false,
