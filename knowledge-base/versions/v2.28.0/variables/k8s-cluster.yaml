  - roles/kubespray_defaults/vars/main/main.yml
  - roles/kubernetes/control-plane/defaults/main/main.yml
  - roles/kubernetes/control-plane/defaults/main/kube-proxy.yml
  - roles/kubernetes/control-plane/defaults/main/kube-scheduler.yml
  - roles/kubernetes/control-plane/defaults/main/etcd.yml
  - roles/kubernetes/control-plane/vars/main.yaml
  - roles/kubernetes/node/defaults/main.yml
  - roles/kubernetes/node/vars/fedora.yml
  - roles/kubernetes/node/vars/ubuntu-18.yml
  - roles/kubernetes/node/vars/ubuntu-20.yml
  - roles/kubernetes/node/vars/ubuntu-22.yml
  - roles/kubernetes/node/vars/ubuntu-24.yml
  - roles/kubernetes/kubeadm/defaults/main.yml
  - roles/kubernetes/kubeadm_common/defaults/main.yml
  - roles/kubernetes/preinstall/defaults/main.yml
  - roles/kubernetes/preinstall/vars/main.yml
  - roles/kubernetes/client/defaults/main.yml
source_url: https://github.com/kubernetes-sigs/kubespray/tree/v2.28.0
retrieved_at: 2026-07-15
topics: [k8s-cluster, control-plane, kubelet, kube-proxy]
reliability: authoritative
notes: >
  Общая роль дефолтов на теге v2.28.0 называется roles/kubespray_defaults (подчёркивание);
  роль roles/kubespray-defaults (дефис) на этом теге — deprecated-заглушка (только warn+import),
  её пути не используются. Роли roles/kubernetes/node-label/ и roles/kubernetes/node-taint/
  содержат только tasks/ — собственных defaults/vars нет. Переменные загрузок (download.yml)
  и контрольные суммы (checksums.yml) вынесены в отдельные справочники; там же в v2.28.0
  определены kube_major_version, kube_next, kube_major_next_version, pod_infra_supported_versions
  и etcd_supported_versions (в отличие от v2.29.1, где они были в vars/main/main.yml).
  kube_version на теге v2.28.0 резолвится в 1.32.5, kube_version_min_required — в 1.30.0,
  kube_major_version — в 1.32.
variables:
  # --- kubespray_defaults: базовые и системные ---
  - name: ansible_ssh_common_args
    default: "{% if 'bastion' in groups['all'] %} -o ProxyCommand='ssh -o UserKnownHostsFile=/dev/null -o StrictHostKeyChecking=no -W %h:%p -p {{ hostvars['bastion']['ansible_port'] | default(22) }} {{ hostvars['bastion']['ansible_user'] }}@{{ hostvars['bastion']['ansible_host'] }} {% if ansible_ssh_private_key_file is defined %}-i {{ ansible_ssh_private_key_file }}{% endif %} ' {% endif %}"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Автоматически добавляет SSH ProxyCommand через bastion-хост, если он есть в группе all"
    conditions: "Применяется только при наличии хоста bastion в группе all"
  - name: preinstall_selinux_state
    default: "permissive"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Целевое состояние SELinux, выставляемое на этапе preinstall (permissive/disabled)"
  - name: ping_access_ip
    default: true
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Проверять доступность access_ip через ping; отключить, если файрвол блокирует ICMP"
  - name: kube_api_anonymous_auth
    default: true
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Разрешить анонимную аутентификацию к API-серверу; false ломает деплой (см. PR #11016), для удаления флага использовать undef()"
    related: [remove_anonymous_access]
  - name: is_fedora_coreos
    default: false
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Признак Fedora CoreOS; выставляется в true автоматически при обнаружении этой ОС"
  - name: kubelet_fail_swap_on
    default: true
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Запрещать запуск kubelet при включённом swap (failSwapOn)"
    related: [kubelet_swap_behavior]
  - name: kubelet_swap_behavior
    default: "LimitedSwap"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Поведение kubelet при разрешённом swap (memorySwap.swapBehavior)"
    conditions: "Актуально при kubelet_fail_swap_on: false"
    related: [kubelet_fail_swap_on]

  # --- kubespray_defaults: версия Kubernetes и kubeadm ---
  - name: kube_version
    default: "{{ (kubelet_checksums['amd64'] | dict2items)[0].key }}"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Устанавливаемая версия Kubernetes; по умолчанию первый (самый новый) ключ kubelet_checksums — на теге v2.28.0 это 1.32.5"
    related: [kube_version_min_required, kube_major_version]
  - name: kube_version_min_required
    default: "{{ (kubelet_checksums['amd64'] | dict2items)[-1].key }}"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Минимально поддерживаемая версия Kubernetes — последний ключ kubelet_checksums; на теге v2.28.0 это 1.30.0"
    related: [kube_version]
  - name: kube_proxy_mode
    default: "ipvs"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Режим kube-proxy: ipvs, iptables или nftables"
    related: [kube_proxy_scheduler, kube_proxy_ipvs_modules]
  - name: kubeadm_config_api_version
    default: "{{ 'v1beta4' if kube_version is version('1.31.0', '>=') else 'v1beta3' }}"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Версия API конфигурации kubeadm: v1beta4 для K8s >= 1.31, иначе v1beta3"
    related: [kube_version]
  - name: kubeadm_config_validate_enabled
    default: true
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Валидировать конфигурацию kubeadm командой kubeadm config validate; отключать только для тестов/пре-релизов"
  - name: kubeadm_init_timeout
    default: "300s"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Тайм-аут kubeadm init на первом узле контрол-плейна"
  - name: kube_reserved_cgroups_for_service_slice
    default: "kube.slice"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Имя systemd slice для cgroup зарезервированных ресурсов kube (в коде помечено TODO: remove)"
    related: [kube_reserved, kube_reserved_cgroups]
  - name: kubeadm_init_phases_skip_default
    default: ["addon/coredns"]
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Базовый список фаз kubeadm init, которые пропускаются всегда (CoreDNS ставит сам Kubespray)"
    related: [kubeadm_init_phases_skip]
  - name: kubeadm_init_phases_skip
    default: |-
      {%- if kube_network_plugin == 'kube-router' and (kube_router_run_service_proxy is defined and kube_router_run_service_proxy) -%}
      {{ kubeadm_init_phases_skip_default + ["addon/kube-proxy"] }}
      {%- elif kube_network_plugin == 'cilium' and (cilium_kube_proxy_replacement is defined and (cilium_kube_proxy_replacement == 'strict' or (cilium_kube_proxy_replacement | bool) or (cilium_kube_proxy_replacement | string | lower == 'true') )) -%}
      {{ kubeadm_init_phases_skip_default + ["addon/kube-proxy"] }}
      {%- elif kube_network_plugin == 'calico' and (calico_bpf_enabled is defined and calico_bpf_enabled) -%}
      {{ kubeadm_init_phases_skip_default + ["addon/kube-proxy"] }}
      {%- elif kube_proxy_remove is defined and kube_proxy_remove -%}
      {{ kubeadm_init_phases_skip_default + ["addon/kube-proxy"] }}
      {%- else -%}
      {{ kubeadm_init_phases_skip_default }}
      {%- endif -%}
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Итоговый список пропускаемых фаз kubeadm init; addon/kube-proxy пропускается, когда CNI заменяет kube-proxy (cilium kube-proxy replacement, calico eBPF, kube-router service proxy) или задан kube_proxy_remove"
    related: [kubeadm_init_phases_skip_default, kube_network_plugin, kube_proxy_deployed]
  - name: kubeadm_join_phases_skip_default
    default: []
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Базовый список фаз kubeadm join, пропускаемых при присоединении нового узла"
    related: [kubeadm_join_phases_skip]
  - name: kubeadm_join_phases_skip
    default: "{{ kubeadm_join_phases_skip_default }}"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Итоговый список пропускаемых фаз kubeadm join; для air-gapped может понадобиться ['preflight']"
    related: [kubeadm_join_phases_skip_default]
  - name: remove_anonymous_access
    default: false
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Удалить созданную kubeadm role binding для анонимных пользователей"
    related: [kube_api_anonymous_auth, kubeadm_use_file_discovery]
  - name: kube_proxy_nodeport_addresses
    default: |-
      {%- if kube_proxy_nodeport_addresses_cidr is defined -%}
      [{{ kube_proxy_nodeport_addresses_cidr }}]
      {%- else -%}
      []
      {%- endif -%}
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Список CIDR-адресов для NodePort; пустой список — все локальные адреса; kube_proxy_nodeport_addresses_cidr — legacy-переменная. Дублируется в roles/kubernetes/control-plane/defaults/main/kube-proxy.yml"
    also_defined_in: [roles/kubernetes/control-plane/defaults/main/kube-proxy.yml]
  - name: ignore_assert_errors
    default: false
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Разрешить продолжение деплоя при провале предварительных проверок (assert). Дублируется в roles/kubernetes/preinstall/defaults/main.yml с тем же значением"
    also_defined_in: [roles/kubernetes/preinstall/defaults/main.yml]

  # --- kubespray_defaults: kube-vip и локальные балансировщики ---
  - name: kube_vip_enabled
    default: false
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Развернуть kube-vip (виртуальный IP для контрол-плейна и/или сервисов)"
    related: [kube_vip_arp_enabled, kube_vip_controlplane_enabled]
  - name: kube_vip_lb_fwdmethod
    default: "local"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Метод форвардинга IPVS-балансировщика kube-vip"
    conditions: "Используется при kube_vip_enabled: true"
  - name: nginx_config_dir
    default: "/etc/nginx"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Каталог конфигурации локального nginx-proxy (балансировка API)"
    related: [loadbalancer_apiserver_type]
  - name: haproxy_config_dir
    default: "/etc/haproxy"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Каталог конфигурации локального haproxy (балансировка API)"
    related: [loadbalancer_apiserver_type]

  # --- kubespray_defaults: каталоги бинарников и загрузок ---
  - name: bin_dir
    default: "/usr/local/bin"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Каталог установки бинарных файлов (kubectl, kubelet и др.)"
  - name: docker_bin_dir
    default: "/usr/bin"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Каталог бинарных файлов Docker"
  - name: containerd_bin_dir
    default: "{{ bin_dir }}"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Каталог бинарных файлов containerd"
    related: [bin_dir]
  - name: etcd_data_dir
    default: "/var/lib/etcd"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Каталог данных etcd"
  - name: local_release_dir
    default: "/tmp/releases"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Каталог на нодах для скачиваемых артефактов (нужно около 1 ГБ места)"
  - name: retry_stagger
    default: 5
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Случайная задержка (сек) между повторами неудачных операций скачивания/загрузки"

  # --- kubespray_defaults: DNS ---
  - name: cluster_name
    default: "cluster.local"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Имя кластера Kubernetes, одновременно используется как DNS-домен кластера"
    related: [dns_domain]
  - name: ndots
    default: 2
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Значение ndots в resolv.conf хостов для разрешения поддоменов кластерного домена hostnet-подами"
    related: [docker_dns_options]
  - name: docker_dns_options
    default: ["ndots:{{ ndots }}", "timeout:2", "attempts:2"]
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Опции resolv.conf по умолчанию (ndots, timeout, attempts)"
    related: [ndots]
  - name: dns_mode
    default: "coredns"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Режим кластерного DNS: coredns, coredns_dual, manual или none"
    related: [dns_servers, manual_dns_server]
  - name: enable_dns_autoscaler
    default: true
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Развернуть dns-autoscaler для автоматического масштабирования реплик CoreDNS"
    related: [dns_mode]
  - name: upstream_dns_servers
    default: []
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Внешние DNS-серверы: добавляются после кластерного DNS и используются CoreDNS как upstream для внекластерных запросов"
  - name: enable_nodelocaldns
    default: true
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Включить nodelocal DNS cache (локальный кеш DNS на каждой ноде)"
    related: [nodelocaldns_ip]
  - name: enable_nodelocaldns_secondary
    default: false
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Включить вторичный (secondary) daemonset nodelocaldns для обновлений без потери DNS"
    related: [enable_nodelocaldns, nodelocaldns_secondary_skew_seconds]
  - name: nodelocaldns_ip
    default: "169.254.25.10"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Link-local IP-адрес, на котором слушает nodelocaldns"
    conditions: "Используется при enable_nodelocaldns: true"
  - name: nodelocaldns_health_port
    default: 9254
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Порт health-check основного nodelocaldns"
  - name: nodelocaldns_second_health_port
    default: 9256
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Порт health-check вторичного nodelocaldns"
    conditions: "Используется при enable_nodelocaldns_secondary: true"
  - name: nodelocaldns_bind_metrics_host_ip
    default: false
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Привязывать метрики nodelocaldns к IP хоста вместо nodelocaldns_ip"
  - name: nodelocaldns_secondary_skew_seconds
    default: 5
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Сдвиг в секундах между перезапусками основного и вторичного nodelocaldns"
    conditions: "Используется при enable_nodelocaldns_secondary: true"
  - name: manual_dns_server
    default: ""
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "IP кастомного кластерного DNS-сервера для dns_mode: manual"
    conditions: "Используется при dns_mode: manual"
  - name: resolvconf_mode
    default: "host_resolvconf"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Способ настройки resolv.conf хоста: host_resolvconf, docker_dns или none"
  - name: deploy_netchecker
    default: false
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Развернуть netchecker — HTTP-сервис проверки DNS-резолвинга в кластере"
  - name: skydns_server
    default: "{{ kube_service_subnets.split(',') | first | ansible.utils.ipaddr('net') | ansible.utils.ipaddr(3) | ansible.utils.ipaddr('address') }}"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "IP кластерного DNS-сервиса — третий адрес первой сервисной подсети (10.233.0.3 при значениях по умолчанию)"
    related: [kube_service_subnets, dns_servers]
  - name: skydns_server_secondary
    default: "{{ kube_service_subnets.split(',') | first | ansible.utils.ipaddr('net') | ansible.utils.ipaddr(4) | ansible.utils.ipaddr('address') }}"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "IP вторичного кластерного DNS для режима coredns_dual — четвёртый адрес сервисной подсети"
    conditions: "Используется при dns_mode: coredns_dual"
  - name: dns_domain
    default: "{{ cluster_name }}"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "DNS-домен кластера (clusterDomain kubelet); по умолчанию равен cluster_name"
    related: [cluster_name]
  - name: docker_dns_search_domains
    default: ["default.svc.{{ dns_domain }}", "svc.{{ dns_domain }}"]
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Search-домены кластера, добавляемые в resolv.conf"
    related: [dns_domain, remove_default_searchdomains]
  - name: searchdomains
    default: []
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Дополнительные пользовательские search-домены для resolv.conf"
  - name: kube_dns_servers
    default:
      coredns: ["{{ skydns_server }}"]
      coredns_dual: "{{ [skydns_server] + [skydns_server_secondary] }}"
      manual: ["{{ manual_dns_server }}"]
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Карта списков кластерных DNS-серверов по режимам dns_mode"
    related: [dns_servers, dns_mode]
  - name: dns_servers
    default: "{{ kube_dns_servers[dns_mode] }}"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Итоговый список кластерных DNS-серверов согласно выбранному dns_mode"
    related: [kube_dns_servers, dns_mode]
  - name: enable_coredns_k8s_external
    default: false
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Включить плагин k8s_external в CoreDNS (резолвинг внешних адресов сервисов)"
    related: [coredns_k8s_external_zone]
  - name: coredns_k8s_external_zone
    default: "k8s_external.local"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "DNS-зона для плагина k8s_external CoreDNS"
    conditions: "Используется при enable_coredns_k8s_external: true"
  - name: enable_coredns_k8s_endpoint_pod_names
    default: false
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Включить опцию endpoint_pod_names в плагине kubernetes CoreDNS"

  # --- kubespray_defaults: каталоги, сертификаты, kubectl ---
  - name: kube_config_dir
    default: "/etc/kubernetes"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Основной каталог конфигурации Kubernetes. Дублируется в defaults ролей preinstall и client с тем же значением"
    also_defined_in: [roles/kubernetes/preinstall/defaults/main.yml, roles/kubernetes/client/defaults/main.yml]
  - name: kube_script_dir
    default: "{{ bin_dir }}/kubernetes-scripts"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Каталог вспомогательных скриптов Kubernetes"
    related: [bin_dir]
  - name: kube_manifest_dir
    default: "{{ kube_config_dir }}/manifests"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Каталог статических манифестов подов (static pods)"
    related: [kube_config_dir]
  - name: kubectl
    default: "{{ bin_dir }}/kubectl --kubeconfig {{ kube_config_dir }}/admin.conf"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Команда kubectl с admin-kubeconfig, используемая внутри ролей Kubespray"
    related: [bin_dir, kube_config_dir]
  - name: kube_cert_dir
    default: "{{ kube_config_dir }}/ssl"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Каталог сертификатов Kubernetes. Дублируется в roles/kubernetes/preinstall/defaults/main.yml"
    related: [kube_config_dir]
    also_defined_in: [roles/kubernetes/preinstall/defaults/main.yml]
  - name: kube_cert_compat_dir
    default: "/etc/kubernetes/pki"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Каталог сертификатов для совместимости с kubeadm (симлинк на kube_cert_dir). Дублируется в preinstall"
    related: [kube_cert_dir]
    also_defined_in: [roles/kubernetes/preinstall/defaults/main.yml]
  - name: kube_token_dir
    default: "{{ kube_config_dir }}/tokens"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Каталог хранения bearer-токенов"
    related: [kube_config_dir, kube_token_auth]
  - name: kube_owner
    default: "kube"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Пользователь-владелец установленных файлов кластера. Дублируется в roles/kubernetes/preinstall/defaults/main.yml"
    also_defined_in: [roles/kubernetes/preinstall/defaults/main.yml]
  - name: kube_cert_group
    default: "kube-cert"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Группа-владелец файлов сертификатов. Дублируется в roles/kubernetes/preinstall/defaults/main.yml"
    also_defined_in: [roles/kubernetes/preinstall/defaults/main.yml]
  - name: kube_external_ca_mode
    default: false
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Режим внешнего управления CA: отключает все задачи работы с сертификатами; сертификаты и kubeconfig должны быть подготовлены заранее"
    related: [kube_cert_dir, kube_config_dir]
  - name: kube_log_level
    default: 2
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Уровень логирования (-v) компонентов Kubernetes"

  # --- kubespray_defaults: сеть кластера ---
  - name: kube_network_plugin
    default: "calico"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Сетевой плагин CNI: calico, cilium, kube-ovn, weave, flannel, cni (generic) или cloud. В v2.28.0 weave ещё поддерживается (см. weave_password и download.yml)"
    related: [kube_network_plugin_multus, enable_network_policy, weave_password]
  - name: kube_network_plugin_multus
    default: false
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Устанавливать Multus для подключения нескольких CNI к подам"
    related: [kube_network_plugin]
  - name: cilium_deploy_additionally
    default: false
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Развернуть Cilium дополнительно к другому CNI (например, для замены kube-proxy)"
    related: [kube_network_plugin]
  - name: peer_with_calico_rr
    default: "{{ 'calico_rr' in groups and groups['calico_rr'] | length > 0 }}"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Использовать Calico route reflectors; true при непустой группе calico_rr в инвентаре"
    conditions: "Актуально при kube_network_plugin: calico"
  - name: calico_datastore
    default: "kdd"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Тип хранилища данных Calico: kdd (Kubernetes datastore) или etcd"
    conditions: "Актуально при kube_network_plugin: calico"
  - name: kube_service_addresses
    default: "10.233.0.0/18"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Внутренняя IPv4-подсеть для сервисов Kubernetes; не должна пересекаться с инфраструктурой"
    related: [kube_service_addresses_ipv6, kube_service_subnets]
  - name: kube_pods_subnet
    default: "10.233.64.0/18"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Внутренняя IPv4-подсеть для подов; не должна использоваться в вашей сети"
    related: [kube_network_node_prefix, kube_pods_subnets]
  - name: kube_network_node_prefix
    default: 24
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Размер IPv4-подсети (длина префикса), выделяемой каждой ноде под IP подов; число подов также ограничено kubelet_max_pods"
    related: [kube_pods_subnet, kubelet_max_pods]
  - name: ipv4_stack
    default: true
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Включить IPv4-стек кластера"
    related: [ipv6_stack]
  - name: ipv6_stack
    default: "{{ enable_dual_stack_networks | default(false) }}"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Включить IPv6-стек кластера; наследует значение устаревшей enable_dual_stack_networks"
    related: [ipv4_stack, kube_service_addresses_ipv6, kube_pods_subnet_ipv6]
  - name: kube_service_addresses_ipv6
    default: "fd85:ee78:d8a6:8607::1000/116"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "IPv6-подсеть для сервисов (4096 адресов)"
    conditions: "Используется только при ipv6_stack: true"
    related: [ipv6_stack]
  - name: kube_pods_subnet_ipv6
    default: "fd85:ee78:d8a6:8607::1:0000/112"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "IPv6-подсеть для подов (256 нод по 254 пода)"
    conditions: "Используется только при ipv6_stack: true"
    related: [ipv6_stack, kube_network_node_prefix_ipv6]
  - name: kube_network_node_prefix_ipv6
    default: 120
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Длина IPv6-префикса, выделяемого каждой ноде под поды (254 пода на ноду)"
    conditions: "Используется только при ipv6_stack: true"
    related: [kube_pods_subnet_ipv6]

  # --- kubespray_defaults: API server и точки доступа ---
  - name: kube_apiserver_ip
    default: "{{ kube_service_subnets.split(',') | first | ansible.utils.ipaddr('net') | ansible.utils.ipaddr(1) | ansible.utils.ipaddr('address') }}"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Виртуальный кластерный IP API-сервера — первый адрес сервисной подсети (10.233.0.1 по умолчанию)"
    related: [kube_service_subnets]
  - name: kube_apiserver_bind_address
    default: "::"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Адрес, на котором слушает kube-apiserver (:: — все интерфейсы). Дублируется в roles/kubernetes/control-plane/defaults/main/main.yml"
    related: [kube_apiserver_port]
    also_defined_in: [roles/kubernetes/control-plane/defaults/main/main.yml]
  - name: kube_apiserver_port
    default: 6443
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "HTTPS-порт kube-apiserver. В roles/kubernetes/client/defaults/main.yml продублирован строкой \"6443\""
    also_defined_in: [roles/kubernetes/client/defaults/main.yml]
  - name: kube_override_hostname
    default: "{{ inventory_hostname }}"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Имя ноды в кластере (--hostname-override); по умолчанию inventory_hostname"
  - name: default_kubelet_config_dir
    default: "{{ kube_config_dir }}/dynamic_kubelet_dir"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Каталог динамической конфигурации kubelet по умолчанию (если kubelet_config_dir не задан)"
    related: [kube_config_dir]
  - name: kube_api_aggregator_routing
    default: false
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Включить --enable-aggregator-routing у API-сервера (маршрутизация к сервисам агрегированного API)"
  - name: kube_profiling
    default: false
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Включить профилирование (/debug/pprof) у компонентов контрол-плейна"

  # --- kubespray_defaults: kubelet graceful shutdown ---
  - name: kubelet_shutdown_grace_period
    default: "60s"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Общий период graceful shutdown ноды (Graceful Node Shutdown)"
    related: [kubelet_shutdown_grace_period_critical_pods]
  - name: kubelet_shutdown_grace_period_critical_pods
    default: "20s"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Часть периода graceful shutdown, зарезервированная для критических подов; должна быть меньше kubelet_shutdown_grace_period"
    related: [kubelet_shutdown_grace_period]

  # --- kubespray_defaults: cloud provider ---
  - name: cloud_provider
    default: ""
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Облачный провайдер: только \"external\" или пустая строка, иначе проверка завершится ошибкой"
    related: [external_cloud_provider]
  - name: external_cloud_provider
    default: ""
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Внешний cloud controller manager: openstack, vsphere, oci, huaweicloud, hcloud или manual"
    conditions: "Требует cloud_provider: external"
    related: [cloud_provider]

  # --- kubespray_defaults: container runtime ---
  - name: deploy_container_engine
    default: "{{ 'k8s_cluster' in group_names or etcd_deployment_type == 'docker' }}"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Устанавливать ли контейнерный рантайм на хост (ноды кластера или etcd в docker-режиме)"
    related: [container_manager, etcd_deployment_type]
  - name: container_manager
    default: "containerd"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Контейнерный рантайм кластера: containerd, crio или docker"
    related: [cri_socket, deploy_container_engine]
  - name: nri_enabled
    default: "{{ container_manager == 'containerd' }}"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Включить NRI (Node Resource Interface) плагин; по умолчанию включён для containerd"
    related: [container_manager]
  - name: kata_containers_enabled
    default: false
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Включить Kata Containers как дополнительный рантайм (несовместимо с Docker)"
    related: [container_manager]
  - name: gvisor_enabled
    default: false
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Включить gVisor как дополнительный рантайм (только Docker или containerd)"
    related: [container_manager]
  - name: runc_enabled
    default: false
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Включить runc как дополнительный рантайм (требует container_manager: crio)"
    related: [container_manager]
  - name: crun_enabled
    default: false
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Включить crun как дополнительный рантайм (требует container_manager: crio)"
    related: [container_manager]
  - name: youki_enabled
    default: false
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Включить youki как дополнительный рантайм (требует container_manager: crio)"
    related: [container_manager]
  - name: container_manager_on_localhost
    default: "{{ container_manager }}"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Контейнерный рантайм на хосте Ansible (для download_localhost)"
    related: [container_manager]
  - name: cri_socket
    default: |-
      {%- if container_manager == 'crio' -%}
      unix:///var/run/crio/crio.sock
      {%- elif container_manager == 'containerd' -%}
      unix:///var/run/containerd/containerd.sock
      {%- elif container_manager == 'docker' -%}
      unix:///var/run/cri-dockerd.sock
      {%- endif -%}
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Путь к CRI-сокету в зависимости от выбранного рантайма"
    related: [container_manager]
  - name: crio_insecure_registries
    default: []
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Список insecure-реестров для CRI-O"
    conditions: "Актуально при container_manager: crio"
  - name: docker_dns_servers_strict
    default: false
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "При более чем 3 nameserver: true — падать с ошибкой, false — использовать первые 3"
  - name: docker_daemon_graph
    default: "/var/lib/docker"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Каталог данных Docker daemon"
    conditions: "Актуально при container_manager: docker"
  - name: docker_iptables_enabled
    default: "false"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Управление iptables со стороны Docker daemon (строковое значение)"
    conditions: "Актуально при container_manager: docker"
  - name: docker_log_opts
    default: "--log-opt max-size=50m --log-opt max-file=5"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Опции ротации логов контейнеров Docker (50m, 5 файлов)"
    conditions: "Актуально при container_manager: docker"
  - name: docker_insecure_registries
    default: []
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Список insecure-реестров Docker (IP или домены)"
    conditions: "Актуально при container_manager: docker"
  - name: docker_registry_mirrors
    default: []
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Список зеркал реестра Docker"
    conditions: "Актуально при container_manager: docker"
  - name: docker_plugins
    default: []
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Плагины Docker, устанавливаемые через docker plugin install --grant-all-permissions"
    conditions: "Актуально при container_manager: docker"
  - name: containerd_use_systemd_cgroup
    default: true
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Использовать systemd cgroup driver в containerd"
    conditions: "Актуально при container_manager: containerd"
  - name: containerd_storage_dir
    default: "/var/lib/containerd"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Каталог хранения данных containerd"
  - name: containerd_state_dir
    default: "/run/containerd"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Каталог состояния (runtime state) containerd"
  - name: containerd_systemd_dir
    default: "/etc/systemd/system/containerd.service.d"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Каталог drop-in юнитов systemd для containerd"
  - name: containerd_cfg_dir
    default: "/etc/containerd"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Каталог конфигурации containerd"

  # --- kubespray_defaults: etcd со стороны ядра, kubeconfig, credentials ---
  - name: etcd_deployment_type
    default: "host"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Способ развёртывания etcd: host (systemd на хосте), docker или kubeadm"
    related: [deploy_container_engine, cert_management]
  - name: cert_management
    default: "script"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Способ управления сертификатами (script) для legacy-режима etcd"
    related: [etcd_deployment_type]
  - name: kubeconfig_localhost
    default: false
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Скопировать admin-kubeconfig на хост Ansible в {{ inventory_dir }}/artifacts. Дублируется в roles/kubernetes/client/defaults/main.yml"
    related: [kubectl_localhost, artifacts_dir]
    also_defined_in: [roles/kubernetes/client/defaults/main.yml]
  - name: kubectl_localhost
    default: false
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Скачать kubectl на хост Ansible. Дублируется в roles/kubernetes/client/defaults/main.yml"
    related: [kubeconfig_localhost]
    also_defined_in: [roles/kubernetes/client/defaults/main.yml]
  - name: credentials_dir
    default: "{{ inventory_dir }}/credentials"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Каталог на хосте Ansible для хранения сгенерированных секретов (например, kube_encrypt_token)"
    related: [kube_encrypt_token]
  - name: k8s_image_pull_policy
    default: "IfNotPresent"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "imagePullPolicy для контейнеров компонентов, разворачиваемых Kubespray"

  # --- kubespray_defaults: аддоны (флаги включения) ---
  - name: dashboard_enabled
