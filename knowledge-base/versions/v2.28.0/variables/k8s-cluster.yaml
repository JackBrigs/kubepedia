    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Создавать health-мониторы для OpenStack LBaaS"
    conditions: "Используется при openstack_lbaas_enabled: true"
  - name: openstack_lbaas_monitor_delay
    default: "1m"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Интервал проверок монитора OpenStack LBaaS"
    conditions: "Используется при openstack_lbaas_enabled: true"
  - name: openstack_lbaas_monitor_timeout
    default: "30s"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Тайм-аут проверок монитора OpenStack LBaaS"
    conditions: "Используется при openstack_lbaas_enabled: true"
  - name: openstack_lbaas_monitor_max_retries
    default: "3"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Число повторов проверок монитора OpenStack LBaaS"
    conditions: "Используется при openstack_lbaas_enabled: true"
  - name: openstack_cacert
    default: "{{ lookup('env', 'OS_CACERT') }}"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "CA-сертификат OpenStack, берётся из переменной окружения OS_CACERT"
  - name: external_openstack_lbaas_enabled
    default: true
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Включить LBaaS во внешнем OpenStack cloud controller"
    conditions: "Актуально при external_cloud_provider: openstack"
  - name: external_openstack_network_ipv6_disabled
    default: false
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Отключить IPv6 в настройках сети внешнего OpenStack CCM"
    conditions: "Актуально при external_cloud_provider: openstack"
  - name: external_openstack_network_internal_networks
    default: []
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Список внутренних сетей для внешнего OpenStack CCM"
    conditions: "Актуально при external_cloud_provider: openstack"
  - name: external_openstack_network_public_networks
    default: []
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Список публичных сетей для внешнего OpenStack CCM"
    conditions: "Актуально при external_cloud_provider: openstack"
  - name: external_hcloud_cloud
    default:
      hcloud_api_token: ""
      token_secret_name: hcloud
      service_account_name: cloud-controller-manager
      controller_image_tag: "latest"
      controller_extra_args: {}
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Настройки внешнего Hetzner Cloud controller manager (токен, имя секрета, образ, доп. аргументы)"
    conditions: "Актуально при external_cloud_provider: hcloud"

  # --- kubespray_defaults: авторизация и feature gates ---
  - name: authorization_modes
    default: ["Node", "RBAC"]
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Режимы авторизации API-сервера (--authorization-mode); порядок важен; протестированы AlwaysAllow, AlwaysDeny, Node, RBAC"
    related: [rbac_enabled, kube_apiserver_use_authorization_config_file]
  - name: kube_apiserver_use_authorization_config_file
    default: false
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Использовать структурированный файл AuthorizationConfiguration вместо флага --authorization-mode; при true переменная authorization_modes игнорируется"
    related: [authorization_modes, kube_apiserver_authorization_config_authorizers]
  - name: kube_apiserver_authorization_config_api_version
    default: "{{ 'v1alpha1' if kube_version is version('1.30.0', '<') else 'v1beta1' if kube_version is version('1.32.0', '<') else 'v1' }}"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Версия API файла AuthorizationConfiguration в зависимости от версии Kubernetes"
    conditions: "Используется при kube_apiserver_use_authorization_config_file: true"
  - name: kube_apiserver_authorization_config_authorizers
    default:
      - {type: Node, name: node}
      - {type: RBAC, name: rbac}
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Список авторизаторов для структурированного AuthorizationConfiguration (Node и RBAC по умолчанию)"
    conditions: "Используется при kube_apiserver_use_authorization_config_file: true"
    related: [kube_webhook_authorization]
  - name: rbac_enabled
    default: "{{ ('RBAC' in authorization_modes and not kube_apiserver_use_authorization_config_file) or (kube_apiserver_use_authorization_config_file and kube_apiserver_authorization_config_authorizers | selectattr('type', 'equalto', 'RBAC') | list | length > 0) }}"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Вычисляемый признак включённого RBAC (по authorization_modes или authorization-config файлу)"
    related: [authorization_modes, kube_apiserver_use_authorization_config_file]

  # --- kubespray_defaults: kubelet (глобальные параметры) ---
  - name: kubelet_authentication_token_webhook
    default: true
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Разрешить аутентификацию к HTTPS-endpoint kubelet по bearer-токенам API (webhook)"
    related: [kubelet_authorization_mode_webhook]
  - name: kubelet_authorization_mode_webhook
    default: true
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Авторизация доступа к kubelet API делегируется API-серверу (mode Webhook)"
    related: [kubelet_authentication_token_webhook]
  - name: kubelet_rotate_certificates
    default: true
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Автоматическая ротация клиентского сертификата kubelet при приближении срока истечения"
    related: [kubelet_rotate_server_certificates]
  - name: kubelet_rotate_server_certificates
    default: false
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Запрашивать и ротировать серверный сертификат kubelet через API (требует подписи CSR)"
    related: [kubelet_rotate_certificates]
  - name: kubelet_protect_kernel_defaults
    default: true
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "kubelet завершается с ошибкой, если параметры ядра отличаются от ожидаемых (protectKernelDefaults)"
  - name: additional_sysctl
    default: []
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Дополнительные параметры sysctl в формате списка словарей {name, value}"
  - name: kube_feature_gates
    default: []
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Общие feature gates кластера (key=value), применяются ко всем компонентам"
    related: [kube_apiserver_feature_gates, kubelet_feature_gates]
  - name: kube_apiserver_feature_gates
    default: []
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Feature gates только для kube-apiserver"
    related: [kube_feature_gates]
  - name: kube_controller_feature_gates
    default: []
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Feature gates только для kube-controller-manager"
    related: [kube_feature_gates]
  - name: kube_scheduler_feature_gates
    default: []
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Feature gates только для kube-scheduler"
    related: [kube_feature_gates]
  - name: kube_proxy_feature_gates
    default: []
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Feature gates только для kube-proxy"
    related: [kube_feature_gates]
  - name: kubelet_feature_gates
    default: []
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Feature gates только для kubelet"
    related: [kube_feature_gates]
  - name: kubeadm_feature_gates
    default: []
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Feature gates самого kubeadm (список пар key=value)"
  - name: local_volume_provisioner_storage_classes
    default: |
      {
        "{{ local_volume_provisioner_storage_class | default('local-storage') }}": {
          "host_dir": "{{ local_volume_provisioner_base_dir | default('/mnt/disks') }}",
          "mount_dir": "{{ local_volume_provisioner_mount_dir | default('/mnt/disks') }}",
          "volume_mode": "Filesystem",
          "fs_type": "ext4"

        }
      }
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Storage-классы Local Volume Provisioner (по умолчанию local-storage в /mnt/disks)"
    conditions: "Используется при local_volume_provisioner_enabled: true"
  - name: weave_password
    default: "EnterPasswordHere"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Пароль шифрования сети Weave; при null шифрование сети отключено. Присутствует в v2.28.0 (weave ещё поддерживается) и удалён в v2.29.1. Можно передать через --extra-vars"
    conditions: "Актуально при kube_network_plugin: weave"
    related: [kube_network_plugin]
  - name: ssl_ca_dirs
    default: |-
      [
      {% if ansible_os_family in ['Flatcar', 'Flatcar Container Linux by Kinvolk'] -%}
      '/usr/share/ca-certificates',
      {% elif ansible_os_family == 'RedHat' -%}
      '/etc/pki/tls',
      '/etc/pki/ca-trust',
      {% elif ansible_os_family == 'Debian' -%}
      '/usr/share/ca-certificates',
      {% endif -%}
      ]
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Каталоги системных CA-сертификатов в зависимости от семейства ОС"

  # --- kubespray_defaults: точки доступа API и etcd ---
  - name: kube_apiserver_count
    default: "{{ groups['kube_control_plane'] | length }}"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Количество API-серверов — размер группы kube_control_plane"
  - name: kube_apiserver_address
    default: "{{ hostvars[inventory_hostname]['main_ip'] }}"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "IP-адрес API-сервера на данном хосте (main_ip хоста)"
  - name: kube_apiserver_access_address
    default: "{{ hostvars[inventory_hostname]['main_access_ip'] }}"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Адрес доступа к API-серверу данного хоста (main_access_ip)"
  - name: first_kube_control_plane_address
    default: "{{ hostvars[groups['kube_control_plane'][0]]['main_access_ip'] }}"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Адрес доступа к первому узлу контрол-плейна"
  - name: loadbalancer_apiserver_localhost
    default: "{{ loadbalancer_apiserver is not defined }}"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Разворачивать локальный балансировщик (nginx/haproxy) на нодах для доступа к API; включён, если внешний loadbalancer_apiserver не задан"
    related: [loadbalancer_apiserver_type, kube_apiserver_endpoint]
  - name: loadbalancer_apiserver_type
    default: "nginx"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Тип локального балансировщика API: nginx или haproxy"
    conditions: "Используется при loadbalancer_apiserver_localhost: true"
    related: [loadbalancer_apiserver_localhost, loadbalancer_apiserver_pod_name]
  - name: apiserver_loadbalancer_domain_name
    default: "lb-apiserver.kubernetes.local"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Доменное имя внешнего балансировщика API-сервера"
    conditions: "Применяется только если задан внешний loadbalancer_apiserver"
  - name: kube_apiserver_global_endpoint
    default: |-
      {% if loadbalancer_apiserver is defined -%}
          https://{{ apiserver_loadbalancer_domain_name }}:{{ loadbalancer_apiserver.port | default(kube_apiserver_port) }}
      {%- elif loadbalancer_apiserver_localhost and (loadbalancer_apiserver_port is not defined or loadbalancer_apiserver_port == kube_apiserver_port) -%}
          https://localhost:{{ kube_apiserver_port }}
      {%- else -%}
          https://{{ first_kube_control_plane_address | ansible.utils.ipwrap }}:{{ kube_apiserver_port }}
      {%- endif %}
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Глобальный endpoint API-сервера (через внешний LB, localhost-LB или первый контрол-плейн)"
    related: [kube_apiserver_endpoint, loadbalancer_apiserver_localhost]
  - name: kube_apiserver_endpoint
    default: |-
      {% if loadbalancer_apiserver is defined -%}
          https://{{ apiserver_loadbalancer_domain_name }}:{{ loadbalancer_apiserver.port | default(kube_apiserver_port) }}
      {%- elif ('kube_control_plane' not in group_names) and loadbalancer_apiserver_localhost -%}
          https://localhost:{{ loadbalancer_apiserver_port | default(kube_apiserver_port) }}
      {%- elif 'kube_control_plane' in group_names -%}
      https://{{ kube_apiserver_bind_address | regex_replace('::', '127.0.0.1') | ansible.utils.ipwrap }}:{{ kube_apiserver_port }}
      {%- else -%}
          https://{{ first_kube_control_plane_address | ansible.utils.ipwrap }}:{{ kube_apiserver_port }}
      {%- endif %}
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Endpoint API-сервера для конкретного хоста (зависит от роли хоста и наличия балансировщика)"
    related: [kube_apiserver_global_endpoint]
  - name: kube_apiserver_client_cert
    default: "{{ kube_cert_dir }}/ca.crt"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Путь к клиентскому сертификату (CA) для проверок доступа к API-серверу"
    related: [kube_cert_dir]
  - name: kube_apiserver_client_key
    default: "{{ kube_cert_dir }}/ca.key"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Путь к клиентскому ключу (CA) для проверок доступа к API-серверу"
    related: [kube_cert_dir]
  - name: etcd_events_cluster_enabled
    default: false
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Развернуть отдельный etcd-кластер для событий Kubernetes (etcd-events)"
    related: [etcd_events_data_dir]
  - name: etcd_hosts
    default: "{{ groups['etcd'] | default(groups['kube_control_plane']) }}"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Список хостов etcd; при пустой группе etcd (kubeadm-managed etcd) — узлы контрол-плейна"
  - name: etcd_address
    default: "{{ hostvars[inventory_hostname]['main_ip'] }}"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "IP-адрес etcd на данном хосте"
  - name: etcd_access_address
    default: "{{ hostvars[inventory_hostname]['main_access_ip'] }}"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Адрес доступа к etcd на данном хосте"
  - name: etcd_events_access_address
    default: "{{ hostvars[inventory_hostname]['main_access_ip'] }}"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Адрес доступа к etcd-events на данном хосте"
  - name: etcd_peer_url
    default: "https://{{ etcd_access_address | ansible.utils.ipwrap }}:2380"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Peer URL etcd данного хоста (порт 2380)"
  - name: etcd_client_url
    default: "https://{{ etcd_access_address | ansible.utils.ipwrap }}:2379"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Клиентский URL etcd данного хоста (порт 2379)"
  - name: etcd_events_peer_url
    default: "https://{{ etcd_events_access_address | ansible.utils.ipwrap }}:2382"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Peer URL etcd-events (порт 2382)"
  - name: etcd_events_client_url
    default: "https://{{ etcd_events_access_address | ansible.utils.ipwrap }}:2383"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Клиентский URL etcd-events (порт 2383)"
  - name: etcd_access_addresses
    default: |-
      {% for item in etcd_hosts -%}
        https://{{ hostvars[item]['main_access_ip'] | ansible.utils.ipwrap }}:2379{% if not loop.last %},{% endif %}
      {%- endfor %}
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Список клиентских адресов всех узлов etcd через запятую"
    related: [etcd_hosts]
  - name: etcd_events_access_addresses_list
    default: |-
      [
      {% for item in etcd_hosts -%}
        'https://{{ hostvars[item].main_access_ip | ansible.utils.ipwrap }}:2383'{% if not loop.last %},{% endif %}
      {%- endfor %}
      ]
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Список клиентских адресов etcd-events в виде списка"
  - name: etcd_metrics_addresses
    default: |-
      {% for item in etcd_hosts -%}
        https://{{ hostvars[item]['main_access_ip'] | ansible.utils.ipwrap }}:{{ etcd_metrics_port | default(2381) }}{% if not loop.last %},{% endif %}
      {%- endfor %}
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Адреса метрик etcd всех узлов (порт etcd_metrics_port, по умолчанию 2381)"
  - name: etcd_events_access_addresses
    default: "{{ etcd_events_access_addresses_list | join(',') }}"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Клиентские адреса etcd-events через запятую"
    related: [etcd_events_access_addresses_list]
  - name: etcd_events_access_addresses_semicolon
    default: "{{ etcd_events_access_addresses_list | join(';') }}"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Клиентские адреса etcd-events через точку с запятой"
    related: [etcd_events_access_addresses_list]
  - name: etcd_member_name
    default: |-
      {% for host in groups['etcd'] %}
      {% if inventory_hostname == host %}{{ hostvars[host].etcd_member_name | default("etcd" + loop.index | string) }}{% endif %}
      {% endfor %}
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Имя члена etcd-кластера; рекомендуется задавать в инвентаре, иначе etcd1, etcd2, ..."
  - name: etcd_peer_addresses
    default: |-
      {% for item in groups['etcd'] -%}
        {{ hostvars[item].etcd_member_name | default("etcd" + loop.index | string) }}=https://{{ hostvars[item]['main_access_ip'] | ansible.utils.ipwrap }}:2380{% if not loop.last %},{% endif %}
      {%- endfor %}
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Строка initial-cluster etcd: имя=peer-URL для всех членов"
  - name: etcd_events_peer_addresses
    default: |-
      {% for item in groups['etcd'] -%}
        {{ hostvars[item].etcd_member_name | default("etcd" + loop.index | string) }}-events=https://{{ hostvars[item]['main_access_ip'] | ansible.utils.ipwrap }}:2382{% if not loop.last %},{% endif %}
      {%- endfor %}
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Строка initial-cluster для etcd-events"
  - name: etcd_heartbeat_interval
    default: "250"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Интервал heartbeat etcd в мс. Дублируется в roles/kubernetes/control-plane/defaults/main/etcd.yml (для kubeadm-managed etcd)"
    related: [etcd_election_timeout]
    also_defined_in: [roles/kubernetes/control-plane/defaults/main/etcd.yml]
  - name: etcd_election_timeout
    default: "5000"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Тайм-аут выборов лидера etcd в мс. Дублируется в roles/kubernetes/control-plane/defaults/main/etcd.yml"
    related: [etcd_heartbeat_interval]
    also_defined_in: [roles/kubernetes/control-plane/defaults/main/etcd.yml]
  - name: etcd_snapshot_count
    default: "100000"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Число транзакций etcd между снапшотами"
  - name: certificates_key_size
    default: 2048
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Размер ключа RSA для генерируемых сертификатов (скриптовая генерация etcd в legacy-режиме)"
    related: [cert_management, certificates_duration]
  - name: certificates_duration
    default: 36500
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Срок действия генерируемых сертификатов в днях (скриптовая генерация). В v2.28.0 отдельных kube_cert_validity_period/kube_ca_cert_validity_period нет — kubeadm-managed сертификаты используют дефолты kubeadm"
    related: [cert_management, certificates_key_size]
  - name: etcd_config_dir
    default: "/etc/ssl/etcd"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Каталог конфигурации/сертификатов etcd"
    related: [etcd_cert_dir]
  - name: etcd_events_data_dir
    default: "/var/lib/etcd-events"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Каталог данных etcd-events"
    conditions: "Используется при etcd_events_cluster_enabled: true"
  - name: etcd_cert_dir
    default: "{{ etcd_config_dir }}/ssl"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Каталог сертификатов etcd"
    related: [etcd_config_dir]
  - name: typha_enabled
    default: false
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Развернуть Calico Typha (масштабирование datastore-подключений Calico)"
    conditions: "Актуально при kube_network_plugin: calico"
  - name: calico_apiserver_enabled
    default: false
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Развернуть Calico API server (управление ресурсами Calico через kubectl)"
    conditions: "Актуально при kube_network_plugin: calico"

  # --- kubespray_defaults: служебные карты архитектур/ОС и kubelet ---
  - name: _host_architecture_groups
    default: {x86_64: amd64, aarch64: arm64, armv7l: arm}
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Служебная карта соответствия архитектур ansible_architecture именам архитектур артефактов"
    related: [host_architecture]
  - name: host_architecture
    default: |-
      {%- if ansible_architecture in _host_architecture_groups -%}
      {{ _host_architecture_groups[ansible_architecture] }}
      {%- else -%}
      {{ ansible_architecture }}
      {%- endif -%}
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Нормализованная архитектура хоста (amd64/arm64/arm) для выбора артефактов"
    related: [_host_architecture_groups]
  - name: _host_os_groups
    default: {Linux: linux, Darwin: darwin, Win32NT: windows}
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Служебная карта соответствия ansible_system именам ОС для артефактов"
    related: [host_os]
  - name: host_os
    default: |-
      {%- if ansible_system in _host_os_groups -%}
      {{ _host_os_groups[ansible_system] }}
      {%- else -%}
      {{ ansible_system }}
      {%- endif -%}
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Нормализованное имя ОС хоста (linux/darwin/windows) для выбора артефактов"
    related: [_host_os_groups]
  - name: kubelet_event_record_qps
    default: 50
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Параметр eventRecordQPS в kubelet-config.yaml; 0 — без ограничения событий в секунду"

  # --- kubespray_defaults: прокси-окружение, sysctl, обновление системы, NTP ---
  - name: proxy_env_defaults
    default:
      http_proxy: "{{ http_proxy | default('') }}"
      HTTP_PROXY: "{{ http_proxy | default('') }}"
      https_proxy: "{{ https_proxy | default('') }}"
      HTTPS_PROXY: "{{ https_proxy | default('') }}"
      no_proxy: "{{ no_proxy | default('') }}"
      NO_PROXY: "{{ no_proxy | default('') }}"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Базовый словарь переменных окружения прокси, собираемый из http_proxy/https_proxy/no_proxy"
    related: [proxy_env]
  - name: proxy_env
    default: "{{ proxy_env_defaults | combine({'SSL_CERT_FILE': https_proxy_cert_file}) if https_proxy_cert_file is defined else proxy_env_defaults }}"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Итоговое прокси-окружение; при заданном https_proxy_cert_file добавляется SSL_CERT_FILE"
    related: [proxy_env_defaults]
  - name: proxy_disable_env
    default:
      ALL_PROXY: ''
      FTP_PROXY: ''
      HTTPS_PROXY: ''
      HTTP_PROXY: ''
      NO_PROXY: ''
      all_proxy: ''
      ftp_proxy: ''
      http_proxy: ''
      https_proxy: ''
      no_proxy: ''
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Словарь пустых прокси-переменных для явного отключения прокси в задачах"
  - name: sysctl_file_path
    default: "/etc/sysctl.d/99-sysctl.conf"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Файл для записи параметров sysctl. Дублируется в defaults ролей kubernetes/node и kubernetes/preinstall с тем же значением"
    also_defined_in: [roles/kubernetes/node/defaults/main.yml, roles/kubernetes/preinstall/defaults/main.yml]
  - name: system_upgrade
    default: false
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Выполнять обновление системных пакетов ОС при развёртывании"
    related: [system_upgrade_reboot]
  - name: system_upgrade_reboot
    default: "on-upgrade"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Политика перезагрузки после обновления системы: on-upgrade, never или always"
    conditions: "Учитывается при system_upgrade: true"
    related: [system_upgrade]
  - name: scheduler_plugins_enabled
    default: false
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Включить scheduler-plugins (расширения планировщика)"
  - name: ntp_enabled
    default: false
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Запускать и включать в автозагрузку службу NTP (ntpd/chrony)"
    related: [ntp_package, ntp_manage_config]
  - name: ntp_package
    default: |-
      {% if ansible_os_family == "RedHat" -%}
      chrony
      {%- else -%}
      ntp
      {%- endif -%}
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Пакет NTP для установки: chrony на семействе RedHat, иначе ntp; допустимы ntp, ntpsec, chrony"
    related: [ntp_enabled, ntp_driftfile]

  # --- kubespray_defaults/vars: производные подсети и константы ---
  - name: kube_proxy_deployed
    default: "{{ 'addon/kube-proxy' not in kubeadm_init_phases_skip }}"
    source_path: roles/kubespray_defaults/vars/main/main.yml
    description: "Вычисляемый признак того, что kube-proxy развёрнут (фаза addon/kube-proxy не пропущена)"
    related: [kubeadm_init_phases_skip]
  - name: calico_min_version_required
    default: "3.27.0"
    source_path: roles/kubespray_defaults/vars/main/main.yml
    description: "Минимальная версия Calico, с которой возможно обновление (равна calico_version предыдущей ветки)"
  - name: containerd_min_version_required
    default: "1.3.7"
    source_path: roles/kubespray_defaults/vars/main/main.yml
    description: "Минимально требуемая версия containerd"
  - name: kube_service_subnets
    default: |-
      {%- if ipv4_stack and ipv6_stack -%}
      {{ kube_service_addresses }},{{ kube_service_addresses_ipv6 }}
      {%- elif ipv4_stack -%}
      {{ kube_service_addresses }}
      {%- else -%}
      {{ kube_service_addresses_ipv6 }}
      {%- endif -%}
    source_path: roles/kubespray_defaults/vars/main/main.yml
    description: "Итоговые сервисные подсети с учётом стека (dualstack/ipv4/ipv6)"
    related: [kube_service_addresses, kube_service_addresses_ipv6, ipv4_stack, ipv6_stack]
  - name: kube_pods_subnets
    default: |-
      {%- if ipv4_stack and ipv6_stack -%}
      {{ kube_pods_subnet }},{{ kube_pods_subnet_ipv6 }}
      {%- elif ipv4_stack -%}
      {{ kube_pods_subnet }}
      {%- else -%}
      {{ kube_pods_subnet_ipv6 }}
      {%- endif -%}
    source_path: roles/kubespray_defaults/vars/main/main.yml
    description: "Итоговые подсети подов с учётом стека (dualstack/ipv4/ipv6)"
    related: [kube_pods_subnet, kube_pods_subnet_ipv6, ipv4_stack, ipv6_stack]

  # --- control-plane: apiserver и общие настройки контрол-плейна ---
  - name: upgrade_cluster_setup
    default: false
    source_path: roles/kubernetes/control-plane/defaults/main/main.yml
    description: "Внутренний флаг режима обновления кластера; выставляется в true плейбуком upgrade-cluster.yml"
  - name: kube_apiserver_bind_address
    default: "::"
    source_path: roles/kubernetes/control-plane/defaults/main/main.yml
    description: "Дубликат: адрес прослушивания kube-apiserver (:: — все интерфейсы), то же значение, что в kubespray_defaults"
    related: [kube_apiserver_port]
    also_defined_in: [roles/kubespray_defaults/defaults/main/main.yml]
  - name: kube_apiserver_node_port_range
    default: "30000-32767"
    source_path: roles/kubernetes/control-plane/defaults/main/main.yml
    description: "Диапазон портов для сервисов NodePort (границы включительно). Дублируется в roles/kubernetes/node/defaults/main.yml"
    also_defined_in: [roles/kubernetes/node/defaults/main.yml]
  - name: kube_apiserver_storage_backend
    default: "etcd3"
    source_path: roles/kubernetes/control-plane/defaults/main/main.yml
    description: "Бэкенд хранения данных Kubernetes (--storage-backend)"
  - name: kube_apiserver_etcd_compaction_interval
    default: "5m0s"
    source_path: roles/kubernetes/control-plane/defaults/main/main.yml
    description: "Интервал запросов компакции etcd от apiserver; 0 — компакция отключена"
  - name: kube_apiserver_service_account_lookup
    default: true
    source_path: roles/kubernetes/control-plane/defaults/main/main.yml
    description: "Проверять фактическое наличие service account токена в etcd (CIS 1.2.26)"
  - name: kube_etcd_cacert_file
    default: "ca.pem"
    source_path: roles/kubernetes/control-plane/defaults/main/main.yml
    description: "Имя файла CA-сертификата etcd для apiserver"
    related: [etcd_cert_dir]
  - name: kube_etcd_cert_file
    default: "node-{{ inventory_hostname }}.pem"
    source_path: roles/kubernetes/control-plane/defaults/main/main.yml
    description: "Имя файла клиентского сертификата etcd для apiserver"
  - name: kube_etcd_key_file
    default: "node-{{ inventory_hostname }}-key.pem"
    source_path: roles/kubernetes/control-plane/defaults/main/main.yml
    description: "Имя файла клиентского ключа etcd для apiserver"
  - name: kube_controller_manager_bind_address
    default: "::"
    source_path: roles/kubernetes/control-plane/defaults/main/main.yml
    description: "Адрес, на котором слушает kube-controller-manager"
  - name: kube_controller_manager_leader_elect_lease_duration
    default: "15s"
    source_path: roles/kubernetes/control-plane/defaults/main/main.yml
    description: "Длительность lease выборов лидера controller-manager"
  - name: kube_controller_manager_leader_elect_renew_deadline
    default: "10s"
    source_path: roles/kubernetes/control-plane/defaults/main/main.yml
    description: "Крайний срок продления lease лидера controller-manager"
  - name: discovery_timeout
    default: "5m0s"
    source_path: roles/kubernetes/control-plane/defaults/main/main.yml
    description: "Тайм-аут discovery kubeadm для контрол-плейна. В roles/kubernetes/kubeadm/defaults/main.yml для join воркеров задан иначе — 60s"
    related: [kubeadm_join_timeout]
  - name: kubeadm_refresh_token
    default: true
    source_path: roles/kubernetes/control-plane/defaults/main/main.yml
    description: "Обновлять kubeadm-токен на первом узле контрол-плейна"
  - name: kubeadm_scale_down_coredns_enabled
    default: true
    source_path: roles/kubernetes/control-plane/defaults/main/main.yml
    description: "Масштабировать реплики coredns kubeadm до 0, если dns_mode не coredns"
    related: [dns_mode]

  # --- control-plane: аудит ---
  - name: kubernetes_audit
    default: false
    source_path: roles/kubernetes/control-plane/defaults/main/main.yml
    description: "Включить аудит API-сервера с записью в файл"
    related: [audit_log_path, audit_policy_file]
  - name: audit_log_path
    default: "/var/log/audit/kube-apiserver-audit.log"
    source_path: roles/kubernetes/control-plane/defaults/main/main.yml
    description: "Путь файла журнала аудита apiserver"
    conditions: "Используется при kubernetes_audit: true"
  - name: audit_log_maxage
    default: 30
    source_path: roles/kubernetes/control-plane/defaults/main/main.yml
    description: "Число дней хранения журналов аудита"
    conditions: "Используется при kubernetes_audit: true"
  - name: audit_log_maxbackups
    default: 10
    source_path: roles/kubernetes/control-plane/defaults/main/main.yml
    description: "Число хранимых файлов журнала аудита"
    conditions: "Используется при kubernetes_audit: true"
  - name: audit_log_maxsize
    default: 100
    source_path: roles/kubernetes/control-plane/defaults/main/main.yml
    description: "Максимальный размер файла журнала аудита в МБ до ротации"
    conditions: "Используется при kubernetes_audit: true"
  - name: audit_policy_file
    default: "{{ kube_config_dir }}/audit-policy/apiserver-audit-policy.yaml"
    source_path: roles/kubernetes/control-plane/defaults/main/main.yml
    description: "Путь файла audit policy"
    conditions: "Используется при kubernetes_audit: true"
  - name: audit_log_name
    default: "audit-logs"
    source_path: roles/kubernetes/control-plane/defaults/main/main.yml
    description: "Имя hostPath-тома журналов аудита в манифесте apiserver"
  - name: audit_log_hostpath
    default: "/var/log/kubernetes/audit"
    source_path: roles/kubernetes/control-plane/defaults/main/main.yml
    description: "hostPath каталога журналов аудита"
  - name: audit_log_mountpath
    default: "{{ audit_log_path | dirname }}"
    source_path: roles/kubernetes/control-plane/defaults/main/main.yml
    description: "Точка монтирования журналов аудита внутри пода apiserver"
    related: [audit_log_path]
  - name: audit_policy_name
    default: "audit-policy"
    source_path: roles/kubernetes/control-plane/defaults/main/main.yml
    description: "Имя hostPath-тома audit policy в манифесте apiserver"
  - name: audit_policy_hostpath
    default: "{{ audit_policy_file | dirname }}"
    source_path: roles/kubernetes/control-plane/defaults/main/main.yml
    description: "hostPath каталога audit policy"
    related: [audit_policy_file]
  - name: audit_policy_mountpath
    default: "{{ audit_policy_hostpath }}"
    source_path: roles/kubernetes/control-plane/defaults/main/main.yml
    description: "Точка монтирования audit policy внутри пода apiserver"
  - name: kubernetes_audit_webhook
    default: false
    source_path: roles/kubernetes/control-plane/defaults/main/main.yml
    description: "Включить отправку событий аудита во внешний webhook"
    related: [audit_webhook_server_url]
  - name: audit_webhook_config_file
    default: "{{ kube_config_dir }}/audit-policy/apiserver-audit-webhook-config.yaml"
    source_path: roles/kubernetes/control-plane/defaults/main/main.yml
    description: "Путь kubeconfig-файла аудит-webhook"
    conditions: "Используется при kubernetes_audit_webhook: true"
  - name: audit_webhook_server_url
    default: "https://audit.app"
    source_path: roles/kubernetes/control-plane/defaults/main/main.yml
    description: "URL сервера аудит-webhook"
    conditions: "Используется при kubernetes_audit_webhook: true"
  - name: audit_webhook_server_extra_args
    default: {}
    source_path: roles/kubernetes/control-plane/defaults/main/main.yml
    description: "Дополнительные аргументы конфигурации аудит-webhook"
  - name: audit_webhook_mode
    default: "batch"
    source_path: roles/kubernetes/control-plane/defaults/main/main.yml
    description: "Режим отправки событий аудита в webhook (batch/blocking)"
  - name: audit_webhook_batch_max_size
    default: 100
    source_path: roles/kubernetes/control-plane/defaults/main/main.yml
    description: "Максимальный размер пакета событий аудита"
    conditions: "Используется при audit_webhook_mode: batch"
  - name: audit_webhook_batch_max_wait
    default: "1s"
    source_path: roles/kubernetes/control-plane/defaults/main/main.yml
    description: "Максимальное ожидание перед отправкой неполного пакета событий аудита"
    conditions: "Используется при audit_webhook_mode: batch"

  # --- control-plane: controller-manager, тайм-ауты, эвакуация ---
  - name: kube_controller_node_monitor_grace_period
    default: "40s"
    source_path: roles/kubernetes/control-plane/defaults/main/main.yml
    description: "Время, в течение которого нода без статусов ещё не помечается NotReady (--node-monitor-grace-period)"
  - name: kube_controller_node_monitor_period
    default: "5s"
    source_path: roles/kubernetes/control-plane/defaults/main/main.yml
    description: "Период опроса статуса нод controller-manager (--node-monitor-period)"
  - name: kube_controller_terminated_pod_gc_threshold
    default: 12500
    source_path: roles/kubernetes/control-plane/defaults/main/main.yml
    description: "Порог числа завершённых подов до запуска сборщика мусора (--terminated-pod-gc-threshold)"
  - name: kube_apiserver_request_timeout
    default: "1m0s"
    source_path: roles/kubernetes/control-plane/defaults/main/main.yml
    description: "Глобальный тайм-аут запросов к apiserver (--request-timeout)"
  - name: kube_apiserver_pod_eviction_not_ready_timeout_seconds
    default: "300"
    source_path: roles/kubernetes/control-plane/defaults/main/main.yml
    description: "Тайм-аут (сек) до эвакуации подов с нод в состоянии NotReady (default-not-ready-toleration-seconds)"
  - name: kube_apiserver_pod_eviction_unreachable_timeout_seconds
    default: "300"
    source_path: roles/kubernetes/control-plane/defaults/main/main.yml
    description: "Тайм-аут (сек) до эвакуации подов с недостижимых нод (default-unreachable-toleration-seconds)"

  # --- control-plane: admission plugins и Pod Security ---
  - name: kube_apiserver_enable_admission_plugins
    default: []
    source_path: roles/kubernetes/control-plane/defaults/main/main.yml
    description: "Список дополнительно включаемых admission-плагинов apiserver (--enable-admission-plugins)"
    related: [kube_apiserver_disable_admission_plugins, kube_apiserver_admission_plugins_needs_configuration]
  - name: kube_apiserver_admission_control_config_file
    default: false
    source_path: roles/kubernetes/control-plane/defaults/main/main.yml
    description: "Создавать файл конфигурации admission-плагинов (--admission-control-config-file)"
    related: [kube_apiserver_admission_plugins_needs_configuration]
  - name: kube_apiserver_admission_event_rate_limits
    default: {}
    source_path: roles/kubernetes/control-plane/defaults/main/main.yml
    description: "Конфигурация лимитов admission-плагина EventRateLimit (type, qps, burst, cache_size)"
    conditions: "Используется при включённом плагине EventRateLimit"
  - name: kube_pod_security_use_default
    default: false
    source_path: roles/kubernetes/control-plane/defaults/main/main.yml
    description: "Задать кластерные значения по умолчанию для admission-плагина PodSecurity"
    related: [kube_pod_security_default_enforce]
  - name: kube_pod_security_default_enforce
    default: "baseline"
    source_path: roles/kubernetes/control-plane/defaults/main/main.yml
    description: "Уровень enforce Pod Security Standards по умолчанию (privileged/baseline/restricted)"
    conditions: "Используется при kube_pod_security_use_default: true"
  - name: kube_pod_security_default_enforce_version
    default: "v{{ kube_major_version }}"
    source_path: roles/kubernetes/control-plane/defaults/main/main.yml
    description: "Версия стандарта для уровня enforce PodSecurity"
  - name: kube_pod_security_default_audit
    default: "restricted"
    source_path: roles/kubernetes/control-plane/defaults/main/main.yml
    description: "Уровень audit Pod Security Standards по умолчанию"
  - name: kube_pod_security_default_audit_version
    default: "v{{ kube_major_version }}"
    source_path: roles/kubernetes/control-plane/defaults/main/main.yml
    description: "Версия стандарта для уровня audit PodSecurity"
  - name: kube_pod_security_default_warn
    default: "restricted"
    source_path: roles/kubernetes/control-plane/defaults/main/main.yml
    description: "Уровень warn Pod Security Standards по умолчанию"
  - name: kube_pod_security_default_warn_version
    default: "v{{ kube_major_version }}"
    source_path: roles/kubernetes/control-plane/defaults/main/main.yml
    description: "Версия стандарта для уровня warn PodSecurity"
  - name: kube_pod_security_exemptions_usernames
    default: []
    source_path: roles/kubernetes/control-plane/defaults/main/main.yml
    description: "Пользователи, исключённые из проверок PodSecurity"
  - name: kube_pod_security_exemptions_runtime_class_names
    default: []
    source_path: roles/kubernetes/control-plane/defaults/main/main.yml
    description: "RuntimeClass-ы, исключённые из проверок PodSecurity"
  - name: kube_pod_security_exemptions_namespaces
    default: [kube-system]
    source_path: roles/kubernetes/control-plane/defaults/main/main.yml
    description: "Namespace-ы, исключённые из проверок PodSecurity (по умолчанию kube-system)"
  - name: kube_resource_quota_limited_resources
    default: []
    source_path: roles/kubernetes/control-plane/defaults/main/main.yml
    description: "Ресурсы, ограничиваемые admission-плагином ResourceQuota при отсутствии квоты"
    conditions: "Используется при включённом плагине ResourceQuota"
  - name: kube_apiserver_disable_admission_plugins
    default: []
    source_path: roles/kubernetes/control-plane/defaults/main/main.yml
    description: "Список отключаемых admission-плагинов apiserver (--disable-admission-plugins)"
    related: [kube_apiserver_enable_admission_plugins]
  - name: kube_apiserver_admission_plugins_needs_configuration
    default: [EventRateLimit, ImagePolicyWebhook, PodSecurity, PodNodeSelector, ResourceQuota]
    source_path: roles/kubernetes/control-plane/vars/main.yaml
    description: "Константа: admission-плагины, требующие файла конфигурации (vars роли control-plane)"
    related: [kube_apiserver_admission_control_config_file]
  - name: kube_apiserver_admission_plugins_podnodeselector_default_node_selector
    default: ""
