    description: "Установить AWS ALB Ingress controller"
  - name: cert_manager_enabled
    default: false
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Установить cert-manager"
  - name: expand_persistent_volumes
    default: false
    source_path: roles/kubespray_defaults/defaults/main/main.yml
