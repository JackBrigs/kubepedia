        expected: [localhost6, localhost6.localdomain]
        unexpected: [localhost, localhost.localdomain]
    source_path: roles/kubernetes/preinstall/defaults/main.yml
    description: "Ожидаемые/нежелательные записи localhost для /etc/hosts. Присутствует в v2.28.0 и удалён в v2.29.1"
    related: [populate_localhost_entries_to_hosts_file]
  - name: minimal_node_memory_mb
    default: 1024
    source_path: roles/kubernetes/preinstall/defaults/main.yml
    description: "Минимальный объём памяти воркер-ноды (МБ) для preflight-проверки"
  - name: minimal_master_memory_mb
    default: 1500
    source_path: roles/kubernetes/preinstall/defaults/main.yml
    description: "Минимальный объём памяти ноды контрол-плейна (МБ) для preflight-проверки"
  - name: ntp_manage_config
    default: false
    source_path: roles/kubernetes/preinstall/defaults/main.yml
    description: "Управлять конфигурационным файлом NTP"
    related: [ntp_enabled, ntp_servers]
  - name: ntp_servers
    default:
      - "0.pool.ntp.org iburst"
      - "1.pool.ntp.org iburst"
      - "2.pool.ntp.org iburst"
      - "3.pool.ntp.org iburst"
    source_path: roles/kubernetes/preinstall/defaults/main.yml
    description: "Список NTP-серверов"
    conditions: "Действует при ntp_manage_config: true"
  - name: ntp_restrict
    default: ["127.0.0.1", "::1"]
    source_path: roles/kubernetes/preinstall/defaults/main.yml
    description: "Хосты, которым разрешён доступ к NTP"
    conditions: "Действует при ntp_manage_config: true"
  - name: ntp_filter_interface
    default: false
    source_path: roles/kubernetes/preinstall/defaults/main.yml
    description: "Фильтровать интерфейсы NTP (совместно с ntp_interfaces)"
  - name: ntp_driftfile
    default: |-
      {% if ntp_package == "ntpsec" -%}
      /var/lib/ntpsec/ntp.drift
      {%- else -%}
      /var/lib/ntp/ntp.drift
      {%- endif -%}
    source_path: roles/kubernetes/preinstall/defaults/main.yml
    description: "Путь driftfile NTP (для ntpsec — /var/lib/ntpsec/ntp.drift)"
    conditions: "Действует при ntp_manage_config: true"
    related: [ntp_package]
  - name: ntp_tinker_panic
    default: false
    source_path: roles/kubernetes/preinstall/defaults/main.yml
    description: "Включить tinker panic 0 в NTP (принимать любой сдвиг времени)"
    conditions: "Действует при ntp_manage_config: true"
  - name: ntp_force_sync_immediately
    default: false
    source_path: roles/kubernetes/preinstall/defaults/main.yml
    description: "Принудительно синхронизировать время сразу после установки NTP"
  - name: ntp_timezone
    default: ""
    source_path: roles/kubernetes/preinstall/defaults/main.yml
    description: "Часовой пояс сервера (например Etc/UTC); пусто — не менять"
  - name: supported_os_distributions
    default: [RedHat, CentOS, Fedora, Ubuntu, Debian, Flatcar, "Flatcar Container Linux by Kinvolk", Suse, "openSUSE Leap", "openSUSE Tumbleweed", ClearLinux, OracleLinux, AlmaLinux, Rocky, Amazon, "Kylin Linux Advanced Server", UnionTech, UniontechOS, openEuler]
    source_path: roles/kubernetes/preinstall/defaults/main.yml
    description: "Список поддерживаемых дистрибутивов ОС для preflight-проверки"
  - name: redhat_os_family_extensions
    default: [UnionTech, UniontechOS]
    source_path: roles/kubernetes/preinstall/defaults/main.yml
    description: "Дистрибутивы, дополнительно относимые к семейству RedHat"
  - name: systemd_resolved_disable_stub_listener
    default: "{{ ansible_os_family in ['Flatcar', 'Flatcar Container Linux by Kinvolk'] }}"
    source_path: roles/kubernetes/preinstall/defaults/main.yml
    description: "Выставить DNSStubListener=no в systemd-resolved (лечит bind: address already in use на 0.0.0.0:53)"
  - name: disable_fapolicyd
    default: true
    source_path: roles/kubernetes/preinstall/defaults/main.yml
    description: "Отключить службу fapolicyd (File Access Policy Daemon); иначе установка CNI-плагина завершится ошибкой"

  # --- preinstall/vars: вычисляемые DNS-переменные ---
  - name: coredns_server_by_mode
    default:
      coredns: "{{ [skydns_server] }}"
      coredns_dual: "{{ [skydns_server, skydns_server_secondary] }}"
      manual: "{{ manual_dns_server.split(',') }}"
      none: []
    source_path: roles/kubernetes/preinstall/vars/main.yml
    description: "Карта кластерных DNS-серверов по режимам dns_mode (vars роли preinstall)"
    related: [coredns_server, dns_mode]
  - name: coredns_server
    default: "{{ upstream_dns_servers if dns_early else coredns_server_by_mode[dns_mode] }}"
    source_path: roles/kubernetes/preinstall/vars/main.yml
    description: "Активный список DNS-серверов: upstream на раннем этапе (dns_early), затем кластерные"
    related: [upstream_dns_servers, coredns_server_by_mode]
  - name: _nameserverentries
    default:
      late:
        - "{{ nodelocaldns_ip if enable_nodelocaldns else coredns_server }}"
      early:
        - "{{ nameservers }}"
        - "{{ cloud_resolver }}"
        - "{{ configured_nameservers if not disable_host_nameservers else [] }}"
    source_path: roles/kubernetes/preinstall/vars/main.yml
    description: "Служебная структура источников nameserver-ов для раннего и позднего этапов настройки DNS"
    related: [nameserverentries]
  - name: nameserverentries
    default: "{{ ((_nameserverentries['late'] if not dns_early else []) + _nameserverentries['early']) | flatten | unique }}"
    source_path: roles/kubernetes/preinstall/vars/main.yml
    description: "Итоговый список nameserver-ов для resolv.conf хоста"
    related: [_nameserverentries]
  - name: dhclient_supersede
    default:
      domain-name-servers: "{{ ([nameservers, cloud_resolver] | flatten | unique) if dns_early else nameserverentries }}"
      domain-name: "{{ [dns_domain] }}"
      domain-search: "{{ default_searchdomains + searchdomains }}"
    source_path: roles/kubernetes/preinstall/vars/main.yml
    description: "Параметры supersede для dhclient (DNS-серверы, домен, search-домены)"
    related: [nameserverentries, dns_domain]
  - name: configured_nameservers
    default: "{{ (resolvconf_slurp.content | b64decode | regex_findall('^nameserver\\s*(\\S*)', multiline=True) | ansible.utils.ipaddr) if resolvconf_stat.stat.exists else [] }}"
    source_path: roles/kubernetes/preinstall/vars/main.yml
    description: "nameserver-ы, уже сконфигурированные в resolv.conf хоста (читаются из файла)"
    related: [disable_host_nameservers]

  # --- client: kubeconfig и kubectl на хосте Ansible ---
  - name: kubeconfig_localhost
    default: false
    source_path: roles/kubernetes/client/defaults/main.yml
    description: "Дубликат: копировать admin-kubeconfig на хост Ansible (то же значение, что в kubespray_defaults)"
    also_defined_in: [roles/kubespray_defaults/defaults/main/main.yml]
  - name: kubeconfig_localhost_ansible_host
    default: false
    source_path: roles/kubernetes/client/defaults/main.yml
    description: "Использовать ansible_host вместо endpoint первого контрол-плейна в копируемом kubeconfig"
    related: [kubeconfig_localhost]
  - name: kubectl_localhost
    default: false
    source_path: roles/kubernetes/client/defaults/main.yml
    description: "Дубликат: скачать kubectl на хост Ansible (то же значение, что в kubespray_defaults)"
    also_defined_in: [roles/kubespray_defaults/defaults/main/main.yml]
  - name: artifacts_dir
    default: "{{ inventory_dir }}/artifacts"
    source_path: roles/kubernetes/client/defaults/main.yml
    description: "Каталог артефактов (kubeconfig, kubectl) на хосте Ansible"
    related: [kubeconfig_localhost, kubectl_localhost]
  - name: kube_config_dir
    default: "/etc/kubernetes"
    source_path: roles/kubernetes/client/defaults/main.yml
    description: "Дубликат: каталог конфигурации Kubernetes (то же значение, что в kubespray_defaults и preinstall)"
    also_defined_in: [roles/kubespray_defaults/defaults/main/main.yml, roles/kubernetes/preinstall/defaults/main.yml]
  - name: kube_apiserver_port
    default: "6443"
    source_path: roles/kubernetes/client/defaults/main.yml
    description: "HTTPS-порт API-сервера в виде строки \"6443\" (в kubespray_defaults — число 6443)"
    also_defined_in: [roles/kubespray_defaults/defaults/main/main.yml]
