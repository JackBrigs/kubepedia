    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Установить Kubernetes Dashboard (требуется RBAC)"
  - name: helm_enabled
    default: false
    source_path: roles/kubespray_defaults/defaults/main/main.yml
