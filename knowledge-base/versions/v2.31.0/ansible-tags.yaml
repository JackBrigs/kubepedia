    images/binaries across hosts", однако фактически в коде тег upload навешен только на подготовительные
    задачи (prep_download, prep_kubeadm_images), а сама раздача образов/файлов на узлы (synchronize push
    в download_container.yml/download_file.yml) идёт под тегом download, не upload. В примере docs upload
    обычно исключают (`--skip-tags upload`) при локальной подготовке образов. Приоритет у кода.

    '
  reliability: authoritative
- ansible_tag: validate-container-engine
  kubespray_version: v2.30.0
  git_commit: f4ccdb5
  description: 'Первая (валидирующая) подроль роли container-engine (container-engine/validate-container-engine).
    Определяет is_ostree, наличие systemd-юнита kubelet, собирает service_facts и ищет установленные сервисы
    containerd/docker/crio. Если обнаружен запущенный движок, отличный от текущего container_manager (и
    это не ostree/Flatcar), выполняет удаление старого движка: при необходимости drain узла (роль remove_node/pre_remove,
    тег pre-remove), остановку kubelet и import_role соответствующей reset-логики (container-engine/containerd|docker|cri-o,
    tasks_from=reset). Обеспечивает корректный переход между container runtimes.

    '
  playbooks:
  - cluster.yml
  - scale.yml
  - upgrade_cluster.yml
  affected_groups:
  - k8s_cluster
  - etcd
  - kube_node
  - kube_control_plane
  - calico_rr
  roles:
  - container-engine/validate-container-engine
  - remove_node/pre_remove
  - container-engine/containerd
  - container-engine/docker
  - container-engine/cri-o
  source_paths:
  - roles/container-engine/meta/main.yml
  - roles/container-engine/validate-container-engine/tasks/main.yml
  standalone_run: risky
  notes: 'Выполняется как часть роли container-engine (навешан тег container-engine и validate-container-engine).
    Потенциально деструктивен: при смене движка может вызвать drain узла, остановку kubelet и полное удаление
    ранее установленного контейнерного движка. Опирается на факты (service_facts, is_ostree). Изолированный
    запуск безопасен только если движок не менялся; иначе способен нарушить работу узла.

    '
  reliability: authoritative
- ansible_tag: vsphere-csi-driver
  kubespray_version: v2.30.0
  git_commit: f4ccdb5
  description: 'Разворачивает CSI-драйвер vSphere (roles/kubernetes-apps/csi_driver/vsphere): генерирует
    и применяет манифесты драйвера/RBAC/StorageClass. В отличие от остальных *-csi-driver, отдельной под-роли
    в persistent_volumes нет — объекты создаются внутри самой роли csi_driver/vsphere.

    '
  playbooks:
  - cluster.yml
  - upgrade_cluster.yml
  affected_groups:
  - kube_control_plane
  roles:
  - kubernetes-apps/csi_driver/vsphere
  source_paths:
  - roles/kubernetes-apps/meta/main.yml
  standalone_run: safe
  notes: 'Условие включения: vsphere_csi_enabled. Входит в зонтичный тег csi-driver. В persistent_volumes/meta/main.yml
    под-роли vsphere нет (в отличие от cinder/aws-ebs/azure/gcp/upcloud), поэтому нет парного тега persistent_volumes_vsphere_csi.
    При выключенном флаге — no-op.

    '
  reliability: authoritative
- ansible_tag: win_nodes
  description: 'Специфичные для Windows задачи (роль win_nodes/kubernetes_patch), выполняются на первом
    узле control plane. Создают каталог пользовательских манифестов и патчат DaemonSet kube-proxy nodeSelector''ом
    kubernetes.io/os=linux, чтобы системные компоненты не планировались на Windows-узлы. Роль подключается
    с тегами [control-plane, win_nodes].

    '
  playbooks:
  - cluster.yml
  - upgrade_cluster.yml
  affected_groups:
  - kube_control_plane
  roles:
  - win_nodes/kubernetes_patch
  source_paths:
  - roles/win_nodes/kubernetes_patch/tasks/main.yml
  - playbooks/cluster.yml
  standalone_run: risky
  notes: 'Требует работающего API-сервера и kubectl (patch kube-proxy), выполняется на kube_control_plane[0].
    В изоляции без поднятого кластера завершится ошибкой. Соответствует docs/ansible/ansible.md ("Running
    windows specific tasks").

    '
  reliability: authoritative
- ansible_tag: youki
  kubespray_version: v2.30.0
  git_commit: f4ccdb5
  description: 'Настройка OCI-рантайма youki. (1) container-engine: подроль container-engine/youki (при
    youki_enabled и container_manager==''crio'') скачивает бинарник youki через download_file и копирует
    его в {{ youki_bin_dir }}/youki на узлах. (2) apps/container-runtimes: подроль kubernetes-apps/container_runtimes/youki
    (при youki_enabled и container_manager==''crio'') шаблонизирует и применяет объект RuntimeClass "youki"
    в кластере (только на первом узле kube_control_plane).

    '
  playbooks:
  - cluster.yml
  - upgrade_cluster.yml
  affected_groups:
  - k8s_cluster
  - etcd
  - kube_node
  - kube_control_plane
  - calico_rr
  roles:
  - container-engine/youki
  - kubernetes-apps/container_runtimes/youki
  source_paths:
  - roles/container-engine/meta/main.yml
  - roles/container-engine/youki/tasks/main.yml
  - roles/kubernetes-apps/container_runtimes/meta/main.yml
  - roles/kubernetes-apps/container_runtimes/youki/tasks/main.yaml
  standalone_run: risky
  notes: 'youki поддерживается только совместно с CRI-O (условие youki_enabled и container_manager==''crio''
    в обеих ролях). Установочная часть требует скачанного бинарника (download), часть RuntimeClass — готового
    кластера и kubectl. В scale.yml роль apps не выполняется, RuntimeClass там не создаётся.

    '
  reliability: authoritative
