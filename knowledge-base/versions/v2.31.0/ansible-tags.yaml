- ansible_tag: check
  description: 'Помечает три assert-проверки окружения запуска в playbooks/ansible_version.yml: версия
    Ansible в диапазоне minimal_ansible_version (2.17.3) <= x < maximal_ansible_version (2.18.0), наличие
    python-netaddr (ansible.utils.ipaddr) и достаточно свежая версия Jinja. Выполняются один раз (run_once)
    на хостах группы all, ничего не меняют.

    '
  playbooks:
  - cluster.yml
  - upgrade_cluster.yml
  - scale.yml
  - reset.yml
  - remove_node.yml
  affected_groups:
  - all
  roles: []
  source_paths:
  - playbooks/ansible_version.yml
  standalone_run: safe
  notes: 'Play ansible_version.yml помечен тегом always, поэтому эти проверки и так выполняются при каждом
    запуске; тег check позволяет адресно прогнать только их. Задачи неразрушающие. В docs/ansible/ansible.md
    тег check отдельно не описан.

    '
  reliability: authoritative
- ansible_tag: cilium
  description: 'Разворачивает CNI Cilium через утилиту cilium-cli по helm-values (в v2.30.0 это основной
    способ, не через статические манифесты). Роль network_plugin/cilium выполняется как зависимость network_plugin
    при условии kube_network_plugin == ''cilium'' или cilium_deploy_additionally. Порядок работы: 1) check.yml
    — набор assert-проверок: наличие cilium_ipsec_key при шифровании ipsec, корректность cilium_encryption_type
    (ipsec|wireguard), ядро >= 5.6.0 для wireguard, cilium_identity_allocation_mode в [''crd'',''kvstore''],
    cilium_cluster_id в диапазоне 0..255, cilium_version >= cilium_min_version_required, cilium_hubble_event_buffer_capacity
    равно степени двойки минус 1; обрабатывается устаревший флаг cilium_ipsec_enabled (переводится в cilium_encryption_type=ipsec).
    2) install.yml — монтирует BPFFS в /sys/fs/bpf; при cilium_identity_allocation_mode == ''kvstore''
    создаёт каталог cilium_cert_dir и жёстко линкует etcd-сертификаты (ca_cert.crt, cert.crt, key.pem);
    на первом узле kube_control_plane рендерит values.yaml.j2 в {{ kube_config_dir }}/cilium-values.yaml,
    пишет cilium-extra-values.yaml из cilium_extra_values; копирует бинарник cilium-cli из local_release_dir
    в bin_dir. 3) apply.yml — на первом control-plane выполняет `cilium version`, по наличию helm-релиза
    выбирает действие install либо upgrade, затем запускает `cilium <install|upgrade> --version {{ cilium_version
    }} -f cilium-values.yaml -f cilium-extra-values.yaml {{ cilium_install_extra_flags }}`; ждёт готовности
    подов k8s-app=cilium; при заданных переменных применяет CRD-ресурсы Cilium: CiliumLoadBalancerIPPool,
    CiliumBGPPeeringPolicy, CiliumBGPClusterConfig, CiliumBGPPeerConfig, CiliumBGPAdvertisement, CiliumBGPNodeConfigOverride
    (каждый — после ожидания установки соответствующего CRD). Тег cilium также помечает создание CNI-каталогов
    (/etc/cni/net.d, /opt/cni/bin) в preinstall.'
  playbooks:
  - cluster.yml
  - upgrade_cluster.yml
  affected_groups:
  - k8s_cluster
  - kube_control_plane
  roles:
  - network_plugin
  - network_plugin/cilium
  - kubernetes/preinstall
  source_paths:
  - roles/network_plugin/meta/main.yml
  - roles/network_plugin/cilium/tasks/main.yml
  - roles/network_plugin/cilium/tasks/check.yml
  - roles/network_plugin/cilium/tasks/install.yml
  - roles/network_plugin/cilium/tasks/apply.yml
  - roles/kubernetes/preinstall/tasks/0050-create_directories.yml
  standalone_run: risky
  notes: 'Ключевое изменение относительно v2.29.1: установка Cilium выполняется через cilium-cli (команды
    `cilium install/upgrade -f <values>`), а не применением готовых манифестов. Требуется предварительно
    скачанный бинарник cilium-cli (роль download) и рабочий control-plane с доступным kubectl. Изолированный
    запуск --tags cilium без --tags download/network рискован: если бинарник cilium-cli не скопирован
    или values не отрендерены, установка упадёт. Часть шагов выполняется только на groups[''kube_control_plane''][0].'
  reliability: authoritative
- ansible_tag: cinder-csi-driver
  kubespray_version: v2.30.0
  git_commit: f4ccdb5
  description: 'Разворачивает CSI-драйвер OpenStack Cinder (roles/kubernetes-apps/csi_driver/cinder),
    создаёт объекты хранилища (roles/kubernetes-apps/persistent_volumes/cinder-csi, StorageClass) и дополнительно
    VolumeSnapshotClass для Cinder (roles/kubernetes-apps/snapshots/cinder-csi). Отличие от остальных
