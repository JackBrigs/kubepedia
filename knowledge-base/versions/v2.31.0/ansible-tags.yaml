- ansible_tag: asserts
  description: 'Проверочные (assert) задачи-предусловия. В v2.30.0 тег стоит на: roles/kubernetes/preinstall/tasks/main.yml
    (import 0040-verify-settings.yml — валидация настроек кластера), roles/download/tasks/prep_download.yml
    (проверка на localhost: доступ к контейнерному рантайму без sudo либо возможность стать root при download_localhost)
    и roles/download/tasks/check_pull_required.yml (сверка локального digest sha256 образа с заданным
    тегом при pull_by_digest). Задачи только читают/проверяют состояние и падают при несоблюдении условий,
    ничего не меняя на узлах.

    '
  playbooks:
  - cluster.yml
  - scale.yml
  - upgrade_cluster.yml
  affected_groups:
  - k8s_cluster
  - etcd
  - kube_node
  roles:
  - kubernetes/preinstall
  - download
  source_paths:
  - roles/kubernetes/preinstall/tasks/main.yml
  - roles/download/tasks/prep_download.yml
  - roles/download/tasks/check_pull_required.yml
  standalone_run: safe
  notes: 'Задачи неразрушающие (assert), но требуют собранных фактов и заданных переменных (image_info_command,
    download_localhost и др.); часть asserts вложена в блоки, выполняемые только при соответствующих условиях.
    Расхождение с docs/ansible/ansible.md: документация описывает asserts как "Check tasks for download
    role", тогда как фактически тег применяется ещё и к verify-settings роли kubernetes/preinstall — приоритет
    у кода.

    '
  reliability: authoritative
