tags:
- ansible_tag: always
  description: 'Специальный Ansible-тег, автоматически применяемый к задачам вне зависимости от --tags
    (отменяется только через --skip-tags always). В v2.30.0 на уровне play помечены: проверка версии Ansible
    и зависимостей (playbooks/ansible_version.yml), настройка и валидация инвентаря (playbooks/boilerplate.yml,
    роли dynamic_groups и validate_inventory — совместимость старых имён групп, определение родительских/пустых
    групп) и сбор фактов (playbooks/internal_facts.yml: network_facts, минимальный setup, сетевые и аппаратные
    факты). Эти play выполняются перед любым запуском, обеспечивая корректный инвентарь и наличие фактов
    для остальных ролей.

    '
  playbooks:
  - cluster.yml
  - upgrade_cluster.yml
  - scale.yml
  - reset.yml
  - remove_node.yml
  affected_groups:
  - all
  - k8s_cluster
  - etcd
  - calico_rr
  roles:
  - dynamic_groups
  - validate_inventory
  - network_facts
  - bootstrap_os
  source_paths:
  - playbooks/ansible_version.yml
  - playbooks/boilerplate.yml
  - playbooks/internal_facts.yml
  standalone_run: safe
  notes: "Спецсемантика: задачи с тегом always выполняются при любом запуске, если явно не заданы --skip-tags\
    \ always. Запуск `--tags always` в изоляции лишь прогонит подготовительные play (валидация версии,\
    \ инвентаря, сбор фактов) — операции неразрушающие, изменений на узлах кластера не производится.\n\
    \ [v2.31.0] Роль network_facts теперь подключается под тегом always (playbooks/internal_facts.yml);\
    \ в ней же исправлен рендеринг no_proxy (flatten+join вместо посимвольного цикла)."
  reliability: authoritative
- ansible_tag: annotate
  description: 'Создаёт аннотации на узлах для сетевого плагина kube-router: задача импортирует annotate.yml
    из роли network_plugin/kube-router (roles/network_plugin/kube-router/tasks/main.yml, import_tasks
    annotate.yml). Аннотации задают параметры BGP (subnet/ASN и пр.) для работы kube-router. Применяется
    только при kube_network_plugin == ''kube-router''.

    '
  playbooks:
  - cluster.yml
  - scale.yml
  - upgrade_cluster.yml
  affected_groups:
  - k8s_cluster
  - kube_node
  roles:
  - network_plugin/kube-router
  source_paths:
  - roles/network_plugin/kube-router/tasks/main.yml
  standalone_run: risky
  notes: 'Зависит от развёрнутого kube-router и выбранного kube_network_plugin == ''kube-router''; вне
    сетевого этапа (роль network_plugin) без установленного CNI изолированный запуск смысла не имеет.
    Соответствует описанию в docs/ansible/ansible.md ("Create kube-router annotation").

    '
  reliability: authoritative
- ansible_tag: apps
  description: 'Сквозной («umbrella») тег группы kubernetes-apps. Запускает роль kubernetes-apps в плее
    «Install Kubernetes apps» (hosts: kube_control_plane) и разворачивает весь набор кластерных addon''ов,
    каждый — по своему флагу *_enabled: helm, registry, metrics_server, CSI-драйверы, persistent_volumes,
    snapshots, container_runtimes (kata/gvisor/crun/youki), container_engine_accelerator (nvidia_gpu),
    kubelet-csr-approver, metallb, argocd, scheduler_plugins, node_feature_discovery. Кроме того, метка
    apps продублирована на подролях ingress_controller (ingress_nginx/cert_manager/alb), external_provisioner
    (local-path/local-volume) и container-* — поэтому запуск с --tags apps затрагивает и их. Также помечает
    задачу создания служебных каталогов в roles/kubernetes/preinstall/tasks/0050-create_directories.yml.'
  playbooks:
  - cluster.yml
  - upgrade_cluster.yml
  affected_groups:
  - kube_control_plane
  roles:
  - kubernetes-apps
  - kubernetes-apps/ingress_controller
  - kubernetes-apps/external_provisioner
  - kubernetes-apps/container_runtimes
  - kubernetes-apps/container_engine_accelerator
  - kubernetes/preinstall
  source_paths:
  - playbooks/cluster.yml
  - playbooks/upgrade_cluster.yml
  - roles/kubernetes-apps/meta/main.yml
  - roles/kubernetes-apps/ingress_controller/meta/main.yml
  - roles/kubernetes-apps/external_provisioner/meta/main.yml
  - roles/kubernetes-apps/container_runtimes/meta/main.yml
  - roles/kubernetes-apps/container_engine_accelerator/meta/main.yml
  - roles/kubernetes/preinstall/tasks/0050-create_directories.yml
  standalone_run: risky
  notes: "Разворачивается только на control plane; большинство задач выполняется однократно с delegate_to/run_once\
    \ на kube_control_plane[0]. Реальный состав разворачиваемого полностью зависит от флагов *_enabled\
    \ (по умолчанию почти все addon'ы выключены). Изолированный запуск требует работающего apiserver и\
    \ заранее скачанных артефактов; без --tags download на чистом окружении часть addon'ов упадёт из-за\
    \ отсутствия образов/бинарников.\n [v2.31.0] Из состава роли kubernetes-apps/ansible удалены задачи\
    \ netchecker и kubernetes-dashboard (роли удалены в v2.31.0)."
  reliability: authoritative
