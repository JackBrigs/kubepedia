  # --- Каталоги конфигурации Kubernetes ---
  - name: kube_config_dir
    sample_value: /etc/kubernetes
    is_set: true
    source_path: inventory/sample/group_vars/k8s_cluster/k8s-cluster.yml
    comment: "Основной каталог конфигурации Kubernetes (аналог /srv/kubernetes). Изменение почти наверняка что-то сломает."
  - name: kube_script_dir
    sample_value: "{{ bin_dir }}/kubernetes-scripts"
    is_set: true
    source_path: inventory/sample/group_vars/k8s_cluster/k8s-cluster.yml
    comment: "Каталог служебных скриптов Kubernetes."
  - name: kube_manifest_dir
    sample_value: "{{ kube_config_dir }}/manifests"
    is_set: true
    source_path: inventory/sample/group_vars/k8s_cluster/k8s-cluster.yml
    comment: "Каталог статических манифестов Kubernetes."
  - name: kube_cert_dir
    sample_value: "{{ kube_config_dir }}/ssl"
    is_set: true
    source_path: inventory/sample/group_vars/k8s_cluster/k8s-cluster.yml
    comment: "Каталог всех cert-скриптов и сертификатов."
  - name: kube_token_dir
    sample_value: "{{ kube_config_dir }}/tokens"
    is_set: true
    source_path: inventory/sample/group_vars/k8s_cluster/k8s-cluster.yml
    comment: "Каталог хранения bearer-токенов."
  - name: kube_api_anonymous_auth
    sample_value: true
    is_set: true
    source_path: inventory/sample/group_vars/k8s_cluster/k8s-cluster.yml
    comment: "Включает анонимную аутентификацию kube-apiserver."
  - name: local_release_dir
    sample_value: "/tmp/releases"
    is_set: true
    source_path: inventory/sample/group_vars/k8s_cluster/k8s-cluster.yml
    comment: "Каталог для скачиваемых бинарников (нужно ~1G свободного места)."
  - name: retry_stagger
    sample_value: 5
    is_set: true
    source_path: inventory/sample/group_vars/k8s_cluster/k8s-cluster.yml
    comment: "Случайный разброс при повторе неудачных операций скачивания/загрузки."
  - name: kube_owner
    sample_value: kube
    is_set: true
    source_path: inventory/sample/group_vars/k8s_cluster/k8s-cluster.yml
    comment: "Пользователь-владелец установки кластера. Для cilium требуется kube_owner: root."
  - name: kube_cert_group
    sample_value: kube-cert
    is_set: true
    source_path: inventory/sample/group_vars/k8s_cluster/k8s-cluster.yml
    comment: "Группа, на которую cert-скрипты меняют владельца сертификатов. Практически не изменяемая."
  - name: kube_log_level
    sample_value: 2
    is_set: true
    source_path: inventory/sample/group_vars/k8s_cluster/k8s-cluster.yml
    comment: "Уровень логирования компонентов Kubernetes."
  - name: credentials_dir
    sample_value: "{{ inventory_dir }}/credentials"
    is_set: true
    source_path: inventory/sample/group_vars/k8s_cluster/k8s-cluster.yml
    comment: "Каталог хранения учётных данных."

