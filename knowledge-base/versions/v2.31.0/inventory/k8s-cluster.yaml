  # --- Structured AuthenticationConfiguration (нововведение примеров в v2.31.0) ---
  - name: kube_apiserver_use_authentication_config_file
    sample_value: false
    is_set: false
    source_path: inventory/sample/group_vars/k8s_cluster/k8s-cluster.yml
    comment: "Пример (закомментирован). Использовать структурированный файл AuthenticationConfiguration. Взаимоисключаемо с флагами --authentication-config и --oidc-*."
  - name: kube_apiserver_authentication_config_jwt
    sample_value: |-
      - issuer:
          url: https://issuer.example.com
          audiences:
          - my-audience
        claimMappings:
          username:
            expression: 'claims.sub'
    is_set: false
    source_path: inventory/sample/group_vars/k8s_cluster/k8s-cluster.yml
    comment: "Пример (закомментирован). Список JWT-issuer'ов для структурированной AuthenticationConfiguration (пример добавлен в sample в v2.31.0)."
  - name: kube_apiserver_authentication_config_anonymous
    sample_value: |-
      enabled: "{{ kube_api_anonymous_auth }}"
      conditions: []
    is_set: false
    source_path: inventory/sample/group_vars/k8s_cluster/k8s-cluster.yml
    comment: "Пример (закомментирован). Настройка анонимного доступа в структурированной AuthenticationConfiguration (пример добавлен в sample в v2.31.0)."

