  - name: kube_network_node_prefix
    sample_value: 24
    is_set: true
    source_path: inventory/sample/group_vars/k8s_cluster/k8s-cluster.yml
    comment: "Размер подсети, выделяемой каждому узлу для IP подов. Число подов на узле также ограничено kubelet_max_pods (по умолчанию 110)."
