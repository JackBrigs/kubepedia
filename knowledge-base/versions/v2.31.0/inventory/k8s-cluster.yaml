    sample_value: fd85:ee78:d8a6:8607::1000/116
    is_set: true
    source_path: inventory/sample/group_vars/k8s_cluster/k8s-cluster.yml
    comment: "Внутренняя IPv6-сеть для сервисов (используется только при ipv6_stack: true, даёт 4096 адресов)."
  - name: kube_pods_subnet_ipv6
    sample_value: fd85:ee78:d8a6:8607::1:0000/112
    is_set: true
    source_path: inventory/sample/group_vars/k8s_cluster/k8s-cluster.yml
    comment: "Внутренняя IPv6-сеть для подов (используется только при ipv6_stack: true; 256 узлов по 254 пода)."
  - name: kube_network_node_prefix_ipv6
    sample_value: 120
    is_set: true
    source_path: inventory/sample/group_vars/k8s_cluster/k8s-cluster.yml
    comment: "Размер IPv6-подсети на узел (используется только при ipv6_stack: true; 254 пода на узел)."
  - name: kube_apiserver_ip
    sample_value: "{{ kube_service_subnets.split(',') | first | ansible.utils.ipaddr('net') | ansible.utils.ipaddr(1) | ansible.utils.ipaddr('address') }}"
    is_set: true
    source_path: inventory/sample/group_vars/k8s_cluster/k8s-cluster.yml
    comment: "Виртуальный cluster IP API-сервера (первый адрес первой service-подсети)."
  - name: kube_apiserver_port
    sample_value: 6443
    is_set: true
    source_path: inventory/sample/group_vars/k8s_cluster/k8s-cluster.yml
    comment: "HTTPS-порт, который слушает API-сервер."
  - name: kube_proxy_mode
    sample_value: ipvs
    is_set: true
    source_path: inventory/sample/group_vars/k8s_cluster/k8s-cluster.yml
    comment: "Режим proxyMode kube-proxy: ipvs, iptables или nftables."
