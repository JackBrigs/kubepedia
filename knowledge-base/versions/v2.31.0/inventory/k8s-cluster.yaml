    sample_value: false
    is_set: true
    source_path: inventory/sample/group_vars/k8s_cluster/k8s-cluster.yml
    comment: "Настраивает arp_ignore и arp_announce, чтобы не отвечать на ARP-запросы с интерфейса kube-ipvs0. Должно быть true для MetalLB и kube-vip (ARP)."
  - name: kube_proxy_nodeport_addresses
    sample_value: |-
      {%- if kube_proxy_nodeport_addresses_cidr is defined -%}
      [{{ kube_proxy_nodeport_addresses_cidr }}]
      {%- else -%}
      []
      {%- endif -%}
    is_set: true
    source_path: inventory/sample/group_vars/k8s_cluster/k8s-cluster.yml
    comment: "Адреса для NodePort. Пустой список означает использование всех локальных адресов. kube_proxy_nodeport_addresses_cidr сохранён для legacy-конфигов."
  - name: kube_override_hostname
