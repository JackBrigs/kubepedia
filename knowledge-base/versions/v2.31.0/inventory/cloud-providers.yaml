retrieved_at: 2026-07-14
topics:
  - inventory
  - cloud-providers
reliability: authoritative

# Примечание: в sample-инвентаре все переменные облачных провайдеров
# закомментированы (is_set: false). Значения sample_value приведены дословно
# из закомментированных строк тега v2.31.0. Итоговые значения по умолчанию
# определяются кодом ролей (roles/*/defaults), а не этими образцами.

variables:
  # ==================== AWS ====================
  - name: aws_ebs_csi_enabled
    sample_value: true
    is_set: false
    source_path: inventory/sample/group_vars/all/aws.yml
    provider: aws
    comment: "Включает драйвер AWS EBS CSI для провижининга томов EBS."
  - name: aws_ebs_csi_enable_volume_scheduling
    sample_value: true
    is_set: false
    source_path: inventory/sample/group_vars/all/aws.yml
    provider: aws
    comment: "Включает планирование томов (topology-aware) для EBS CSI."
  - name: aws_ebs_csi_enable_volume_snapshot
    sample_value: false
    is_set: false
    source_path: inventory/sample/group_vars/all/aws.yml
    provider: aws
    comment: "Включает поддержку снапшотов томов в EBS CSI."
  - name: aws_ebs_csi_enable_volume_resizing
    sample_value: false
    is_set: false
    source_path: inventory/sample/group_vars/all/aws.yml
    provider: aws
    comment: "Включает изменение размера томов в EBS CSI."
  - name: aws_ebs_csi_controller_replicas
    sample_value: 1
    is_set: false
    source_path: inventory/sample/group_vars/all/aws.yml
    provider: aws
    comment: "Количество реплик контроллера EBS CSI."
  - name: aws_ebs_csi_plugin_image_tag
    sample_value: latest
    is_set: false
    source_path: inventory/sample/group_vars/all/aws.yml
    provider: aws
    comment: "Тег образа плагина EBS CSI."
  - name: aws_ebs_csi_extra_volume_tags
    sample_value: "Owner=owner,Team=team,Environment=environment'"
    is_set: false
    source_path: inventory/sample/group_vars/all/aws.yml
    provider: aws
    comment: "Дополнительные теги для создаваемых томов EBS. В образце тега v2.31.0 присутствует несбалансированная кавычка (открыта двойной, закрыта одинарной) — значение приведено дословно."

