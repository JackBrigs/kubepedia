project: kubespray
kubespray_version: v2.31.0
git_commit: 1c9add4
source_type: inventory
source_paths:
  - inventory/sample/group_vars/k8s_cluster/addons.yml
source_url: https://github.com/kubernetes-sigs/kubespray/tree/v2.31.0
retrieved_at: 2026-07-14
topics:
  - addons
  - inventory
reliability: authoritative
notes: >-
  В v2.31.0 из addons.yml удалены переменные Kubernetes Dashboard
  (dashboard_enabled и связанные) и ingress_nginx (ingress_nginx_enabled и
  связанные) — соответствующие роли убраны из Kubespray. В sample-файле их больше нет.
variables:

  # --- Helm ---
  - name: helm_enabled
    sample_value: false
    is_set: true
    source_path: inventory/sample/group_vars/k8s_cluster/addons.yml
    comment: "Установить клиент Helm на узлы control-plane."

  # --- Registry ---
  - name: registry_enabled
    sample_value: false
    is_set: true
    source_path: inventory/sample/group_vars/k8s_cluster/addons.yml
