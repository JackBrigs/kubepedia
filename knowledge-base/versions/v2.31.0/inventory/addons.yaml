  # --- Cert Manager ---
  - name: cert_manager_enabled
    sample_value: false
    is_set: true
    source_path: inventory/sample/group_vars/k8s_cluster/addons.yml
    comment: "Развернуть cert-manager."
  - name: cert_manager_namespace
    sample_value: "cert-manager"
    is_set: false
    source_path: inventory/sample/group_vars/k8s_cluster/addons.yml
    comment: "Пример (закомментирован). Namespace для cert-manager."
  - name: cert_manager_tolerations
    sample_value: |-
      - key: node-role.kubernetes.io/control-plane
        effect: NoSchedule
    is_set: false
    source_path: inventory/sample/group_vars/k8s_cluster/addons.yml
    comment: "Пример (закомментирован). Tolerations для подов cert-manager."
  - name: cert_manager_affinity
    sample_value: |-
      nodeAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          preference:
            matchExpressions:
            - key: node-role.kubernetes.io/control-plane
              operator: In
              values:
              - ""
    is_set: false
    source_path: inventory/sample/group_vars/k8s_cluster/addons.yml
    comment: "Пример (закомментирован). Affinity для подов cert-manager."
  - name: cert_manager_nodeselector
    sample_value: |-
      kubernetes.io/os: "linux"
    is_set: false
    source_path: inventory/sample/group_vars/k8s_cluster/addons.yml
    comment: "Пример (закомментирован). nodeSelector для подов cert-manager."
  - name: cert_manager_trusted_internal_ca
    sample_value: |-
      -----BEGIN CERTIFICATE-----
      [REPLACE with your CA certificate]
      -----END CERTIFICATE-----
    is_set: false
    source_path: inventory/sample/group_vars/k8s_cluster/addons.yml
    comment: "Пример (закомментирован). Доверенный внутренний CA-сертификат для cert-manager."
  - name: cert_manager_leader_election_namespace
    sample_value: kube-system
    is_set: false
    source_path: inventory/sample/group_vars/k8s_cluster/addons.yml
    comment: "Пример (закомментирован). Namespace для leader election cert-manager."
  - name: cert_manager_dns_policy
    sample_value: "ClusterFirst"
    is_set: false
    source_path: inventory/sample/group_vars/k8s_cluster/addons.yml
    comment: "Пример (закомментирован). dnsPolicy для подов cert-manager."
  - name: cert_manager_dns_config
    sample_value: |-
      nameservers:
        - "1.1.1.1"
        - "8.8.8.8"
    is_set: false
    source_path: inventory/sample/group_vars/k8s_cluster/addons.yml
    comment: "Пример (закомментирован). dnsConfig (nameservers) для подов cert-manager."
  - name: cert_manager_controller_extra_args
    sample_value: |-
      - "--dns01-recursive-nameservers-only=true"
