  - name: local_path_provisioner_image_repo
    sample_value: "{{ docker_image_repo }}/rancher/local-path-provisioner"
    is_set: false
    source_path: inventory/sample/group_vars/k8s_cluster/addons.yml
    comment: "Пример (закомментирован). Репозиторий образа Local Path Provisioner."
  - name: local_path_provisioner_helper_image_repo
    sample_value: "busybox"
    is_set: false
    source_path: inventory/sample/group_vars/k8s_cluster/addons.yml
    comment: "Пример (закомментирован). Репозиторий helper-образа Local Path Provisioner."
  - name: local_path_provisioner_helper_image_tag
    sample_value: "latest"
    is_set: false
    source_path: inventory/sample/group_vars/k8s_cluster/addons.yml
    comment: "Пример (закомментирован). Тег helper-образа Local Path Provisioner."

  # --- Local Volume Provisioner ---
  - name: local_volume_provisioner_enabled
    sample_value: false
    is_set: true
    source_path: inventory/sample/group_vars/k8s_cluster/addons.yml
    comment: "Развернуть Local Volume Provisioner."
  - name: local_volume_provisioner_namespace
    sample_value: kube-system
    is_set: false
    source_path: inventory/sample/group_vars/k8s_cluster/addons.yml
    comment: "Пример (закомментирован). Namespace для Local Volume Provisioner."
  - name: local_volume_provisioner_nodelabels
    sample_value: |-
      - kubernetes.io/hostname
      - topology.kubernetes.io/region
      - topology.kubernetes.io/zone
    is_set: false
    source_path: inventory/sample/group_vars/k8s_cluster/addons.yml
    comment: "Пример (закомментирован). Метки узла, копируемые в создаваемые PV."
  - name: local_volume_provisioner_storage_classes
    sample_value: |-
      local-storage:
        host_dir: /mnt/disks
        mount_dir: /mnt/disks
        volume_mode: Filesystem
        fs_type: ext4
      fast-disks:
        host_dir: /mnt/fast-disks
        mount_dir: /mnt/fast-disks
        block_cleaner_command:
          - "/scripts/shred.sh"
          - "2"
        volume_mode: Filesystem
        fs_type: ext4
    is_set: false
    source_path: inventory/sample/group_vars/k8s_cluster/addons.yml
    comment: "Пример (закомментирован). Определение StorageClass'ов Local Volume Provisioner (host_dir, mount_dir, volume_mode, fs_type, block_cleaner_command)."
  - name: local_volume_provisioner_tolerations
    sample_value: |-
      - effect: NoSchedule
        operator: Exists
    is_set: false
    source_path: inventory/sample/group_vars/k8s_cluster/addons.yml
    comment: "Пример (закомментирован). Tolerations для подов Local Volume Provisioner."

