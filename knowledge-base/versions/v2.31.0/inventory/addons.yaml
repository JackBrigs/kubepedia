  - name: metallb_namespace
    sample_value: "metallb-system"
    is_set: true
    source_path: inventory/sample/group_vars/k8s_cluster/addons.yml
    comment: "Namespace для MetalLB."
  - name: metallb_protocol
    sample_value: "layer2"
    is_set: false
    source_path: inventory/sample/group_vars/k8s_cluster/addons.yml
    comment: "Пример (закомментирован). Протокол MetalLB: layer2 или bgp."
  - name: metallb_port
    sample_value: "7472"
    is_set: false
    source_path: inventory/sample/group_vars/k8s_cluster/addons.yml
    comment: "Пример (закомментирован). Порт метрик MetalLB."
  - name: metallb_memberlist_port
    sample_value: "7946"
    is_set: false
    source_path: inventory/sample/group_vars/k8s_cluster/addons.yml
    comment: "Пример (закомментирован). Порт memberlist MetalLB."
  - name: metallb_config
    sample_value: |-
      speaker:
        nodeselector:
          kubernetes.io/os: "linux"
        tolerations:
          - key: "node-role.kubernetes.io/control-plane"
            operator: "Equal"
            value: ""
            effect: "NoSchedule"
      address_pools:
        primary:
          ip_range:
            - 10.5.0.0/16
          auto_assign: true
      layer2:
        - primary
    is_set: false
    source_path: inventory/sample/group_vars/k8s_cluster/addons.yml
    comment: "Пример (закомментирован). Полная конфигурация MetalLB: speaker/controller (nodeselector, tolerations), address_pools, layer2/layer3, communities, peers. В файле приведён развёрнутый пример."

