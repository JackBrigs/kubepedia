    sample_value: 1
    is_set: false
    source_path: inventory/sample/group_vars/k8s_cluster/addons.yml
    comment: "Пример (закомментирован). Число реплик metrics-server."

  # --- Rancher Local Path Provisioner ---
  - name: local_path_provisioner_enabled
    sample_value: false
    is_set: true
    source_path: inventory/sample/group_vars/k8s_cluster/addons.yml
    comment: "Развернуть Rancher Local Path Provisioner."
  - name: local_path_provisioner_namespace
    sample_value: "local-path-storage"
    is_set: false
    source_path: inventory/sample/group_vars/k8s_cluster/addons.yml
    comment: "Пример (закомментирован). Namespace для Local Path Provisioner."
  - name: local_path_provisioner_storage_class
    sample_value: "local-path"
    is_set: false
    source_path: inventory/sample/group_vars/k8s_cluster/addons.yml
    comment: "Пример (закомментирован). Имя StorageClass Local Path Provisioner."
  - name: local_path_provisioner_reclaim_policy
    sample_value: Delete
    is_set: false
    source_path: inventory/sample/group_vars/k8s_cluster/addons.yml
    comment: "Пример (закомментирован). Reclaim policy для PV Local Path Provisioner."
  - name: local_path_provisioner_claim_root
    sample_value: /opt/local-path-provisioner/
    is_set: false
    source_path: inventory/sample/group_vars/k8s_cluster/addons.yml
