  - name: registry_namespace
    sample_value: kube-system
    is_set: false
    source_path: inventory/sample/group_vars/k8s_cluster/addons.yml
    comment: "Пример (закомментирован). Namespace для внутрикластерного registry."
  - name: registry_storage_class
    sample_value: ""
    is_set: false
    source_path: inventory/sample/group_vars/k8s_cluster/addons.yml
    comment: "Пример (закомментирован). StorageClass для registry."
  - name: registry_disk_size
