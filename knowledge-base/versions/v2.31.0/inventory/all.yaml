# ============================================================================
# Разбор общих (не облачных) файлов group_vars/all тега v2.31.0.
# Поле is_set: true  — переменная в sample-инвентаре РАСКОММЕНТИРОВАНА (задана);
#                       такое значение переопределяет role defaults.
# Поле is_set: false — переменная ЗАКОММЕНТИРОВАНА (только пример/подсказка);
#                       фактически действует значение из roles/*/defaults.
# sample_value для is_set:false берётся из закомментированной строки (пример).
# Проверка расхождений с role defaults — см. поле notes/discrepancies в конце.
# ============================================================================

variables:

  # ==========================================================================
  # inventory/sample/group_vars/all/all.yml
  # ==========================================================================
  - name: bin_dir
    sample_value: /usr/local/bin
    is_set: true
    source_path: inventory/sample/group_vars/all/all.yml
    comment: "Каталог, куда устанавливаются бинарные файлы. Совпадает с role default (roles/kubespray_defaults/defaults/main/main.yml)."

  - name: access_ip
    sample_value: 1.1.1.1
    is_set: false
    source_path: inventory/sample/group_vars/all/all.yml
    comment: "Определяет, как другие узлы обращаются к данному узлу (например, публичный IP в AWS/GCP, о котором сам узел не знает). Используется в flannel."

  - name: loadbalancer_apiserver
    sample_value: |-
      address: 1.2.3.4
      port: 1234
    is_set: false
    source_path: inventory/sample/group_vars/all/all.yml
    comment: "Конфигурация внешнего балансировщика API-сервера (address и port). Пример в связке с apiserver_loadbalancer_domain_name."

  - name: loadbalancer_apiserver_localhost
    sample_value: true
    is_set: false
    source_path: inventory/sample/group_vars/all/all.yml
    comment: "Разворачивать локальный балансировщик API-сервера на узлах. Role default вычисляется как (loadbalancer_apiserver не задан)."

  - name: loadbalancer_apiserver_type
    sample_value: nginx
    is_set: false
    source_path: inventory/sample/group_vars/all/all.yml
    comment: "Тип локального балансировщика API-сервера. Допустимые значения: nginx или haproxy."

  - name: loadbalancer_apiserver_port
    sample_value: 6443
    is_set: true
    source_path: inventory/sample/group_vars/all/all.yml
    comment: "Порт локального балансировщика API-сервера. Должен быть равен 6443."

  - name: loadbalancer_apiserver_healthcheck_port
    sample_value: 8081
    is_set: true
    source_path: inventory/sample/group_vars/all/all.yml
    comment: "Если переменная задана — включается проверка живости (liveness) прокси для nginx."

  - name: disable_host_nameservers
    sample_value: false
    is_set: false
    source_path: inventory/sample/group_vars/all/all.yml
    comment: "Если true — Kubespray не включает nameserver'ы хоста в nameserverentries на стадии dns_late (но использует их на стадии dns_early). Использовать осторожно."

  - name: upstream_dns_servers
    sample_value: |-
      - 8.8.8.8
      - 8.8.4.4
    is_set: false
    source_path: inventory/sample/group_vars/all/all.yml
    comment: "Вышестоящие (upstream) DNS-серверы. Role default — пустой список []."

  - name: cloud_provider
    sample_value: ""
    is_set: false
    source_path: inventory/sample/group_vars/all/all.yml
    comment: "Специфичные настройки облачного провайдера. После K8s v1.31 допустимо только значение 'external'."

  - name: external_cloud_provider
    sample_value: ""
    is_set: false
    source_path: inventory/sample/group_vars/all/all.yml
    comment: "Внешний cloud controller manager. Требует cloud_provider=external. Поддерживаются: openstack, vsphere, oci, huaweicloud, hcloud, manual."

  - name: http_proxy
    sample_value: ""
    is_set: false
    source_path: inventory/sample/group_vars/all/all.yml
    comment: "HTTP-прокси для пакетного менеджера и docker daemon."

  - name: https_proxy
    sample_value: ""
    is_set: false
    source_path: inventory/sample/group_vars/all/all.yml
    comment: "HTTPS-прокси для пакетного менеджера и docker daemon."

  - name: https_proxy_cert_file
    sample_value: ""
    is_set: false
    source_path: inventory/sample/group_vars/all/all.yml
    comment: "Пользовательский CA-сертификат для https_proxy при необходимости."

  - name: no_proxy
    sample_value: ""
    is_set: false
    source_path: inventory/sample/group_vars/all/all.yml
    comment: "Список адресов/сетей, исключаемых из проксирования. Перед изменением см. roles/kubespray_defaults/defaults/main/main.yml."

  - name: download_validate_certs
    sample_value: false
    is_set: false
    source_path: inventory/sample/group_vars/all/all.yml
    comment: "Валидация TLS-сертификатов в модуле get_url. false отключает проверку SSL (обход бага ansible #32750); контрольные суммы всё равно проверяются. Role default — true."

  - name: additional_no_proxy
    sample_value: ""
    is_set: false
    source_path: inventory/sample/group_vars/all/all.yml
    comment: "Дополнительные ресурсы, которые нужно исключить из проксирования (помимо узлов кластера)."

  - name: skip_http_proxy_on_os_packages
    sample_value: false
    is_set: false
    source_path: inventory/sample/group_vars/all/all.yml
    comment: "Если true — прокси не задаётся для репозиториев ОС (не пишется в /etc/yum.conf или /etc/apt/apt.conf)."

  - name: no_proxy_exclude_workers
    sample_value: false
    is_set: true
    source_path: inventory/sample/group_vars/all/all.yml
    comment: "Если true — в no_proxy включаются только узлы control-plane (не воркеры), чтобы docker не перезапускался на всех узлах при добавлении/удалении воркеров."

  - name: cert_management
    sample_value: script
    is_set: false
    source_path: inventory/sample/group_vars/all/all.yml
    comment: "Способ управления сертификатами. Значения: script или none (none — если вы предоставляете свои сертификаты)."

  - name: ignore_assert_errors
    sample_value: false
    is_set: false
    source_path: inventory/sample/group_vars/all/all.yml
    comment: "Разрешить провал pre-check-проверок и продолжить развёртывание."

  - name: kube_read_only_port
    sample_value: 10255
    is_set: false
    source_path: inventory/sample/group_vars/all/all.yml
    comment: "Read-only порт kubelet без аутентификации/авторизации. Раскомментировать для включения."

  - name: download_container
    sample_value: true
    is_set: false
    source_path: inventory/sample/group_vars/all/all.yml
    comment: "Скачивать и кэшировать контейнерные образы."

  - name: deploy_container_engine
    sample_value: true
    is_set: false
    source_path: inventory/sample/group_vars/all/all.yml
    comment: "Разворачивать container engine. false — если движок устанавливается вручную."

  - name: rh_subscription_username
    sample_value: ""
    is_set: false
    source_path: inventory/sample/group_vars/all/all.yml
    comment: "Имя пользователя подписки Red Hat Enterprise Linux."

  - name: rh_subscription_password
    sample_value: ""
    is_set: false
    source_path: inventory/sample/group_vars/all/all.yml
    comment: "Пароль подписки Red Hat Enterprise Linux."

  - name: rh_subscription_org_id
    sample_value: ""
    is_set: false
    source_path: inventory/sample/group_vars/all/all.yml
    comment: "Organization ID подписки RHEL (в связке с Activation Key)."

  - name: rh_subscription_activation_key
    sample_value: ""
    is_set: false
    source_path: inventory/sample/group_vars/all/all.yml
    comment: "Activation Key подписки RHEL (в связке с Organization ID)."

  - name: rh_subscription_usage
    sample_value: Development
    is_set: false
    source_path: inventory/sample/group_vars/all/all.yml
    comment: "Назначение (usage) подписки RHEL."

  - name: rh_subscription_role
    sample_value: Red Hat Enterprise Server
    is_set: false
    source_path: inventory/sample/group_vars/all/all.yml
    comment: "Роль подписки RHEL."

  - name: rh_subscription_sla
    sample_value: Self-Support
    is_set: false
    source_path: inventory/sample/group_vars/all/all.yml
    comment: "Уровень SLA подписки RHEL."

  - name: ping_access_ip
    sample_value: true
    is_set: false
    source_path: inventory/sample/group_vars/all/all.yml
    comment: "Проверять доступность access_ip через ping. false — если файрвол блокирует ICMP."

  - name: sysctl_file_path
    sample_value: /etc/sysctl.d/99-sysctl.conf
    is_set: false
    source_path: inventory/sample/group_vars/all/all.yml
    comment: "Путь к файлу sysctl-конфигурации, куда добавляются параметры."

  - name: sysctl_ignore_unknown_keys
    sample_value: false
    is_set: false
    source_path: inventory/sample/group_vars/all/all.yml
    comment: "Игнорировать ошибки sysctl о неизвестных ключах."

  - name: kube_webhook_token_auth
    sample_value: false
    is_set: true
    source_path: inventory/sample/group_vars/all/all.yml
    comment: "Включить webhook token authentication для API-сервера."

  - name: kube_webhook_token_auth_url_skip_tls_verify
    sample_value: false
    is_set: true
    source_path: inventory/sample/group_vars/all/all.yml
    comment: "Пропускать проверку TLS при обращении к webhook token auth URL."

  - name: kube_webhook_token_auth_url
    sample_value: https://...
    is_set: false
    source_path: inventory/sample/group_vars/all/all.yml
    comment: "URL сервиса webhook token authentication."

  - name: kube_webhook_token_auth_ca_data
    sample_value: "LS0t..."
    is_set: false
    source_path: inventory/sample/group_vars/all/all.yml
    comment: "Base64-строка CA-сертификата webhook'а."

  - name: ntp_enabled
    sample_value: false
    is_set: true
    source_path: inventory/sample/group_vars/all/all.yml
    comment: "Запускать и включать сервис ntpd/chrony при загрузке системы."

  - name: ntp_manage_config
    sample_value: false
    is_set: true
    source_path: inventory/sample/group_vars/all/all.yml
    comment: "Позволять Kubespray управлять конфигурацией NTP (ntp_servers)."

  - name: ntp_servers
    sample_value: |-
      - "0.pool.ntp.org iburst"
      - "1.pool.ntp.org iburst"
      - "2.pool.ntp.org iburst"
      - "3.pool.ntp.org iburst"
    is_set: true
    source_path: inventory/sample/group_vars/all/all.yml
    comment: "Список NTP-серверов, применяется при ntp_manage_config: true."

  - name: unsafe_show_logs
    sample_value: false
    is_set: true
    source_path: inventory/sample/group_vars/all/all.yml
    comment: "Управляет атрибутом no_log. false — не показывать потенциально приватные данные в логах. Совпадает с разрешённым (non-CI) значением role default из download.yml."

  - name: allow_unsupported_distribution_setup
    sample_value: false
    is_set: true
    source_path: inventory/sample/group_vars/all/all.yml
    comment: "Разрешить попытку установки на неподдерживаемых дистрибутивах (может привести к сбоям)."

  # ==========================================================================
  # inventory/sample/group_vars/all/etcd.yml
  # ==========================================================================
  - name: etcd_data_dir
    sample_value: /var/lib/etcd
    is_set: true
    source_path: inventory/sample/group_vars/all/etcd.yml
    comment: "Каталог данных etcd (WAL и snapshot). Совпадает с role default (roles/etcd_defaults/defaults/main.yml)."

  - name: container_manager
    sample_value: containerd
    is_set: false
    source_path: inventory/sample/group_vars/all/etcd.yml
    comment: "Container runtime для etcd: docker, crio, containerd или kubeadm (экспериментально). Если не задан — наследуется из Kubespray defaults, а не из k8s-cluster.yml. Позволяет использовать другой runtime на узлах etcd."

  - name: etcd_deployment_type
    sample_value: host
    is_set: true
    source_path: inventory/sample/group_vars/all/etcd.yml
    comment: "Тип развёртывания etcd. Установить docker при container_manager: docker. Совпадает с role default."

  # ==========================================================================
  # inventory/sample/group_vars/all/containerd.yml
  # (все переменные закомментированы; полные defaults —
  #  roles/container-engine/containerd/defaults/main.yml)
  # ==========================================================================
  - name: containerd_storage_dir
    sample_value: "/var/lib/containerd"
    is_set: false
    source_path: inventory/sample/group_vars/all/containerd.yml
    comment: "Каталог хранения данных containerd (root)."

  - name: containerd_state_dir
    sample_value: "/run/containerd"
    is_set: false
    source_path: inventory/sample/group_vars/all/containerd.yml
    comment: "Каталог состояния containerd (state)."

  - name: containerd_oom_score
    sample_value: 0
    is_set: false
    source_path: inventory/sample/group_vars/all/containerd.yml
    comment: "Значение oom_score_adj для процесса containerd."

  - name: containerd_default_runtime
    sample_value: "runc"
    is_set: false
    source_path: inventory/sample/group_vars/all/containerd.yml
    comment: "Имя рантайма CRI по умолчанию для containerd."

  - name: containerd_snapshotter
    sample_value: "native"
    is_set: false
    source_path: inventory/sample/group_vars/all/containerd.yml
    comment: "Снапшоттер containerd. Внимание: пример в инвентаре — native, тогда как role default — overlayfs."

  - name: containerd_runc_runtime
    sample_value: |-
      name: runc
      type: "io.containerd.runc.v2"
      options:
        Root: ""
    is_set: false
    source_path: inventory/sample/group_vars/all/containerd.yml
    comment: "Определение рантайма runc для containerd (пример; полный role default содержит base_runtime_spec, SystemdCgroup, BinaryName)."

  - name: containerd_additional_runtimes
    sample_value: |-
      - name: kata
        type: "io.containerd.kata.v2"
        options:
          Root: ""
    is_set: false
    source_path: inventory/sample/group_vars/all/containerd.yml
    comment: "Дополнительные рантаймы containerd. В примере — Kata Containers. Role default — []."

  - name: containerd_grpc_max_recv_message_size
    sample_value: 16777216
    is_set: false
    source_path: inventory/sample/group_vars/all/containerd.yml
    comment: "Максимальный размер принимаемого gRPC-сообщения containerd (байт)."

  - name: containerd_grpc_max_send_message_size
    sample_value: 16777216
    is_set: false
    source_path: inventory/sample/group_vars/all/containerd.yml
    comment: "Максимальный размер отправляемого gRPC-сообщения containerd (байт)."

  - name: containerd_debug_address
    sample_value: ""
    is_set: false
    source_path: inventory/sample/group_vars/all/containerd.yml
    comment: "Адрес debug-сокета containerd (формат unix или tcp)."

  - name: containerd_debug_level
    sample_value: "info"
    is_set: false
    source_path: inventory/sample/group_vars/all/containerd.yml
    comment: "Уровень логирования containerd."

  - name: containerd_debug_format
    sample_value: ""
    is_set: false
    source_path: inventory/sample/group_vars/all/containerd.yml
    comment: "Формат логов containerd. Поддерживаются: text, json."

  - name: containerd_debug_uid
    sample_value: 0
    is_set: false
    source_path: inventory/sample/group_vars/all/containerd.yml
    comment: "UID владельца debug-сокета containerd."

  - name: containerd_debug_gid
    sample_value: 0
    is_set: false
    source_path: inventory/sample/group_vars/all/containerd.yml
    comment: "GID владельца debug-сокета containerd."

  - name: containerd_metrics_address
    sample_value: ""
    is_set: false
    source_path: inventory/sample/group_vars/all/containerd.yml
    comment: "Адрес эндпоинта метрик containerd."

  - name: containerd_metrics_grpc_histogram
    sample_value: false
    is_set: false
    source_path: inventory/sample/group_vars/all/containerd.yml
    comment: "Включить гистограммы gRPC в метриках containerd."

  - name: containerd_registries_mirrors
    sample_value: |-
      - prefix: docker.io
        mirrors:
          - host: https://registry-1.docker.io
            capabilities: ["pull", "resolve"]
            skip_verify: false
            header:
              Authorization: "Basic XXX"
    is_set: false
    source_path: inventory/sample/group_vars/all/containerd.yml
    comment: "Зеркала реестров containerd (формат hosts.toml)."

  - name: containerd_max_container_log_line_size
    sample_value: 16384
    is_set: false
    source_path: inventory/sample/group_vars/all/containerd.yml
    comment: "Максимальный размер строки лога контейнера (байт)."

  - name: containerd_registry_auth
    sample_value: |-
      - registry: 10.0.0.2:5000
        username: user
        password: pass
    is_set: false
    source_path: inventory/sample/group_vars/all/containerd.yml
    comment: "Аутентификация для реестров containerd (registry/username/password). Role default — []."

  # ==========================================================================
  # inventory/sample/group_vars/all/cri-o.yml
  # (все переменные закомментированы)
  # ==========================================================================
  - name: crio_insecure_registries
    sample_value: |-
      - 10.0.0.2:5000
    is_set: false
    source_path: inventory/sample/group_vars/all/cri-o.yml
    comment: "Список insecure-реестров для CRI-O. Role default — []."

  - name: crio_registry_auth
    sample_value: |-
      - registry: 10.0.0.2:5000
        username: user
        password: pass
    is_set: false
    source_path: inventory/sample/group_vars/all/cri-o.yml
    comment: "Аутентификация для реестров CRI-O (registry/username/password)."

  # ==========================================================================
  # inventory/sample/group_vars/all/docker.yml
  # ==========================================================================
  - name: docker_storage_options
    sample_value: -s overlay2
    is_set: false
    source_path: inventory/sample/group_vars/all/docker.yml
    comment: "Форсировать overlay/overlay2 как storage driver docker (overlay2 — только на новых ядрах)."

  - name: docker_container_storage_setup
    sample_value: false
    is_set: true
    source_path: inventory/sample/group_vars/all/docker.yml
    comment: "Включить docker_container_storage_setup (настройка devicemapper на CentOS7/RedHat7)."

  - name: docker_container_storage_setup_devs
    sample_value: /dev/vdb
    is_set: false
    source_path: inventory/sample/group_vars/all/docker.yml
    comment: "Путь к диску для docker_container_storage_setup. Обязателен, иначе docker-storage-setup отработает некорректно."

  - name: docker_cgroup_driver
    sample_value: systemd
    is_set: false
    source_path: inventory/sample/group_vars/all/docker.yml
    comment: "Cgroup driver docker (native.cgroupdriver). Значения: systemd или cgroupfs, по умолчанию systemd."

  - name: docker_dns_servers_strict
    sample_value: false
    is_set: true
    source_path: inventory/sample/group_vars/all/docker.yml
    comment: "Задавать true только при более чем 3 nameserver'ах: тогда используются первые 3, иначе выполнение прервётся. Совпадает с role default."

  - name: docker_daemon_graph
    sample_value: "/var/lib/docker"
    is_set: true
    source_path: inventory/sample/group_vars/all/docker.yml
    comment: "Каталог хранения данных Docker. Совпадает с role default."

  - name: docker_iptables_enabled
    sample_value: "false"
    is_set: true
    source_path: inventory/sample/group_vars/all/docker.yml
    comment: "Опция iptables демона Docker (строка). Совпадает с role default."

  - name: docker_log_opts
    sample_value: "--log-opt max-size=50m --log-opt max-file=5"
    is_set: true
    source_path: inventory/sample/group_vars/all/docker.yml
    comment: "Опции логирования Docker: ротация при 50m, хранить 5 файлов. Совпадает с role default."

  - name: docker_bin_dir
    sample_value: "/usr/bin"
    is_set: true
    source_path: inventory/sample/group_vars/all/docker.yml
    comment: "Каталог бинарников Docker. Совпадает с role default."

  - name: docker_rpm_keepcache
    sample_value: 1
    is_set: true
    source_path: inventory/sample/group_vars/all/docker.yml
    comment: "Сохранять пакеты docker после установки (1) — ускоряет повторные прогоны ansible."

  - name: docker_insecure_registries
    sample_value: |-
      - mirror.registry.io
      - 172.19.16.11
    is_set: false
    source_path: inventory/sample/group_vars/all/docker.yml
    comment: "Insecure-реестры Docker (IP или доменное имя). Role default — []."

  - name: docker_registry_mirrors
    sample_value: |-
      - https://registry.docker-cn.com
      - https://mirror.aliyuncs.com
    is_set: false
    source_path: inventory/sample/group_vars/all/docker.yml
    comment: "Зеркала реестров Docker (например, зеркала для Китая). Role default — []."

  - name: docker_mount_flags
    sample_value: ""
