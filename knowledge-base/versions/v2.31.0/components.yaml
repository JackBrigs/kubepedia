  - name: prometheus_operator_crds
    version_variable: prometheus_operator_crds_version
    default_expression: "{{ (prometheus_operator_crds_checksums.no_arch | dict2items)[0].key }}"
    resolved_version: "0.88.1"
    source_path: roles/kubespray_defaults/defaults/main/download.yml

  - name: registry
    version_variable: registry_version
    default_expression: "2.8.1"
    resolved_version: "2.8.1"
    source_path: roles/kubespray_defaults/defaults/main/download.yml

  - name: dnsautoscaler
