# Компоненты, УДАЛЁННЫЕ к v2.31.0 (в v2.30.0 помечены как последняя поддерживаемая версия):
removed_components:
  - name: ingress_nginx
    note: >-
      Роль ingress-nginx (nginx ingress controller) удалена. В
      roles/kubernetes-apps/ingress_controller/ остался только
      alb_ingress_controller. Переменных ingress_nginx_* в download.yml нет.
  - name: kubernetes-dashboard
    note: >-
      Роль/переменные Kubernetes Dashboard отсутствуют в v2.31.0
      (в kubespray_defaults ссылок на dashboard нет).

reliability: authoritative
