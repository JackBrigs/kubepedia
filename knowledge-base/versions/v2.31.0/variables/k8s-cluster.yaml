        "{{ local_volume_provisioner_storage_class | default('local-storage') }}": {
          "host_dir": "{{ local_volume_provisioner_base_dir | default('/mnt/disks') }}",
          "mount_dir": "{{ local_volume_provisioner_mount_dir | default('/mnt/disks') }}",
          "volume_mode": "Filesystem",
          "fs_type": "ext4"

        }
      }
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Storage-классы local-volume-provisioner (строка, приводимая к dict Python)."

  - name: ssl_ca_dirs
    default: |-
      [
      {% if ansible_os_family in ['Flatcar', 'Flatcar Container Linux by Kinvolk'] -%}
      '/usr/share/ca-certificates',
      {% elif ansible_os_family == 'RedHat' -%}
      '/etc/pki/tls',
      '/etc/pki/ca-trust',
      {% elif ansible_os_family == 'Debian' -%}
      '/usr/share/ca-certificates',
      {% endif -%}
      ]
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Каталоги CA-сертификатов в зависимости от семейства ОС."

  # --- API endpoint / LB ---
  - name: first_kube_control_plane
    default: "{{ groups['kube_control_plane'] | first }}"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Первый узел control-plane (для делегирования задач на рабочий узел)."

  - name: kube_apiserver_count
    default: "{{ groups['kube_control_plane'] | length }}"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Число узлов control-plane."

  - name: kube_apiserver_address
    default: "{{ hostvars[inventory_hostname]['main_ip'] }}"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Адрес API-сервера текущего узла (main_ip)."

  - name: kube_apiserver_access_address
    default: "{{ hostvars[inventory_hostname]['main_access_ip'] }}"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Access-адрес API-сервера текущего узла (main_access_ip)."

  - name: first_kube_control_plane_address
    default: "{{ hostvars[groups['kube_control_plane'][0]]['main_access_ip'] }}"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Access-адрес первого узла control-plane."

  - name: loadbalancer_apiserver_localhost
    default: "{{ loadbalancer_apiserver is not defined }}"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Разворачивать локальный LB (nginx/haproxy) на узлах, если внешний loadbalancer_apiserver не задан."

  - name: loadbalancer_apiserver_type
    default: "nginx"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Тип локального LB API-сервера: nginx или haproxy."

  - name: apiserver_loadbalancer_domain_name
    default: "{{ 'localhost' if loadbalancer_apiserver_localhost else (loadbalancer_apiserver.address | d(undef())) }}"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Доменное имя внешнего LB API-сервера (применяется только при внешнем LB)."

  - name: kube_apiserver_global_endpoint
    default: |-
      {% if loadbalancer_apiserver is defined -%}
          https://{{ apiserver_loadbalancer_domain_name | ansible.utils.ipwrap }}:{{ loadbalancer_apiserver.port | default(kube_apiserver_port) }}
      {%- elif loadbalancer_apiserver_localhost -%}
          https://localhost:{{ loadbalancer_apiserver_port | default(kube_apiserver_port) }}
      {%- else -%}
          https://{{ first_kube_control_plane_address | ansible.utils.ipwrap }}:{{ kube_apiserver_port }}
      {%- endif %}
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Глобальный эндпоинт API-сервера (учитывает внешний/локальный LB)."

  - name: kube_apiserver_endpoint
    default: |-
      {% if loadbalancer_apiserver is defined -%}
          https://{{ apiserver_loadbalancer_domain_name | ansible.utils.ipwrap }}:{{ loadbalancer_apiserver.port | default(kube_apiserver_port) }}
      {%- elif ('kube_control_plane' not in group_names) and loadbalancer_apiserver_localhost -%}
          https://localhost:{{ loadbalancer_apiserver_port | default(kube_apiserver_port) }}
      {%- elif 'kube_control_plane' in group_names -%}
      https://{{ kube_apiserver_bind_address | regex_replace('::', '127.0.0.1') | ansible.utils.ipwrap }}:{{ kube_apiserver_port }}
      {%- else -%}
          https://{{ first_kube_control_plane_address | ansible.utils.ipwrap }}:{{ kube_apiserver_port }}
      {%- endif %}
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Локальный/эффективный эндпоинт API-сервера, зависит от роли узла и LB."

  - name: kube_apiserver_client_cert
    default: "{{ kube_cert_dir }}/ca.crt"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Путь к клиентскому сертификату API-сервера (ca.crt)."

  - name: kube_apiserver_client_key
    default: "{{ kube_cert_dir }}/ca.key"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Путь к клиентскому ключу API-сервера (ca.key)."

  # --- etcd endpoints/адресация ---
  - name: etcd_events_cluster_enabled
    default: "false"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Развернуть отдельный кластер etcd-events."

  - name: etcd_hosts
    default: "{{ groups['etcd'] | default(groups['kube_control_plane']) }}"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Список хостов etcd (может быть пустым, когда etcd управляется kubeadm)."

  - name: etcd_address
    default: "{{ hostvars[inventory_hostname]['main_ip'] }}"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Адрес etcd текущего узла (main_ip)."

  - name: etcd_access_address
    default: "{{ hostvars[inventory_hostname]['main_access_ip'] }}"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Access-адрес etcd текущего узла."

  - name: etcd_events_access_address
    default: "{{ hostvars[inventory_hostname]['main_access_ip'] }}"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Access-адрес etcd-events текущего узла."

  - name: etcd_peer_url
    default: "https://{{ etcd_access_address | ansible.utils.ipwrap }}:2380"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Peer URL etcd (порт 2380)."

  - name: etcd_client_url
    default: "https://{{ etcd_access_address | ansible.utils.ipwrap }}:2379"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Client URL etcd (порт 2379)."

  - name: etcd_events_peer_url
    default: "https://{{ etcd_events_access_address | ansible.utils.ipwrap }}:2382"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Peer URL etcd-events (порт 2382)."

  - name: etcd_events_client_url
    default: "https://{{ etcd_events_access_address | ansible.utils.ipwrap }}:2383"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Client URL etcd-events (порт 2383)."

  - name: etcd_access_addresses
    default: |-
      {% for item in etcd_hosts -%}
        https://{{ hostvars[item]['main_access_ip'] | ansible.utils.ipwrap }}:2379{% if not loop.last %},{% endif %}
      {%- endfor %}
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Список client-адресов всех членов etcd."

  - name: etcd_events_access_addresses_list
    default: |-
      [
      {% for item in etcd_hosts -%}
        'https://{{ hostvars[item].main_access_ip | ansible.utils.ipwrap }}:2383'{% if not loop.last %},{% endif %}
      {%- endfor %}
      ]
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Список client-адресов членов etcd-events (как список)."

  - name: etcd_metrics_addresses
    default: |-
      {% for item in etcd_hosts -%}
        https://{{ hostvars[item]['main_access_ip'] | ansible.utils.ipwrap }}:{{ etcd_metrics_port | default(2381) }}{% if not loop.last %},{% endif %}
      {%- endfor %}
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Адреса метрик etcd (порт 2381 по умолчанию)."

  - name: etcd_events_access_addresses
    default: "{{ etcd_events_access_addresses_list | join(',') }}"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Client-адреса etcd-events, объединённые через запятую."

  - name: etcd_events_access_addresses_semicolon
    default: "{{ etcd_events_access_addresses_list | join(';') }}"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Client-адреса etcd-events, объединённые через точку с запятой."

  - name: etcd_member_name
    default: |-
      {% for host in groups['etcd'] %}
      {% if inventory_hostname == host %}{{ hostvars[host].etcd_member_name | default("etcd" + loop.index | string) }}{% endif %}
      {% endfor %}
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Имя члена etcd (пользователь может задать в inventory)."

  - name: etcd_peer_addresses
    default: |-
      {% for item in groups['etcd'] -%}
        {{ hostvars[item].etcd_member_name | default("etcd" + loop.index | string) }}=https://{{ hostvars[item]['main_access_ip'] | ansible.utils.ipwrap }}:2380{% if not loop.last %},{% endif %}
      {%- endfor %}
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Peer-адреса всех членов etcd (name=url)."

  - name: etcd_events_peer_addresses
    default: |-
      {% for item in groups['etcd'] -%}
        {{ hostvars[item].etcd_member_name | default("etcd" + loop.index | string) }}-events=https://{{ hostvars[item]['main_access_ip'] | ansible.utils.ipwrap }}:2382{% if not loop.last %},{% endif %}
      {%- endfor %}
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Peer-адреса всех членов etcd-events (name-events=url)."

  - name: etcd_heartbeat_interval
    default: '"250"'
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Интервал heartbeat etcd (мс)."

  - name: etcd_election_timeout
    default: '"5000"'
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Таймаут выборов лидера etcd (мс)."

  - name: etcd_snapshot_count
    default: '"100000"'
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Число транзакций между снапшотами etcd."

  - name: certificates_key_size
    default: "2048"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Размер ключа генерируемых сертификатов."

  - name: certificates_duration
    default: "36500"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Срок действия сертификатов (дней)."

  - name: etcd_config_dir
    default: "/etc/ssl/etcd"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Каталог конфигурации etcd."

  - name: etcd_events_data_dir
    default: "/var/lib/etcd-events"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Каталог данных etcd-events."

  - name: etcd_cert_dir
    default: "{{ etcd_config_dir }}/ssl"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Каталог сертификатов etcd."

  - name: typha_enabled
    default: "false"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Включить Typha для Calico."

  - name: calico_apiserver_enabled
    default: "false"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Включить Calico API server."

  # --- Архитектура/ОС хоста ---
  - name: _host_architecture_groups
    default: |-
      x86_64: amd64
      aarch64: arm64
      armv7l: arm
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Маппинг ansible_architecture в архитектуру пакетов (внутренняя переменная)."

  - name: host_architecture
    default: |-
      {%- if ansible_architecture in _host_architecture_groups -%}
      {{ _host_architecture_groups[ansible_architecture] }}
      {%- else -%}
      {{ ansible_architecture }}
      {%- endif -%}
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Архитектура хоста, приведённая к amd64/arm64/arm."
    related: [_host_architecture_groups]

  - name: _host_os_groups
    default: |-
      Linux: linux
      Darwin: darwin
      Win32NT: windows
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Маппинг ansible_system в имя ОС (внутренняя переменная)."

  - name: host_os
    default: |-
      {%- if ansible_system in _host_os_groups -%}
      {{ _host_os_groups[ansible_system] }}
      {%- else -%}
      {{ ansible_system }}
      {%- endif -%}
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "ОС хоста, приведённая к linux/darwin/windows."
    related: [_host_os_groups]

  - name: kubelet_event_record_qps
    default: "50"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "eventRecordQPS в kubelet-config; 0 — без ограничений."

  # --- Proxy env ---
  - name: proxy_env_defaults
    default: |-
      http_proxy: "{{ http_proxy | default('') }}"
      HTTP_PROXY: "{{ http_proxy | default('') }}"
      https_proxy: "{{ https_proxy | default('') }}"
      HTTPS_PROXY: "{{ https_proxy | default('') }}"
      no_proxy: "{{ no_proxy | default('') }}"
      NO_PROXY: "{{ no_proxy | default('') }}"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Базовый словарь переменных окружения прокси."

  - name: proxy_env
    default: "{{ proxy_env_defaults | combine({'SSL_CERT_FILE': https_proxy_cert_file}) if https_proxy_cert_file is defined else proxy_env_defaults }}"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Итоговый словарь proxy-env, при наличии добавляет SSL_CERT_FILE."
    related: [proxy_env_defaults]

  - name: proxy_disable_env
    default: |-
      ALL_PROXY: ''
      FTP_PROXY: ''
      HTTPS_PROXY: ''
      HTTP_PROXY: ''
      NO_PROXY: ''
      all_proxy: ''
      ftp_proxy: ''
      http_proxy: ''
      https_proxy: ''
      no_proxy: ''
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Словарь для отключения прокси-переменных окружения."

  - name: sysctl_file_path
    default: "/etc/sysctl.d/99-sysctl.conf"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Путь к файлу sysctl-конфигурации."

  - name: sysctl_ignore_unknown_keys
    default: "false"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Игнорировать ошибки sysctl о неизвестных ключах."

  - name: system_upgrade
    default: "false"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Обновлять системные пакеты ОС."

  - name: system_upgrade_reboot
    default: "on-upgrade"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Стратегия перезагрузки при system_upgrade: never, always, on-upgrade."

  - name: scheduler_plugins_enabled
    default: "false"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Включить scheduler plugins."

  - name: ntp_enabled
    default: "false"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Запускать и включать ntpd/chrony при загрузке."

  - name: ntp_package
    default: |-
      {% if ansible_os_family == "RedHat" -%}
      chrony
      {%- else -%}
      ntp
      {%- endif -%}
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Пакет NTP: chrony для RedHat, иначе ntp. Допустимы ntp, ntpsec, chrony."

  # ==========================================================================
  # roles/kubespray_defaults/vars/main/main.yml  (10 ключей) — vars, не переопределяются пользователем
  # ==========================================================================

  - name: kube_major_version
    default: "{{ (kube_version | split('.'))[:-1] | join('.') }}"
    source_path: roles/kubespray_defaults/vars/main/main.yml
    description: "Мажорная версия Kubernetes (напр. 1.17.4 => 1.17)."
    related: [kube_version]

  - name: kube_next
    default: "{{ ((kube_version | split('.'))[1] | int) + 1 }}"
    source_path: roles/kubespray_defaults/vars/main/main.yml
    description: "Следующий минорный номер версии Kubernetes."

  - name: kube_major_next_version
    default: "1.{{ kube_next }}"
    source_path: roles/kubespray_defaults/vars/main/main.yml
    description: "Следующая мажорная.минорная версия Kubernetes (1.<kube_next>)."
    related: [kube_next]

  - name: pod_infra_supported_versions
    default: |-
      '1.35': '3.10.1'
      '1.34': '3.10.1'
      '1.33': '3.10'
    source_path: roles/kubespray_defaults/vars/main/main.yml
    description: "Поддерживаемые версии pause (pod-infra) образа по версиям Kubernetes."

  - name: etcd_supported_versions
    default: |-
      '1.35': "{{ (etcd_binary_checksums['amd64'].keys() | select('version', '3.7', '<'))[0] }}"
      '1.34': "{{ (etcd_binary_checksums['amd64'].keys() | select('version', '3.6', '<'))[0] }}"
      '1.33': "{{ (etcd_binary_checksums['amd64'].keys() | select('version', '3.6', '<'))[0] }}"
    source_path: roles/kubespray_defaults/vars/main/main.yml
    description: "Поддерживаемые версии etcd по версиям Kubernetes."

  - name: kube_proxy_deployed
    default: "{{ 'addon/kube-proxy' not in kubeadm_init_phases_skip }}"
    source_path: roles/kubespray_defaults/vars/main/main.yml
    description: "Признак того, что kube-proxy будет развёрнут (фаза не пропущена)."
    related: [kubeadm_init_phases_skip]

  - name: calico_min_version_required
    default: '"3.27.0"'
    source_path: roles/kubespray_defaults/vars/main/main.yml
    description: "Минимальная версия Calico для обновления (== calico_version предыдущей ветки)."

  - name: containerd_min_version_required
    default: '"1.3.7"'
    source_path: roles/kubespray_defaults/vars/main/main.yml
    description: "Минимальная требуемая версия containerd."

  - name: kube_service_subnets
    default: |-
      {%- if ipv4_stack and ipv6_stack -%}
      {{ kube_service_addresses }},{{ kube_service_addresses_ipv6 }}
      {%- elif ipv4_stack -%}
      {{ kube_service_addresses }}
      {%- else -%}
      {{ kube_service_addresses_ipv6 }}
      {%- endif -%}
    source_path: roles/kubespray_defaults/vars/main/main.yml
    description: "Смешанные service-подсети для разных стеков (dualstack/ipv6only/ipv4only)."
    related: [kube_service_addresses, kube_service_addresses_ipv6, ipv4_stack, ipv6_stack]

  - name: kube_pods_subnets
    default: |-
      {%- if ipv4_stack and ipv6_stack -%}
      {{ kube_pods_subnet }},{{ kube_pods_subnet_ipv6 }}
      {%- elif ipv4_stack -%}
      {{ kube_pods_subnet }}
      {%- else -%}
      {{ kube_pods_subnet_ipv6 }}
      {%- endif -%}
    source_path: roles/kubespray_defaults/vars/main/main.yml
    description: "Смешанные pod-подсети для разных стеков (dualstack/ipv6only/ipv4only)."
    related: [kube_pods_subnet, kube_pods_subnet_ipv6, ipv4_stack, ipv6_stack]

  # ==========================================================================
  # roles/kubernetes/control-plane/defaults/main/main.yml  (88 ключей)
  # ==========================================================================

  - name: upgrade_cluster_setup
    default: "false"
    source_path: roles/kubernetes/control-plane/defaults/main/main.yml
    description: "Отключить upgrade cluster (обновление в рамках cluster.yml)."

  - name: control_plane_node_become_ready_tries
    default: "24"
    source_path: roles/kubernetes/control-plane/defaults/main/main.yml
    description: "Число попыток (интервал 5с) проверки готовности новых узлов control-plane после join."

  - name: kube_apiserver_bind_address
    default: '"::"'
    source_path: roles/kubernetes/control-plane/defaults/main/main.yml
    description: "Адрес привязки внешнего API (переопределение из control-plane; по умолчанию все интерфейсы)."
    conditions: "Дублирует kube_apiserver_bind_address из kubespray_defaults."

  - name: kube_apiserver_node_port_range
    default: '"30000-32767"'
    source_path: roles/kubernetes/control-plane/defaults/main/main.yml
    description: "Диапазон портов для сервисов типа NodePort (включительно)."

  - name: kube_apiserver_storage_backend
    default: "etcd3"
    source_path: roles/kubernetes/control-plane/defaults/main/main.yml
    description: "Backend хранения данных k8s (etcd3)."

  - name: kube_apiserver_etcd_compaction_interval
    default: '"5m0s"'
    source_path: roles/kubernetes/control-plane/defaults/main/main.yml
    description: "Интервал запросов compaction; 0 отключает."

  - name: kube_apiserver_service_account_lookup
    default: "true"
    source_path: roles/kubernetes/control-plane/defaults/main/main.yml
    description: "CIS 1.2.26: проверять наличие токена service account в etcd."

  - name: kube_etcd_cacert_file
    default: "ca.pem"
    source_path: roles/kubernetes/control-plane/defaults/main/main.yml
