project: kubespray
kubespray_version: v2.31.0
git_commit: 1c9add4
source_type: code
source_paths:
  - roles/kubespray_defaults/defaults/main/main.yml
  - roles/kubespray_defaults/vars/main/main.yml
  - roles/kubernetes/control-plane/defaults/main/main.yml
  - roles/kubernetes/control-plane/defaults/main/kube-proxy.yml
  - roles/kubernetes/control-plane/defaults/main/kube-scheduler.yml
  - roles/kubernetes/control-plane/defaults/main/etcd.yml
  - roles/kubernetes/node/defaults/main.yml
  - roles/kubernetes/preinstall/defaults/main.yml
  - roles/kubernetes/preinstall/vars/main.yml
  - roles/kubernetes/kubeadm/defaults/main.yml
  - roles/kubernetes/kubeadm_common/defaults/main.yml
  - roles/kubernetes/client/defaults/main.yml
source_url: https://github.com/kubernetes-sigs/kubespray/tree/v2.31.0
retrieved_at: 2026-07-14
topics:
  - k8s-cluster
  - control-plane
  - kubelet
  - kube-proxy
reliability: authoritative
variables:

  # ==========================================================================
  # roles/kubespray_defaults/defaults/main/main.yml  (239 ключей)
  # ==========================================================================

  # --- SSH / bastion ---
  - name: ansible_ssh_common_args
    default: |-
      {% if 'bastion' in groups['all'] %} -o ProxyCommand='ssh -o UserKnownHostsFile=/dev/null -o StrictHostKeyChecking=no -W %h:%p -p {{ hostvars['bastion']['ansible_port'] | default(22) }} {{ hostvars['bastion']['ansible_user'] }}@{{ hostvars['bastion']['ansible_host'] }} {% if ansible_ssh_private_key_file is defined %}-i {{ ansible_ssh_private_key_file }}{% endif %} ' {% endif %}
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Дополнительные аргументы SSH; автоматически добавляет ProxyCommand через bastion-хост, если он есть в группе all."

  # --- SELinux / preinstall ---
  - name: preinstall_selinux_state
    default: "permissive"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Целевое состояние SELinux, устанавливаемое на этапе preinstall."

  - name: ping_access_ip
    default: "true"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Проверять доступность access_ip через ping. Установите false, если файрвол блокирует ICMP."

  # --- API server anonymous auth ---
  - name: kube_api_anonymous_auth
    default: "true"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Включает анонимную аутентификацию kube-apiserver. Установка в false ломает; при undef() аргумент --anonymous-auth убирается."

  - name: is_fedora_coreos
    default: "false"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Признак Fedora CoreOS. По умолчанию false, но автоматически становится true при обнаружении ОС."

  # --- Kubelet cgroup / swap ---
  - name: kubelet_fail_cgroup_v1
    default: "true"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Kubernetes 1.35+: завершать работу с ошибкой при cgroup v1 по умолчанию."

  - name: kubelet_fail_swap_on
    default: "true"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Kubelet завершится с ошибкой, если на узле включён swap."

  - name: kubelet_swap_behavior
    default: "LimitedSwap"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Поведение kubelet при работе со swap (LimitedSwap/NoSwap)."

  # --- Версия Kubernetes ---
  - name: kube_version
    default: "{{ (kubelet_checksums['amd64'] | dict2items)[0].key }}"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Версия Kubernetes для установки. По умолчанию — первый (старший) ключ из kubelet_checksums для amd64."
    related: [kube_version_min_required, kube_major_version]

  - name: kube_version_min_required
    default: "{{ (kubelet_checksums['amd64'] | dict2items)[-1].key }}"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Минимально поддерживаемая версия Kubernetes — последний (младший) ключ из kubelet_checksums для amd64."

  # --- kube-proxy ---
  - name: kube_proxy_mode
    default: "ipvs"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Режим работы kube-proxy: один из ['ipvs', 'iptables', 'nftables']."

  # --- kubeadm ---
  - name: kubeadm_config_validate_enabled
    default: "true"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Включает команду kubeadm config validate. Ставьте false только для dev/test с pre-release версиями Kubernetes."

  - name: kubeadm_init_timeout
    default: "300s"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Таймаут инициализации первого узла control-plane через kubeadm init."

  - name: kube_reserved_cgroups_for_service_slice
    default: "kube.slice"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Имя systemd slice для зарезервированных ресурсов kube. TODO: помечено на удаление."

  - name: kubeadm_init_phases_skip_default
    default: '[ "addon/coredns" ]'
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Базовый список фаз kubeadm init, пропускаемых при настройке control-plane (по умолчанию пропускается addon/coredns)."

  - name: kubeadm_init_phases_skip
    default: |-
      {%- if kube_network_plugin == 'kube-router' and (kube_router_run_service_proxy is defined and kube_router_run_service_proxy) -%}
      {{ kubeadm_init_phases_skip_default + ["addon/kube-proxy"] }}
      {%- elif kube_network_plugin == 'cilium' and (cilium_kube_proxy_replacement is defined and (cilium_kube_proxy_replacement == 'strict' or (cilium_kube_proxy_replacement | bool) or (cilium_kube_proxy_replacement | string | lower == 'true') )) -%}
      {{ kubeadm_init_phases_skip_default + ["addon/kube-proxy"] }}
      {%- elif kube_network_plugin == 'calico' and (calico_bpf_enabled is defined and calico_bpf_enabled) -%}
      {{ kubeadm_init_phases_skip_default + ["addon/kube-proxy"] }}
      {%- elif kube_proxy_remove is defined and kube_proxy_remove -%}
      {{ kubeadm_init_phases_skip_default + ["addon/kube-proxy"] }}
      {%- else -%}
      {{ kubeadm_init_phases_skip_default }}
      {%- endif -%}
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Итоговый список пропускаемых фаз kubeadm init; addon/kube-proxy добавляется для kube-router/cilium(kube-proxy replacement)/calico(bpf)/kube_proxy_remove."
    related: [kubeadm_init_phases_skip_default, kube_network_plugin]

  - name: kubeadm_join_phases_skip_default
    default: "[]"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Базовый список фаз kubeadm, пропускаемых при присоединении нового узла. Для air-gapped может требоваться ['preflight']."

  - name: kubeadm_join_phases_skip
    default: "{{ kubeadm_join_phases_skip_default }}"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Итоговый список фаз, пропускаемых при kubeadm join."
    related: [kubeadm_join_phases_skip_default]

  - name: kubeadm_upgrade_node_phases_skip_default
    default: "[]"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Базовый список фаз kubeadm upgrade node, пропускаемых при обновлении вторичного узла control-plane."

  - name: kubeadm_upgrade_node_phases_skip
    default: |-
      {%- if kube_version is version('1.32.0', '>=') -%}
      {{ kubeadm_upgrade_node_phases_skip_default + kubeadm_init_phases_skip }}
      {%- else -%}
      {{ kubeadm_upgrade_node_phases_skip_default }}
      {%- endif -%}
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Итоговый список пропускаемых фаз kubeadm upgrade node; для k8s >=1.32.0 добавляет kubeadm_init_phases_skip."
    related: [kubeadm_init_phases_skip]

  - name: remove_anonymous_access
    default: "false"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Удалить role binding для анонимных пользователей, создаваемый kubeadm."
    related: [kubeadm_use_file_discovery]

  - name: kube_proxy_nodeport_addresses
    default: |-
      {%- if kube_proxy_nodeport_addresses_cidr is defined -%}
      [{{ kube_proxy_nodeport_addresses_cidr }}]
      {%- else -%}
      []
      {%- endif -%}
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Адреса для NodePort. Пустой список означает использование всех локальных адресов. kube_proxy_nodeport_addresses_cidr сохранён для legacy-конфигов."

  - name: ignore_assert_errors
    default: "false"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Разрешить провал pre-check-проверок и продолжить развёртывание."

  # --- kube-vip ---
  - name: kube_vip_enabled
    default: "false"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Включает kube-vip для виртуального IP API-сервера."

  - name: kube_vip_lb_fwdmethod
    default: "local"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Метод форвардинга нагрузки kube-vip (local)."

  - name: kube_vip_address
    default: ""
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Виртуальный IP-адрес kube-vip (не задан по умолчанию)."

  # --- LB прокси конфиги ---
  - name: nginx_config_dir
    default: "/etc/nginx"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Каталог конфигурации nginx-proxy."

  - name: haproxy_config_dir
    default: "/etc/haproxy"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Каталог конфигурации haproxy."

  # --- Каталоги бинарников/данных ---
  - name: bin_dir
    default: "/usr/local/bin"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Каталог установки бинарных файлов."

  - name: docker_bin_dir
    default: "/usr/bin"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Каталог бинарников Docker."

  - name: containerd_bin_dir
    default: "{{ bin_dir }}"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Каталог бинарников containerd."

  - name: etcd_data_dir
    default: "/var/lib/etcd"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Каталог данных etcd."

  - name: local_release_dir
    default: "/tmp/releases"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Каталог для скачиваемых бинарников (нужно ~1G свободного места)."

  - name: retry_stagger
    default: "5"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Случайный разброс при повторе неудачных операций скачивания/загрузки."

  # --- DNS ---
  - name: cluster_name
    default: "cluster.local"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Имя кластера Kubernetes, также используется как DNS-домен."
    related: [dns_domain]

  - name: ndots
    default: "2"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Число точек в DNS-имени, при котором применяется search-домен."

  - name: docker_dns_options
    default: |-
      - ndots:{{ ndots }}
      - timeout:2
      - attempts:2
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Опции resolv.conf по умолчанию для Docker DNS."

  - name: dns_mode
    default: "coredns"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Режим DNS: coredns, coredns_dual, manual или none."

  - name: enable_dns_autoscaler
    default: "true"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Включает DNS autoscaler."

  - name: upstream_dns_servers
    default: "[]"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "DNS-серверы, добавляемые после cluster DNS; также upstream для CoreDNS по внешним запросам."

  - name: enable_nodelocaldns
    default: "true"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Включает nodelocal DNS cache."

  - name: enable_nodelocaldns_secondary
    default: "false"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Включает вторичный экземпляр nodelocaldns."

  - name: nodelocaldns_ip
    default: "169.254.25.10"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "IP-адрес link-local, на котором слушает nodelocaldns."

  - name: nodelocaldns_health_port
    default: "9254"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Порт health-check nodelocaldns."

  - name: nodelocaldns_second_health_port
    default: "9256"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Порт health-check вторичного nodelocaldns."

  - name: nodelocaldns_bind_metrics_host_ip
    default: "false"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Привязывать метрики nodelocaldns к host IP."

  - name: nodelocaldns_secondary_skew_seconds
    default: "5"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Сдвиг (в секундах) для вторичного nodelocaldns."

  - name: manual_dns_server
    default: ""
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Cluster IP кастомного DNS при dns_mode: manual."

  - name: resolvconf_mode
    default: "host_resolvconf"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Режим управления resolv.conf: host_resolvconf, docker_dns или none."

  - name: skydns_server
    default: "{{ kube_service_subnets.split(',') | first | ansible.utils.ipaddr('net') | ansible.utils.ipaddr(3) | ansible.utils.ipaddr('address') }}"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "IP DNS-сервиса кластера (третий адрес первой service-подсети)."
    related: [kube_service_subnets]

  - name: skydns_server_secondary
    default: "{{ kube_service_subnets.split(',') | first | ansible.utils.ipaddr('net') | ansible.utils.ipaddr(4) | ansible.utils.ipaddr('address') }}"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Вторичный IP DNS-сервиса (четвёртый адрес первой service-подсети)."

  - name: dns_domain
    default: "{{ cluster_name }}"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "DNS-домен кластера, равен cluster_name."
    related: [cluster_name]

  - name: docker_dns_search_domains
    default: |-
      - 'default.svc.{{ dns_domain }}'
      - 'svc.{{ dns_domain }}'
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Search-домены для Docker DNS."

  - name: searchdomains
    default: "[]"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Дополнительные search-домены."

  - name: kube_dns_servers
    default: |-
      coredns: ["{{ skydns_server }}"]
      coredns_dual: "{{ [skydns_server] + [skydns_server_secondary] }}"
      manual: ["{{ manual_dns_server }}"]
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Словарь DNS-серверов по режимам dns_mode."

  - name: dns_servers
    default: "{{ kube_dns_servers[dns_mode] }}"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Итоговый список DNS-серверов для выбранного dns_mode."
    related: [dns_mode, kube_dns_servers]

  - name: enable_coredns_k8s_external
    default: "false"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Включает плагин k8s_external в CoreDNS."

  - name: coredns_k8s_external_zone
    default: "k8s_external.local"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Зона для плагина k8s_external CoreDNS."

  - name: enable_coredns_k8s_endpoint_pod_names
    default: "false"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Включает endpoint pod names в CoreDNS."

  # --- Каталоги конфигурации Kubernetes ---
  - name: kube_config_dir
    default: "/etc/kubernetes"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Основной каталог конфигурации Kubernetes."

  - name: kube_script_dir
    default: "{{ bin_dir }}/kubernetes-scripts"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Каталог служебных скриптов Kubernetes."

  - name: kube_manifest_dir
    default: "{{ kube_config_dir }}/manifests"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Каталог статических манифестов Kubernetes."

  - name: kubectl
    default: "{{ bin_dir }}/kubectl --kubeconfig {{ kube_config_dir }}/admin.conf"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Команда kubectl с kubeconfig для использования в ролях."

  - name: kube_cert_dir
    default: "{{ kube_config_dir }}/ssl"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Каталог сертификатов и cert-скриптов."

  - name: kube_cert_compat_dir
    default: "/etc/kubernetes/pki"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Каталог совместимости сертификатов для kubeadm."

  - name: kube_token_dir
    default: "{{ kube_config_dir }}/tokens"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Каталог хранения bearer-токенов."

  - name: kube_owner
    default: "kube"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Пользователь-владелец установки кластера."

  - name: kube_cert_group
    default: "kube-cert"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Группа для сертификатов (практически не изменяемая)."

  - name: kube_external_ca_mode
    default: "false"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Режим внешнего управления CA: отключает все задачи по манипуляции сертификатами."

  - name: kube_log_level
    default: "2"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Уровень логирования компонентов Kubernetes."

  # --- Сеть/CNI ---
  - name: kube_network_plugin
    default: "calico"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Сетевой плагин CNI: cilium, calico, kube-ovn, flannel, cni, cloud и т.д."

  - name: kube_network_plugin_multus
    default: "false"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Развернуть Multus поверх основного CNI."

  - name: cilium_deploy_additionally
    default: "false"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Развернуть Cilium дополнительно, даже если kube_network_plugin не cilium (для замены kube-proxy)."

  - name: cilium_identity_allocation_mode
    default: "crd"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Режим хранения identity Cilium: crd или kvstore."

  - name: peer_with_calico_rr
    default: "{{ 'calico_rr' in groups and groups['calico_rr'] | length > 0 }}"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Определяет наличие группы calico_rr (route reflectors)."

  - name: calico_datastore
    default: "kdd"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Тип хранилища для Calico: etcd или kdd (kubernetes datastore)."

  - name: kube_service_addresses
    default: "10.233.0.0/18"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Внутренняя сеть для сервисов Kubernetes (неиспользуемый блок адресов)."

  - name: kube_pods_subnet
    default: "10.233.64.0/18"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Внутренняя сеть для подов; должна быть свободна в инфраструктуре."

  - name: kube_network_node_prefix
    default: "24"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Размер подсети, выделяемой каждому узлу для IP подов."
    related: [kubelet_max_pods]

  - name: ipv4_stack
    default: "true"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Включает IPv4-стек сети."

  - name: ipv6_stack
    default: "{{ enable_dual_stack_networks | default(false) }}"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Включает IPv6-стек сети (устаревшая переменная enable_dual_stack_networks как источник)."

  - name: kube_service_addresses_ipv6
    default: "fd85:ee78:d8a6:8607::1000/116"
