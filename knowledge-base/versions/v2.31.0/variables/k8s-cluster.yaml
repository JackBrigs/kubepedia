    description: "Установите true, если сеть не поддерживает IPv6."

  - name: remove_default_searchdomains
    default: "false"
    source_path: roles/kubernetes/preinstall/defaults/main.yml
    description: "Удалить дефолтные search-домены (default.svc.<domain>, svc.<domain>)."

  - name: kube_owner
    default: "kube"
    source_path: roles/kubernetes/preinstall/defaults/main.yml
    description: "Пользователь-владелец (дубль из kubespray_defaults)."
    conditions: "Также определён в roles/kubespray_defaults/defaults/main/main.yml."

  - name: kube_cert_group
    default: "kube-cert"
    source_path: roles/kubernetes/preinstall/defaults/main.yml
    description: "Группа сертификатов (дубль из kubespray_defaults)."
    conditions: "Также определён в roles/kubespray_defaults/defaults/main/main.yml."

  - name: kube_config_dir
    default: "/etc/kubernetes"
    source_path: roles/kubernetes/preinstall/defaults/main.yml
    description: "Каталог конфигурации Kubernetes (дубль из kubespray_defaults)."
    conditions: "Также определён в kubespray_defaults и client."

  - name: kube_cert_dir
    default: "{{ kube_config_dir }}/ssl"
    source_path: roles/kubernetes/preinstall/defaults/main.yml
    description: "Каталог сертификатов (дубль из kubespray_defaults)."
    conditions: "Также определён в roles/kubespray_defaults/defaults/main/main.yml."

  - name: kube_cert_compat_dir
    default: "/etc/kubernetes/pki"
    source_path: roles/kubernetes/preinstall/defaults/main.yml
    description: "Каталог совместимости сертификатов kubeadm (дубль)."
    conditions: "Также определён в roles/kubespray_defaults/defaults/main/main.yml."

  - name: kubelet_flexvolumes_plugins_dir
    default: "/usr/libexec/kubernetes/kubelet-plugins/volume/exec"
    source_path: roles/kubernetes/preinstall/defaults/main.yml
    description: "Каталог flexvolume-плагинов kubelet."

  - name: resolveconf_cloud_init_conf
    default: "/etc/resolveconf_cloud_init.conf"
    source_path: roles/kubernetes/preinstall/defaults/main.yml
    description: "Файл cloud-init для resolv.conf в Flatcar."

  - name: sysctl_file_path
    default: "/etc/sysctl.d/99-sysctl.conf"
    source_path: roles/kubernetes/preinstall/defaults/main.yml
    description: "Путь к файлу sysctl-конфигурации (дубль)."
    conditions: "Также определён в kubespray_defaults и node."

  - name: minimal_node_memory_mb
    default: "1024"
    source_path: roles/kubernetes/preinstall/defaults/main.yml
    description: "Минимальный объём памяти узла (МБ) для safety-проверки."

  - name: minimal_master_memory_mb
    default: "1500"
    source_path: roles/kubernetes/preinstall/defaults/main.yml
    description: "Минимальный объём памяти узла control-plane (МБ) для safety-проверки."

  - name: ntp_manage_config
    default: "false"
    source_path: roles/kubernetes/preinstall/defaults/main.yml
    description: "Управлять конфигурационным файлом NTP."

  - name: ntp_servers
    default: |-
      - "0.pool.ntp.org iburst"
      - "1.pool.ntp.org iburst"
      - "2.pool.ntp.org iburst"
      - "3.pool.ntp.org iburst"
    source_path: roles/kubernetes/preinstall/defaults/main.yml
    description: "Список NTP-серверов (при ntp_manage_config: true)."

  - name: ntp_restrict
    default: |-
      - "127.0.0.1"
      - "::1"
    source_path: roles/kubernetes/preinstall/defaults/main.yml
    description: "Ограничение доступа NTP этими хостами (при ntp_manage_config: true)."

  - name: ntp_filter_interface
    default: "false"
    source_path: roles/kubernetes/preinstall/defaults/main.yml
    description: "Фильтровать интерфейсы NTP."

  - name: ntp_driftfile
    default: |-
      {% if ntp_package == "ntpsec" -%}
      /var/lib/ntpsec/ntp.drift
      {%- else -%}
      /var/lib/ntp/ntp.drift
      {%- endif -%}
    source_path: roles/kubernetes/preinstall/defaults/main.yml
    description: "Путь к driftfile NTP (для ntpsec иной путь)."
    related: [ntp_package]

  - name: ntp_tinker_panic
    default: "false"
    source_path: roles/kubernetes/preinstall/defaults/main.yml
    description: "Опция tinker panic NTP (при ntp_manage_config: true)."

  - name: ntp_force_sync_immediately
    default: "false"
    source_path: roles/kubernetes/preinstall/defaults/main.yml
    description: "Немедленная синхронизация времени сразу после установки NTP."

  - name: ntp_timezone
    default: '""'
    source_path: roles/kubernetes/preinstall/defaults/main.yml
    description: "Часовой пояс сервера (пусто — не менять)."

  - name: supported_os_distributions
    default: |-
      - 'RedHat'
      - 'CentOS'
      - 'Fedora'
      - 'Ubuntu'
      - 'Debian'
      - 'Flatcar'
      - 'Flatcar Container Linux by Kinvolk'
      - 'Suse'
      - 'openSUSE Leap'
      - 'openSUSE Tumbleweed'
      - 'ClearLinux'
      - 'OracleLinux'
      - 'AlmaLinux'
      - 'Rocky'
      - 'Amazon'
      - 'Kylin Linux Advanced Server'
      - 'UnionTech'
      - 'UniontechOS'
      - 'openEuler'
    source_path: roles/kubernetes/preinstall/defaults/main.yml
    description: "Список поддерживаемых дистрибутивов ОС."

  - name: redhat_os_family_extensions
    default: |-
      - "UnionTech"
      - "UniontechOS"
    source_path: roles/kubernetes/preinstall/defaults/main.yml
    description: "Дистрибутивы, расширяющие семейство RedHat."

  - name: systemd_resolved_disable_stub_listener
    default: "{{ ansible_os_family in ['Flatcar', 'Flatcar Container Linux by Kinvolk'] }}"
    source_path: roles/kubernetes/preinstall/defaults/main.yml
    description: "Устанавливает DNSStubListener=no (полезно при 0.0.0.0:53 bind conflict)."

  - name: disable_fapolicyd
    default: "true"
    source_path: roles/kubernetes/preinstall/defaults/main.yml
    description: "Отключить File Access Policy Daemon (иначе установка CNI-плагина упадёт)."

  # ==========================================================================
  # roles/kubernetes/preinstall/vars/main.yml  (6 ключей) — vars
  # ==========================================================================

  - name: coredns_server_by_mode
    default: |-
      coredns: "{{ [skydns_server] }}"
      coredns_dual: "{{ [skydns_server, skydns_server_secondary] }}"
      manual: "{{ manual_dns_server.split(',') }}"
      none: []
    source_path: roles/kubernetes/preinstall/vars/main.yml
    description: "Словарь CoreDNS-серверов по режимам dns_mode."

  - name: coredns_server
    default: "{{ upstream_dns_servers if dns_early else coredns_server_by_mode[dns_mode] }}"
    source_path: roles/kubernetes/preinstall/vars/main.yml
    description: "Итоговый CoreDNS-сервер (early — upstream, иначе по режиму)."
    related: [dns_mode, coredns_server_by_mode]

  - name: _nameserverentries
    default: |-
      late:
        - "{{ nodelocaldns_ip if enable_nodelocaldns else coredns_server }}"
      early:
        - "{{ nameservers }}"
        - "{{ cloud_resolver }}"
        - "{{ configured_nameservers if not disable_host_nameservers else [] }}"
    source_path: roles/kubernetes/preinstall/vars/main.yml
    description: "Внутренняя структура записей nameserver для late/early фаз."

  - name: nameserverentries
    default: "{{ ((_nameserverentries['late'] if not dns_early else []) + _nameserverentries['early']) | flatten | unique }}"
    source_path: roles/kubernetes/preinstall/vars/main.yml
    description: "Итоговый список nameserver-записей."
    related: [_nameserverentries]

  - name: dhclient_supersede
    default: |-
      domain-name-servers: "{{ ([nameservers, cloud_resolver] | flatten | unique) if dns_early else nameserverentries }}"
      domain-name: "{{ [dns_domain] }}"
      domain-search: "{{ default_searchdomains + searchdomains }}"
    source_path: roles/kubernetes/preinstall/vars/main.yml
    description: "Параметры supersede для dhclient."

  - name: configured_nameservers
    default: "{{ (resolvconf_slurp.content | b64decode | regex_findall('^nameserver\\s*(\\S*)', multiline=True) | ansible.utils.ipaddr) if resolvconf_stat.stat.exists else [] }}"
    source_path: roles/kubernetes/preinstall/vars/main.yml
    description: "Nameserver'ы, считанные из существующего resolv.conf хоста."

  # ==========================================================================
  # roles/kubernetes/kubeadm/defaults/main.yml  (3 ключа)
  # ==========================================================================

  - name: discovery_timeout
    default: "60s"
    source_path: roles/kubernetes/kubeadm/defaults/main.yml
    description: "Таймаут discovery kubeadm; должен быть меньше kubeadm_join_timeout. ВНИМАНИЕ: переопределяет значение 5m0s из control-plane."
    conditions: "Переопределяет discovery_timeout (5m0s) из control-plane в рамках роли kubeadm."
    related: [kubeadm_join_timeout]

  - name: kubeadm_join_timeout
    default: "120s"
    source_path: roles/kubernetes/kubeadm/defaults/main.yml
    description: "Таймаут kubeadm join."

  - name: kubeadm_use_file_discovery
    default: "{{ remove_anonymous_access }}"
    source_path: roles/kubernetes/kubeadm/defaults/main.yml
    description: "Включить kubeadm file discovery при удалённом анонимном доступе (дубль из control-plane)."
    conditions: "Также определён в roles/kubernetes/control-plane/defaults/main/main.yml."
    related: [remove_anonymous_access]

  # ==========================================================================
  # roles/kubernetes/kubeadm_common/defaults/main.yml  (3 ключа)
  # ==========================================================================

  - name: kubeadm_patches_dir
    default: "{{ kube_config_dir }}/patches"
    source_path: roles/kubernetes/kubeadm_common/defaults/main.yml
    description: "Каталог kustomize-патчей kubeadm."

  - name: kubeadm_patches
    default: "[]"
    source_path: roles/kubernetes/kubeadm_common/defaults/main.yml
    description: "Список патчей kubeadm (target/type/patch), применяются по порядку."

  - name: kubeadm_ignore_preflight_errors
    default: "[]"
    source_path: roles/kubernetes/kubeadm_common/defaults/main.yml
    description: "Список ошибок, игнорируемых при preflight-проверках kubeadm."

  # ==========================================================================
  # roles/kubernetes/client/defaults/main.yml  (6 ключей)
  # ==========================================================================

  - name: kubeconfig_localhost
    default: "false"
    source_path: roles/kubernetes/client/defaults/main.yml
    description: "Скопировать kubeconfig на управляющий хост (дубль из kubespray_defaults)."
    conditions: "Также определён в roles/kubespray_defaults/defaults/main/main.yml."

  - name: kubeconfig_localhost_ansible_host
    default: "false"
    source_path: roles/kubernetes/client/defaults/main.yml
    description: "Использовать ansible_host в kubeconfig на localhost."

  - name: kubectl_localhost
    default: "false"
    source_path: roles/kubernetes/client/defaults/main.yml
    description: "Скачать kubectl на управляющий хост (дубль из kubespray_defaults)."
    conditions: "Также определён в roles/kubespray_defaults/defaults/main/main.yml."

  - name: artifacts_dir
    default: "{{ inventory_dir }}/artifacts"
    source_path: roles/kubernetes/client/defaults/main.yml
    description: "Каталог артефактов (kubeconfig, kubectl) на управляющем хосте."

  - name: kube_config_dir
    default: "/etc/kubernetes"
    source_path: roles/kubernetes/client/defaults/main.yml
    description: "Каталог конфигурации Kubernetes (дубль)."
    conditions: "Также определён в kubespray_defaults и preinstall."

  - name: kube_apiserver_port
    default: '"6443"'
    source_path: roles/kubernetes/client/defaults/main.yml
    description: "Порт kube-apiserver (дубль из kubespray_defaults, здесь строка)."
    conditions: "Также определён в roles/kubespray_defaults/defaults/main/main.yml (как 6443)."
