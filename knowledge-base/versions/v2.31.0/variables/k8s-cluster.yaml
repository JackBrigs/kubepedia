  # --- Structured authentication/authorization ---
  - name: kube_apiserver_use_authentication_config_file
    default: "false"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Использовать структурированный файл AuthenticationConfiguration (GA в k8s 1.34). Взаимоисключаемо с --oidc-* флагами."

  - name: kube_apiserver_authentication_config_api_version
    default: "{{ 'v1beta1' if kube_version is version('1.34.0', '<') else 'v1' }}"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Версия API для AuthenticationConfiguration (v1beta1 для k8s <1.34, иначе v1)."

  - name: kube_apiserver_authentication_config_anonymous
    default: |-
      enabled: "{{ kube_api_anonymous_auth }}"
      conditions: []
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Настройка анонимного доступа в структурированной AuthenticationConfiguration."
    related: [kube_api_anonymous_auth]

  - name: kube_apiserver_authentication_config_jwt
    default: "[]"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Список JWT-issuer'ов для структурированной AuthenticationConfiguration."

  - name: authorization_modes
    default: "['Node', 'RBAC']"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Режимы авторизации k8s. Тестируются AlwaysAllow, AlwaysDeny, Node, RBAC. Порядок важен."

  - name: kube_apiserver_use_authorization_config_file
    default: "false"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Использовать структурированный файл AuthorizationConfiguration (GA в v1.32). Взаимоисключаемо с --authorization-mode; при true authorization_modes игнорируется."
    related: [authorization_modes]

  - name: kube_apiserver_authorization_config_api_version
    default: "{{ 'v1alpha1' if kube_version is version('1.30.0', '<') else 'v1beta1' if kube_version is version('1.32.0', '<') else 'v1' }}"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Версия API AuthorizationConfiguration в зависимости от версии Kubernetes."

  - name: kube_apiserver_authorization_config_authorizers
    default: |-
      - type: Node
        name: node
      - type: RBAC
        name: rbac
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Список авторизаторов для структурированной AuthorizationConfiguration."

  - name: rbac_enabled
    default: "{{ ('RBAC' in authorization_modes and not kube_apiserver_use_authorization_config_file) or (kube_apiserver_use_authorization_config_file and kube_apiserver_authorization_config_authorizers | selectattr('type', 'equalto', 'RBAC') | list | length > 0) }}"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Признак включённого RBAC (учитывает и authorization_modes, и структурированный конфиг)."
    related: [authorization_modes, kube_apiserver_use_authorization_config_file]

