project: kubespray
kubespray_version: v2.31.0
git_commit: 1c9add4
source_type: code
source_path: roles/kubespray_defaults/defaults/main/download.yml
source_url: https://github.com/kubernetes-sigs/kubespray/blob/v2.31.0/roles/kubespray_defaults/defaults/main/download.yml
retrieved_at: 2026-07-14
topics:
  - download
  - cache
reliability: authoritative

# Переменные механизма загрузки (download). Таблицы checksums (vars/main/checksums.yml)
# сюда НЕ включены — механизм их использования описан в notes ниже.
# Версии компонентов вынесены в components.yaml.

variables:
  # --- Пути и каталоги ---
  - name: local_release_dir
    default: /tmp/releases
    description: >-
      Каталог на целевых узлах, куда скачиваются бинарные файлы и архивы
      (kubelet, kubeadm, etcd, cni, crictl и т.д.).
    source_path: roles/kubespray_defaults/defaults/main/download.yml

  - name: download_cache_dir
    default: /tmp/kubespray_cache
    description: >-
      Каталог кэша на управляющем узле (ansible runner) и на узле-делегате,
      где хранятся скачанные файлы и образы для повторного использования.
    source_path: roles/kubespray_defaults/defaults/main/download.yml

  # --- Режимы загрузки ---
  - name: download_run_once
    default: false
    description: >-
      Если true — файлы и образы скачиваются один раз (на узле-делегате или
      localhost), затем распространяются на остальные узлы. Уменьшает трафик.
      Не работает на Flatcar Container Linux, если download_localhost не true.
    source_path: roles/kubespray_defaults/defaults/main/download.yml

  - name: download_localhost
    default: false
    description: >-
      Если true — в режиме download_run_once загрузка выполняется на localhost
      (требуются docker и sudo), а не на первом узле группы kube_control_plane.
      Полезно для локального кэширования образов или для узлов Flatcar.
    source_path: roles/kubespray_defaults/defaults/main/download.yml

  - name: download_delegate
    default: "{% if download_localhost %}localhost{% else %}{{ groups['kube_control_plane'][0] }}{% endif %}"
    resolved_default: "первый узел группы kube_control_plane (или localhost, если download_localhost=true)"
    description: >-
      Узел, на котором выполняется скачивание в режиме download_run_once.
    source_path: roles/kubespray_defaults/defaults/main/download.yml

  - name: download_container
    default: true
    description: >-
      Если true — контейнерные образы скачиваются/пуллятся. При false загрузка
      образов пропускается.
    source_path: roles/kubespray_defaults/defaults/main/download.yml

  - name: download_always_pull
    default: false
    description: >-
      Если true — образы всегда пуллятся заново. Иначе наличие проверяется по
      тегу/дайджесту в локальном хранилище образов.
    source_path: roles/kubespray_defaults/defaults/main/download.yml

  - name: download_force_cache
    default: false
    description: >-
      Актуально только при download_run_once=false. Локально закэшированные
      файлы и образы загружаются на узлы; образы, скачанные на узлах,
      копируются обратно в кэш ansible runner, если их там ещё нет.
    source_path: roles/kubespray_defaults/defaults/main/download.yml

  - name: download_keep_remote_cache
    default: false
    description: >-
      Не удалять удалённые файлы кэша после использования. Полезно в основном
      при разработке kubespray.
    source_path: roles/kubespray_defaults/defaults/main/download.yml

  - name: download_compress
    default: 1
    description: >-
      Уровень сжатия при передаче файлов в режиме download_run_once
      (1 = самый быстрый).
    source_path: roles/kubespray_defaults/defaults/main/download.yml

  - name: download_validate_certs
    default: true
    description: >-
      Валидация TLS-сертификатов в модуле get_url. Установить в false при
      проблемах загрузки через https-прокси (обход бага ansible #32750).
      Контрольные суммы (checksum) при этом всё равно проверяются.
    source_path: roles/kubespray_defaults/defaults/main/download.yml

  - name: download_retries
    default: 4
    description: >-
      Количество повторных попыток при скачивании файлов и контейнеров.
    source_path: roles/kubespray_defaults/defaults/main/download.yml

  # --- Пропуск загрузок ---
  - name: skip_downloads
    default: false
    description: >-
      Используется для того, чтобы только вычислить переменные роли download,
      не выполняя фактических загрузок.
    source_path: roles/kubespray_defaults/defaults/main/download.yml

  - name: skip_kubeadm_images
    default: false
    description: Пропустить скачивание образов, управляемых kubeadm.
    source_path: roles/kubespray_defaults/defaults/main/download.yml

  - name: kubeadm_images
    default: {}
    description: Словарь образов kubeadm (по умолчанию пустой, заполняется динамически).
    source_path: roles/kubespray_defaults/defaults/main/download.yml

  # --- Отладка ---
  - name: unsafe_show_logs
    default: "{{ lookup('env', 'CI_PROJECT_URL') == 'https://gitlab.com/kargo-ci/kubernetes-sigs-kubespray' }}"
    resolved_default: "false (true только в официальном CI kubespray)"
    description: >-
      Показывать отладочную информацию, которая может содержать приватные
      данные. В production рекомендуется false.
    source_path: roles/kubespray_defaults/defaults/main/download.yml

  # --- Архитектура ---
  - name: image_arch
    default: "{{ host_architecture | default('amd64') }}"
    resolved_default: amd64
    description: Архитектура скачиваемых образов и пакетов.
    source_path: roles/kubespray_defaults/defaults/main/download.yml

  # --- Инструменты работы с образами ---
  - name: image_command_tool
    default: "nerdctl (containerd) | crictl (crio) | {{ container_manager }} (иначе)"
    description: >-
      Инструмент CLI для работы с образами в зависимости от container_manager.
      Для containerd — nerdctl, для crio — crictl, иначе сам container_manager.
    source_path: roles/kubespray_defaults/defaults/main/download.yml

  - name: image_pull_command
    default: "{{ lookup('vars', image_command_tool + '_image_pull_command') }}"
    description: >-
      Команда пулла образа, выбирается по image_command_tool
      (docker_image_pull_command / nerdctl_image_pull_command / crictl_image_pull_command).
    source_path: roles/kubespray_defaults/defaults/main/download.yml

  - name: image_info_command
    default: "{{ lookup('vars', image_command_tool + '_image_info_command') }}"
    description: >-
      Команда получения списка/информации об образах, выбирается по image_command_tool.
    source_path: roles/kubespray_defaults/defaults/main/download.yml

  # --- Базовые URL источников загрузки ---
  - name: github_url
    default: https://github.com
    description: Базовый URL GitHub для скачивания релизов компонентов.
    source_path: roles/kubespray_defaults/defaults/main/download.yml

  - name: dl_k8s_io_url
    default: https://dl.k8s.io
    description: Базовый URL для бинарников Kubernetes (kubelet, kubectl, kubeadm).
    source_path: roles/kubespray_defaults/defaults/main/download.yml

  - name: storage_googleapis_url
    default: https://storage.googleapis.com
    description: Базовый URL для cri-o и gVisor.
    source_path: roles/kubespray_defaults/defaults/main/download.yml

  - name: get_helm_url
    default: https://get.helm.sh
    description: Базовый URL для скачивания Helm.
    source_path: roles/kubespray_defaults/defaults/main/download.yml

  # --- Репозитории образов ---
  - name: kube_image_repo
    default: registry.k8s.io
    description: Репозиторий образов Kubernetes (kube-proxy, pause, coredns, metrics-server и т.д.).
    source_path: roles/kubespray_defaults/defaults/main/download.yml

  - name: gcr_image_repo
    default: gcr.io
    description: Google Container Registry.
    source_path: roles/kubespray_defaults/defaults/main/download.yml

  - name: docker_image_repo
    default: docker.io
    description: Docker Hub.
    source_path: roles/kubespray_defaults/defaults/main/download.yml

  - name: quay_image_repo
    default: quay.io
    description: Quay (calico, cilium, cert-manager, metallb).
    source_path: roles/kubespray_defaults/defaults/main/download.yml

  - name: github_image_repo
    default: ghcr.io
    description: GitHub Container Registry (multus, kube-vip).
    source_path: roles/kubespray_defaults/defaults/main/download.yml

  - name: kubeadm_image_repo
    default: "{{ kube_image_repo }}"
    resolved_default: registry.k8s.io
    description: Репозиторий образов, скачиваемых kubeadm.
    source_path: roles/kubespray_defaults/defaults/main/download.yml

# --- Шаблоны URL загрузки (*_download_url) ---
# Каждый компонент имеет переменную <name>_download_url, собираемую из базовых
# URL, версии компонента и image_arch. Полный список в download.yml, ключевые:
download_url_variables:
  - name: kubelet_download_url
    default: "{{ dl_k8s_io_url }}/release/v{{ kube_version }}/bin/linux/{{ image_arch }}/kubelet"
    source_path: roles/kubespray_defaults/defaults/main/download.yml
  - name: kubectl_download_url
    default: "{{ dl_k8s_io_url }}/release/v{{ kube_version }}/bin/linux/{{ image_arch }}/kubectl"
    source_path: roles/kubespray_defaults/defaults/main/download.yml
  - name: kubeadm_download_url
    default: "{{ dl_k8s_io_url }}/release/v{{ kube_version }}/bin/linux/{{ image_arch }}/kubeadm"
    source_path: roles/kubespray_defaults/defaults/main/download.yml
  - name: etcd_download_url
    default: "{{ github_url }}/etcd-io/etcd/releases/download/v{{ etcd_version }}/etcd-v{{ etcd_version }}-linux-{{ image_arch }}.tar.gz"
    source_path: roles/kubespray_defaults/defaults/main/download.yml
  - name: cni_download_url
    default: "{{ github_url }}/containernetworking/plugins/releases/download/v{{ cni_version }}/cni-plugins-linux-{{ image_arch }}-v{{ cni_version }}.tgz"
    source_path: roles/kubespray_defaults/defaults/main/download.yml
  - name: crictl_download_url
    default: "{{ github_url }}/kubernetes-sigs/cri-tools/releases/download/v{{ crictl_version }}/crictl-v{{ crictl_version }}-{{ ansible_system | lower }}-{{ image_arch }}.tar.gz"
    source_path: roles/kubespray_defaults/defaults/main/download.yml
  - name: containerd_download_url
    default: "{{ github_url }}/containerd/containerd/releases/download/v{{ containerd_version }}/containerd-{{ 'static-' if containerd_static_binary }}{{ containerd_version }}-linux-{{ image_arch }}.tar.gz"
    source_path: roles/kubespray_defaults/defaults/main/download.yml
  - name: helm_download_url
    default: "{{ get_helm_url }}/helm-v{{ helm_version }}-linux-{{ image_arch }}.tar.gz"
    source_path: roles/kubespray_defaults/defaults/main/download.yml
  - name: crio_download_url
    default: "{{ storage_googleapis_url }}/cri-o/artifacts/cri-o.{{ image_arch }}.v{{ crio_version }}.tar.gz"
    source_path: roles/kubespray_defaults/defaults/main/download.yml
  # Полный перечень *_download_url (kubelet, kubectl, kubeadm, etcd, cni, calicoctl,
  # calico_crds, ciliumcli, crictl, crio, helm, runc, crun, youki, kata_containers,
  # gvisor_runsc, gvisor_containerd_shim, nerdctl, containerd, cri_dockerd, skopeo,
  # yq, argocd_install, gateway_api_crds, prometheus_operator_crds) — см. download.yml.

# --- Словарь downloads ---
# Центральная структура: словарь всех загружаемых артефактов (файлов и контейнеров).
# Роль download итерирует по нему. Каждая запись имеет схему полей:
downloads_entry_schema:
  container: "bool — является ли артефакт контейнерным образом"
  file: "bool — является ли артефакт скачиваемым файлом/архивом"
  enabled: "bool/выражение — включена ли загрузка (часто зависит от опций, напр. kube_network_plugin)"
  dest: "путь назначения на узле (для file), обычно под local_release_dir"
  repo: "репозиторий образа (для container)"
  tag: "тег образа (для container)"
  checksum: "контрольная сумма файла или digest образа"
  url: "URL скачивания (для file)"
  unarchive: "bool — распаковывать ли архив"
  unarchive_extra_opts: "доп. опции распаковки (напр. --strip=1 для cri_dockerd)"
  owner: "владелец файла (по умолчанию root)"
  mode: "права доступа (обычно 0755)"
  groups: "группы хостов, на которые распространяется артефакт (etcd, k8s_cluster, kube_control_plane, kube_node)"

downloads_keys:
  # Полный список ключей словаря downloads в v2.31.0 (условие enabled см. в download.yml):
  files:
    - cni
    - kubeadm
    - kubelet
    - kubectl
    - crictl
    - crio
    - cri_dockerd
    - crun
    - youki
    - runc
    - kata_containers
    - containerd
    - gvisor_runsc
    - gvisor_containerd_shim
    - nerdctl
    - skopeo
    - ciliumcli
    - calicoctl
    - calico_crds
    - helm
    - yq
    - argocd_install
    - gateway_api_crds
    - prometheus_operator_crds
    - etcd   # file, если etcd_deployment_type == 'host'
  containers:
    - etcd   # container, если etcd_deployment_type != 'host'
    - cilium
    - cilium_operator
    - cilium_hubble_relay
    - cilium_hubble_certgen
    - cilium_hubble_ui
    - cilium_hubble_ui_backend
    - cilium_hubble_envoy
    - multus
    - flannel
    - flannel_init
    - calico_node
    - calico_cni
    - calico_policy
    - calico_typha
    - calico_apiserver
    - kube_ovn
    - kube_router
    - pod_infra
    - kube-vip
    - nginx
    - haproxy
    - coredns
    - nodelocaldns
    - dnsautoscaler
    - registry
    - metrics_server
    - local_volume_provisioner
    - local_path_provisioner
    - ingress_alb_controller
    - cert_manager_controller
    - cert_manager_cainjector
    - cert_manager_webhook
    - csi_attacher
    - csi_provisioner
    - csi_snapshotter
    - snapshot_controller
    - csi_resizer
    - csi_livenessprobe
    - csi_node_driver_registrar
    - cinder_csi_plugin
    - aws_ebs_csi_plugin
    - metallb_speaker
    - metallb_controller

download_defaults:
  default:
    container: false
    file: false
    repo: None
    tag: None
    enabled: false
    dest: None
    url: None
    unarchive: false
    owner: "{{ kube_owner }}"
    mode: None
  description: >-
    Значения по умолчанию для каждой записи downloads; конкретная запись
    переопределяет нужные поля.
  source_path: roles/kubespray_defaults/defaults/main/download.yml

notes: >-
  Механизм контрольных сумм: файлы download.yml задают переменные вида
  <component>_binary_checksum / <component>_archive_checksum, которые
  индексируют большие словари контрольных сумм из
  roles/kubespray_defaults/vars/main/checksums.yml по [image_arch][version]
  (напр. kubelet_binary_checksum = kubelet_checksums[image_arch][kube_version]).
  Для контейнерных образов checksum — это digest вида <component>_digest_checksum,
  по умолчанию None (проверка по тегу). Сами таблицы checksums (сотни строк на
  каждый компонент и архитектуру amd64/arm64/arm/ppc64le) в этот срез не включены;
  они являются источником и версий компонентов — см. components.yaml, где
  Jinja-выражения вида (X_checksums['amd64'] | dict2items)[0].key разрешены до
  конкретных значений. Порядок ключей в checksums.yml — по убыванию версии,
  поэтому первый ключ = самая новая поддерживаемая версия компонента.
