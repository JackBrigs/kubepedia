    source_path: roles/kubernetes-apps/registry/defaults/main.yml
    description: "Размер тома для registry."
  - name: registry_port
    default: 5000
    source_path: roles/kubernetes-apps/registry/defaults/main.yml
    description: "Порт registry."
  - name: registry_replica_count
    default: 1
    source_path: roles/kubernetes-apps/registry/defaults/main.yml
    description: "Число реплик registry."
  - name: registry_service_type
    default: "ClusterIP"
    source_path: roles/kubernetes-apps/registry/defaults/main.yml
    description: "Тип сервиса registry: ClusterIP, LoadBalancer или NodePort."
  - name: registry_service_cluster_ip
    default: ""
    source_path: roles/kubernetes-apps/registry/defaults/main.yml
    description: "Заданный ClusterIP для сервиса registry."
  - name: registry_service_loadbalancer_ip
    default: ""
    source_path: roles/kubernetes-apps/registry/defaults/main.yml
    description: "loadBalancerIP для сервиса registry при типе LoadBalancer."
  - name: registry_service_annotations
    default: "{}"
    source_path: roles/kubernetes-apps/registry/defaults/main.yml
    description: "Аннотации сервиса registry (для облачных балансировщиков)."
  - name: registry_service_nodeport
    default: ""
    source_path: roles/kubernetes-apps/registry/defaults/main.yml
    description: "NodePort сервиса registry при типе NodePort."
  - name: registry_tls_secret
    default: ""
    source_path: roles/kubernetes-apps/registry/defaults/main.yml
    description: "Имя секрета с TLS-сертификатами registry."
  - name: registry_htpasswd
    default: ""
    source_path: roles/kubernetes-apps/registry/defaults/main.yml
    description: "Содержимое htpasswd для базовой аутентификации registry."
  - name: registry_config
    default: |
      version: 0.1
      log:
        fields:
          service: registry
      storage:
        cache:
          blobdescriptor: inmemory
      http:
        addr: :{{ registry_port }}
        headers:
          X-Content-Type-Options: [nosniff]
      health:
        storagedriver:
          enabled: true
          interval: 10s
          threshold: 3
    source_path: roles/kubernetes-apps/registry/defaults/main.yml
    description: "Конфигурация Docker registry (config.yml): версия, логирование, storage cache, http, health check."
  - name: registry_ingress_annotations
    default: "{}"
    source_path: roles/kubernetes-apps/registry/defaults/main.yml
    description: "Аннотации Ingress для registry."
  - name: registry_ingress_host
    default: ""
    source_path: roles/kubernetes-apps/registry/defaults/main.yml
    description: "Hostname Ingress для registry."
  - name: registry_ingress_tls_secret
    default: ""
    source_path: roles/kubernetes-apps/registry/defaults/main.yml
    description: "Имя секрета с TLS-сертификатами Ingress registry."

  # ==========================================================================
  # roles/kubernetes-apps/scheduler_plugins — 8
  # ==========================================================================
  - name: scheduler_plugins_enabled
    default: false
    source_path: roles/kubernetes-apps/scheduler_plugins/defaults/main.yml
    description: "Флаг включения scheduler-plugins (второй планировщик)."
  - name: scheduler_plugins_namespace
    default: "scheduler-plugins"
    source_path: roles/kubernetes-apps/scheduler_plugins/defaults/main.yml
    description: "Namespace для scheduler-plugins."
  - name: scheduler_plugins_controller_replicas
    default: 1
    source_path: roles/kubernetes-apps/scheduler_plugins/defaults/main.yml
    description: "Число реплик контроллера scheduler-plugins."
  - name: scheduler_plugins_scheduler_replicas
    default: 1
    source_path: roles/kubernetes-apps/scheduler_plugins/defaults/main.yml
    description: "Число реплик планировщика scheduler-plugins."
  - name: scheduler_plugins_scheduler_leader_elect
    default: "{{ ((groups['kube_control_plane'] | length) > 1) }}"
    source_path: roles/kubernetes-apps/scheduler_plugins/defaults/main.yml
    description: "Включить leader election планировщика (по умолчанию — при более чем одном control plane узле)."
  - name: scheduler_plugins_enabled_plugins
    default: |
      - Coscheduling
      - CapacityScheduling
      - NodeResourceTopologyMatch
      - NodeResourcesAllocatable
    source_path: roles/kubernetes-apps/scheduler_plugins/defaults/main.yml
    description: "Список включаемых плагинов scheduler-plugins."
  - name: scheduler_plugins_disabled_plugins
    default: |
      - PrioritySort
    source_path: roles/kubernetes-apps/scheduler_plugins/defaults/main.yml
    description: "Список отключаемых стандартных плагинов планировщика."
  - name: scheduler_plugins_plugin_config
    default: |
      - name: Coscheduling
        args:
          permitWaitingTimeSeconds: 10
    source_path: roles/kubernetes-apps/scheduler_plugins/defaults/main.yml
    description: "Конфигурация (pluginConfig) для включённых плагинов планировщика."

  # ==========================================================================
  # roles/kubernetes-apps/snapshots/cinder-csi — 1
  # ==========================================================================
  - name: snapshot_classes
    default: |
      - name: cinder-csi-snapshot
        is_default: false
        force_create: true
        deletionPolicy: Delete
    source_path: roles/kubernetes-apps/snapshots/cinder-csi/defaults/main.yml
    description: "Определения VolumeSnapshotClass для Cinder CSI."

  # ==========================================================================
  # roles/kubernetes-apps/snapshots/snapshot-controller — 2
  # ==========================================================================
  - name: snapshot_controller_replicas
    default: 1
    source_path: roles/kubernetes-apps/snapshots/snapshot-controller/defaults/main.yml
    description: "Число реплик snapshot-controller."
  - name: snapshot_controller_namespace
    default: "kube-system"
    source_path: roles/kubernetes-apps/snapshots/snapshot-controller/defaults/main.yml
    description: "Namespace для snapshot-controller."

  # ==========================================================================
  # roles/kubernetes-apps/utils — 1
  # ==========================================================================
  - name: k8s_namespace
    default: "kube-system"
    source_path: roles/kubernetes-apps/utils/defaults/main.yml
    description: "Namespace, используемый вспомогательными задачами роли utils."

