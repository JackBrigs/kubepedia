  # ==========================================================================
  # roles/kubernetes-apps/ansible  (CoreDNS, nodelocaldns, dns-autoscaler) — 28
  # ==========================================================================
  - name: dns_memory_limit
    default: "300Mi"
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "Лимит памяти для подов CoreDNS."
  - name: dns_cpu_requests
    default: "100m"
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "Запрос CPU для подов CoreDNS."
  - name: dns_memory_requests
    default: "70Mi"
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "Запрос памяти для подов CoreDNS."
  - name: dns_min_replicas
    default: "{{ [2, groups['k8s_cluster'] | length] | min }}"
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "Минимальное число реплик CoreDNS: 2 либо число узлов кластера, если их меньше двух."
  - name: dns_nodes_per_replica
    default: 16
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "Число узлов на одну реплику CoreDNS для dns-autoscaler."
  - name: dns_cores_per_replica
    default: 256
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "Число ядер на одну реплику CoreDNS для dns-autoscaler."
  - name: dns_prevent_single_point_failure
    default: "{{ 'true' if dns_min_replicas | int > 1 else 'false' }}"
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "Включает защиту dns-autoscaler от единой точки отказа при dns_min_replicas > 1."
  - name: enable_coredns_reverse_dns_lookups
    default: true
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "Включает обратные DNS-запросы (reverse lookups) в CoreDNS."
  - name: coredns_svc_name
    default: "coredns"
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "Имя Kubernetes-сервиса CoreDNS."
  - name: coredns_ordinal_suffix
    default: ""
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "Порядковый суффикс к имени CoreDNS (для параллельного развёртывания второго инстанса)."
  - name: coredns_affinity
    default: |
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchExpressions:
              - key: k8s-app
                operator: In
                values: ["kube-dns"]
            topologyKey: kubernetes.io/hostname
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "Affinity для подов CoreDNS: мягкая анти-аффинность по узлам (topologyKey kubernetes.io/hostname)."
  - name: coredns_deployment_nodeselector
    default: "kubernetes.io/os: linux"
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "nodeSelector для Deployment CoreDNS (строка, подставляемая в шаблон)."
  - name: coredns_default_zone_cache_block
    default: |
      cache 30
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "Блок cache для зоны по умолчанию в конфиге CoreDNS (Corefile)."
  - name: coredns_pod_disruption_budget
    default: false
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "Создавать ли PodDisruptionBudget для CoreDNS."
  - name: coredns_replicas
    default: 2
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "Число реплик CoreDNS, когда enable_dns_autoscaler = false."
  - name: coredns_pod_disruption_budget_max_unavailable
    default: "30%"
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "Значение maxUnavailable для PDB CoreDNS."
  - name: deploy_coredns
    default: true
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "Разворачивать ли CoreDNS."
  - name: old_dns_domains
    default: "[]"
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "Список прежних доменов DNS для корректных ответов CoreDNS/nodelocaldns после смены dns_domain."
  - name: nodelocaldns_cpu_requests
    default: "100m"
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "Запрос CPU для nodelocaldns."
  - name: nodelocaldns_memory_limit
    default: "200Mi"
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "Лимит памяти для nodelocaldns."
  - name: nodelocaldns_memory_requests
    default: "70Mi"
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "Запрос памяти для nodelocaldns."
  - name: nodelocaldns_ds_nodeselector
