  - name: nodelocaldns_secondary_prometheus_port
    default: 9255
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "Порт метрик Prometheus для вторичного инстанса nodelocaldns."
  - name: dns_autoscaler_cpu_requests
