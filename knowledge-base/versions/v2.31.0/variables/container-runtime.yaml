---
# ============================================================================
# Kubespray Encyclopedia — справочник переменных контейнерного рантайма
# Фокус: containerd (полный набор defaults). Прочие рантаймы только упомянуты.
# ============================================================================
project: kubespray
kubespray_version: v2.31.0
git_commit: 1c9add4
source_type: code
source_paths:
  - roles/container-engine/containerd/defaults/main.yml
  - roles/container-engine/containerd-common/defaults/main.yml
  - roles/container-engine/runc/defaults/main.yml
  - roles/container-engine/validate-container-engine/tasks/main.yml
  - roles/kubespray_defaults/defaults/main/main.yml
  - roles/kubespray_defaults/defaults/main/download.yml
source_url: https://github.com/kubernetes-sigs/kubespray/tree/v2.31.0
retrieved_at: 2026-07-14
topics:
  - container-runtime
  - containerd
reliability: authoritative

# ============================================================================
# Проверка полноты (см. также блок notes в конце файла):
#   containerd/defaults/main.yml — 45 top-level ключей
#   (grep -cE '^[a-zA-Z_]+:' -> 45); извлечены все 45.
# Удалённые в v2.30.0 переменные runtime_engine / runtime_root в v2.31.0
#   ОТСУТСТВУЮТ как самостоятельные переменные (grep '^runtime_engine|^runtime_root'
#   по roles/ пуст). Остались лишь как ключи .engine/.root внутри элементов
#   containerd_additional_runtimes (шаблон config-v1.toml.j2, containerd < 2.0).
# containerd_discard_unpacked_layers = true (без изменений; в v2.31.0 комментарий
#   уточняет область применения "Only for containerd < 2.1").
# ============================================================================

variables:

  # ==========================================================================
  # Выбор контейнерного рантайма (roles/kubespray_defaults)
  # ==========================================================================
  - name: container_manager
    default: containerd
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: >-
      Выбор контейнерного рантайма (CRI) для кластера. Допустимые значения:
      containerd, crio, docker. По умолчанию containerd. Значение определяет,
      какая роль container-engine выполняется и какой сокет CRI использует kubelet.
    related:
      - cri_socket
      - nri_enabled
      - container_manager_on_localhost

  - name: container_manager_on_localhost
    default: "{{ container_manager }}"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: >-
      Рантайм, используемый на localhost (управляющем узле Ansible) при загрузке
      образов, когда download_localhost истинно. По умолчанию совпадает с
      container_manager.
    related:
      - container_manager

  - name: cri_socket
    default: >-
      {%- if container_manager == 'crio' -%}
      unix:///var/run/crio/crio.sock
      {%- elif container_manager == 'containerd' -%}
      unix:///var/run/containerd/containerd.sock
      {%- elif container_manager == 'docker' -%}
      unix:///var/run/cri-dockerd.sock
      {%- endif -%}
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: >-
      Путь к сокету CRI, который передаётся kubelet. Вычисляется автоматически
      в зависимости от container_manager. Для containerd —
      unix:///var/run/containerd/containerd.sock.
    conditions: зависит от значения container_manager
    related:
      - container_manager

  - name: nri_enabled
    default: "{{ container_manager == 'containerd' }}"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: >-
      Включает плагин Node Resource Interface (NRI) для containerd. По умолчанию
      истинно только когда container_manager == 'containerd'.
    conditions: применимо только при container_manager == 'containerd'
    related:
      - container_manager

  # --- Дополнительные рантаймы (только выбор; сами роли в фокус не входят) ---
  - name: kata_containers_enabled
    default: false
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: >-
      Включает Kata Containers как дополнительный рантайм. Требует
      container_manager, отличный от Docker.
    related:
      - container_manager

  - name: gvisor_enabled
    default: false
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: >-
      Включает gVisor как дополнительный рантайм. Поддерживается только при
      container_manager Docker или containerd.
    related:
      - container_manager

  - name: runc_enabled
    default: false
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: >-
      Включает runc как дополнительный рантайм. Требует container_manager=crio.
    related:
      - container_manager

  - name: crun_enabled
    default: false
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: >-
      Включает crun как дополнительный рантайм. Требует container_manager=crio.
    related:
      - container_manager

  - name: youki_enabled
    default: false
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: >-
      Включает youki как дополнительный рантайм. Требует container_manager=crio.
    related:
      - container_manager

  # ==========================================================================
  # Опции containerd, заданные в roles/kubespray_defaults
  # (относятся к container_manager == 'containerd')
  # ==========================================================================
  - name: containerd_use_systemd_cgroup
    default: true
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: >-
      Использовать systemd cgroup driver для containerd. Значение подставляется
      в опцию SystemdCgroup рантайма runc и определяет cgroupDriver kubelet
      (systemd при true, иначе cgroupfs, см. roles/kubernetes/node/tasks/facts.yml).
    related:
      - containerd_runc_runtime

  - name: containerd_static_binary
    default: false
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: >-
      Использовать статическую сборку бинарника containerd для совместимости со
      старыми дистрибутивами (например, Debian 11). Влияет на URL и контрольную
      сумму загрузки (containerd-static-...).
    related:
      - containerd_version

  # ВНИМАНИЕ: следующие 4 переменные ДУБЛИРУЮТСЯ — они заданы и в
  # roles/kubespray_defaults/defaults/main/main.yml, и в
  # roles/container-engine/containerd/defaults/main.yml с ОДИНАКОВЫМИ значениями.
  # Обе точки — role defaults (одинаковый уровень приоритетности Ansible),
  # значения совпадают, конфликта поведения нет. Подробнее см. .md.
  - name: containerd_storage_dir
    default: "/var/lib/containerd"
    source_path: roles/container-engine/containerd/defaults/main.yml
    description: >-
      Каталог хранения данных containerd (root). Дублируется также в
      roles/kubespray_defaults/defaults/main/main.yml с тем же значением.
    related:
      - containerd_state_dir

  - name: containerd_state_dir
    default: "/run/containerd"
    source_path: roles/container-engine/containerd/defaults/main.yml
    description: >-
      Каталог состояния containerd (state). Дублируется также в
      roles/kubespray_defaults/defaults/main/main.yml с тем же значением.
    related:
      - containerd_storage_dir

  - name: containerd_systemd_dir
    default: "/etc/systemd/system/containerd.service.d"
    source_path: roles/container-engine/containerd/defaults/main.yml
    description: >-
      Каталог drop-in для systemd-юнита containerd. Дублируется также в
      roles/kubespray_defaults/defaults/main/main.yml с тем же значением.

  - name: containerd_cfg_dir
    default: /etc/containerd
    source_path: roles/container-engine/containerd/defaults/main.yml
    description: >-
      Каталог конфигурации containerd (config.toml). Дублируется также в
      roles/kubespray_defaults/defaults/main/main.yml с тем же значением.

  # ==========================================================================
  # Версия containerd (roles/kubespray_defaults/defaults/main/download.yml)
  # ==========================================================================
  - name: containerd_version
    default: "{{ (containerd_archive_checksums['amd64'] | dict2items)[0].key }}"
    source_path: roles/kubespray_defaults/defaults/main/download.yml
    description: >-
      Версия containerd. Вычисляется как первый (старший) ключ словаря
      containerd_archive_checksums для amd64. В теге v2.31.0 разрешается в 2.2.3
      (см. roles/kubespray_defaults/vars/main/checksums.yml).
    related:
      - containerd_static_binary
    reliability: authoritative

  # ==========================================================================
  # roles/container-engine/containerd/defaults/main.yml — 45 ключей
  # ==========================================================================

  # --- Каталоги и базовые параметры процесса ---
  - name: containerd_oom_score
    default: 0
    source_path: roles/container-engine/containerd/defaults/main.yml
    description: >-
      Значение oom_score_adj для процесса containerd. По умолчанию 0 (а не -999),
      т.к. containerd сам выставляет oom_score_adj = -999 даже при 0
      (см. PR kubespray#9275).

  # --- Рантайм по умолчанию и снапшоттер ---
  - name: containerd_default_runtime
    default: "runc"
    source_path: roles/container-engine/containerd/defaults/main.yml
    description: >-
      Имя рантайма CRI по умолчанию, используемого containerd. По умолчанию runc.
    related:
      - containerd_runc_runtime

  - name: containerd_snapshotter
    default: "overlayfs"
    source_path: roles/container-engine/containerd/defaults/main.yml
    description: >-
      Снапшоттер containerd по умолчанию (например, overlayfs, native, devmapper).

  - name: containerd_runc_runtime
    default: |
      name: runc
      type: "io.containerd.runc.v2"
      base_runtime_spec: cri-base.json
      options:
        Root: ""
        SystemdCgroup: "{{ containerd_use_systemd_cgroup | ternary('true', 'false') }}"
        BinaryName: "{{ bin_dir }}/runc"
    source_path: roles/container-engine/containerd/defaults/main.yml
    description: >-
      Определение рантайма runc для containerd (тип io.containerd.runc.v2, базовая
      спецификация cri-base.json, опции Root/SystemdCgroup/BinaryName). SystemdCgroup
      берётся из containerd_use_systemd_cgroup, BinaryName — из bin_dir.
    related:
      - containerd_use_systemd_cgroup
      - containerd_default_runtime
      - containerd_base_runtime_specs

  - name: containerd_additional_runtimes
    default: []
    source_path: roles/container-engine/containerd/defaults/main.yml
    description: >-
      Список дополнительных рантаймов containerd (например, kata). По умолчанию
      пуст. В defaults приведён закомментированный пример для Kata Containers.
    related:
      - kata_containers_enabled

  # --- Базовая runtime spec (rlimits) ---
  - name: containerd_base_runtime_spec_rlimit_nofile
    default: 65535
    source_path: roles/container-engine/containerd/defaults/main.yml
    description: >-
      Значение rlimit RLIMIT_NOFILE (hard и soft), подставляемое в базовую
      runtime spec containerd.
    related:
      - containerd_default_base_runtime_spec_patch

  - name: containerd_default_base_runtime_spec_patch
    default: |
      process:
        rlimits:
          - type: RLIMIT_NOFILE
            hard: "{{ containerd_base_runtime_spec_rlimit_nofile }}"
            soft: "{{ containerd_base_runtime_spec_rlimit_nofile }}"
    source_path: roles/container-engine/containerd/defaults/main.yml
    description: >-
      Патч базовой runtime spec: задаёт rlimits процесса (RLIMIT_NOFILE) на основе
      containerd_base_runtime_spec_rlimit_nofile. Объединяется с
      containerd_default_base_runtime_spec.
    related:
      - containerd_base_runtime_spec_rlimit_nofile
      - containerd_base_runtime_specs

  - name: containerd_base_runtime_specs
    default: |
      cri-base.json: "{{ containerd_default_base_runtime_spec | combine(containerd_default_base_runtime_spec_patch, recursive=1) }}"
    source_path: roles/container-engine/containerd/defaults/main.yml
    description: >-
      Набор базовых runtime spec-файлов, записываемых в конфигурацию containerd.
      cri-base.json формируется объединением containerd_default_base_runtime_spec
      с патчем containerd_default_base_runtime_spec_patch.
    conditions: >-
      containerd_default_base_runtime_spec определяется вне defaults (генерируется
      через `ctr oci spec` в задачах роли)
    related:
      - containerd_default_base_runtime_spec_patch
    reliability: unconfirmed

  - name: containerd_discard_unpacked_layers
    default: true
    source_path: roles/container-engine/containerd/defaults/main.yml
    description: >-
      Удалять распакованные слои образов для экономии места на диске. Актуально
      только для containerd < 2.1 (согласно комментарию в defaults).

  # --- gRPC ---
  - name: containerd_grpc_max_recv_message_size
    default: 16777216
    source_path: roles/container-engine/containerd/defaults/main.yml
    description: Максимальный размер принимаемого gRPC-сообщения containerd (байт).

  - name: containerd_grpc_max_send_message_size
    default: 16777216
    source_path: roles/container-engine/containerd/defaults/main.yml
    description: Максимальный размер отправляемого gRPC-сообщения containerd (байт).

  # --- Отладка (debug) ---
  - name: containerd_debug_address
    default: ""
    source_path: roles/container-engine/containerd/defaults/main.yml
    description: Адрес debug-сокета containerd. Пусто — отладочный сокет не настраивается.

  - name: containerd_debug_level
    default: "info"
    source_path: roles/container-engine/containerd/defaults/main.yml
    description: Уровень логирования containerd (например, info, debug, warn, error).

  - name: containerd_debug_format
    default: ""
    source_path: roles/container-engine/containerd/defaults/main.yml
    description: Формат логов containerd (например, json). Пусто — формат по умолчанию.

  - name: containerd_debug_uid
    default: 0
    source_path: roles/container-engine/containerd/defaults/main.yml
    description: UID владельца debug-сокета containerd.

  - name: containerd_debug_gid
    default: 0
    source_path: roles/container-engine/containerd/defaults/main.yml
    description: GID владельца debug-сокета containerd.

  # --- Метрики ---
  - name: containerd_metrics_address
    default: ""
    source_path: roles/container-engine/containerd/defaults/main.yml
    description: >-
      Адрес эндпоинта метрик Prometheus для containerd. Пусто — метрики не
      экспонируются.
    related:
      - containerd_metrics_grpc_histogram

  - name: containerd_metrics_grpc_histogram
    default: false
    source_path: roles/container-engine/containerd/defaults/main.yml
    description: Включить гистограммы gRPC в метриках containerd.
    related:
      - containerd_metrics_address

  # --- Реестры и аутентификация ---
  - name: containerd_registries_mirrors
    default: |
      - prefix: docker.io
        mirrors:
          - host: https://registry-1.docker.io
            capabilities: ["pull", "resolve"]
            skip_verify: false
    source_path: roles/container-engine/containerd/defaults/main.yml
    description: >-
      Список зеркал реестров containerd (формат hosts.toml). По умолчанию задано
      зеркало для docker.io на registry-1.docker.io с возможностями pull/resolve.
      Поддерживает поля ca, client, header (закомментированы в примере).
    related:
      - containerd_registry_auth

  - name: containerd_registry_auth
    default: []
    source_path: roles/container-engine/containerd/defaults/main.yml
    description: >-
      Список записей аутентификации для реестров (registry/username/password).
      По умолчанию пуст.
    related:
      - containerd_registries_mirrors

  - name: containerd_max_container_log_line_size
    default: 16384
    source_path: roles/container-engine/containerd/defaults/main.yml
    description: Максимальный размер строки лога контейнера (байт).

  # --- Сетевые и безопасностные опции CRI ---
  - name: containerd_enable_unprivileged_ports
    default: false
    source_path: roles/container-engine/containerd/defaults/main.yml
    description: >-
      Разрешить непривилегированным пользователям использовать порты < 1024.

  - name: containerd_enable_unprivileged_icmp
    default: false
    source_path: roles/container-engine/containerd/defaults/main.yml
    description: >-
      Разрешить непривилегированным пользователям использовать ICMP-сокеты.

  - name: containerd_enable_selinux
    default: false
    source_path: roles/container-engine/containerd/defaults/main.yml
    description: Включить поддержку SELinux в containerd.

  - name: containerd_disable_apparmor
    default: false
    source_path: roles/container-engine/containerd/defaults/main.yml
    description: Отключить AppArmor в containerd.

  - name: containerd_tolerate_missing_hugetlb_controller
    default: true
    source_path: roles/container-engine/containerd/defaults/main.yml
    description: Не считать ошибкой отсутствие cgroup-контроллера hugetlb.
    related:
      - containerd_disable_hugetlb_controller

  - name: containerd_disable_hugetlb_controller
    default: true
    source_path: roles/container-engine/containerd/defaults/main.yml
    description: Отключить cgroup-контроллер hugetlb в containerd.
    related:
      - containerd_tolerate_missing_hugetlb_controller

  - name: containerd_image_pull_progress_timeout
    default: 5m
    source_path: roles/container-engine/containerd/defaults/main.yml
    description: >-
      Таймаут ожидания прогресса при загрузке образа; при отсутствии прогресса
      загрузка прерывается.

  # --- Дополнительная конфигурация ---
  - name: containerd_extra_args
    default: "''"
    source_path: roles/container-engine/containerd/defaults/main.yml
    description: >-
      Произвольный дополнительный текст, дословно добавляемый в config.toml
      containerd. По умолчанию пусто.

  - name: containerd_extra_runtime_args
    default: {}
    source_path: roles/container-engine/containerd/defaults/main.yml
    description: >-
      Дополнительные опции рантайма, внедряемые в секцию CRI-плагина
      [plugins."io.containerd.cri.v1.runtime"]. Полезно для параметров, не
      поддержанных явными переменными Kubespray. По умолчанию пусто.

  # --- Лимиты systemd-юнита containerd ---
  - name: containerd_limit_proc_num
    default: "infinity"
    source_path: roles/container-engine/containerd/defaults/main.yml
    description: Лимит числа процессов (LimitNPROC) для systemd-юнита containerd.

  - name: containerd_limit_core
    default: "infinity"
    source_path: roles/container-engine/containerd/defaults/main.yml
    description: Лимит размера core-дампа (LimitCORE) для systemd-юнита containerd.

  - name: containerd_limit_open_file_num
    default: 1048576
    source_path: roles/container-engine/containerd/defaults/main.yml
    description: Лимит числа открытых файлов (LimitNOFILE) для systemd-юнита containerd.

  - name: containerd_limit_mem_lock
    default: "infinity"
    source_path: roles/container-engine/containerd/defaults/main.yml
    description: Лимит блокируемой памяти (LimitMEMLOCK) для systemd-юнита containerd.

  # --- Поддерживаемые дистрибутивы ---
  - name: containerd_supported_distributions
    default: |
      - "CentOS"
      - "OracleLinux"
      - "RedHat"
      - "Ubuntu"
      - "Debian"
      - "Fedora"
      - "AlmaLinux"
      - "Rocky"
      - "Amazon"
      - "Flatcar"
      - "Flatcar Container Linux by Kinvolk"
      - "Suse"
      - "openSUSE Leap"
      - "openSUSE Tumbleweed"
      - "Kylin Linux Advanced Server"
      - "UnionTech"
      - "UniontechOS"
      - "openEuler"
    source_path: roles/container-engine/containerd/defaults/main.yml
    description: >-
      Список дистрибутивов ОС, для которых поддерживается установка containerd
      средствами Kubespray.

  # --- CDI ---
  - name: enable_cdi
    default: false
    source_path: roles/container-engine/containerd/defaults/main.yml
    description: >-
      Включить Container Device Interface (CDI) в containerd. Обратите внимание:
      имя переменной без префикса containerd_.

  # --- Трассировка (tracing) ---
  - name: containerd_tracing_enabled
    default: false
    source_path: roles/container-engine/containerd/defaults/main.yml
    description: Включить трассировку (OpenTelemetry) в containerd.
    related:
      - containerd_tracing_endpoint

  - name: containerd_tracing_endpoint
    default: "[::]:4317"
    source_path: roles/container-engine/containerd/defaults/main.yml
    description: Эндпоинт коллектора трассировки containerd.
    related:
      - containerd_tracing_enabled

  - name: containerd_tracing_protocol
    default: "grpc"
    source_path: roles/container-engine/containerd/defaults/main.yml
    description: Протокол экспорта трассировки containerd (например, grpc, http).

  - name: containerd_tracing_sampling_ratio
    default: 1.0
    source_path: roles/container-engine/containerd/defaults/main.yml
    description: Доля сэмплирования трассировки containerd (0.0–1.0).

  - name: containerd_tracing_service_name
    default: "containerd"
    source_path: roles/container-engine/containerd/defaults/main.yml
    description: Имя сервиса, указываемое в данных трассировки containerd.

  # ==========================================================================
  # roles/container-engine/containerd-common/defaults/main.yml
  # ==========================================================================
  - name: containerd_package
    default: "'containerd.io'"
    source_path: roles/container-engine/containerd-common/defaults/main.yml
    description: >-
      Имя пакета containerd в пакетном менеджере. Сохранено для миграции с
      установок через пакетный менеджер на прямую загрузку бинарников.

  - name: yum_repo_dir
    default: /etc/yum.repos.d
    source_path: roles/container-engine/containerd-common/defaults/main.yml
    description: Каталог с файлами yum-репозиториев (для RPM-дистрибутивов).

  # ==========================================================================
  # roles/container-engine/runc/defaults/main.yml
  # (runc — низкоуровневый рантайм OCI, используемый containerd по умолчанию)
  # ==========================================================================
  - name: runc_bin_dir
    default: "{{ bin_dir }}"
    source_path: roles/container-engine/runc/defaults/main.yml
    description: >-
      Каталог установки бинарника runc. По умолчанию совпадает с bin_dir.
    related:
      - containerd_runc_runtime

  - name: runc_package_name
    default: runc
    source_path: roles/container-engine/runc/defaults/main.yml
    description: Имя пакета runc в пакетном менеджере.

  # ==========================================================================
  # Версии сопутствующих компонентов рантайма
  # (roles/kubespray_defaults/defaults/main/download.yml).
  # Значения вычисляются как первый (старший) ключ соответствующего словаря
  # контрольных сумм; фактические значения на теге v2.31.0 указаны в description.
  # ==========================================================================
  - name: runc_version
    default: "{{ (runc_checksums['amd64'] | dict2items)[0].key }}"
    source_path: roles/kubespray_defaults/defaults/main/download.yml
    description: >-
      Версия runc (первый ключ runc_checksums для amd64). На теге v2.31.0
      разрешается в 1.4.2.
    related:
      - runc_bin_dir
    reliability: authoritative

  - name: nerdctl_version
    default: "{{ (nerdctl_archive_checksums['amd64'] | dict2items)[0].key }}"
    source_path: roles/kubespray_defaults/defaults/main/download.yml
    description: >-
      Версия nerdctl — CLI для containerd (первый ключ nerdctl_archive_checksums
      для amd64). На теге v2.31.0 разрешается в 2.2.2.
    reliability: authoritative

  - name: crictl_version
    default: "{{ (crictl_checksums['amd64'].keys() | select('version', kube_major_next_version, '<'))[0] }}"
    source_path: roles/kubespray_defaults/defaults/main/download.yml
    description: >-
      Версия crictl — CLI для CRI: старший ключ crictl_checksums[amd64], меньший
      kube_major_next_version. На теге v2.31.0 старший ключ — 1.35.0.
    reliability: authoritative

  - name: docker_containerd_version
    default: 1.6.32
    source_path: roles/kubespray_defaults/defaults/main/download.yml
    description: >-
      Версия containerd, устанавливаемая в связке с Docker (container_manager=docker).
      К режиму containerd по умолчанию не относится; приведена для полноты.
    reliability: authoritative

# ============================================================================
# Метаданные полноты и наблюдения
# ============================================================================
notes:
  completeness_check:
    containerd_defaults_top_level_keys_expected: 45
    containerd_defaults_top_level_keys_extracted: 45
    method: >-
      grep -cE '^[a-zA-Z_]+:' roles/container-engine/containerd/defaults/main.yml -> 45;
      все 45 ключей присутствуют в справочнике.
  removed_in_v2_30_0:
    - "runtime_engine (как самостоятельная переменная) — в v2.31.0 отсутствует; grep '^runtime_engine' по roles/ пуст."
    - "runtime_root (как самостоятельная переменная) — в v2.31.0 отсутствует; grep '^runtime_root' по roles/ пуст."
    - "Оба имени сохранились только как ключи .engine/.root внутри элементов containerd_additional_runtimes и используются лишь шаблоном config-v1.toml.j2 (containerd < 2.0). При containerd_version по умолчанию (2.2.3 >= 2.0.0) используется config.toml.j2."
  discrepancies:
    - "containerd_storage_dir, containerd_state_dir, containerd_systemd_dir, containerd_cfg_dir определены одновременно в roles/container-engine/containerd/defaults/main.yml и roles/kubespray_defaults/defaults/main/main.yml с идентичными значениями (дублирование, не конфликт)."
  containerd_discard_unpacked_layers_check:
    value_v2_31_0: true
    comment: "Значение по умолчанию true; комментарий в defaults уточняет применимость 'Only for containerd < 2.1'."
  vs_v2_30_0:
    containerd_defaults_diff: "пуст (файл roles/container-engine/containerd/defaults/main.yml идентичен v2.30.0)."
    containerd_version: "2.2.1 (v2.30.0) -> 2.2.3 (v2.31.0)."
