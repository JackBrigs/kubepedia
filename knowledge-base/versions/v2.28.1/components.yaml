---
project: kubespray
kubespray_version: v2.28.1
git_commit: a20891a
source_type: code
source_paths:
  - roles/kubespray_defaults/defaults/main/download.yml
  - roles/kubespray_defaults/defaults/main/main.yml
  - roles/kubespray_defaults/vars/main/main.yml
  - roles/kubespray_defaults/vars/main/checksums.yml
  - roles/kubernetes-apps/argocd/defaults/main.yml
source_url: https://github.com/kubernetes-sigs/kubespray/tree/v2.28.1
retrieved_at: 2026-07-15
topics:
  - components
  - versions
reliability: authoritative

# Механизм разрешения версий:
# - выражение "(X_checksums['amd64'] | dict2items)[0].key" означает «первый ключ словаря
#   контрольных сумм X_checksums для amd64» (словари в checksums.yml упорядочены по убыванию
#   версий, т.е. берётся самая новая версия, для которой есть контрольная сумма);
# - kube_version разрешается первым (из kubelet_checksums['amd64']) = 1.32.8, отсюда
#   kube_major_version = 1.32 (roles/kubespray_defaults/defaults/main/download.yml);
# - словари *_supported_versions (etcd, crictl, crio, pod_infra) выбирают версию компонента
#   по ключу kube_major_version = 1.32.
# Минимальная поддерживаемая версия Kubernetes: kube_version_min_required = 1.30.0
# (последний ключ kubelet_checksums['amd64']).
#
# ВНИМАНИЕ по расположению *_supported_versions в v2.28.1: словари etcd_supported_versions,
# crictl_supported_versions, crio_supported_versions, pod_infra_supported_versions заданы
# прямо в roles/kubespray_defaults/defaults/main/download.yml (а не в vars/main/main.yml,
# как в более поздних тегах).

components:
  # === Ядро кластера ===
  - name: kubernetes
    version_variable: kube_version
    default_expression: "{{ (kubelet_checksums['amd64'] | dict2items)[0].key }}"
    resolved_version: "1.32.8"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    notes: "Первый (самый новый) ключ kubelet_checksums['amd64']. Диапазон поддержки в теге: 1.30.0–1.32.8 (kube_version_min_required = 1.30.0)."

  - name: kubeadm / kubectl / kubelet
    version_variable: kube_version
    default_expression: "{{ dl_k8s_io_url }}/release/v{{ kube_version }}/bin/linux/{{ image_arch }}/kubeadm"
    resolved_version: "1.32.8"
    source_path: roles/kubespray_defaults/defaults/main/download.yml
    notes: "Отдельной переменной версии нет: kubeadm, kubectl и kubelet скачиваются той же версии, что kube_version."

  - name: etcd
    version_variable: etcd_version
    default_expression: "{{ etcd_supported_versions[kube_major_version] }}"
    resolved_version: "3.5.22"
    source_path: roles/kubespray_defaults/defaults/main/download.yml
    notes: "В v2.28.1 etcd_supported_versions задан не литералом, а выражением (etcd_binary_checksums['amd64'].keys() | select('version', '3.6', '<'))[0] для '1.30'/'1.31'/'1.32' — берётся наибольшая версия etcd < 3.6 из checksums.yml. На теге это 3.5.22 (в v2.28.0 было литеральное 3.5.16)."

  - name: pause (pod_infra)
    version_variable: pod_infra_version
    default_expression: "{{ pod_infra_supported_versions[kube_major_version] }}"
    resolved_version: "3.10"
    source_path: roles/kubespray_defaults/defaults/main/download.yml
    notes: "pod_infra_supported_versions: 3.10 для 1.31–1.32, 3.9 для 1.30; для 1.32 — 3.10."

  # === Container runtime и инструменты ===
  - name: containerd
    version_variable: containerd_version
    default_expression: "{{ (containerd_archive_checksums['amd64'] | dict2items)[0].key }}"
    resolved_version: "2.0.6"
    source_path: roles/kubespray_defaults/defaults/main/download.yml
    notes: "Минимальная поддерживаемая версия containerd_min_version_required = 1.3.7 (roles/kubespray_defaults/vars/main/main.yml)."

  - name: docker-containerd
    version_variable: docker_containerd_version
    default_expression: "1.6.32"
    resolved_version: "1.6.32"
    source_path: roles/kubespray_defaults/defaults/main/download.yml
    notes: "Актуально при container_manager == 'docker'. Задано литералом."

  - name: runc
    version_variable: runc_version
    default_expression: "{{ (runc_checksums['amd64'] | dict2items)[0].key }}"
    resolved_version: "1.2.6"
    source_path: roles/kubespray_defaults/defaults/main/download.yml

  - name: crictl
    version_variable: crictl_version
    default_expression: "{{ crictl_supported_versions[kube_major_version] }}"
    resolved_version: "1.32.0"
    source_path: roles/kubespray_defaults/defaults/main/download.yml
    notes: "crictl_supported_versions: 1.32→1.32.0, 1.31→1.31.1, 1.30→1.30.1."

  - name: nerdctl
    version_variable: nerdctl_version
    default_expression: "{{ (nerdctl_archive_checksums['amd64'] | dict2items)[0].key }}"
    resolved_version: "2.0.5"
    source_path: roles/kubespray_defaults/defaults/main/download.yml

  - name: cri-o
    version_variable: crio_version
    default_expression: "{{ crio_supported_versions[kube_major_version] }}"
    resolved_version: "1.32.0"
    source_path: roles/kubespray_defaults/defaults/main/download.yml
    notes: "crio_supported_versions: 1.32→1.32.0, 1.31→1.31.3, 1.30→1.30.3. Используется при container_manager == 'crio'."

  - name: cri-dockerd
    version_variable: cri_dockerd_version
    default_expression: "{{ (cri_dockerd_archive_checksums['amd64'] | dict2items)[0].key }}"
    resolved_version: "0.3.18"
    source_path: roles/kubespray_defaults/defaults/main/download.yml
    notes: "Используется при container_manager == 'docker'."

  - name: skopeo
    version_variable: skopeo_version
    default_expression: "{{ (skopeo_binary_checksums['amd64'] | dict2items)[0].key }}"
    resolved_version: "1.16.1"
    source_path: roles/kubespray_defaults/defaults/main/download.yml
    notes: "Скачивается при container_manager == 'crio'."

  - name: crun
    version_variable: crun_version
    default_expression: "{{ (crun_checksums['amd64'] | dict2items)[0].key }}"
    resolved_version: "1.17"
    source_path: roles/kubespray_defaults/defaults/main/download.yml

  - name: youki
    version_variable: youki_version
    default_expression: "{{ (youki_checksums['amd64'] | dict2items)[0].key }}"
    resolved_version: "0.5.5"
    source_path: roles/kubespray_defaults/defaults/main/download.yml

  - name: gvisor
    version_variable: gvisor_version
    default_expression: "{{ (gvisor_runsc_binary_checksums['amd64'] | dict2items)[0].key }}"
    resolved_version: "20250820.0"
    source_path: roles/kubespray_defaults/defaults/main/download.yml

  - name: kata_containers
    version_variable: kata_containers_version
    default_expression: "{{ (kata_containers_binary_checksums['amd64'] | dict2items)[0].key }}"
    resolved_version: "3.7.0"
    source_path: roles/kubespray_defaults/defaults/main/download.yml

  # === Сеть / CNI ===
  - name: cni-plugins
    version_variable: cni_version
    default_expression: "{{ (cni_binary_checksums['amd64'] | dict2items)[0].key }}"
    resolved_version: "1.4.1"
    source_path: roles/kubespray_defaults/defaults/main/download.yml

  - name: cilium
    version_variable: cilium_version
    default_expression: "\"1.17.7\""
    resolved_version: "1.17.7"
    source_path: roles/kubespray_defaults/defaults/main/download.yml
    notes: "Задана литералом (не через checksums)."

  - name: cilium-cli
    version_variable: cilium_cli_version
    default_expression: "{{ (ciliumcli_binary_checksums['amd64'] | dict2items)[0].key }}"
    resolved_version: "0.18.6"
    source_path: roles/kubespray_defaults/defaults/main/download.yml

  - name: calico
    version_variable: calico_version
    default_expression: "{{ (calicoctl_binary_checksums['amd64'] | dict2items)[0].key }}"
    resolved_version: "3.29.5"
    source_path: roles/kubespray_defaults/defaults/main/download.yml
    notes: "calico_ctl/cni/policy/typha/apiserver_version наследуют calico_version. Минимально допустимая для апгрейда: calico_min_version_required = 3.27.0. Используется при kube_network_plugin == 'calico'."

  - name: flannel
    version_variable: flannel_version
    default_expression: "0.22.0"
    resolved_version: "0.22.0"
    source_path: roles/kubespray_defaults/defaults/main/download.yml
    notes: "flannel_cni_version = 1.1.2 (flannel-cni-plugin). Используется при kube_network_plugin == 'flannel'. Задано литералом."

  - name: weave
    version_variable: weave_version
    default_expression: "2.8.7"
    resolved_version: "2.8.7"
    source_path: roles/kubespray_defaults/defaults/main/download.yml
    notes: "Используется при kube_network_plugin == 'weave'. Задано литералом."

  - name: kube-ovn
    version_variable: kube_ovn_version
    default_expression: "\"1.12.21\""
    resolved_version: "1.12.21"
    source_path: roles/kubespray_defaults/defaults/main/download.yml
    notes: "kube_ovn_dpdk_version = 19.11-v1.12.21. Используется при kube_network_plugin == 'kube-ovn'."

  - name: kube-router
    version_variable: kube_router_version
    default_expression: "\"2.1.1\""
    resolved_version: "2.1.1"
    source_path: roles/kubespray_defaults/defaults/main/download.yml
    notes: "Используется при kube_network_plugin == 'kube-router'."

  - name: multus
    version_variable: multus_version
    default_expression: "\"4.1.0\""
    resolved_version: "4.1.0"
    source_path: roles/kubespray_defaults/defaults/main/download.yml
    notes: "Мета-CNI, включается при kube_network_plugin_multus == true."

  # === DNS ===
  - name: coredns
    version_variable: coredns_version
    default_expression: "{{ '1.11.3' if (kube_version is version('1.30.5', '>=')) else '1.11.1' }}"
    resolved_version: "1.11.3"
    source_path: roles/kubespray_defaults/defaults/main/download.yml
    notes: "Тернарное выражение: 1.11.3 при kube_version >= 1.30.5, иначе 1.11.1. Для 1.32.8 — 1.11.3."

  - name: nodelocaldns
    version_variable: nodelocaldns_version
    default_expression: "\"1.25.0\""
    resolved_version: "1.25.0"
    source_path: roles/kubespray_defaults/defaults/main/download.yml
    notes: "Задана литералом."

  - name: dnsautoscaler (cluster-proportional-autoscaler)
    version_variable: dnsautoscaler_version
    default_expression: "1.8.8"
    resolved_version: "1.8.8"
    source_path: roles/kubespray_defaults/defaults/main/download.yml

  # === Инструменты ===
  - name: helm
    version_variable: helm_version
    default_expression: "{{ (helm_archive_checksums['amd64'] | dict2items)[0].key }}"
    resolved_version: "3.16.4"
    source_path: roles/kubespray_defaults/defaults/main/download.yml

  - name: yq
    version_variable: yq_version
    default_expression: "{{ (yq_checksums['amd64'] | dict2items)[0].key }}"
    resolved_version: "4.42.1"
    source_path: roles/kubespray_defaults/defaults/main/download.yml
    notes: "Скачивается при argocd_enabled."

  # === Addons ===
  - name: metrics_server
    version_variable: metrics_server_version
    default_expression: "\"0.7.0\""
    resolved_version: "0.7.0"
    source_path: roles/kubespray_defaults/defaults/main/download.yml

  - name: ingress_nginx
    version_variable: ingress_nginx_version
    default_expression: "\"1.12.1\""
    resolved_version: "1.12.1"
    source_path: roles/kubespray_defaults/defaults/main/download.yml

  - name: cert_manager
    version_variable: cert_manager_version
    default_expression: "\"1.15.3\""
    resolved_version: "1.15.3"
    source_path: roles/kubespray_defaults/defaults/main/download.yml

  - name: argocd
    version_variable: argocd_version
    default_expression: "{{ (argocd_install_checksums.no_arch | dict2items)[0].key }}"
    resolved_version: "2.14.5"
    source_path: roles/kubespray_defaults/defaults/main/download.yml
    notes: "В v2.28.1 argocd переведён на механизм download-по-checksum: argocd_version резолвится из первого ключа argocd_install_checksums.no_arch (в теге — 2.14.5), а манифест ставится через downloads.argocd_install (argocd_install_url + argocd_install_checksum). В defaults роли argocd (roles/kubernetes-apps/argocd/defaults/main.yml) остаётся argocd_version: 2.14.5 как fallback. Включается при argocd_enabled."

  - name: metallb
    version_variable: metallb_version
    default_expression: "0.13.9"
    resolved_version: "0.13.9"
    source_path: roles/kubespray_defaults/defaults/main/download.yml

  - name: local_path_provisioner
    version_variable: local_path_provisioner_version
    default_expression: "\"0.0.24\""
    resolved_version: "0.0.24"
    source_path: roles/kubespray_defaults/defaults/main/download.yml

  - name: local_volume_provisioner
    version_variable: local_volume_provisioner_version
    default_expression: "\"2.5.0\""
    resolved_version: "2.5.0"
    source_path: roles/kubespray_defaults/defaults/main/download.yml

  - name: node_feature_discovery
    version_variable: node_feature_discovery_version
    default_expression: "0.16.4"
    resolved_version: "0.16.4"
    source_path: roles/kubespray_defaults/defaults/main/download.yml

  - name: gateway_api (CRDs)
    version_variable: gateway_api_version
    default_expression: "\"1.2.1\""
    resolved_version: "1.2.1"
    source_path: roles/kubespray_defaults/defaults/main/download.yml
    notes: "Канал по умолчанию gateway_api_channel = standard."

  - name: registry
    version_variable: registry_version
    default_expression: "\"2.8.1\""
    resolved_version: "2.8.1"
    source_path: roles/kubespray_defaults/defaults/main/download.yml

  - name: kubernetes-dashboard
    version_variable: dashboard_image_tag
    default_expression: "\"v2.7.0\""
    resolved_version: "2.7.0"
    source_path: roles/kubespray_defaults/defaults/main/download.yml
    notes: "Отдельной переменной *_version нет — версия задаётся тегом образа dashboard_image_tag."

  - name: kube-vip
    version_variable: kube_vip_image_tag
    default_expression: "v0.8.9"
    resolved_version: "0.8.9"
    source_path: roles/kubespray_defaults/defaults/main/download.yml
    notes: "Отдельной переменной *_version нет — версия задаётся тегом образа kube_vip_image_tag."
