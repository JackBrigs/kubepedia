project: kubespray
kubespray_version: v2.28.1
git_commit: a20891a
source_type: code
source_paths:
  - roles/kubespray_defaults/defaults/main/download.yml
source_url: https://github.com/kubernetes-sigs/kubespray/tree/v2.28.1
retrieved_at: 2026-07-15
topics:
  - download
reliability: authoritative

# Примечание: в теге v2.28.1 каталог roles/download/defaults/ ОТСУТСТВУЕТ.
# Роль download содержит только meta/, tasks/, templates/.
# Все переменные механизма загрузки определены в
# roles/kubespray_defaults/defaults/main/download.yml.

notes:
  - >
    Механизм контрольных сумм: для каждого скачиваемого файла определена переменная вида
    <компонент>_binary_checksum / <компонент>_archive_checksum, которая берёт значение из
    больших словарей *_checksums (roles/kubespray_defaults/vars/main/checksums.yml) по ключам
    [image_arch][<компонент>_version], например
    "{{ etcd_binary_checksums[image_arch][etcd_version] }}". Таблицы сумм пер-версия в
    справочник не включены — см. checksums.yml тега.
  - >
    Переменные *_image_repo / *_image_tag (например cilium_image_repo, coredns_image_tag)
    задают репозиторий и тег каждого контейнерного образа; все они строятся от базовых
    репозиториев (kube_image_repo, docker_image_repo, quay_image_repo, github_image_repo)
    и переменных версий, что позволяет перенаправить все образы на локальное зеркало.
    Пер-компонентные образы и версии в этот справочник не включаются — они относятся к
    справочникам компонентов.
  - >
    Особенность v2.28.1: пер-компонентные версии и таблицы поддерживаемых версий физически
    находятся в этом же файле download.yml (в v2.29.1 часть из них вынесена в vars/main.yml).
    Это переменные kube_major_version (строка 129) и словари pod_infra_supported_versions,
    etcd_supported_versions, crictl_supported_versions, crio_supported_versions,
    scheduler_plugins_supported_versions (+ snapshot_controller_supported_versions). Они
    определяют версии компонентов, а не поведение механизма загрузки, поэтому в подробный
    перечень ниже не включены — см. соответствующие справочники компонентов среза v2.28.1.
  - >
    Отличия v2.28.1 от v2.29.1 в области механизма загрузки: (1) unsafe_show_logs здесь
    задан простым значением false, а не выражением с lookup env CI_PROJECT_URL; (2)
    containerd_download_url НЕ содержит условия 'static-' (в v2.28.1 нет опции статического
    бинарника containerd в имени архива); (3) ОТСУТСТВУЮТ переменные kubeadm_image_repo,
    prometheus_operator_crds_download_url (добавлены в v2.29.1).
  - >
    Отличие v2.28.1 от v2.28.0: ArgoCD переведён на механизм download-по-checksum. В
    download.yml добавлены argocd_version (= первый ключ argocd_install_checksums.no_arch,
    в теге 2.14.5), argocd_install_url (raw-манифест install.yaml из репозитория argo-cd),
    argocd_install_checksum и элемент словаря downloads.argocd_install (file: true,
    dest {{ local_release_dir }}/argocd-install.yml, checksum {{ argocd_install_checksum }},
    enabled {{ argocd_enabled }}, группа kube_control_plane). Ранее (v2.28.0) манифест ArgoCD
    качался ролью kubernetes-apps/argocd без проверки контрольной суммы, а argocd_install_url
    жил в defaults роли argocd.

variables:
  # === Каталоги и кэш ===
  - name: local_release_dir
    default: "/tmp/releases"
    source_path: roles/kubespray_defaults/defaults/main/download.yml
    description: "Каталог на целевых узлах, куда складываются скачанные файлы (бинарники, архивы)."
    related: [download_cache_dir]

  - name: download_cache_dir
    default: "/tmp/kubespray_cache"
    source_path: roles/kubespray_defaults/defaults/main/download.yml
    description: "Каталог локального кэша загрузок на хосте-делегате/Ansible-раннере."
    related: [download_run_once, download_force_cache, download_keep_remote_cache]

  - name: download_keep_remote_cache
    default: "false"
    source_path: roles/kubespray_defaults/defaults/main/download.yml
    description: "Не удалять файлы удалённого кэша после использования (полезно только при разработке Kubespray)."
    related: [download_cache_dir]

  - name: download_force_cache
    default: "false"
    source_path: roles/kubespray_defaults/defaults/main/download.yml
    description: "При download_run_once=false принудительно раздавать файлы/образы из локального кэша и копировать скачанное на узлах обратно в кэш раннера."
    conditions: "Имеет смысл только при download_run_once: false"
    related: [download_run_once, download_cache_dir]

  # === Режимы работы механизма загрузки ===
  - name: skip_downloads
    default: "false"
    source_path: roles/kubespray_defaults/defaults/main/download.yml
    description: "Пропустить сами загрузки; переменные роли download при этом всё равно вычисляются."

  - name: skip_kubeadm_images
    default: "false"
    source_path: roles/kubespray_defaults/defaults/main/download.yml
    description: "Опционально пропустить загрузку образов, требуемых kubeadm."
    related: [kubeadm_images]

  - name: kubeadm_images
    default: "{}"
    source_path: roles/kubespray_defaults/defaults/main/download.yml
    description: "Словарь образов kubeadm; заполняется динамически задачами роли download."
    related: [skip_kubeadm_images]

  - name: download_run_once
    default: "false"
    source_path: roles/kubespray_defaults/defaults/main/download.yml
    description: "Скачивать каждый файл/образ только один раз (на хосте-делегате), затем раздавать на остальные узлы; не работает на Flatcar без download_localhost."
    related: [download_localhost, download_delegate, download_compress, download_cache_dir]

  - name: download_compress
    default: "1"
    source_path: roles/kubespray_defaults/defaults/main/download.yml
    description: "Уровень сжатия при передаче образов в режиме download_run_once (1 — самый быстрый)."
    conditions: "Используется в режиме download_run_once"
    related: [download_run_once]

  - name: download_container
    default: "true"
    source_path: roles/kubespray_defaults/defaults/main/download.yml
    description: "Скачивать контейнерные образы (а не только файлы)."

  - name: download_localhost
    default: "false"
    source_path: roles/kubespray_defaults/defaults/main/download.yml
    description: "В режиме download_run_once использовать localhost (Ansible-раннер) как хост загрузки; требует docker и sudo; иначе используется первый узел kube_control_plane."
    conditions: "Имеет смысл при download_run_once: true"
    related: [download_run_once, download_delegate]

  - name: download_always_pull
    default: "false"
    source_path: roles/kubespray_defaults/defaults/main/download.yml
    description: "Всегда делать pull образов; иначе наличие проверяется по тегу/дайджесту в локальном хранилище."

  - name: download_validate_certs
    default: "true"
    source_path: roles/kubespray_defaults/defaults/main/download.yml
    description: "Проверять SSL-сертификаты в get_url; отключение бывает нужно при https-прокси (баг ansible#32750), контрольные суммы проверяются в любом случае."

  - name: download_delegate
    default: "{% if download_localhost %}localhost{% else %}{{ groups['kube_control_plane'][0] }}{% endif %}"
    source_path: roles/kubespray_defaults/defaults/main/download.yml
    description: "Хост, на который делегируются загрузки в режиме download_run_once: localhost либо первый узел kube_control_plane."
    conditions: "Используется в режиме download_run_once"
    related: [download_localhost, download_run_once]

  - name: download_retries
    default: "4"
    source_path: roles/kubespray_defaults/defaults/main/download.yml
    description: "Число повторных попыток загрузки файлов и контейнерных образов."

  - name: unsafe_show_logs
    default: "false"
    source_path: roles/kubespray_defaults/defaults/main/download.yml
    description: "Показывать отладочный вывод задач загрузки (может содержать приватные данные); в v2.28.1 задан простым значением false, рекомендуется не включать в production (в v2.29.1 значение стало выражением с lookup env CI)."

  # === Команды работы с образами и выбор инструмента ===
  - name: docker_image_pull_command
    default: "{{ docker_bin_dir }}/docker pull"
    source_path: roles/kubespray_defaults/defaults/main/download.yml
    description: "Команда pull образа для container_manager=docker."

  - name: docker_image_info_command
    default: |-
      {{ docker_bin_dir }}/docker images -q | xargs -i {{ '{{' }} docker_bin_dir }}/docker inspect -f {% raw %}'{{ '{{' }} if .RepoTags }}{{ '{{' }} join .RepoTags ","}}{{ '{{' }} end }}{{ '{{' }} if .RepoDigests }},{{ '{{' }} join .RepoDigests ","}}{{ '{{' }} end }}' {% endraw %} {} | tr '\n' ','
    source_path: roles/kubespray_defaults/defaults/main/download.yml
    description: "Команда получения списка локальных образов для docker (двойная Jinja-обработка через raw/endraw)."

  - name: nerdctl_image_info_command
    default: "{{ bin_dir }}/nerdctl -n k8s.io images --format '{% raw %}{{ .Repository }}:{{ .Tag }}{% endraw %}' 2>/dev/null | grep -v ^:$ | tr '\\n' ','"
    source_path: roles/kubespray_defaults/defaults/main/download.yml
    description: "Команда получения списка локальных образов для containerd (через nerdctl, namespace k8s.io)."

  - name: nerdctl_image_pull_command
    default: "{{ bin_dir }}/nerdctl -n k8s.io pull --quiet"
    source_path: roles/kubespray_defaults/defaults/main/download.yml
    description: "Команда pull образа для container_manager=containerd (nerdctl)."

  - name: crictl_image_info_command
    default: "{{ bin_dir }}/crictl images --verbose | awk -F ': ' '/RepoTags|RepoDigests/ {print $2}' | tr '\\n' ','"
    source_path: roles/kubespray_defaults/defaults/main/download.yml
    description: "Команда получения списка локальных образов для CRI-O (crictl)."

  - name: crictl_image_pull_command
    default: "{{ bin_dir }}/crictl pull"
    source_path: roles/kubespray_defaults/defaults/main/download.yml
    description: "Команда pull образа для container_manager=crio (crictl)."

  - name: image_command_tool
    default: "{%- if container_manager == 'containerd' -%}nerdctl{%- elif container_manager == 'crio' -%}crictl{%- else -%}{{ container_manager }}{%- endif -%}"
    source_path: roles/kubespray_defaults/defaults/main/download.yml
    description: "Инструмент работы с образами, выбираемый по container_manager: nerdctl / crictl / docker."
    related: [image_pull_command, image_info_command]

  - name: image_command_tool_on_localhost
    default: "{{ image_command_tool }}"
    source_path: roles/kubespray_defaults/defaults/main/download.yml
    description: "Инструмент работы с образами на localhost (для download_localhost); по умолчанию тот же, что на узлах."
    related: [image_command_tool, download_localhost]

  - name: image_pull_command
    default: "{{ lookup('vars', image_command_tool + '_image_pull_command') }}"
    source_path: roles/kubespray_defaults/defaults/main/download.yml
    description: "Итоговая команда pull, разрешается в docker/nerdctl/crictl-вариант по image_command_tool."
    related: [image_command_tool]

  - name: image_info_command
    default: "{{ lookup('vars', image_command_tool + '_image_info_command') }}"
    source_path: roles/kubespray_defaults/defaults/main/download.yml
    description: "Итоговая команда получения информации об образах, разрешается по image_command_tool."
    related: [image_command_tool]

  - name: image_pull_command_on_localhost
    default: "{{ lookup('vars', image_command_tool_on_localhost + '_image_pull_command') }}"
    source_path: roles/kubespray_defaults/defaults/main/download.yml
    description: "Команда pull на localhost в режиме download_localhost."
    conditions: "Используется при download_localhost: true"
    related: [image_command_tool_on_localhost]

  - name: image_info_command_on_localhost
    default: "{{ lookup('vars', image_command_tool_on_localhost + '_image_info_command') }}"
    source_path: roles/kubespray_defaults/defaults/main/download.yml
    description: "Команда информации об образах на localhost в режиме download_localhost."
    conditions: "Используется при download_localhost: true"
    related: [image_command_tool_on_localhost]

  - name: image_arch
    default: "{{ host_architecture | default('amd64') }}"
    source_path: roles/kubespray_defaults/defaults/main/download.yml
    description: "Архитектура скачиваемых образов и бинарников (ключ в словарях checksums и в URL загрузок)."

  # === Базовые репозитории образов (точки подмены на зеркала) ===
  - name: gcr_image_repo
    default: "gcr.io"
    source_path: roles/kubespray_defaults/defaults/main/download.yml
    description: "Базовый адрес реестра gcr.io."

  - name: kube_image_repo
    default: "registry.k8s.io"
    source_path: roles/kubespray_defaults/defaults/main/download.yml
    description: "Базовый реестр образов Kubernetes (kube-proxy, pause, coredns, addons registry.k8s.io)."

  - name: docker_image_repo
    default: "docker.io"
    source_path: roles/kubespray_defaults/defaults/main/download.yml
    description: "Базовый адрес реестра Docker Hub."

  - name: quay_image_repo
    default: "quay.io"
    source_path: roles/kubespray_defaults/defaults/main/download.yml
    description: "Базовый адрес реестра quay.io (etcd, cilium, calico, metallb, cert-manager)."

  - name: github_image_repo
    default: "ghcr.io"
    source_path: roles/kubespray_defaults/defaults/main/download.yml
    description: "Базовый адрес реестра GitHub Container Registry (multus, kube-vip)."

  # === Базовые URL файловых загрузок (точки подмены для offline/зеркал) ===
  - name: github_url
    default: "https://github.com"
    source_path: roles/kubespray_defaults/defaults/main/download.yml
    description: "Базовый URL GitHub для загрузки релизных артефактов (etcd, cni, runc, containerd и др.)."

  - name: dl_k8s_io_url
    default: "https://dl.k8s.io"
    source_path: roles/kubespray_defaults/defaults/main/download.yml
    description: "Базовый URL загрузки бинарников Kubernetes (kubelet, kubectl, kubeadm)."

  - name: storage_googleapis_url
    default: "https://storage.googleapis.com"
    source_path: roles/kubespray_defaults/defaults/main/download.yml
    description: "Базовый URL Google Storage (cri-o, gVisor)."

  - name: get_helm_url
    default: "https://get.helm.sh"
    source_path: roles/kubespray_defaults/defaults/main/download.yml
    description: "Базовый URL загрузки Helm."

  # === URL конкретных загрузок (*_download_url) ===
  - name: kubelet_download_url
    default: "{{ dl_k8s_io_url }}/release/v{{ kube_version }}/bin/linux/{{ image_arch }}/kubelet"
    source_path: roles/kubespray_defaults/defaults/main/download.yml
    description: "URL бинарника kubelet."
    related: [dl_k8s_io_url, image_arch]

  - name: kubectl_download_url
    default: "{{ dl_k8s_io_url }}/release/v{{ kube_version }}/bin/linux/{{ image_arch }}/kubectl"
    source_path: roles/kubespray_defaults/defaults/main/download.yml
    description: "URL бинарника kubectl."
    related: [dl_k8s_io_url, image_arch]

  - name: kubeadm_download_url
    default: "{{ dl_k8s_io_url }}/release/v{{ kube_version }}/bin/linux/{{ image_arch }}/kubeadm"
    source_path: roles/kubespray_defaults/defaults/main/download.yml
    description: "URL бинарника kubeadm."
    related: [dl_k8s_io_url, image_arch]

  - name: etcd_download_url
    default: "{{ github_url }}/etcd-io/etcd/releases/download/v{{ etcd_version }}/etcd-v{{ etcd_version }}-linux-{{ image_arch }}.tar.gz"
    source_path: roles/kubespray_defaults/defaults/main/download.yml
    description: "URL архива etcd (для etcd_deployment_type=host)."

  - name: cni_download_url
    default: "{{ github_url }}/containernetworking/plugins/releases/download/v{{ cni_version }}/cni-plugins-linux-{{ image_arch }}-v{{ cni_version }}.tgz"
    source_path: roles/kubespray_defaults/defaults/main/download.yml
    description: "URL архива CNI-плагинов."

  - name: calicoctl_download_url
    default: "{{ github_url }}/projectcalico/calico/releases/download/v{{ calico_ctl_version }}/calicoctl-linux-{{ image_arch }}"
    source_path: roles/kubespray_defaults/defaults/main/download.yml
    description: "URL бинарника calicoctl."
    conditions: "Скачивается при kube_network_plugin == 'calico'"

  - name: calico_crds_download_url
    default: "{{ github_url }}/projectcalico/calico/archive/v{{ calico_version }}.tar.gz"
    source_path: roles/kubespray_defaults/defaults/main/download.yml
    description: "URL архива с CRD Calico."
    conditions: "Скачивается при kube_network_plugin == 'calico' и calico_datastore == 'kdd'"

  - name: ciliumcli_download_url
    default: "{{ github_url }}/cilium/cilium-cli/releases/download/v{{ cilium_cli_version }}/cilium-linux-{{ image_arch }}.tar.gz"
    source_path: roles/kubespray_defaults/defaults/main/download.yml
    description: "URL архива cilium-cli."
    conditions: "Скачивается при kube_network_plugin == 'cilium' или cilium_deploy_additionally"

  - name: crictl_download_url
    default: "{{ github_url }}/kubernetes-sigs/cri-tools/releases/download/v{{ crictl_version }}/crictl-v{{ crictl_version }}-{{ ansible_system | lower }}-{{ image_arch }}.tar.gz"
    source_path: roles/kubespray_defaults/defaults/main/download.yml
    description: "URL архива crictl."

  - name: crio_download_url
    default: "{{ storage_googleapis_url }}/cri-o/artifacts/cri-o.{{ image_arch }}.v{{ crio_version }}.tar.gz"
    source_path: roles/kubespray_defaults/defaults/main/download.yml
    description: "URL архива CRI-O."
    conditions: "Скачивается при container_manager == 'crio'"

  - name: helm_download_url
    default: "{{ get_helm_url }}/helm-v{{ helm_version }}-linux-{{ image_arch }}.tar.gz"
    source_path: roles/kubespray_defaults/defaults/main/download.yml
    description: "URL архива Helm."
    conditions: "Скачивается при helm_enabled"

  - name: runc_download_url
    default: "{{ github_url }}/opencontainers/runc/releases/download/v{{ runc_version }}/runc.{{ image_arch }}"
    source_path: roles/kubespray_defaults/defaults/main/download.yml
    description: "URL бинарника runc."
    conditions: "Скачивается при container_manager == 'containerd'"

  - name: crun_download_url
    default: "{{ github_url }}/containers/crun/releases/download/{{ crun_version }}/crun-{{ crun_version }}-linux-{{ image_arch }}"
    source_path: roles/kubespray_defaults/defaults/main/download.yml
    description: "URL бинарника crun."
    conditions: "Скачивается при crun_enabled"

  - name: youki_download_url
    default: "{{ github_url }}/youki-dev/youki/releases/download/v{{ youki_version }}/youki-{{ youki_version }}-{{ ansible_architecture }}-gnu.tar.gz"
    source_path: roles/kubespray_defaults/defaults/main/download.yml
    description: "URL архива youki."
    conditions: "Скачивается при youki_enabled"

  - name: kata_containers_download_url
    default: "{{ github_url }}/kata-containers/kata-containers/releases/download/{{ kata_containers_version }}/kata-static-{{ kata_containers_version }}-{{ image_arch }}.tar.xz"
    source_path: roles/kubespray_defaults/defaults/main/download.yml
    description: "URL статического архива Kata Containers."
    conditions: "Скачивается при kata_containers_enabled"

  - name: gvisor_runsc_download_url
    default: "{{ storage_googleapis_url }}/gvisor/releases/release/{{ gvisor_version }}/{{ ansible_architecture }}/runsc"
    source_path: roles/kubespray_defaults/defaults/main/download.yml
    description: "URL бинарника gVisor runsc (gVisor поддерживает только amd64, в ссылке — x86_64)."
    conditions: "Скачивается при gvisor_enabled"

  - name: gvisor_containerd_shim_runsc_download_url
    default: "{{ storage_googleapis_url }}/gvisor/releases/release/{{ gvisor_version }}/{{ ansible_architecture }}/containerd-shim-runsc-v1"
    source_path: roles/kubespray_defaults/defaults/main/download.yml
    description: "URL шима containerd-shim-runsc-v1 для gVisor."
    conditions: "Скачивается при gvisor_enabled"

  - name: nerdctl_download_url
    default: "{{ github_url }}/containerd/nerdctl/releases/download/v{{ nerdctl_version }}/nerdctl-{{ nerdctl_version }}-{{ ansible_system | lower }}-{{ image_arch }}.tar.gz"
    source_path: roles/kubespray_defaults/defaults/main/download.yml
    description: "URL архива nerdctl."
    conditions: "Скачивается при container_manager == 'containerd'"

  - name: containerd_download_url
    default: "{{ github_url }}/containerd/containerd/releases/download/v{{ containerd_version }}/containerd-{{ containerd_version }}-linux-{{ image_arch }}.tar.gz"
    source_path: roles/kubespray_defaults/defaults/main/download.yml
    description: "URL архива containerd. В v2.28.1 без условия 'static-' в имени архива (опция статического бинарника добавлена в v2.29.1)."
    conditions: "Скачивается при container_manager == 'containerd'"

  - name: cri_dockerd_download_url
    default: "{{ github_url }}/Mirantis/cri-dockerd/releases/download/v{{ cri_dockerd_version }}/cri-dockerd-{{ cri_dockerd_version }}.{{ image_arch }}.tgz"
    source_path: roles/kubespray_defaults/defaults/main/download.yml
    description: "URL архива cri-dockerd."
    conditions: "Скачивается при container_manager == 'docker'"

  - name: skopeo_download_url
    default: "{{ github_url }}/lework/skopeo-binary/releases/download/v{{ skopeo_version }}/skopeo-linux-{{ image_arch }}"
    source_path: roles/kubespray_defaults/defaults/main/download.yml
    description: "URL бинарника skopeo."
    conditions: "Скачивается при container_manager == 'crio'"

  - name: yq_download_url
    default: "{{ github_url }}/mikefarah/yq/releases/download/v{{ yq_version }}/yq_linux_{{ image_arch }}"
    source_path: roles/kubespray_defaults/defaults/main/download.yml
    description: "URL бинарника yq."
    conditions: "Скачивается при argocd_enabled"

  - name: argocd_install_url
    default: "https://raw.githubusercontent.com/argoproj/argo-cd/v{{ argocd_version }}/manifests/install.yaml"
    source_path: roles/kubespray_defaults/defaults/main/download.yml
    description: "Новая в v2.28.1 (перенесена из defaults роли argocd). URL raw-манифеста install.yaml ArgoCD выбранной версии; используется элементом downloads.argocd_install."
    conditions: "Скачивается при argocd_enabled"
    related: [argocd_version, argocd_install_checksum]

  - name: argocd_install_checksum
    default: "{{ argocd_install_checksums.no_arch[argocd_version] }}"
    source_path: roles/kubespray_defaults/defaults/main/download.yml
    description: "Новая в v2.28.1. Контрольная сумма манифеста ArgoCD install.yaml из argocd_install_checksums.no_arch по ключу argocd_version; обеспечивает проверку целостности при загрузке (ранее манифест качался без проверки)."
    conditions: "Скачивается при argocd_enabled"
    related: [argocd_install_url, argocd_version]

  - name: gateway_api_crds_download_url
    default: "{{ github_url }}/kubernetes-sigs/gateway-api/releases/download/v{{ gateway_api_version }}/{{ gateway_api_channel }}-install.yaml"
    source_path: roles/kubespray_defaults/defaults/main/download.yml
    description: "URL манифеста CRD Gateway API (канал standard/experimental)."
    conditions: "Скачивается при gateway_api_enabled"

  # === Словарь загрузок ===
  - name: downloads
    default: "<большой словарь из ~73 элементов: netcheck_server, netcheck_agent, etcd, cni, kubeadm, kubelet, kubectl, crictl, containerd, runc, cilium, coredns, helm, metrics_server, weave_kube, weave_npc, argocd_install (новый в v2.28.1) и др.>"
    source_path: roles/kubespray_defaults/defaults/main/download.yml
    description: "Главный реестр всех загрузок: для каждого элемента задаются enabled (условие), container/file, repo/tag или url/dest/checksum, unarchive, owner/mode и целевые группы хостов (groups)."
    related: [download_defaults, skip_downloads, download_container]

  - name: download_defaults
    default: "{container: false, file: false, repo: None, tag: None, enabled: false, dest: None, url: None, unarchive: false, owner: \"{{ kube_owner }}\", mode: None}"
    source_path: roles/kubespray_defaults/defaults/main/download.yml
    description: "Значения по умолчанию, которыми дополняется каждый элемент словаря downloads."
    related: [downloads]
