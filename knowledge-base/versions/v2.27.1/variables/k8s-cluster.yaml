---
project: kubespray
kubespray_version: v2.27.1
git_commit: 45140b5
source_type: code
source_paths:
  - roles/kubespray-defaults/defaults/main/main.yml
  - roles/kubernetes/control-plane/defaults/main/main.yml
  - roles/kubernetes/control-plane/defaults/main/kube-proxy.yml
  - roles/kubernetes/control-plane/defaults/main/kube-scheduler.yml
  - roles/kubernetes/control-plane/defaults/main/etcd.yml
  - roles/kubernetes/node/defaults/main.yml
  - roles/kubernetes/kubeadm/defaults/main.yml
  - roles/kubernetes/kubeadm_common/defaults/main.yml
  - roles/kubernetes/preinstall/defaults/main.yml
  - roles/kubernetes/client/defaults/main.yml
source_url: https://github.com/kubernetes-sigs/kubespray/tree/v2.27.1
retrieved_at: 2026-07-15
topics: [k8s-cluster, control-plane, kubelet, kube-proxy]
reliability: authoritative
notes: >
  Роль общих defaults в v2.27.1 называется roles/kubespray-defaults (с ДЕФИСОМ).
  Переменные доменов etcd, container runtime и Cilium вынесены в отдельные справочники
  (etcd.yaml, container-runtime.yaml, cni.yaml) и здесь по большей части не дублируются.
  Переменные addon-компонентов (helm, metrics-server, ingress, cert-manager, CSI, metallb,
  argocd и т.п.) относятся к addons.yaml (отдельный срез) и сюда не входят.
  Переменные загрузок (download.yml) — в download.yaml.
  В v2.27.1 для IP-стека используется enable_dual_stack_networks (переменных ipv4_stack /
  ipv6_stack, появившихся в v2.29.1, здесь НЕТ). Адреса узлов строятся на ip/access_ip/fallback_ip.
variables:
  # ==================================================================
  # roles/kubespray-defaults/defaults/main/main.yml — базовые и системные
  # ==================================================================
  - name: ansible_ssh_common_args
    default: "{% if 'bastion' in groups['all'] %} -o ProxyCommand='ssh ... {{ hostvars['bastion']['ansible_user'] }}@{{ hostvars['bastion']['ansible_host'] }} ...' {% endif %}"
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Автоматически добавляет SSH ProxyCommand через bastion-хост, если он есть в группе all."
    conditions: "Применяется только при наличии хоста bastion в группе all"

  - name: preinstall_selinux_state
    default: "permissive"
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Целевое состояние SELinux, выставляемое на этапе preinstall (permissive/disabled)."

  - name: is_fedora_coreos
    default: false
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Признак Fedora CoreOS; выставляется в true автоматически при обнаружении этой ОС."

  - name: ignore_assert_errors
    default: false
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    also_defined_in: roles/kubernetes/preinstall/defaults/main.yml
    description: "Разрешить продолжение деплоя при провале предварительных проверок (assert)."

  - name: bin_dir
    default: "/usr/local/bin"
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Каталог установки бинарных файлов (kubectl, kubelet и др.)."

  - name: docker_bin_dir
    default: "/usr/bin"
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Каталог бинарных файлов Docker."

  - name: retry_stagger
    default: 5
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Случайная задержка (сек) между повторами неудачных операций скачивания/загрузки."

  - name: epel_enabled
    default: false
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    also_defined_in: roles/kubernetes/preinstall/defaults/main.yml
    description: "Устанавливать репозиторий EPEL на CentOS/RHEL."

  - name: kube_vip_enabled
    default: false
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Включить kube-vip (виртуальный IP для API-сервера / сервисов LoadBalancer)."

  - name: nginx_config_dir
    default: "/etc/nginx"
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Каталог конфигурации локального nginx-прокси для API."

  - name: haproxy_config_dir
    default: "/etc/haproxy"
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Каталог конфигурации локального haproxy для API."

  - name: _host_architecture_groups
    default: {x86_64: amd64, aarch64: arm64, armv7l: arm}
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Служебная карта соответствия ansible_architecture именам архитектур артефактов."
    related: [host_architecture]

  - name: host_architecture
    default: "{%- if ansible_architecture in _host_architecture_groups -%}{{ _host_architecture_groups[ansible_architecture] }}{%- else -%}{{ ansible_architecture }}{%- endif -%}"
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Нормализованная архитектура хоста (amd64/arm64/arm) для выбора артефактов."
    related: [_host_architecture_groups]

  - name: _host_os_groups
    default: {Linux: linux, Darwin: darwin, Win32NT: windows}
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Служебная карта соответствия ansible_system именам ОС для артефактов."
    related: [host_os]

  - name: host_os
    default: "{%- if ansible_system in _host_os_groups -%}{{ _host_os_groups[ansible_system] }}{%- else -%}{{ ansible_system }}{%- endif -%}"
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Нормализованное имя ОС хоста (linux/darwin/windows) для выбора артефактов."
    related: [_host_os_groups]

  - name: sysctl_file_path
    default: "/etc/sysctl.d/99-sysctl.conf"
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    also_defined_in: roles/kubernetes/node/defaults/main.yml; roles/kubernetes/preinstall/defaults/main.yml
    description: "Файл для записи параметров sysctl."

  - name: additional_sysctl
    default: []
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Дополнительные параметры sysctl в формате списка словарей {name, value}."

  - name: system_upgrade
    default: false
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Выполнять обновление системных пакетов ОС при развёртывании."
    related: [system_upgrade_reboot]

  - name: system_upgrade_reboot
    default: "on-upgrade"
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Политика перезагрузки после обновления системы: on-upgrade, never или always."
    conditions: "Учитывается при system_upgrade: true"
    related: [system_upgrade]

  - name: krew_root_dir
    default: "/usr/local/krew"
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Корневой каталог установки krew."

  - name: weave_password
    default: "EnterPasswordHere"
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Пароль шифрования сети Weave (Weave не индексируется по охвату; переменная объявлена в общих defaults)."

  - name: ssl_ca_dirs
    default: "[ '/usr/share/ca-certificates' | '/etc/pki/tls','/etc/pki/ca-trust' — по семейству ОС ]"
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Каталоги системных CA-сертификатов в зависимости от семейства ОС (Flatcar/RedHat/Debian)."

  - name: proxy_env_defaults
    default: "{http_proxy, HTTP_PROXY, https_proxy, HTTPS_PROXY, no_proxy, NO_PROXY — из соответствующих переменных}"
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Базовый словарь переменных окружения прокси, наполняемый из http_proxy/https_proxy/no_proxy."
    related: [proxy_env]

  - name: proxy_env
    default: "{{ proxy_env_defaults | combine({'SSL_CERT_FILE': https_proxy_cert_file}) if https_proxy_cert_file is defined else proxy_env_defaults }}"
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Итоговый словарь прокси-окружения; при заданном https_proxy_cert_file добавляет SSL_CERT_FILE."
    related: [proxy_env_defaults]

  - name: proxy_disable_env
    default: "{ALL_PROXY, FTP_PROXY, HTTPS_PROXY, HTTP_PROXY, NO_PROXY и строчные — пустые}"
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Словарь для явного отключения прокси-переменных окружения (все пустые)."

  # --- версия Kubernetes и kubeadm ---
  - name: kube_version
    default: "v1.31.9"
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Устанавливаемая версия Kubernetes; в v2.27.1 задана явным литералом v1.31.9 (с префиксом v)."
    related: [kube_version_min_required, kube_major_version]

  - name: kube_version_min_required
    default: "v1.29.0"
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Минимально поддерживаемая версия Kubernetes; в v2.27.1 — v1.29.0."
    related: [kube_version]

  - name: kubeadm_config_api_version
    default: "{{ 'v1beta4' if kube_version is version('v1.31.0', '>=') else 'v1beta3' }}"
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Версия API конфигурации kubeadm: v1beta4 для K8s >= 1.31, иначе v1beta3."
    related: [kube_version]

  - name: kubeadm_init_timeout
    default: "300s"
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Тайм-аут kubeadm init на первом узле контрол-плейна."

  - name: kube_reserved_cgroups_for_service_slice
    default: "kube.slice"
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Имя systemd slice для cgroup зарезервированных ресурсов kube (в коде помечено TODO: remove)."
    related: [kube_reserved, kube_reserved_cgroups]

  - name: kubeadm_init_phases_skip_default
    default: ["addon/coredns"]
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Базовый список фаз kubeadm init, которые пропускаются всегда (CoreDNS ставит сам Kubespray)."
    related: [kubeadm_init_phases_skip]

  - name: kubeadm_init_phases_skip
    default: "addon/kube-proxy добавляется, когда CNI заменяет kube-proxy (cilium strict, calico eBPF, kube-router service proxy) или задан kube_proxy_remove; иначе — kubeadm_init_phases_skip_default"
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Итоговый список пропускаемых фаз kubeadm init."
    related: [kubeadm_init_phases_skip_default, kube_network_plugin]

  - name: kubeadm_join_phases_skip_default
    default: []
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Базовый список фаз kubeadm join, пропускаемых при присоединении нового узла."
    related: [kubeadm_join_phases_skip]

  - name: kubeadm_join_phases_skip
    default: "{{ kubeadm_join_phases_skip_default }}"
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Итоговый список пропускаемых фаз kubeadm join; для air-gapped может понадобиться ['preflight']."
    related: [kubeadm_join_phases_skip_default]

  - name: kubeadm_feature_gates
    default: []
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Feature gates самого kubeadm (список пар key=value)."

  # --- сеть кластера ---
  - name: kube_network_plugin
    default: "calico"
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Сетевой плагин CNI: calico, cilium, kube-ovn, weave, flannel, cni (generic) или cloud. Детально в справочнике проиндексирован только Cilium."
    related: [kube_network_plugin_multus, enable_network_policy]

  - name: kube_network_plugin_multus
    default: false
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Устанавливать Multus для подключения нескольких CNI к подам."
    related: [kube_network_plugin]

  - name: peer_with_calico_rr
    default: "{{ 'calico_rr' in groups and groups['calico_rr'] | length > 0 }}"
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Использовать Calico route reflectors; true при непустой группе calico_rr."
    conditions: "Актуально при kube_network_plugin: calico"

  - name: calico_datastore
    default: "kdd"
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Тип хранилища данных Calico: kdd (Kubernetes datastore) или etcd."
    conditions: "Актуально при kube_network_plugin: calico"

  - name: kube_service_addresses
    default: "10.233.0.0/18"
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Внутренняя IPv4-подсеть для сервисов Kubernetes; не должна пересекаться с инфраструктурой."
    related: [kube_service_addresses_ipv6]

  - name: kube_pods_subnet
    default: "10.233.64.0/18"
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Внутренняя IPv4-подсеть для подов; не должна использоваться в вашей сети."
    related: [kube_network_node_prefix]

  - name: kube_network_node_prefix
    default: 24
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Размер IPv4-подсети (длина префикса), выделяемой каждой ноде под IP подов; число подов также ограничено kubelet_max_pods."
    related: [kube_pods_subnet, kubelet_max_pods]

  - name: enable_dual_stack_networks
    default: false
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Включить двойной стек (IPv4+IPv6). В v2.27.1 это основной переключатель IPv6 (переменных ipv4_stack/ipv6_stack из v2.29.1здесь нет)."
    related: [kube_service_addresses_ipv6, kube_pods_subnet_ipv6]

  - name: kube_service_addresses_ipv6
    default: "fd85:ee78:d8a6:8607::1000/116"
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "IPv6-подсеть для сервисов (4096 адресов)."
    conditions: "Используется только при enable_dual_stack_networks: true"

  - name: kube_pods_subnet_ipv6
    default: "fd85:ee78:d8a6:8607::1:0000/112"
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "IPv6-подсеть для подов (256 нод по 254 пода)."
    conditions: "Используется только при enable_dual_stack_networks: true"
    related: [kube_network_node_prefix_ipv6]

  - name: kube_network_node_prefix_ipv6
    default: 120
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Длина IPv6-префикса, выделяемого каждой ноде под поды (254 пода на ноду)."
    conditions: "Используется только при enable_dual_stack_networks: true"

  - name: enable_network_policy
    default: true
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Включить поддержку NetworkPolicy в CNI."
    related: [kube_network_plugin]

  - name: typha_enabled
    default: false
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Развернуть Calico Typha (масштабирование datastore-подключений Calico)."
    conditions: "Актуально при kube_network_plugin: calico"

  - name: calico_apiserver_enabled
    default: false
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Развернуть Calico API server (управление ресурсами Calico через kubectl)."
    conditions: "Актуально при kube_network_plugin: calico"

  # --- DNS ---
  - name: cluster_name
    default: "cluster.local"
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Имя кластера Kubernetes, одновременно используется как DNS-домен кластера."
    related: [dns_domain]

  - name: ndots
    default: 2
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Значение ndots в resolv.conf хостов для разрешения поддоменов кластерного домена hostnet-подами."
    related: [docker_dns_options]

  - name: docker_dns_options
    default: ["ndots:{{ ndots }}", "timeout:2", "attempts:2"]
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Опции resolv.conf по умолчанию (ndots, timeout, attempts)."
    related: [ndots]

  - name: dns_mode
    default: "coredns"
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Режим кластерного DNS: coredns, coredns_dual, manual или none."
    related: [dns_servers, manual_dns_server]

  - name: enable_dns_autoscaler
    default: true
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Развернуть dns-autoscaler для автоматического масштабирования реплик CoreDNS."
    related: [dns_mode]

  - name: upstream_dns_servers
    default: []
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Внешние DNS-серверы: добавляются после кластерного DNS и используются CoreDNS как upstream для внекластерных запросов."

  - name: enable_nodelocaldns
    default: true
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Включить nodelocal DNS cache (локальный кеш DNS на каждой ноде)."
    related: [nodelocaldns_ip]

  - name: enable_nodelocaldns_secondary
    default: false
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Включить вторичный (secondary) daemonset nodelocaldns для обновлений без потери DNS."
    related: [enable_nodelocaldns, nodelocaldns_secondary_skew_seconds]

  - name: nodelocaldns_ip
    default: "169.254.25.10"
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Link-local IP-адрес, на котором слушает nodelocaldns."
    conditions: "Используется при enable_nodelocaldns: true"

  - name: nodelocaldns_health_port
    default: 9254
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Порт health-check основного nodelocaldns."

  - name: nodelocaldns_second_health_port
    default: 9256
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Порт health-check вторичного nodelocaldns."
    conditions: "Используется при enable_nodelocaldns_secondary: true"

  - name: nodelocaldns_bind_metrics_host_ip
    default: false
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Привязывать метрики nodelocaldns к IP хоста вместо nodelocaldns_ip."

  - name: nodelocaldns_secondary_skew_seconds
    default: 5
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Сдвиг в секундах между перезапусками основного и вторичного nodelocaldns."
    conditions: "Используется при enable_nodelocaldns_secondary: true"

  - name: manual_dns_server
    default: '""'
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "IP кастомного кластерного DNS-сервера для dns_mode: manual."
    conditions: "Используется при dns_mode: manual"

  - name: resolvconf_mode
    default: "host_resolvconf"
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Способ настройки resolv.conf хоста: host_resolvconf, docker_dns или none."

  - name: deploy_netchecker
    default: false
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Развернуть netchecker — HTTP-сервис проверки DNS-резолвинга в кластере."

  - name: skydns_server
    default: "{{ kube_service_addresses | ansible.utils.ipaddr('net') | ansible.utils.ipaddr(3) | ansible.utils.ipaddr('address') }}"
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "IP кластерного DNS-сервиса — третий адрес сервисной подсети (10.233.0.3 при значениях по умолчанию). В v2.27.1 берётся напрямую из kube_service_addresses."
    related: [kube_service_addresses, dns_servers]

  - name: skydns_server_secondary
    default: "{{ kube_service_addresses | ansible.utils.ipaddr('net') | ansible.utils.ipaddr(4) | ansible.utils.ipaddr('address') }}"
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "IP вторичного кластерного DNS для режима coredns_dual — четвёртый адрес сервисной подсети."
    conditions: "Используется при dns_mode: coredns_dual"

  - name: dns_domain
    default: "{{ cluster_name }}"
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "DNS-домен кластера (clusterDomain kubelet); по умолчанию равен cluster_name."
    related: [cluster_name]

  - name: docker_dns_search_domains
    default: ["default.svc.{{ dns_domain }}", "svc.{{ dns_domain }}"]
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Search-домены кластера, добавляемые в resolv.conf."
    related: [dns_domain, remove_default_searchdomains]

  - name: searchdomains
    default: []
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Дополнительные пользовательские search-домены для resolv.conf."

  - name: kube_dns_servers
    default:
      coredns: ["{{ skydns_server }}"]
      coredns_dual: "{{ [skydns_server] + [skydns_server_secondary] }}"
      manual: ["{{ manual_dns_server }}"]
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Карта списков кластерных DNS-серверов по режимам dns_mode."
    related: [dns_servers, dns_mode]

  - name: dns_servers
    default: "{{ kube_dns_servers[dns_mode] }}"
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Итоговый список кластерных DNS-серверов согласно выбранному dns_mode."
    related: [kube_dns_servers, dns_mode]

  - name: enable_coredns_k8s_external
    default: false
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Включить плагин k8s_external в CoreDNS (резолвинг внешних адресов сервисов)."
    related: [coredns_k8s_external_zone]

  - name: coredns_k8s_external_zone
    default: "k8s_external.local"
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "DNS-зона для плагина k8s_external CoreDNS."
    conditions: "Используется при enable_coredns_k8s_external: true"

  - name: enable_coredns_k8s_endpoint_pod_names
    default: false
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Включить опцию endpoint_pod_names в плагине kubernetes CoreDNS."

  # --- каталоги, сертификаты, kubectl ---
  - name: kube_config_dir
    default: "/etc/kubernetes"
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    also_defined_in: roles/kubernetes/preinstall/defaults/main.yml; roles/kubernetes/client/defaults/main.yml
    description: "Основной каталог конфигурации Kubernetes."

  - name: kube_script_dir
    default: "{{ bin_dir }}/kubernetes-scripts"
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Каталог вспомогательных скриптов Kubernetes."
    related: [bin_dir]

  - name: kube_manifest_dir
    default: "{{ kube_config_dir }}/manifests"
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Каталог статических манифестов подов (static pods)."
    related: [kube_config_dir]

  - name: kubectl
    default: "{{ bin_dir }}/kubectl --kubeconfig {{ kube_config_dir }}/admin.conf"
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Команда kubectl с admin-kubeconfig, используемая внутри ролей Kubespray."
    related: [bin_dir, kube_config_dir]

  - name: kube_cert_dir
    default: "{{ kube_config_dir }}/ssl"
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    also_defined_in: roles/kubernetes/preinstall/defaults/main.yml
    description: "Каталог сертификатов Kubernetes."
    related: [kube_config_dir]

  - name: kube_cert_compat_dir
    default: "/etc/kubernetes/pki"
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    also_defined_in: roles/kubernetes/preinstall/defaults/main.yml
    description: "Каталог сертификатов для совместимости с kubeadm (симлинк на kube_cert_dir)."
    related: [kube_cert_dir]

  - name: kube_token_dir
    default: "{{ kube_config_dir }}/tokens"
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Каталог хранения bearer-токенов."
    related: [kube_config_dir, kube_token_auth]

  - name: kube_owner
    default: "kube"
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    also_defined_in: roles/kubernetes/preinstall/defaults/main.yml
    description: "Пользователь-владелец установленных файлов кластера."

  - name: kube_cert_group
    default: "kube-cert"
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    also_defined_in: roles/kubernetes/preinstall/defaults/main.yml
    description: "Группа-владелец файлов сертификатов."

  - name: kube_external_ca_mode
    default: false
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Режим внешнего управления CA: отключает все задачи работы с сертификатами; сертификаты и kubeconfig должны быть подготовлены заранее."
    related: [kube_cert_dir, kube_config_dir]

  - name: kube_log_level
    default: 2
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Уровень логирования (-v) компонентов Kubernetes."

  - name: default_kubelet_config_dir
    default: "{{ kube_config_dir }}/dynamic_kubelet_dir"
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Каталог динамической конфигурации kubelet по умолчанию (если kubelet_config_dir не задан)."
    related: [kube_config_dir]

  - name: kube_override_hostname
    default: "{{ inventory_hostname }}"
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Имя ноды в кластере (--hostname-override); по умолчанию inventory_hostname."

  - name: credentials_dir
    default: "{{ inventory_dir }}/credentials"
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Каталог на хосте Ansible для хранения сгенерированных секретов (например, kube_encrypt_token)."
    related: [kube_encrypt_token]

  - name: kubeconfig_localhost
    default: false
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    also_defined_in: roles/kubernetes/client/defaults/main.yml
    description: "Скопировать admin-kubeconfig на хост Ansible в {{ inventory_dir }}/artifacts."
    related: [kubectl_localhost, artifacts_dir]

  - name: kubectl_localhost
    default: false
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    also_defined_in: roles/kubernetes/client/defaults/main.yml
    description: "Скачать kubectl на хост Ansible."
    related: [kubeconfig_localhost]

  - name: certificates_key_size
    default: 2048
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Размер ключа RSA для генерируемых сертификатов (скриптовая генерация etcd)."
    related: [cert_management]

  - name: certificates_duration
    default: 36500
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Срок действия генерируемых сертификатов в днях (скриптовая генерация etcd)."
    related: [cert_management]

  - name: k8s_image_pull_policy
    default: "IfNotPresent"
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "imagePullPolicy для контейнеров компонентов, разворачиваемых Kubespray."

  # --- API server и точки доступа ---
  - name: kube_api_anonymous_auth
    default: true
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Разрешить анонимную аутентификацию к API-серверу; false ломает деплой (см. PR #11016)."
    related: [remove_anonymous_access]

  - name: remove_anonymous_access
    default: false
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Удалить созданную kubeadm role binding для анонимных пользователей."
    related: [kube_api_anonymous_auth, kubeadm_use_file_discovery]

  - name: kube_apiserver_ip
    default: "{{ kube_service_addresses | ansible.utils.ipaddr('net') | ansible.utils.ipaddr(1) | ansible.utils.ipaddr('address') }}"
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Виртуальный кластерный IP API-сервера — первый адрес сервисной подсети (10.233.0.1 по умолчанию)."
    related: [kube_service_addresses]

  - name: kube_apiserver_bind_address
    default: "0.0.0.0"
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    also_defined_in: roles/kubernetes/control-plane/defaults/main/main.yml
    description: "Адрес, на котором слушает kube-apiserver (0.0.0.0 — все интерфейсы). В v2.27.1 значение по умолчанию 0.0.0.0 (в v2.29.1 — ::)."
    related: [kube_apiserver_port]

  - name: kube_apiserver_port
    default: 6443
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    also_defined_in: roles/kubernetes/client/defaults/main.yml
    description: "HTTPS-порт kube-apiserver (в client — строкой \"6443\")."

  - name: kube_api_aggregator_routing
    default: false
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Включить --enable-aggregator-routing у API-сервера (маршрутизация к сервисам агрегированного API)."

  - name: kube_profiling
    default: false
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Включить профилирование (/debug/pprof) у компонентов контрол-плейна."

  - name: kube_apiserver_count
    default: "{{ groups['kube_control_plane'] | length }}"
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Количество API-серверов — размер группы kube_control_plane."

  - name: kube_apiserver_address
    default: "{{ ip | default(hostvars[inventory_hostname]['fallback_ip']) }}"
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "IP-адрес API-сервера на данном хосте (ip хоста, иначе fallback_ip)."

  - name: kube_apiserver_access_address
    default: "{{ access_ip | default(kube_apiserver_address) }}"
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Адрес доступа к API-серверу данного хоста (access_ip, иначе kube_apiserver_address)."

  - name: first_kube_control_plane_address
    default: "{{ hostvars[groups['kube_control_plane'][0]]['access_ip'] | default(hostvars[groups['kube_control_plane'][0]]['ip'] | default(...fallback_ip)) }}"
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Адрес доступа к первому узлу контрол-плейна."

  - name: loadbalancer_apiserver_localhost
    default: "{{ loadbalancer_apiserver is not defined }}"
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Разворачивать локальный балансировщик (nginx/haproxy) на нодах для доступа к API; включён, если внешний loadbalancer_apiserver не задан."
    related: [loadbalancer_apiserver_type, kube_apiserver_endpoint]

  - name: loadbalancer_apiserver_type
    default: "nginx"
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Тип локального балансировщика API: nginx или haproxy."
    conditions: "Используется при loadbalancer_apiserver_localhost: true"
    related: [loadbalancer_apiserver_localhost, loadbalancer_apiserver_pod_name]

  - name: apiserver_loadbalancer_domain_name
    default: "lb-apiserver.kubernetes.local"
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Доменное имя внешнего балансировщика API-сервера."
    conditions: "Применяется только если задан внешний loadbalancer_apiserver"

  - name: kube_apiserver_global_endpoint
    default: "https://... (через внешний LB, localhost-LB или первый контрол-плейн; порты зашиты)"
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Глобальный endpoint API-сервера (через внешний LB, localhost-LB или первый контрол-плейн)."
    related: [kube_apiserver_endpoint, loadbalancer_apiserver_localhost]

  - name: kube_apiserver_endpoint
    default: "https://... (зависит от роли хоста и наличия балансировщика; для контрол-плейна bind 0.0.0.0 заменяется на 127.0.0.1)"
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Endpoint API-сервера для конкретного хоста (зависит от роли хоста и наличия балансировщика)."
    related: [kube_apiserver_global_endpoint]

  - name: kube_apiserver_client_cert
    default: "{{ kube_cert_dir }}/ca.crt"
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Путь к клиентскому сертификату (CA) для проверок доступа к API-серверу."
    related: [kube_cert_dir]

  - name: kube_apiserver_client_key
    default: "{{ kube_cert_dir }}/ca.key"
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Путь к клиентскому ключу (CA) для проверок доступа к API-серверу."
    related: [kube_cert_dir]

  # --- авторизация и feature gates ---
  - name: authorization_modes
    default: ["Node", "RBAC"]
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Режимы авторизации API-сервера (--authorization-mode); порядок важен; протестированы AlwaysAllow, AlwaysDeny, Node, RBAC. В v2.27.1 нет structured AuthorizationConfiguration из v2.29.1."
    related: [rbac_enabled]

  - name: rbac_enabled
    default: "{{ 'RBAC' in authorization_modes }}"
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Вычисляемый признак включённого RBAC (по authorization_modes). В v2.27.1 формула проще, чем в v2.29.1."
    related: [authorization_modes]

  - name: kube_feature_gates
    default: []
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Общие feature gates кластера (key=value), применяются ко всем компонентам."
    related: [kube_apiserver_feature_gates, kubelet_feature_gates]

  - name: kube_apiserver_feature_gates
    default: []
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Feature gates только для kube-apiserver."
    related: [kube_feature_gates]

  - name: kube_controller_feature_gates
    default: []
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Feature gates только для kube-controller-manager."
    related: [kube_feature_gates]

  - name: kube_scheduler_feature_gates
    default: []
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Feature gates только для kube-scheduler."
    related: [kube_feature_gates]

  - name: kube_proxy_feature_gates
    default: []
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Feature gates только для kube-proxy."
    related: [kube_feature_gates]

  - name: kubelet_feature_gates
    default: []
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Feature gates только для kubelet."
    related: [kube_feature_gates]

  # --- kubelet (глобальные параметры) ---
  - name: kubelet_fail_swap_on
    default: true
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Запрещать запуск kubelet при включённом swap (failSwapOn)."
    related: [kubelet_swap_behavior]

  - name: kubelet_swap_behavior
    default: "LimitedSwap"
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Поведение kubelet при разрешённом swap (memorySwap.swapBehavior)."
    conditions: "Актуально при kubelet_fail_swap_on: false"
    related: [kubelet_fail_swap_on]

  - name: kubelet_shutdown_grace_period
    default: "60s"
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Общий период graceful shutdown ноды (Graceful Node Shutdown)."
    related: [kubelet_shutdown_grace_period_critical_pods]

  - name: kubelet_shutdown_grace_period_critical_pods
    default: "20s"
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Часть периода graceful shutdown, зарезервированная для критических подов; должна быть меньше kubelet_shutdown_grace_period."
    related: [kubelet_shutdown_grace_period]

  - name: kubelet_authentication_token_webhook
    default: true
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Разрешить аутентификацию к HTTPS-endpoint kubelet по bearer-токенам API (webhook)."
    related: [kubelet_authorization_mode_webhook]

  - name: kubelet_authorization_mode_webhook
    default: true
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Авторизация доступа к kubelet API делегируется API-серверу (mode Webhook)."
    related: [kubelet_authentication_token_webhook]

  - name: kubelet_rotate_certificates
    default: true
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Автоматическая ротация клиентского сертификата kubelet при приближении срока истечения."
    related: [kubelet_rotate_server_certificates]

  - name: kubelet_rotate_server_certificates
    default: false
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Запрашивать и ротировать серверный сертификат kubelet через API (требует подписи CSR)."
    related: [kubelet_rotate_certificates]

  - name: kubelet_protect_kernel_defaults
    default: true
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "kubelet завершается с ошибкой, если параметры ядра отличаются от ожидаемых (protectKernelDefaults)."

  - name: kubelet_event_record_qps
    default: 50
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Параметр eventRecordQPS в kubelet-config.yaml; 0 — без ограничения событий в секунду."

  # --- kube-proxy (глобальные) ---
  - name: kube_proxy_mode
    default: "ipvs"
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Режим kube-proxy: ipvs или iptables. В v2.27.1 комментарий упоминает только iptables/ipvs (nftables добавлен позже)."
    related: [kube_proxy_scheduler, kube_proxy_ipvs_modules]

  - name: kube_proxy_nodeport_addresses
    default: "[{{ kube_proxy_nodeport_addresses_cidr }}] если задан, иначе []"
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    also_defined_in: roles/kubernetes/control-plane/defaults/main/kube-proxy.yml
    description: "Список CIDR-адресов для NodePort; пустой список — все локальные адреса; kube_proxy_nodeport_addresses_cidr — legacy-переменная."

  # --- cloud provider ---
  - name: cloud_provider
    default: '""'
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Облачный провайдер: только \"external\" или пустая строка, иначе проверка завершится ошибкой."
    related: [external_cloud_provider]

  - name: external_cloud_provider
    default: '""'
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Внешний cloud controller manager: openstack, vsphere, oci, huaweicloud, hcloud или manual. Значение 'manual' добавлено в v2.27.1 — оно НЕ устанавливает CCM (управление CCM берёт на себя оператор)."
    conditions: "Требует cloud_provider: external"
    related: [cloud_provider]

  - name: openstack_blockstorage_ignore_volume_az
    default: "{{ volume_cross_zone_attachment | default('false') }}"
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Игнорировать зону доступности томов Cinder (кросс-зонное подключение)."
    conditions: "Актуально при использовании OpenStack"

  - name: cinder_csi_ignore_volume_az
    default: "{{ volume_cross_zone_attachment | default('false') }}"
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Игнорировать зону доступности томов для Cinder CSI."
    conditions: "Актуально при cinder_csi_enabled: true"

  - name: openstack_lbaas_enabled
    default: false
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Включить OpenStack LBaaSv2 для сервисов типа LoadBalancer."

  - name: openstack_lbaas_create_monitor
    default: "yes"
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Создавать health-мониторы для OpenStack LBaaS."
    conditions: "Используется при openstack_lbaas_enabled: true"

  - name: openstack_lbaas_monitor_delay
    default: "1m"
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Интервал проверок монитора OpenStack LBaaS."
    conditions: "Используется при openstack_lbaas_enabled: true"

  - name: openstack_lbaas_monitor_timeout
    default: "30s"
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Тайм-аут проверок монитора OpenStack LBaaS."
    conditions: "Используется при openstack_lbaas_enabled: true"

  - name: openstack_lbaas_monitor_max_retries
    default: "3"
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Число повторов проверок монитора OpenStack LBaaS."
    conditions: "Используется при openstack_lbaas_enabled: true"

  - name: openstack_cacert
    default: "{{ lookup('env', 'OS_CACERT') }}"
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "CA-сертификат OpenStack, берётся из переменной окружения OS_CACERT."

  - name: external_openstack_lbaas_enabled
    default: true
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Включить LBaaS во внешнем OpenStack cloud controller."
    conditions: "Актуально при external_cloud_provider: openstack"

  - name: external_openstack_network_ipv6_disabled
    default: false
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Отключить IPv6 в настройках сети внешнего OpenStack CCM."
    conditions: "Актуально при external_cloud_provider: openstack"

  - name: external_openstack_network_internal_networks
    default: []
    source_path: roles/kubespray-defaults/defaults/main/main.yml
    description: "Список внутренних сетей для внешнего OpenStack CCM."
    conditions: "Актуально при external_cloud_provider: openstack"

  - name: external_openstack_network_public_networks
    default: []
