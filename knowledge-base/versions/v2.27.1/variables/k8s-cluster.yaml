  - name: kubelet_healthz_bind_address
    default: "127.0.0.1"
    source_path: roles/kubernetes/node/defaults/main.yml
    description: "Адрес привязки healthz kubelet."

  - name: kube_proxy_ipvs_modules
    default: ["ip_vs", "ip_vs_rr", "ip_vs_wrr", "ip_vs_sh", "ip_vs_wlc", "ip_vs_lc"]
    source_path: roles/kubernetes/node/defaults/main.yml
    description: "Модули ядра, загружаемые для kube_proxy_mode: ipvs."
    related: [kube_proxy_mode]

  - name: conntrack_modules
    default: ["nf_conntrack", "nf_conntrack_ipv4"]
    source_path: roles/kubernetes/node/defaults/main.yml
    description: "Модули conntrack; загружается первый успешно modprobe-нутый."

  - name: kubelet_tracing
    default: false
    source_path: roles/kubernetes/node/defaults/main.yml
    description: "Включить distributed tracing kubelet."
    related: [kubelet_tracing_endpoint]

  - name: kubelet_tracing_endpoint
    default: "0.0.0.0:4317"
    source_path: roles/kubernetes/node/defaults/main.yml
    description: "OTLP-endpoint трассировки kubelet."
    conditions: "Используется при kubelet_tracing: true"

  - name: kubelet_tracing_sampling_rate_per_million
    default: 100
    source_path: roles/kubernetes/node/defaults/main.yml
    description: "Частота сэмплирования трассировки kubelet (на миллион)."
    conditions: "Используется при kubelet_tracing: true"

  - name: kubelet_max_parallel_image_pulls
    default: 1
    source_path: roles/kubernetes/node/defaults/main.yml
    description: "Максимальное число параллельных pull образов (>1 включает параллелизм)."

  # ==================================================================
  # roles/kubernetes/kubeadm/defaults/main.yml
  # ==================================================================
  - name: kubeadm_join_timeout
    default: "120s"
    source_path: roles/kubernetes/kubeadm/defaults/main.yml
    description: "Тайм-аут kubeadm join при присоединении узла; должен быть больше discovery_timeout."
    related: [discovery_timeout]

  # (discovery_timeout и kubeadm_use_file_discovery из этой роли — см. записи выше с also_defined_in)

  # ==================================================================
  # roles/kubernetes/kubeadm_common/defaults/main.yml
  # ==================================================================
  - name: kubeadm_patches_dir
    default: "{{ kube_config_dir }}/patches"
    source_path: roles/kubernetes/kubeadm_common/defaults/main.yml
    description: "Каталог kubeadm-патчей на узле."
    related: [kubeadm_patches]

  - name: kubeadm_patches
    default: []
    source_path: roles/kubernetes/kubeadm_common/defaults/main.yml
    description: "Список kubeadm-патчей (target/type/patch) для компонентов контрол-плейна/kubelet."
    related: [kubeadm_patches_dir]

  - name: kubeadm_ignore_preflight_errors
    default: []
    source_path: roles/kubernetes/kubeadm_common/defaults/main.yml
    description: "Список ошибок preflight-проверок kubeadm, которые игнорируются."

  # ==================================================================
  # roles/kubernetes/preinstall/defaults/main.yml
  # ==================================================================
  - name: nameservers
    default: []
    source_path: roles/kubernetes/preinstall/defaults/main.yml
    description: "Дополнительные DNS-серверы для resolv.conf хоста."

  - name: cloud_resolver
    default: []
    source_path: roles/kubernetes/preinstall/defaults/main.yml
    description: "DNS-серверы облачного провайдера для резолвинга."

  - name: disable_host_nameservers
    default: false
    source_path: roles/kubernetes/preinstall/defaults/main.yml
    description: "Не использовать хостовые nameservers в конфигурации DNS."

  - name: dns_late
    default: false
    source_path: roles/kubernetes/preinstall/defaults/main.yml
    description: "Служебный флаг: применить изменения resolv.conf после запуска clusterDNS."

  - name: disable_ipv6_dns
    default: false
    source_path: roles/kubernetes/preinstall/defaults/main.yml
    description: "Отключить IPv6 в DNS (для сетей без IPv6)."

  - name: remove_default_searchdomains
    default: false
    source_path: roles/kubernetes/preinstall/defaults/main.yml
    description: "Удалить дефолтные search-домены кластера из resolv.conf."
    related: [docker_dns_search_domains]

  - name: kubelet_flexvolumes_plugins_dir
    default: "/usr/libexec/kubernetes/kubelet-plugins/volume/exec"
    source_path: roles/kubernetes/preinstall/defaults/main.yml
    description: "Каталог flexvolume-плагинов kubelet."

  - name: resolveconf_cloud_init_conf
    default: "/etc/resolveconf_cloud_init.conf"
    source_path: roles/kubernetes/preinstall/defaults/main.yml
    description: "Файл cloud-init для resolv.conf на Flatcar (hostnet-поды)."

  - name: populate_inventory_to_hosts_file
    default: true
    source_path: roles/kubernetes/preinstall/defaults/main.yml
    description: "Записывать все хосты инвентаря в /etc/hosts каждого узла."

  - name: populate_loadbalancer_apiserver_to_hosts_file
    default: true
    source_path: roles/kubernetes/preinstall/defaults/main.yml
    description: "Записывать FQDN API-балансировщика в /etc/hosts."

  - name: populate_localhost_entries_to_hosts_file
    default: true
    source_path: roles/kubernetes/preinstall/defaults/main.yml
    description: "Записывать localhost-записи в /etc/hosts."
    related: [etc_hosts_localhost_entries]

  - name: etc_hosts_localhost_entries
    default:
      127.0.0.1:
        expected: [localhost, localhost.localdomain]
      "::1":
        expected: [localhost6, localhost6.localdomain]
        unexpected: [localhost, localhost.localdomain]
    source_path: roles/kubernetes/preinstall/defaults/main.yml
    description: "Ожидаемые/нежелательные localhost-записи /etc/hosts."

  - name: minimal_node_memory_mb
    default: 1024
    source_path: roles/kubernetes/preinstall/defaults/main.yml
    description: "Минимальный объём RAM (МБ) рабочей ноды для проверок безопасности."

  - name: minimal_master_memory_mb
    default: 1500
    source_path: roles/kubernetes/preinstall/defaults/main.yml
    description: "Минимальный объём RAM (МБ) узла контрол-плейна для проверок безопасности."

  - name: pkg_install_retries
    default: 4
    source_path: roles/kubernetes/preinstall/defaults/main.yml
    description: "Число повторов задачи установки пакетов."

  - name: yum_repo_dir
    default: "/etc/yum.repos.d"
    source_path: roles/kubernetes/preinstall/defaults/main.yml
    also_defined_in: roles/container-engine/containerd-common/defaults/main.yml
    description: "Каталог yum-репозиториев (используется на этапе preinstall; продублирован в containerd-common)."

  - name: ping_access_ip
    default: true
    source_path: roles/kubernetes/preinstall/defaults/main.yml
    description: "Проверять доступность access_ip через ping; отключить, если файрвол блокирует ICMP."

  - name: ntp_enabled
    default: false
    source_path: roles/kubernetes/preinstall/defaults/main.yml
    description: "Запускать и включать в автозагрузку службу NTP (ntpd/chrony)."
    related: [ntp_package, ntp_manage_config]

  - name: ntp_package
    default: "{% if ansible_os_family == 'RedHat' %}chrony{% else %}ntp{% endif %}"
    source_path: roles/kubernetes/preinstall/defaults/main.yml
    description: "Пакет NTP: chrony на семействе RedHat, иначе ntp; допустимы ntp, ntpsec, chrony."
    related: [ntp_enabled, ntp_driftfile]

  - name: ntp_manage_config
    default: false
    source_path: roles/kubernetes/preinstall/defaults/main.yml
    description: "Управлять конфигурационным файлом NTP."
    related: [ntp_servers, ntp_restrict]

  - name: ntp_servers
    default: ["0.pool.ntp.org iburst", "1.pool.ntp.org iburst", "2.pool.ntp.org iburst", "3.pool.ntp.org iburst"]
    source_path: roles/kubernetes/preinstall/defaults/main.yml
    description: "Список NTP-серверов."
    conditions: "Используется при ntp_manage_config: true"

  - name: ntp_restrict
    default: ["127.0.0.1", "::1"]
    source_path: roles/kubernetes/preinstall/defaults/main.yml
    description: "Ограничение доступа к NTP этими хостами."
    conditions: "Используется при ntp_manage_config: true"

  - name: ntp_filter_interface
    default: false
    source_path: roles/kubernetes/preinstall/defaults/main.yml
    description: "Фильтровать интерфейсы NTP."

  - name: ntp_driftfile
    default: "{% if ntp_package == 'ntpsec' %}/var/lib/ntpsec/ntp.drift{% else %}/var/lib/ntp/ntp.drift{% endif %}"
    source_path: roles/kubernetes/preinstall/defaults/main.yml
    description: "Путь к NTP driftfile."
    conditions: "Используется при ntp_manage_config: true"

  - name: ntp_tinker_panic
    default: false
    source_path: roles/kubernetes/preinstall/defaults/main.yml
    description: "Опция tinker panic NTP."
    conditions: "Используется при ntp_manage_config: true"

  - name: ntp_force_sync_immediately
    default: false
    source_path: roles/kubernetes/preinstall/defaults/main.yml
    description: "Немедленная синхронизация времени сразу после установки NTP."

  - name: ntp_timezone
    default: '""'
    source_path: roles/kubernetes/preinstall/defaults/main.yml
    description: "Часовой пояс сервера; пусто — не менять."

  - name: supported_os_distributions
    default: "[RedHat, CentOS, Fedora, Ubuntu, Debian, Flatcar, ... openEuler]"
    source_path: roles/kubernetes/preinstall/defaults/main.yml
    description: "Список поддерживаемых дистрибутивов ОС (проверка на этапе preinstall)."

  - name: redhat_os_family_extensions
    default: ["UnionTech", "UniontechOS"]
    source_path: roles/kubernetes/preinstall/defaults/main.yml
    description: "Дистрибутивы, расширяющие семейство RedHat."

  - name: systemd_resolved_disable_stub_listener
    default: "{{ ansible_os_family in ['Flatcar', 'Flatcar Container Linux by Kinvolk'] }}"
    source_path: roles/kubernetes/preinstall/defaults/main.yml
    description: "Отключить DNSStubListener systemd-resolved (полезно при занятом 0.0.0.0:53)."

  - name: disable_fapolicyd
    default: true
    source_path: roles/kubernetes/preinstall/defaults/main.yml
    description: "Отключить службу fapolicyd (иначе установка CNI-плагина падает)."

  # ==================================================================
  # roles/kubernetes/client/defaults/main.yml
  # ==================================================================
  - name: kubeconfig_localhost_ansible_host
    default: false
    source_path: roles/kubernetes/client/defaults/main.yml
    description: "Копировать kubeconfig с указанием ansible_host в качестве адреса API."
    related: [kubeconfig_localhost]

  - name: artifacts_dir
    default: "{{ inventory_dir }}/artifacts"
    source_path: roles/kubernetes/client/defaults/main.yml
    description: "Каталог на хосте Ansible для kubeconfig и kubectl (при kubeconfig_localhost/kubectl_localhost)."
    related: [kubeconfig_localhost, kubectl_localhost]
