    description: "Включить Hubble (без установки relay); дублирующее объявление с тем же значением есть в download.yml (управляет скачиванием hubble-образов)."
    related: [cilium_enable_hubble_ui, cilium_hubble_metrics]

  - name: cilium_enable_hubble_ui
    default: "{{ cilium_enable_hubble }}"
    source_path: roles/network_plugin/cilium/defaults/main.yml
    description: "Включить Hubble UI; по умолчанию следует cilium_enable_hubble."
    related: [cilium_enable_hubble]

  - name: cilium_enable_hubble_metrics
    default: false
    source_path: roles/network_plugin/cilium/defaults/main.yml
    description: "Включить метрики Hubble."
    related: [cilium_hubble_metrics]

  - name: cilium_hubble_metrics
    default: "{}"
    source_path: roles/network_plugin/cilium/defaults/main.yml
    description: "Список метрик Hubble (dns, drop, tcp, flow, icmp, http); действует при cilium_enable_hubble_metrics: true."
    related: [cilium_enable_hubble_metrics]

  - name: cilium_hubble_install
    default: false
    source_path: roles/network_plugin/cilium/defaults/main.yml
    description: "Установить Hubble (relay/UI и сопутствующие ресурсы)."
    related: [cilium_hubble_tls_generate]

  - name: cilium_hubble_tls_generate
    default: false
    source_path: roles/network_plugin/cilium/defaults/main.yml
    description: "Автогенерация сертификатов Hubble mTLS при cilium_hubble_install: true."
    related: [cilium_certgen_args]

  # --- cilium: ipam ---
  - name: cilium_ipam_mode
    default: "cluster-pool"
    source_path: roles/network_plugin/cilium/defaults/main.yml
    description: "Режим IPAM Cilium; по умолчанию Cluster Scope (cluster-pool)."
    related: [cilium_pool_cidr, cilium_pool_mask_size]

  - name: cilium_pool_cidr
    default: "не определена (закомментирована; default kube_pods_subnet)"
    source_path: roles/network_plugin/cilium/defaults/main.yml
    description: "IPv4 CIDR пула подов для cluster-pool IPAM; по умолчанию берётся kube_pods_subnet."
    related: [kube_pods_subnet, cilium_pool_mask_size]

  - name: cilium_pool_cidr_ipv6
    default: "не определена (закомментирована; default kube_pods_subnet_ipv6)"
    source_path: roles/network_plugin/cilium/defaults/main.yml
    description: "IPv6 CIDR пула подов для cluster-pool IPAM; по умолчанию kube_pods_subnet_ipv6."
    conditions: "Осмысленно при cilium_enable_ipv6: true"
    related: [kube_pods_subnet_ipv6, cilium_enable_ipv6]

  - name: cilium_pool_mask_size
    default: "не определена (закомментирована; default kube_network_node_prefix)"
    source_path: roles/network_plugin/cilium/defaults/main.yml
    description: "Размер префикса, выделяемого узлу из IPv4 пула; по умолчанию kube_network_node_prefix."
    related: [cilium_pool_cidr]

  - name: cilium_pool_mask_size_ipv6
    default: "не определена (закомментирована; default kube_network_node_prefix_ipv6)"
    source_path: roles/network_plugin/cilium/defaults/main.yml
    description: "Размер префикса, выделяемого узлу из IPv6 пула; по умолчанию kube_network_node_prefix_ipv6."
    related: [cilium_pool_cidr_ipv6]

  # --- cilium: agent ---
  - name: cilium_agent_custom_args
    default: "[]"
    source_path: roles/network_plugin/cilium/defaults/main.yml
    description: "Дополнительные аргументы агента Cilium."

  - name: cilium_agent_extra_volumes
    default: "[]"
    source_path: roles/network_plugin/cilium/defaults/main.yml
    description: "Дополнительные тома пода агента."
    related: [cilium_agent_extra_volume_mounts]

  - name: cilium_agent_extra_volume_mounts
    default: "[]"
    source_path: roles/network_plugin/cilium/defaults/main.yml
    description: "Дополнительные точки монтирования агента."
    related: [cilium_agent_extra_volumes]

  - name: cilium_agent_extra_env_vars
    default: "[]"
    source_path: roles/network_plugin/cilium/defaults/main.yml
    description: "Дополнительные переменные окружения агента."

  # --- cilium: operator ---
  - name: cilium_operator_replicas
    default: "2"
    source_path: roles/network_plugin/cilium/defaults/main.yml
    description: "Число реплик cilium-operator."

  - name: cilium_operator_api_serve_addr
    default: '"127.0.0.1:9234"'
    source_path: roles/network_plugin/cilium/defaults/main.yml
    description: "Адрес health-check API cilium-operator."

  - name: cilium_config_extra_vars
    default: "{}"
    source_path: roles/network_plugin/cilium/defaults/main.yml
    description: "Словарь дополнительных ключей cilium-config."

  - name: cilium_operator_extra_volumes
    default: "[]"
    source_path: roles/network_plugin/cilium/defaults/main.yml
    description: "Дополнительные тома пода cilium-operator."
    related: [cilium_operator_extra_volume_mounts]

  - name: cilium_operator_extra_volume_mounts
    default: "[]"
    source_path: roles/network_plugin/cilium/defaults/main.yml
    description: "Дополнительные точки монтирования cilium-operator."
    related: [cilium_operator_extra_volumes]

  - name: cilium_operator_custom_args
    default: "[]"
    source_path: roles/network_plugin/cilium/defaults/main.yml
    description: "Дополнительные аргументы cilium-operator."

  # --- cilium: кластер, CNI, cgroup ---
  - name: cilium_cluster_name
    default: "default"
    source_path: roles/network_plugin/cilium/defaults/main.yml
    description: "Имя кластера для Cluster Mesh; актуально при построении меша кластеров."
    related: [cilium_certgen_args]

  - name: cilium_cni_exclusive
    default: true
    source_path: roles/network_plugin/cilium/defaults/main.yml
    description: "Cilium забирает /etc/cni/net.d в единоличное владение, переименовывая чужие CNI-конфигурации в *.cilium_bak (Cilium >= 1.10)."

  - name: cilium_cni_log_file
    default: '"/var/run/cilium/cilium-cni.log"'
    source_path: roles/network_plugin/cilium/defaults/main.yml
    description: "Файл лога CNI-плагина Cilium (ротация 7 дней, Cilium >= 1.12); пустое значение отключает логирование в файл."

  - name: cilium_cgroup_auto_mount
    default: true
    source_path: roles/network_plugin/cilium/defaults/main.yml
    description: "Автоматически монтировать cgroup2 в cilium_cgroup_host_root (Cilium >= 1.11)."
    related: [cilium_cgroup_host_root]

  - name: cilium_cgroup_host_root
    default: '"/run/cilium/cgroupv2"'
    source_path: roles/network_plugin/cilium/defaults/main.yml
    description: "Точка монтирования cgroup2 на хосте для Cilium."
    related: [cilium_cgroup_auto_mount]

  - name: cilium_bpf_map_dynamic_size_ratio
    default: '"0.0025"'
    source_path: roles/network_plugin/cilium/defaults/main.yml
    description: "Доля системной памяти (0.0–1.0) для динамического сайзинга BPF-карт CT/NAT/policy."

  # --- cilium: identity / monitor / bpf ---
  - name: cilium_enable_remote_node_identity
    default: true
    source_path: roles/network_plugin/cilium/defaults/main.yml
    description: "Использование identity remote-node."

  - name: cilium_enable_well_known_identities
    default: false
    source_path: roles/network_plugin/cilium/defaults/main.yml
    description: "Использование well-known identities."

  - name: cilium_monitor_aggregation
    default: "medium"
    source_path: roles/network_plugin/cilium/defaults/main.yml
    description: "Уровень агрегации monitor-событий: none/low/medium/maximum."
    related: [cilium_monitor_aggregation_flags]

  - name: cilium_monitor_aggregation_flags
    default: '"all"'
    source_path: roles/network_plugin/cilium/defaults/main.yml
    description: "TCP-флаги, порождающие monitor-уведомления при агрегации medium+."
    related: [cilium_monitor_aggregation]

  - name: cilium_enable_bpf_clock_probe
    default: true
    source_path: roles/network_plugin/cilium/defaults/main.yml
    description: "Проверка источника часов для BPF."

  # --- cilium: BGP ---
  - name: cilium_enable_bgp_control_plane
    default: false
    source_path: roles/network_plugin/cilium/defaults/main.yml
    description: "Включить BGP Control Plane Cilium."
    related: [cilium_bgp_cluster_configs, cilium_bgp_peering_policies]

  - name: cilium_bgp_cluster_configs
    default: "[]"
    source_path: roles/network_plugin/cilium/defaults/main.yml
    description: "Список CiliumBGPClusterConfig (новый bgpv2 API, Cilium >= 1.16)."
    related: [cilium_enable_bgp_control_plane, cilium_bgp_peer_configs]

  - name: cilium_bgp_peer_configs
    default: "[]"
    source_path: roles/network_plugin/cilium/defaults/main.yml
    description: "Список CiliumBGPPeerConfig (bgpv2 API)."
    related: [cilium_bgp_cluster_configs]

  - name: cilium_bgp_advertisements
    default: "[]"
    source_path: roles/network_plugin/cilium/defaults/main.yml
    description: "Список CiliumBGPAdvertisement (bgpv2 API)."
    related: [cilium_bgp_node_config_overrides]

  - name: cilium_bgp_node_config_overrides
    default: "[]"
    source_path: roles/network_plugin/cilium/defaults/main.yml
    description: "Список CiliumBGPNodeConfigOverride (bgpv2 API)."
    related: [cilium_bgp_advertisements]

  - name: cilium_bgp_peering_policies
    default: "[]"
    source_path: roles/network_plugin/cilium/defaults/main.yml
    description: "Список CiliumBGPPeeringPolicy (устаревший BGP API, Cilium < 1.16)."
    related: [cilium_enable_bgp_control_plane]

  # --- cilium: CNP / restart / метрики ---
  - name: cilium_disable_cnp_status_updates
    default: true
    source_path: roles/network_plugin/cilium/defaults/main.yml
    description: "Отключение обновлений статуса CiliumNetworkPolicy."

  - name: cilium_rolling_restart_wait_retries_count
    default: "30"
    source_path: roles/network_plugin/cilium/defaults/main.yml
    description: "Число повторов ожидания готовности DaemonSet Cilium."
    related: [cilium_rolling_restart_wait_retries_delay_seconds]

  - name: cilium_rolling_restart_wait_retries_delay_seconds
    default: "10"
    source_path: roles/network_plugin/cilium/defaults/main.yml
    description: "Пауза (секунды) между повторами ожидания готовности Cilium."
    related: [cilium_rolling_restart_wait_retries_count]

  - name: cilium_enable_prometheus
    default: false
    source_path: roles/network_plugin/cilium/defaults/main.yml
    description: "Экспорт метрик Prometheus агентом/оператором Cilium."
    related: [cilium_agent_scrape_port]

  - name: cilium_agent_scrape_port
    default: "{{ cilium_version | regex_replace('v') is version('1.12', '>=') | ternary('9962', '9090') }}"
    source_path: roles/network_plugin/cilium/defaults/main.yml
    description: "Порт метрик агента Cilium; вычисляется по версии (9962 для >= 1.12, иначе 9090 — порт изменён upstream в 1.12)."
    related: [cilium_enable_prometheus]

  - name: cilium_operator_scrape_port
    default: "{{ cilium_version | regex_replace('v') is version('1.12', '>=') | ternary('9963', '6942') }}"
    source_path: roles/network_plugin/cilium/defaults/main.yml
    description: "Порт метрик cilium-operator; вычисляется по версии (9963 для >= 1.12, иначе 6942)."
    related: [cilium_enable_prometheus]

  - name: cilium_hubble_scrape_port
    default: "{{ cilium_version | regex_replace('v') is version('1.12', '>=') | ternary('9965', '9091') }}"
    source_path: roles/network_plugin/cilium/defaults/main.yml
    description: "Порт метрик Hubble; вычисляется по версии (9965 для >= 1.12, иначе 9091)."
    related: [cilium_enable_prometheus]

  # --- cilium: certgen / доступ ---
  - name: cilium_certgen_args
    default: "{cilium-namespace: kube-system, ca-reuse-secret: true, ca-secret-name: hubble-ca-secret, ca-generate: true, ca-validity-duration: 94608000s, hubble-server-cert-generate: true, hubble-server-cert-common-name: '*.{{ cilium_cluster_name }}.hubble-grpc.cilium.io', hubble-server-cert-validity-duration: 94608000s, hubble-server-cert-secret-name: hubble-server-certs, hubble-relay-client-cert-generate: true, hubble-relay-client-cert-common-name: '*.{{ cilium_cluster_name }}.hubble-grpc.cilium.io', hubble-relay-client-cert-validity-duration: 94608000s, hubble-relay-client-cert-secret-name: hubble-relay-client-certs, hubble-relay-server-cert-generate: false}"
    source_path: roles/network_plugin/cilium/defaults/main.yml
    description: "Аргументы certgen для генерации сертификатов hubble mTLS."
    related: [cilium_hubble_tls_generate, cilium_cluster_name]

  - name: cilium_clusterrole_rules_operator_extra_vars
    default: "[]"
    source_path: roles/network_plugin/cilium/defaults/main.yml
    description: "Дополнительные правила ClusterRole для cilium-operator (apiGroups/resources/verbs)."

  # --- cilium: политики и безопасность ---
  - name: cilium_enable_host_firewall
    default: false
    source_path: roles/network_plugin/cilium/defaults/main.yml
    description: "Включить host firewall Cilium — сетевые политики для самих узлов."
    related: [cilium_policy_audit_mode]

  - name: cilium_policy_audit_mode
    default: false
    source_path: roles/network_plugin/cilium/defaults/main.yml
    description: "Аудит-режим сетевых политик: нарушения логируются, но не блокируются."
    related: [cilium_enable_host_firewall]

  # --- cilium: portmap ---
  - name: cilium_enable_portmap
    default: false
    source_path: roles/network_plugin/cilium/defaults/main.yml
    description: "Развернуть CNI-конфигурацию portmap для поддержки hostPort mappings."
