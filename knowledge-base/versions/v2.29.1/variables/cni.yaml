---
project: kubespray
kubespray_version: v2.29.1
git_commit: 0c6a295
source_type: code
source_paths:
  - roles/network_plugin/cilium/defaults/main.yml
  - roles/network_plugin/cilium/tasks/check.yml
  - roles/network_plugin/cilium/tasks/install.yml
  - roles/network_plugin/cilium/tasks/apply.yml
  - roles/network_plugin/cilium/templates/values.yaml.j2
  - roles/network_plugin/cni/defaults/main.yml
  - roles/network_plugin/meta/main.yml
  - roles/kubespray_defaults/defaults/main/main.yml
  - roles/kubespray_defaults/defaults/main/download.yml
source_url: https://github.com/kubernetes-sigs/kubespray/tree/v2.29.1
retrieved_at: 2026-07-14
topics:
  - cni
  - cilium
  - network
reliability: authoritative
scope_note: >
  Из сетевых плагинов тега проиндексирован только Cilium (ограничение проекта).
  Переменные ядра (kube_network_plugin и смежные) даны выборочно — полный
  справочник ядра см. в k8s-cluster.yaml.

variables:
  # --- выбор CNI (roles/kubespray_defaults; полный справочник ядра — k8s-cluster.yaml) ---
  - name: kube_network_plugin
    default: "calico"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Выбор сетевого плагина кластера (cilium, calico, kube-ovn, flannel, cni — generic, cloud); управляет подключением ролей в roles/network_plugin/meta/main.yml."
    related: [kube_network_plugin_multus, cilium_deploy_additionally]

  - name: kube_network_plugin_multus
    default: "false"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Дополнительно развернуть Multus поверх основного CNI (роль network_plugin/multus; сама роль не проиндексирована)."
    related: [kube_network_plugin]

  - name: cilium_deploy_additionally
    default: "false"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Развернуть Cilium даже если kube_network_plugin != cilium (например, рядом с другим CNI для замены kube-proxy)."
    conditions: "Влияет на условие подключения роли network_plugin/cilium в meta/main.yml и на enabled образов cilium в download.yml"
    related: [kube_network_plugin, cilium_kube_proxy_replacement]

  # --- generic CNI (roles/network_plugin/cni + версии cni-plugins) ---
  - name: cni_bin_owner
    default: "{{ kube_owner }}"
    source_path: roles/network_plugin/cni/defaults/main.yml
    description: "Владелец каталога /opt/cni/bin и распакованных CNI-бинарников."
    conditions: "Роль network_plugin/cni выполняется при kube_network_plugin != 'none'"
    related: [kube_owner]

  - name: cni_version
    default: "{{ (cni_binary_checksums['amd64'] | dict2items)[0].key }}"
    source_path: roles/kubespray_defaults/defaults/main/download.yml
    description: "Версия containernetworking/plugins (базовые CNI-бинарники); вычисляется из списка контрольных сумм."
    related: [cni_download_url, cni_binary_checksum]

  - name: cni_download_url
    default: "{{ github_url }}/containernetworking/plugins/releases/download/v{{ cni_version }}/cni-plugins-linux-{{ image_arch }}-v{{ cni_version }}.tgz"
    source_path: roles/kubespray_defaults/defaults/main/download.yml
    description: "URL загрузки архива базовых CNI-плагинов."
    related: [cni_version]

  - name: cni_binary_checksum
    default: "{{ cni_binary_checksums[image_arch][cni_version] }}"
    source_path: roles/kubespray_defaults/defaults/main/download.yml
    description: "Контрольная сумма архива CNI-плагинов для выбранной архитектуры."
    related: [cni_version]

  # --- cilium: версии и образы (roles/kubespray_defaults/defaults/main/download.yml) ---
  - name: cilium_version
    default: "1.18.4"
    source_path: roles/kubespray_defaults/defaults/main/download.yml
    description: "Версия Cilium; используется в тегах образов и в команде `cilium install/upgrade --version`."
    related: [cilium_image_tag, cilium_min_version_required]

  - name: cilium_cli_version
    default: "{{ (ciliumcli_binary_checksums['amd64'] | dict2items)[0].key }}"
    source_path: roles/kubespray_defaults/defaults/main/download.yml
    description: "Версия cilium-cli (утилита, которой роль устанавливает/обновляет Cilium); берётся из списка контрольных сумм."
    related: [ciliumcli_download_url]

  - name: ciliumcli_download_url
    default: "{{ github_url }}/cilium/cilium-cli/releases/download/v{{ cilium_cli_version }}/cilium-linux-{{ image_arch }}.tar.gz"
    source_path: roles/kubespray_defaults/defaults/main/download.yml
    description: "URL загрузки бинарника cilium-cli."
    related: [cilium_cli_version]

  - name: ciliumcli_binary_checksum
    default: "{{ ciliumcli_binary_checksums[image_arch][cilium_cli_version] }}"
    source_path: roles/kubespray_defaults/defaults/main/download.yml
    description: "Контрольная сумма бинарника cilium-cli для выбранной архитектуры."
    related: [cilium_cli_version]

  - name: cilium_image_repo
    default: "{{ quay_image_repo }}/cilium/cilium"
    source_path: roles/kubespray_defaults/defaults/main/download.yml
    description: "Репозиторий образа агента Cilium."
    related: [cilium_image_tag]

  - name: cilium_image_tag
    default: "v{{ cilium_version }}"
    source_path: roles/kubespray_defaults/defaults/main/download.yml
    description: "Тег образа агента Cilium."
    related: [cilium_version]

  - name: cilium_operator_image_repo
    default: "{{ quay_image_repo }}/cilium/operator"
    source_path: roles/kubespray_defaults/defaults/main/download.yml
    description: "Репозиторий образа cilium-operator."
    related: [cilium_operator_image_tag]

  - name: cilium_operator_image_tag
    default: "v{{ cilium_version }}"
    source_path: roles/kubespray_defaults/defaults/main/download.yml
    description: "Тег образа cilium-operator."
    related: [cilium_version]

  - name: cilium_hubble_relay_image_repo
    default: "{{ quay_image_repo }}/cilium/hubble-relay"
    source_path: roles/kubespray_defaults/defaults/main/download.yml
    description: "Репозиторий образа hubble-relay."
    related: [cilium_enable_hubble]

  - name: cilium_hubble_relay_image_tag
    default: "v{{ cilium_version }}"
    source_path: roles/kubespray_defaults/defaults/main/download.yml
    description: "Тег образа hubble-relay."
    related: [cilium_version]

  - name: cilium_hubble_certgen_image_repo
    default: "{{ quay_image_repo }}/cilium/certgen"
    source_path: roles/kubespray_defaults/defaults/main/download.yml
    description: "Репозиторий образа certgen (генерация сертификатов Hubble); прокидывается в helm-values (certgen.image)."
    related: [cilium_hubble_certgen_image_tag]

  - name: cilium_hubble_certgen_image_tag
    default: "v0.2.4"
    source_path: roles/kubespray_defaults/defaults/main/download.yml
    description: "Тег образа certgen."

  - name: cilium_hubble_ui_image_repo
    default: "{{ quay_image_repo }}/cilium/hubble-ui"
    source_path: roles/kubespray_defaults/defaults/main/download.yml
    description: "Репозиторий образа фронтенда Hubble UI."
    related: [cilium_enable_hubble_ui]

  - name: cilium_hubble_ui_image_tag
    default: "v0.13.3"
    source_path: roles/kubespray_defaults/defaults/main/download.yml
    description: "Тег образа фронтенда Hubble UI."

  - name: cilium_hubble_ui_backend_image_repo
    default: "{{ quay_image_repo }}/cilium/hubble-ui-backend"
    source_path: roles/kubespray_defaults/defaults/main/download.yml
    description: "Репозиторий образа бэкенда Hubble UI."
    related: [cilium_enable_hubble_ui]

  - name: cilium_hubble_ui_backend_image_tag
    default: "v0.13.3"
    source_path: roles/kubespray_defaults/defaults/main/download.yml
    description: "Тег образа бэкенда Hubble UI."

  - name: cilium_hubble_envoy_image_repo
    default: "{{ quay_image_repo }}/cilium/cilium-envoy"
    source_path: roles/kubespray_defaults/defaults/main/download.yml
    description: "Репозиторий образа cilium-envoy; прокидывается в helm-values (envoy.image)."
    related: [cilium_hubble_envoy_image_tag]

  - name: cilium_hubble_envoy_image_tag
    default: "v1.34.10-1762597008-ff7ae7d623be00078865cff1b0672cc5d9bfc6d5"
    source_path: roles/kubespray_defaults/defaults/main/download.yml
    description: "Тег образа cilium-envoy."

  # --- cilium: базовые (roles/network_plugin/cilium/defaults/main.yml) ---
  - name: cilium_min_version_required
    default: "1.15"
    source_path: roles/network_plugin/cilium/defaults/main.yml
    description: "Минимально допустимая версия Cilium; проверяется assert-ом в tasks/check.yml."
    related: [cilium_version]

  - name: cilium_remove_old_resources
    default: "false"
    source_path: roles/network_plugin/cilium/defaults/main.yml
    description: "Удалить старые ресурсы Cilium прежнего (до-helm) способа развёртывания (tasks/remove_old_resources.yml); в коде помечено «remove after 2.29 released»."
    conditions: "Задачи remove_old_resources.yml выполняются только при true"

  - name: cilium_debug
    default: "false"
    source_path: roles/network_plugin/cilium/defaults/main.yml
    description: "Режим отладочного логирования агента Cilium (helm-value debug.enabled)."

  - name: cilium_mtu
    default: "\"0\""
    source_path: roles/network_plugin/cilium/defaults/main.yml
    description: "MTU для Cilium (helm-value MTU); 0 — автоопределение."

  - name: cilium_enable_ipv4
    default: "{{ ipv4_stack }}"
    source_path: roles/network_plugin/cilium/defaults/main.yml
    description: "Включить IPv4 в Cilium; по умолчанию следует общекластерному ipv4_stack."
    related: [ipv4_stack]

  - name: cilium_enable_ipv6
    default: "{{ ipv6_stack }}"
    source_path: roles/network_plugin/cilium/defaults/main.yml
    description: "Включить IPv6 в Cilium; по умолчанию следует общекластерному ipv6_stack."
    related: [ipv6_stack, cilium_pool_cidr_ipv6]

  - name: cilium_l2announcements
    default: "false"
    source_path: roles/network_plugin/cilium/defaults/main.yml
    description: "Включить L2-анонсы Cilium (замена MetalLB для LoadBalancer-сервисов в L2-сети)."
    related: [cilium_loadbalancer_ip_pools]

  - name: cilium_agent_health_port
    default: "\"9879\""
    source_path: roles/network_plugin/cilium/defaults/main.yml
    description: "Порт health-check API агента Cilium (helm-value healthPort)."

  - name: cilium_identity_allocation_mode
    default: "crd"
    source_path: roles/network_plugin/cilium/defaults/main.yml
    description: "Режим хранения identity Cilium: crd (CRD в Kubernetes) или kvstore (etcd); проверяется assert-ом в check.yml."
    conditions: "При kvstore задачи install.yml создают cilium_cert_dir и линкуют etcd-сертификаты"
    related: [cilium_cert_dir, kube_etcd_cacert_file, kube_etcd_cert_file, kube_etcd_key_file]

  - name: cilium_cert_dir
    default: "/etc/cilium/certs"
    source_path: roles/network_plugin/cilium/defaults/main.yml
    description: "Каталог для etcd-сертификатов Cilium на узле."
    conditions: "Используется только при cilium_identity_allocation_mode == \"kvstore\""
    related: [cilium_identity_allocation_mode]

  - name: kube_etcd_cacert_file
    default: "ca.pem"
    source_path: roles/network_plugin/cilium/defaults/main.yml
    description: "Имя файла CA-сертификата etcd, который линкуется в cilium_cert_dir/ca_cert.crt."
    conditions: "Используется только при cilium_identity_allocation_mode == \"kvstore\""
    related: [cilium_identity_allocation_mode, cilium_cert_dir]

  - name: kube_etcd_cert_file
    default: "node-{{ inventory_hostname }}.pem"
    source_path: roles/network_plugin/cilium/defaults/main.yml
    description: "Имя файла клиентского сертификата etcd для узла (линк в cilium_cert_dir/cert.crt)."
    conditions: "Используется только при cilium_identity_allocation_mode == \"kvstore\""
    related: [cilium_identity_allocation_mode]

  - name: kube_etcd_key_file
    default: "node-{{ inventory_hostname }}-key.pem"
    source_path: roles/network_plugin/cilium/defaults/main.yml
    description: "Имя файла клиентского ключа etcd для узла (линк в cilium_cert_dir/key.pem)."
    conditions: "Используется только при cilium_identity_allocation_mode == \"kvstore\""
    related: [cilium_identity_allocation_mode]

  - name: cilium_cluster_id
    default: "0"
    source_path: roles/network_plugin/cilium/defaults/main.yml
    description: "Уникальный ID кластера (0–255) для Cluster Mesh; 0 — если Cluster Mesh не используется; валидируется в check.yml."
    related: [cilium_cluster_name]

  - name: cilium_cluster_name
    default: "default"
    source_path: roles/network_plugin/cilium/defaults/main.yml
    description: "Имя кластера для Cluster Mesh; «default» недопустимо при cilium_cluster_id != 0."
    related: [cilium_cluster_id, cilium_certgen_args]

  - name: cilium_cni_exclusive
    default: "true"
    source_path: roles/network_plugin/cilium/defaults/main.yml
    description: "Cilium забирает /etc/cni/net.d в единоличное владение, переименовывая чужие CNI-конфигурации в *.cilium_bak."

  - name: cilium_cni_log_file
    default: "\"/var/run/cilium/cilium-cni.log\""
    source_path: roles/network_plugin/cilium/defaults/main.yml
    description: "Файл лога CNI-плагина Cilium (ротация 7 дней); пустое значение отключает логирование в файл."

  - name: cilium_cgroup_auto_mount
    default: "true"
    source_path: roles/network_plugin/cilium/defaults/main.yml
    description: "Автоматически монтировать cgroup2 в cilium_cgroup_host_root на хосте и в поде агента."
    related: [cilium_cgroup_host_root]

  - name: cilium_cgroup_host_root
    default: "\"/run/cilium/cgroupv2\""
    source_path: roles/network_plugin/cilium/defaults/main.yml
    description: "Точка монтирования cgroup2 на хосте для Cilium."
    related: [cilium_cgroup_auto_mount]

  - name: cilium_rolling_restart_wait_retries_count
    default: "30"
    source_path: roles/network_plugin/cilium/defaults/main.yml
    description: "Число повторов ожидания готовности DaemonSet Cilium и появления CRD в tasks/apply.yml."
    related: [cilium_rolling_restart_wait_retries_delay_seconds]

  - name: cilium_rolling_restart_wait_retries_delay_seconds
    default: "10"
    source_path: roles/network_plugin/cilium/defaults/main.yml
    description: "Пауза (секунды) между повторами ожидания готовности Cilium."
    related: [cilium_rolling_restart_wait_retries_count]

  - name: cilium_install_extra_flags
    default: "\"\""
    source_path: roles/network_plugin/cilium/defaults/main.yml
    description: "Дополнительные флаги команды `cilium install/upgrade` (tasks/apply.yml)."

  - name: cilium_extra_values
    default: "{}"
    source_path: roles/network_plugin/cilium/defaults/main.yml
    description: "Произвольные helm-values Cilium; рендерятся в cilium-extra-values.yaml и передаются вторым -f в `cilium install/upgrade`."
    related: [cilium_config_extra_vars]

  - name: cilium_config_extra_vars
    default: "{}"
    source_path: roles/network_plugin/cilium/defaults/main.yml
    description: "Словарь дополнительных ключей cilium-config (helm-value extraConfig)."
    related: [cilium_extra_values]

  # --- cilium: маршрутизация / туннелирование ---
  - name: cilium_tunnel_mode
    default: "vxlan"
    source_path: roles/network_plugin/cilium/defaults/main.yml
    description: "Режим overlay-сети (helm-value tunnelProtocol); disabled — нативная маршрутизация."
    related: [cilium_auto_direct_node_routes, cilium_native_routing_cidr]

  - name: cilium_auto_direct_node_routes
    default: "false"
    source_path: roles/network_plugin/cilium/defaults/main.yml
    description: "Автоматически анонсировать маршруты подов между узлами без туннеля; требует L2-связности узлов и cilium_tunnel_mode: disabled."
    conditions: "Осмысленно только при cilium_tunnel_mode == disabled и заданном cilium_native_routing_cidr"
    related: [cilium_tunnel_mode, cilium_native_routing_cidr]

  - name: cilium_native_routing_cidr
    default: "\"\""
    source_path: roles/network_plugin/cilium/defaults/main.yml
    description: "IPv4 CIDR нативной маршрутизации: трафик в этот диапазон отдаётся сетевому стеку Linux без SNAT (helm-value ipv4NativeRoutingCIDR)."
    related: [cilium_auto_direct_node_routes, cilium_native_routing_cidr_ipv6]

  - name: cilium_native_routing_cidr_ipv6
    default: "\"\""
    source_path: roles/network_plugin/cilium/defaults/main.yml
    description: "IPv6 CIDR нативной маршрутизации (helm-value ipv6NativeRoutingCIDR)."
    related: [cilium_native_routing_cidr]

  - name: cilium_enable_host_legacy_routing
    default: "false"
    source_path: roles/network_plugin/cilium/defaults/main.yml
    description: "Направлять трафик direct-routing через хостовый стек (true) вместо более быстрого пути в BPF в обход netfilter (false)."

  # --- cilium: kube-proxy replacement / балансировка ---
  - name: cilium_kube_proxy_replacement
    default: "false"
    source_path: roles/network_plugin/cilium/defaults/main.yml
    description: "Замена kube-proxy средствами Cilium (helm-value kubeProxyReplacement); при true kubeadm пропускает фазу addon/kube-proxy."
    conditions: "Влияет на kubeadm_init_phases_skip в roles/kubespray_defaults/defaults/main/main.yml при kube_network_plugin == 'cilium'"
    related: [kube_network_plugin, cilium_deploy_additionally, cilium_dns_proxy_enable_transparent_mode]

  - name: cilium_loadbalancer_mode
    default: "snat"
    source_path: roles/network_plugin/cilium/defaults/main.yml
    description: "Режим балансировщика Cilium: snat, dsr или hybrid (helm-value loadBalancer.mode)."
    related: [cilium_kube_proxy_replacement]

  - name: cilium_loadbalancer_ip_pools
    default: "[]"
    source_path: roles/network_plugin/cilium/defaults/main.yml
    description: "Список пулов CiliumLoadBalancerIPPool; при непустом списке apply.yml ждёт CRD и применяет манифесты."
    conditions: "Манифесты применяются только при length > 0"
    related: [cilium_l2announcements]

  - name: cilium_dns_proxy_enable_transparent_mode
    default: "(не задана; закомментирована в defaults)"
    source_path: roles/network_plugin/cilium/defaults/main.yml
    description: "Явное управление dnsProxy.enableTransparentMode; false позволяет избежать конфликта dnsProxy с nodelocaldns при kube-proxy replacement."
    conditions: "Попадает в helm-values только если переменная определена"
    related: [cilium_kube_proxy_replacement]

  # --- cilium: BGP ---
  - name: cilium_enable_bgp_control_plane
    default: "false"
    source_path: roles/network_plugin/cilium/defaults/main.yml
    description: "Включить BGP Control Plane Cilium (helm-value bgpControlPlane.enabled)."
    related: [cilium_bgp_cluster_configs, cilium_bgp_peering_policies]

  - name: cilium_bgp_cluster_configs
    default: "[]"
    source_path: roles/network_plugin/cilium/defaults/main.yml
    description: "Список CiliumBGPClusterConfig (новый bgpv2 API, Cilium >= 1.16); применяется в apply.yml при непустом списке."
    conditions: "Манифесты применяются только при length > 0"
    related: [cilium_enable_bgp_control_plane, cilium_bgp_peer_configs]

  - name: cilium_bgp_peer_configs
    default: "[]"
    source_path: roles/network_plugin/cilium/defaults/main.yml
    description: "Список CiliumBGPPeerConfig (bgpv2 API); применяется в apply.yml при непустом списке."
    conditions: "Манифесты применяются только при length > 0"
    related: [cilium_bgp_cluster_configs]

  - name: cilium_bgp_advertisements
    default: "[]"
    source_path: roles/network_plugin/cilium/defaults/main.yml
    description: "Список CiliumBGPAdvertisement (bgpv2 API); применяется в apply.yml при непустом списке."
    conditions: "Манифесты применяются только при length > 0"
    related: [cilium_bgp_cluster_configs, cilium_bgp_node_config_overrides]

  - name: cilium_bgp_node_config_overrides
    default: "[]"
    source_path: roles/network_plugin/cilium/defaults/main.yml
    description: "Список CiliumBGPNodeConfigOverride (bgpv2 API); применяется в apply.yml при непустом списке."
    conditions: "Манифесты применяются при length > 0 (ожидание CRD в коде завязано на cilium_bgp_advertisements)"
    related: [cilium_bgp_advertisements]

  - name: cilium_bgp_peering_policies
    default: "[]"
    source_path: roles/network_plugin/cilium/defaults/main.yml
    description: "Список CiliumBGPPeeringPolicy (устаревший BGP API, Cilium < 1.16); применяется в apply.yml при непустом списке."
    conditions: "Манифесты применяются только при length > 0"
    related: [cilium_enable_bgp_control_plane]

  # --- cilium: шифрование ---
  - name: cilium_encryption_enabled
    default: "false"
    source_path: roles/network_plugin/cilium/defaults/main.yml
