project: kubespray
kubespray_version: v2.29.1
git_commit: 0c6a295
source_type: inventory
source_paths:
  - inventory/sample/group_vars/all/all.yml
  - inventory/sample/group_vars/all/etcd.yml
  - inventory/sample/group_vars/all/containerd.yml
  - inventory/sample/group_vars/all/cri-o.yml
  - inventory/sample/group_vars/all/docker.yml
  - inventory/sample/group_vars/all/coreos.yml
  - inventory/sample/group_vars/all/offline.yml
source_url: https://github.com/kubernetes-sigs/kubespray/tree/v2.29.1
retrieved_at: 2026-07-14
topics: [inventory, all, offline]
reliability: authoritative
# Примечания:
# - is_set: true  — переменная в sample-инвентаре РАСКОММЕНТИРОВАНА (реально задаётся).
# - is_set: false — переменная присутствует лишь как ЗАКОММЕНТИРОВАННЫЙ пример.
# - sample_value приводится дословно из файла; для закомментированных примеров это
#   значение справа от "# <var>:". Пустое значение (например "cloud_provider:") — commented-empty.
# - Расхождения sample vs roles/*/defaults вынесены в discrepancies (см. отдельный отчёт этапа).
variables:

  # --- all.yml ---

  - name: bin_dir
    sample_value: "/usr/local/bin"
    is_set: true
    source_path: inventory/sample/group_vars/all/all.yml
    comment: "Каталог установки бинарников (kubectl, kubelet и др.); совпадает с defaults."

  - name: access_ip
    sample_value: "1.1.1.1"
    is_set: false
    source_path: inventory/sample/group_vars/all/all.yml
    comment: "Адрес, по которому другие ноды обращаются к данной ноде (актуально в AWS/GCP с публичным IP)."

  - name: loadbalancer_apiserver
    sample_value: "{address: 1.2.3.4, port: 1234}"
    is_set: false
    source_path: inventory/sample/group_vars/all/all.yml
    comment: "Конфигурация ВНЕШНЕГО балансировщика apiserver (адрес и порт); задаётся вместе с apiserver_loadbalancer_domain_name."

  - name: loadbalancer_apiserver_localhost
    sample_value: "true"
    is_set: false
    source_path: inventory/sample/group_vars/all/all.yml
    comment: "Разворачивать локальный балансировщик apiserver (nginx/haproxy) на нодах; в defaults вычисляется как {{ loadbalancer_apiserver is not defined }}."

  - name: loadbalancer_apiserver_type
    sample_value: "nginx"
    is_set: false
    source_path: inventory/sample/group_vars/all/all.yml
    comment: "Тип локального балансировщика apiserver: допустимо nginx или haproxy."

  - name: loadbalancer_apiserver_port
    sample_value: "6443"
    is_set: true
    source_path: inventory/sample/group_vars/all/all.yml
    comment: "Порт локального балансировщика apiserver; должен быть 6443."

  - name: loadbalancer_apiserver_healthcheck_port
    sample_value: "8081"
    is_set: true
    source_path: inventory/sample/group_vars/all/all.yml
    comment: "Порт liveness-проверки прокси nginx (если переменная задана — включает healthcheck)."

  - name: disable_host_nameservers
    sample_value: "false"
    is_set: false
    source_path: inventory/sample/group_vars/all/all.yml
    comment: "Не включать nameserver'ы хоста в nameserverentries на стадии dns_late (использовать с осторожностью)."

  - name: upstream_dns_servers
    sample_value: "[8.8.8.8, 8.8.4.4]"
    is_set: false
    source_path: inventory/sample/group_vars/all/all.yml
    comment: "Внешние (upstream) DNS-серверы для CoreDNS; в defaults пустой список []."

  - name: cloud_provider
    sample_value: "commented-empty"
    is_set: false
    source_path: inventory/sample/group_vars/all/all.yml
    comment: "Облачный провайдер; после K8s v1.31 допустимо только 'external' либо пусто."

  - name: external_cloud_provider
    sample_value: "commented-empty"
    is_set: false
    source_path: inventory/sample/group_vars/all/all.yml
    comment: "Внешний cloud controller manager: openstack, vsphere, oci, huaweicloud, hcloud, manual (требует cloud_provider: external)."

  - name: http_proxy
    sample_value: '""'
    is_set: false
    source_path: inventory/sample/group_vars/all/all.yml
    comment: "HTTP-прокси для пакетного менеджера и container engine."

  - name: https_proxy
    sample_value: '""'
    is_set: false
    source_path: inventory/sample/group_vars/all/all.yml
    comment: "HTTPS-прокси для пакетного менеджера и container engine."

  - name: https_proxy_cert_file
    sample_value: '""'
    is_set: false
    source_path: inventory/sample/group_vars/all/all.yml
    comment: "Путь к кастомному CA-сертификату для https_proxy."

  - name: no_proxy
    sample_value: '""'
    is_set: false
    source_path: inventory/sample/group_vars/all/all.yml
    comment: "Список адресов, исключаемых из проксирования (перед изменением см. roles/kubespray_defaults/defaults/main/main.yml)."

  - name: download_validate_certs
    sample_value: "False"
    is_set: false
    source_path: inventory/sample/group_vars/all/all.yml
    comment: "Проверять SSL-сертификаты в get_url; отключение нужно при баге ansible#32750 (контрольные суммы всё равно проверяются)."

  - name: additional_no_proxy
    sample_value: '""'
    is_set: false
    source_path: inventory/sample/group_vars/all/all.yml
    comment: "Дополнительные ресурсы, исключаемые из проксирования сверх нод кластера."

  - name: skip_http_proxy_on_os_packages
    sample_value: "false"
    is_set: false
    source_path: inventory/sample/group_vars/all/all.yml
    comment: "Не прописывать прокси в /etc/yum.conf и /etc/apt/apt.conf, оставаясь за http_proxy для остального."

  - name: no_proxy_exclude_workers
    sample_value: "false"
    is_set: true
    source_path: inventory/sample/group_vars/all/all.yml
    comment: "Включать в no_proxy только контрол-плейн (true), чтобы не рестартовать docker на всех нодах при добавлении/удалении воркеров."

  - name: cert_management
    sample_value: "script"
    is_set: false
    source_path: inventory/sample/group_vars/all/all.yml
    comment: "Способ генерации сертификатов: script или none (none — если сертификаты предоставляются вручную)."

  - name: ignore_assert_errors
    sample_value: "false"
    is_set: false
    source_path: inventory/sample/group_vars/all/all.yml
    comment: "Разрешить продолжение деплоя при провале pre-checks (assert)."

  - name: kube_read_only_port
    sample_value: "10255"
    is_set: false
    source_path: inventory/sample/group_vars/all/all.yml
    comment: "Read-only порт kubelet без аутентификации/авторизации; раскомментировать для включения."

  - name: download_container
    sample_value: "true"
    is_set: false
    source_path: inventory/sample/group_vars/all/all.yml
    comment: "Скачивать и кэшировать контейнерные образы."

  - name: deploy_container_engine
    sample_value: "true"
    is_set: false
    source_path: inventory/sample/group_vars/all/all.yml
    comment: "Устанавливать container engine; false — если движок ставится вручную."

  - name: rh_subscription_username
    sample_value: '""'
    is_set: false
    source_path: inventory/sample/group_vars/all/all.yml
    comment: "Имя пользователя подписки RHEL."

  - name: rh_subscription_password
    sample_value: '""'
    is_set: false
    source_path: inventory/sample/group_vars/all/all.yml
    comment: "Пароль подписки RHEL."

  - name: rh_subscription_org_id
    sample_value: '""'
    is_set: false
    source_path: inventory/sample/group_vars/all/all.yml
    comment: "Organization ID подписки RHEL."

  - name: rh_subscription_activation_key
    sample_value: '""'
    is_set: false
    source_path: inventory/sample/group_vars/all/all.yml
    comment: "Activation Key подписки RHEL."

  - name: rh_subscription_usage
    sample_value: "Development"
    is_set: false
    source_path: inventory/sample/group_vars/all/all.yml
    comment: "Назначение (usage) подписки RHEL."

  - name: rh_subscription_role
    sample_value: "Red Hat Enterprise Server"
    is_set: false
    source_path: inventory/sample/group_vars/all/all.yml
    comment: "Роль (role) подписки RHEL."

  - name: rh_subscription_sla
    sample_value: "Self-Support"
    is_set: false
    source_path: inventory/sample/group_vars/all/all.yml
    comment: "Уровень SLA подписки RHEL."

  - name: ping_access_ip
    sample_value: "true"
    is_set: false
    source_path: inventory/sample/group_vars/all/all.yml
    comment: "Проверять доступность access_ip через ping; false — если файрвол блокирует ICMP."

  - name: sysctl_file_path
    sample_value: "/etc/sysctl.d/99-sysctl.conf"
    is_set: false
    source_path: inventory/sample/group_vars/all/all.yml
    comment: "Файл, в который записываются параметры sysctl."

  - name: sysctl_ignore_unknown_keys
    sample_value: "false"
    is_set: false
    source_path: inventory/sample/group_vars/all/all.yml
    comment: "Игнорировать ошибки sysctl о неизвестных ключах ядра."

  - name: kube_webhook_token_auth
    sample_value: "false"
    is_set: true
    source_path: inventory/sample/group_vars/all/all.yml
    comment: "Включить webhook token authentication на apiserver."

  - name: kube_webhook_token_auth_url_skip_tls_verify
    sample_value: "false"
    is_set: true
    source_path: inventory/sample/group_vars/all/all.yml
    comment: "Пропускать проверку TLS для URL webhook token auth."

  - name: kube_webhook_token_auth_url
    sample_value: "https://..."
    is_set: false
    source_path: inventory/sample/group_vars/all/all.yml
    comment: "URL сервиса webhook token authentication."

  - name: kube_webhook_token_auth_ca_data
    sample_value: '"LS0t..."'
    is_set: false
    source_path: inventory/sample/group_vars/all/all.yml
    comment: "base64-строка CA-сертификата webhook'а."

  - name: ntp_enabled
    sample_value: "false"
    is_set: true
    source_path: inventory/sample/group_vars/all/all.yml
    comment: "Запускать и включать в автозагрузку службу NTP (ntpd/chrony); совпадает с defaults."

  - name: ntp_manage_config
    sample_value: "false"
    is_set: true
    source_path: inventory/sample/group_vars/all/all.yml
    comment: "Управлять конфигурацией NTP через Kubespray (перезаписывать ntp_servers)."

  - name: ntp_servers
    sample_value: '["0.pool.ntp.org iburst", "1.pool.ntp.org iburst", "2.pool.ntp.org iburst", "3.pool.ntp.org iburst"]'
    is_set: true
    source_path: inventory/sample/group_vars/all/all.yml
    comment: "Список NTP-серверов; применяется при ntp_manage_config: true."

  - name: unsafe_show_logs
    sample_value: "false"
    is_set: true
    source_path: inventory/sample/group_vars/all/all.yml
    comment: "Управляет атрибутом no_log задач (показывать отладочный вывод, возможно с приватными данными). В defaults вычисляется по CI-переменной (см. discrepancies)."

  - name: allow_unsupported_distribution_setup
    sample_value: "false"
    is_set: true
    source_path: inventory/sample/group_vars/all/all.yml
    comment: "Разрешить попытку установки на неподдерживаемых дистрибутивах (риск неожиданных сбоев)."

  # --- etcd.yml ---

  - name: etcd_data_dir
    sample_value: "/var/lib/etcd"
    is_set: true
    source_path: inventory/sample/group_vars/all/etcd.yml
    comment: "Каталог хранения данных etcd; совпадает с defaults."

  - name: container_manager
    sample_value: "containerd"
    is_set: false
    source_path: inventory/sample/group_vars/all/etcd.yml
