    default: "{}"
    source_path: roles/kubernetes-apps/metrics_server/defaults/main.yml
    description: "Доп. affinity для Metrics Server."
  - name: metrics_server_nodeselector
    default: "{}"
    source_path: roles/kubernetes-apps/metrics_server/defaults/main.yml
    description: "nodeSelector для Metrics Server."

  # ============================================================
  # Node Feature Discovery (roles/kubernetes-apps/node_feature_discovery)
  # ============================================================
  - name: node_feature_discovery_namespace
    default: "node-feature-discovery"
    source_path: roles/kubernetes-apps/node_feature_discovery/defaults/main.yml
    description: "Namespace для Node Feature Discovery."
  - name: node_feature_discovery_enable_nodefeature_api
    default: "true"
    source_path: roles/kubernetes-apps/node_feature_discovery/defaults/main.yml
    description: "Включить NodeFeature API вместо аннотаций."
  - name: node_feature_discovery_gc_replicas
    default: "1"
    source_path: roles/kubernetes-apps/node_feature_discovery/defaults/main.yml
    description: "Число реплик garbage collector NFD."
  - name: node_feature_discovery_gc_interval
    default: "1h"
    source_path: roles/kubernetes-apps/node_feature_discovery/defaults/main.yml
    description: "Интервал работы garbage collector NFD."
  - name: node_feature_discovery_gc_sa_name
    default: "node-feature-discovery-gc"
    source_path: roles/kubernetes-apps/node_feature_discovery/defaults/main.yml
    description: "Имя ServiceAccount garbage collector NFD."
  - name: node_feature_discovery_gc_sa_create
    default: "true"
    source_path: roles/kubernetes-apps/node_feature_discovery/defaults/main.yml
    description: "Создавать ServiceAccount garbage collector NFD."
  - name: node_feature_discovery_master_replicas
    default: "1"
    source_path: roles/kubernetes-apps/node_feature_discovery/defaults/main.yml
    description: "Число реплик master NFD."
  - name: node_feature_discovery_master_crd_controller
    default: "null"
    source_path: roles/kubernetes-apps/node_feature_discovery/defaults/main.yml
    description: "Включение CRD-контроллера master NFD (null — значение по умолчанию chart'а)."
  - name: node_feature_discovery_master_instance
    default: "null"
    source_path: roles/kubernetes-apps/node_feature_discovery/defaults/main.yml
    description: "Имя инстанса master NFD."
  - name: node_feature_discovery_master_config
    default: "null"
    source_path: roles/kubernetes-apps/node_feature_discovery/defaults/main.yml
    description: "Пользовательская конфигурация master NFD."
  - name: node_feature_discovery_worker_sa_name
    default: "node-feature-discovery-worker"
    source_path: roles/kubernetes-apps/node_feature_discovery/defaults/main.yml
    description: "Имя ServiceAccount worker NFD."
  - name: node_feature_discovery_worker_sa_create
    default: "true"
    source_path: roles/kubernetes-apps/node_feature_discovery/defaults/main.yml
    description: "Создавать ServiceAccount worker NFD."
  - name: node_feature_discovery_worker_config
    default: "null"
    source_path: roles/kubernetes-apps/node_feature_discovery/defaults/main.yml
    description: "Пользовательская конфигурация worker NFD."
  - name: node_feature_discovery_worker_tolerations
    default: "null"
    source_path: roles/kubernetes-apps/node_feature_discovery/defaults/main.yml
    description: "Tolerations для worker NFD."

  # ============================================================
  # Persistent Volumes: AWS EBS (roles/.../persistent_volumes/aws-ebs-csi)
  # ============================================================
  - name: restrict_az_provisioning
    default: "false"
    source_path: roles/kubernetes-apps/persistent_volumes/aws-ebs-csi/defaults/main.yml
    description: "Ограничивать зоны доступности при провижининге томов."
  - name: aws_ebs_availability_zones
    default: "[eu-west-3c]"
    source_path: roles/kubernetes-apps/persistent_volumes/aws-ebs-csi/defaults/main.yml
    description: "Список разрешённых зон доступности AWS."

  # ============================================================
  # Persistent Volumes: Azure Disk (roles/.../persistent_volumes/azuredisk-csi)
  # ============================================================
  - name: storage_account_type
    default: "StandardSSD_LRS"
    source_path: roles/kubernetes-apps/persistent_volumes/azuredisk-csi/defaults/main.yml
    description: "Тип storage account для Azure Disk StorageClass."

  # ============================================================
  # Persistent Volumes: Cinder (roles/.../persistent_volumes/cinder-csi)
  # ============================================================
  - name: storage_classes
    default: "[{name: cinder-csi, is_default: false, parameters: {availability: nova, allowVolumeExpansion: false}}]"
    source_path: roles/kubernetes-apps/persistent_volumes/cinder-csi/defaults/main.yml
    description: "Определения StorageClass для Cinder CSI."
    conditions: "имя storage_classes также используется в upcloud-csi с другим значением"

  # ============================================================
  # Persistent Volumes: GCP PD (roles/.../persistent_volumes/gcp-pd-csi)
  # ============================================================
  - name: gcp_pd_csi_volume_type
    default: "pd-standard"
    source_path: roles/kubernetes-apps/persistent_volumes/gcp-pd-csi/defaults/main.yml
    description: "Тип диска GCP PD (pd-standard/pd-ssd)."
  - name: gcp_pd_regional_replication_enabled
    default: "false"
    source_path: roles/kubernetes-apps/persistent_volumes/gcp-pd-csi/defaults/main.yml
    description: "Включить региональную репликацию дисков GCP PD."
  - name: gcp_pd_restrict_zone_replication
    default: "false"
    source_path: roles/kubernetes-apps/persistent_volumes/gcp-pd-csi/defaults/main.yml
    description: "Ограничивать зоны репликации GCP PD."
  - name: gcp_pd_restricted_zones
    default: "[europe-west1-b, europe-west1-c]"
    source_path: roles/kubernetes-apps/persistent_volumes/gcp-pd-csi/defaults/main.yml
    description: "Список разрешённых зон репликации GCP PD."

  # ============================================================
  # Persistent Volumes: UpCloud (roles/.../persistent_volumes/upcloud-csi)
  # ============================================================
  - name: storage_classes
    default: "[{name: standard, is_default: true, expand_persistent_volumes: true, parameters: {tier: maxiops}}, {name: hdd, is_default: false, expand_persistent_volumes: true, parameters: {tier: hdd}}]"
    source_path: roles/kubernetes-apps/persistent_volumes/upcloud-csi/defaults/main.yml
    description: "Определения StorageClass для UpCloud CSI (standard/hdd)."
    conditions: "имя storage_classes также используется в cinder-csi с другим значением"

  # ============================================================
  # Policy Controller: Calico (roles/.../policy_controller/calico)
  # ============================================================
  - name: calico_policy_controller_cpu_limit
    default: "1000m"
    source_path: roles/kubernetes-apps/policy_controller/calico/defaults/main.yml
    description: "Лимит CPU для calico-kube-controllers."
  - name: calico_policy_controller_memory_limit
    default: "256M"
    source_path: roles/kubernetes-apps/policy_controller/calico/defaults/main.yml
    description: "Лимит памяти для calico-kube-controllers."
  - name: calico_policy_controller_cpu_requests
    default: "30m"
    source_path: roles/kubernetes-apps/policy_controller/calico/defaults/main.yml
    description: "Запрос CPU для calico-kube-controllers."
  - name: calico_policy_controller_memory_requests
    default: "64M"
    source_path: roles/kubernetes-apps/policy_controller/calico/defaults/main.yml
    description: "Запрос памяти для calico-kube-controllers."
  - name: calico_policy_controller_deployment_nodeselector
    default: "kubernetes.io/os: linux"
    source_path: roles/kubernetes-apps/policy_controller/calico/defaults/main.yml
    description: "nodeSelector для calico-kube-controllers."
  - name: calico_policy_controller_log_level
    default: "info"
    source_path: roles/kubernetes-apps/policy_controller/calico/defaults/main.yml
    description: "Уровень логирования calico-kube-controllers."
  - name: calico_cert_dir
    default: '"/etc/calico/certs"'
    source_path: roles/kubernetes-apps/policy_controller/calico/defaults/main.yml
    description: "Каталог сертификатов Calico на узлах."

  # ============================================================
  # Registry (roles/kubernetes-apps/registry)
  # ============================================================
  - name: registry_namespace
    default: '"kube-system"'
    source_path: roles/kubernetes-apps/registry/defaults/main.yml
    description: "Namespace для внутрикластерного registry."
  - name: registry_storage_class
    default: '""'
    source_path: roles/kubernetes-apps/registry/defaults/main.yml
    description: "StorageClass для PVC registry (пусто — без PVC)."
  - name: registry_storage_access_mode
    default: '"ReadWriteOnce"'
    source_path: roles/kubernetes-apps/registry/defaults/main.yml
    description: "Режим доступа PVC registry."
  - name: registry_disk_size
    default: '"10Gi"'
    source_path: roles/kubernetes-apps/registry/defaults/main.yml
    description: "Размер тома registry."
  - name: registry_port
    default: "5000"
    source_path: roles/kubernetes-apps/registry/defaults/main.yml
    description: "Порт registry."
  - name: registry_replica_count
    default: "1"
    source_path: roles/kubernetes-apps/registry/defaults/main.yml
    description: "Число реплик registry."
  - name: registry_service_type
    default: '"ClusterIP"'
    source_path: roles/kubernetes-apps/registry/defaults/main.yml
    description: "Тип Service registry."
  - name: registry_service_cluster_ip
    default: '""'
    source_path: roles/kubernetes-apps/registry/defaults/main.yml
    description: "Фиксированный ClusterIP registry."
  - name: registry_service_loadbalancer_ip
    default: '""'
    source_path: roles/kubernetes-apps/registry/defaults/main.yml
    description: "Фиксированный LoadBalancer IP registry."
  - name: registry_service_annotations
    default: "{}"
    source_path: roles/kubernetes-apps/registry/defaults/main.yml
    description: "Аннотации Service registry."
  - name: registry_service_nodeport
    default: '""'
    source_path: roles/kubernetes-apps/registry/defaults/main.yml
    description: "Фиксированный NodePort registry."
  - name: registry_tls_secret
    default: '""'
    source_path: roles/kubernetes-apps/registry/defaults/main.yml
    description: "Имя секрета TLS для registry."
  - name: registry_htpasswd
    default: '""'
    source_path: roles/kubernetes-apps/registry/defaults/main.yml
    description: "Содержимое htpasswd для базовой аутентификации registry."
  - name: registry_config
    default: "{version: 0.1, log: {fields: {service: registry}}, storage: {cache: {blobdescriptor: inmemory}}, http: {addr: ':{{ registry_port }}', headers: {X-Content-Type-Options: [nosniff]}}, health: {storagedriver: {enabled: true, interval: 10s, threshold: 3}}}"
    source_path: roles/kubernetes-apps/registry/defaults/main.yml
    description: "Полная конфигурация docker/distribution registry (config.yml)."
  - name: registry_ingress_annotations
    default: "{}"
    source_path: roles/kubernetes-apps/registry/defaults/main.yml
    description: "Аннотации Ingress registry."
  - name: registry_ingress_host
    default: '""'
    source_path: roles/kubernetes-apps/registry/defaults/main.yml
    description: "Hostname Ingress registry."
  - name: registry_ingress_tls_secret
    default: '""'
    source_path: roles/kubernetes-apps/registry/defaults/main.yml
    description: "Имя секрета TLS для Ingress registry."

  # ============================================================
  # Scheduler Plugins (roles/kubernetes-apps/scheduler_plugins)
  # ============================================================
  - name: scheduler_plugins_namespace
    default: "scheduler-plugins"
    source_path: roles/kubernetes-apps/scheduler_plugins/defaults/main.yml
    description: "Namespace для Scheduler Plugins."
  - name: scheduler_plugins_controller_replicas
    default: "1"
    source_path: roles/kubernetes-apps/scheduler_plugins/defaults/main.yml
    description: "Число реплик контроллера Scheduler Plugins."
  - name: scheduler_plugins_scheduler_replicas
    default: "1"
    source_path: roles/kubernetes-apps/scheduler_plugins/defaults/main.yml
    description: "Число реплик планировщика Scheduler Plugins."
  - name: scheduler_plugins_scheduler_leader_elect
    default: "{{ ((groups['kube_control_plane'] | length) > 1) }}"
    source_path: roles/kubernetes-apps/scheduler_plugins/defaults/main.yml
    description: "Включать leader election планировщика при нескольких control plane."
  - name: scheduler_plugins_enabled_plugins
    default: "[Coscheduling, CapacityScheduling, NodeResourceTopologyMatch, NodeResourcesAllocatable]"
    source_path: roles/kubernetes-apps/scheduler_plugins/defaults/main.yml
    description: "Список включённых плагинов планировщика."
  - name: scheduler_plugins_disabled_plugins
    default: "[PrioritySort]"
    source_path: roles/kubernetes-apps/scheduler_plugins/defaults/main.yml
    description: "Список отключаемых стандартных плагинов."
  - name: scheduler_plugins_plugin_config
    default: "[{name: Coscheduling, args: {permitWaitingTimeSeconds: 10}}]"
    source_path: roles/kubernetes-apps/scheduler_plugins/defaults/main.yml
    description: "Конфигурация pluginConfig для включённых плагинов."

