    description: "Лимит памяти Metrics Server."
  - name: metrics_server_requests_cpu
    default: "100m"
    source_path: roles/kubernetes-apps/metrics_server/defaults/main.yml
    description: "Запрос CPU Metrics Server."
  - name: metrics_server_requests_memory
    default: "200Mi"
    source_path: roles/kubernetes-apps/metrics_server/defaults/main.yml
    description: "Запрос памяти Metrics Server."
  - name: metrics_server_host_network
    default: "false"
    source_path: roles/kubernetes-apps/metrics_server/defaults/main.yml
    description: "Запускать Metrics Server в hostNetwork."
  - name: metrics_server_replicas
    default: "1"
    source_path: roles/kubernetes-apps/metrics_server/defaults/main.yml
