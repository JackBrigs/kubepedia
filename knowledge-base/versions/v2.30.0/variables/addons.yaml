variables:

  # ============================================================
  # Флаги включения аддонов (roles/kubespray_defaults/defaults/main/main.yml)
  # ============================================================
  - name: dashboard_enabled
    default: "false"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Включает развёртывание Kubernetes Dashboard."
  - name: helm_enabled
    default: "false"
    source_path: roles/kubernetes-apps/helm/defaults/main.yml
    description: "Устанавливает клиент Helm на узлы control plane."
  - name: registry_enabled
    default: "false"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Включает развёртывание внутрикластерного Docker registry."
  - name: metrics_server_enabled
    default: "false"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Включает Metrics Server (метрики CPU/памяти для HPA и kubectl top)."
  - name: local_path_provisioner_enabled
    default: "false"
    source_path: roles/kubernetes-apps/external_provisioner/local_path_provisioner/defaults/main.yml
    description: "Включает Local Path Provisioner (динамические PV на локальных путях узлов)."
  - name: local_volume_provisioner_enabled
    default: "false"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Включает Local Volume Static Provisioner (статические локальные тома)."
  - name: cinder_csi_enabled
    default: "false"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Включает CSI-драйвер OpenStack Cinder."
  - name: aws_ebs_csi_enabled
    default: "false"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Включает CSI-драйвер AWS EBS."
  - name: azure_csi_enabled
    default: "false"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Включает CSI-драйвер Azure Disk."
  - name: gcp_pd_csi_enabled
    default: "false"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Включает CSI-драйвер GCP Persistent Disk."
  - name: vsphere_csi_enabled
    default: "false"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Включает CSI-драйвер vSphere."
  - name: upcloud_csi_enabled
    default: "false"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Включает CSI-драйвер UpCloud."
  - name: csi_snapshot_controller_enabled
    default: "false"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Включает snapshot-controller для CSI-снимков томов."
  - name: persistent_volumes_enabled
    default: "false"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Включает создание StorageClass/PV для выбранных CSI-драйверов."
  - name: ingress_nginx_enabled
    default: "false"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Включает Ingress NGINX Controller."
  - name: ingress_alb_enabled
    default: "false"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Включает AWS ALB Ingress Controller."
  - name: cert_manager_enabled
    default: "false"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Включает cert-manager (управление TLS-сертификатами)."
  - name: metallb_enabled
    default: "false"
    source_path: roles/kubernetes-apps/metallb/defaults/main.yml
    description: "Включает MetalLB (LoadBalancer для bare-metal)."
  - name: argocd_enabled
    default: "false"
    source_path: roles/kubernetes-apps/argocd/defaults/main.yml
    description: "Включает Argo CD (GitOps continuous delivery)."
  - name: gateway_api_enabled
    default: "false"
    source_path: roles/kubernetes-apps/common_crds/gateway_api/defaults/main.yml
    description: "Устанавливает CRD Gateway API."
  - name: scheduler_plugins_enabled
    default: "false"
    source_path: roles/kubernetes-apps/scheduler_plugins/defaults/main.yml
    description: "Включает Scheduler Plugins (дополнительный планировщик с плагинами)."
  - name: node_feature_discovery_enabled
    default: "false"
    source_path: roles/kubernetes-apps/node_feature_discovery/defaults/main.yml
    description: "Включает Node Feature Discovery (обнаружение аппаратных возможностей узлов)."
  - name: nvidia_accelerator_enabled
    default: "false"
    source_path: roles/kubernetes-apps/container_engine_accelerator/nvidia_gpu/defaults/main.yml
    description: "Включает поддержку NVIDIA GPU (device plugin и установку драйвера)."
  - name: kubelet_csr_approver_enabled
    default: "{{ kubelet_rotate_server_certificates }}"
    source_path: roles/kubernetes-apps/kubelet-csr-approver/defaults/main.yml
    description: "Включает kubelet-csr-approver; по умолчанию активен при ротации серверных сертификатов kubelet."

  # ============================================================
  # DNS: CoreDNS / nodelocaldns / dns-autoscaler (roles/kubernetes-apps/ansible)
  # ============================================================
  - name: dns_memory_limit
    default: "300Mi"
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "Лимит памяти для подов CoreDNS."
  - name: dns_cpu_requests
    default: "100m"
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "Запрос CPU для подов CoreDNS."
  - name: dns_memory_requests
    default: "70Mi"
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "Запрос памяти для подов CoreDNS."
  - name: dns_min_replicas
    default: "{{ [2, groups['k8s_cluster'] | length] | min }}"
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "Минимальное число реплик CoreDNS (не более числа узлов кластера, минимум 2)."
  - name: dns_nodes_per_replica
    default: "16"
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "Число узлов на одну реплику CoreDNS для dns-autoscaler."
  - name: dns_cores_per_replica
    default: "256"
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "Число ядер на одну реплику CoreDNS для dns-autoscaler."
  - name: dns_prevent_single_point_failure
    default: "{{ 'true' if dns_min_replicas | int > 1 else 'false' }}"
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "Включает защиту от единой точки отказа dns-autoscaler при числе реплик больше 1."
  - name: enable_coredns_reverse_dns_lookups
    default: "true"
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "Включает обратные DNS-запросы (PTR) в CoreDNS."
  - name: coredns_ordinal_suffix
    default: '""'
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "Суффикс к имени deployment CoreDNS (для нескольких экземпляров)."
  - name: coredns_affinity
    default: "podAntiAffinity: preferredDuringSchedulingIgnoredDuringExecution: [{weight: 100, podAffinityTerm: {labelSelector: {matchExpressions: [{key: k8s-app, operator: In, values: [kube-dns]}]}, topologyKey: kubernetes.io/hostname}}]"
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "Правила affinity для подов CoreDNS (антиаффинити по узлам для kube-dns)."
  - name: coredns_deployment_nodeselector
    default: "kubernetes.io/os: linux"
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "nodeSelector для deployment CoreDNS."
  - name: coredns_default_zone_cache_block
    default: "cache 30\\n"
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "Блок конфигурации кэша для зоны по умолчанию в Corefile."
  - name: coredns_pod_disruption_budget
    default: "false"
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "Создавать PodDisruptionBudget для CoreDNS."
  - name: coredns_replicas
    default: "2"
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "Число реплик CoreDNS, когда dns-autoscaler выключен."
  - name: coredns_pod_disruption_budget_max_unavailable
    default: '"30%"'
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "maxUnavailable в PDB для CoreDNS."
  - name: deploy_coredns
    default: "true"
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "Внутренний флаг, управляющий фактическим развёртыванием CoreDNS."
  - name: old_dns_domains
    default: "[]"
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "Список прежних DNS-доменов для сохранения совместимости при смене cluster domain."
  - name: nodelocaldns_cpu_requests
    default: "100m"
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "Запрос CPU для подов nodelocaldns."
  - name: nodelocaldns_memory_limit
    default: "200Mi"
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "Лимит памяти для подов nodelocaldns."
  - name: nodelocaldns_memory_requests
    default: "70Mi"
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "Запрос памяти для подов nodelocaldns."
  - name: nodelocaldns_ds_nodeselector
    default: "kubernetes.io/os: linux"
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "nodeSelector для DaemonSet nodelocaldns."
  - name: nodelocaldns_prometheus_port
    default: "9253"
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "Порт Prometheus-метрик nodelocaldns."
  - name: nodelocaldns_secondary_prometheus_port
    default: "9255"
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "Порт метрик вторичного экземпляра nodelocaldns (при secondary)."
  - name: dns_autoscaler_cpu_requests
    default: "20m"
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "Запрос CPU для dns-autoscaler."
  - name: dns_autoscaler_memory_requests
    default: "10Mi"
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "Запрос памяти для dns-autoscaler."
  - name: dns_autoscaler_deployment_nodeselector
    default: "kubernetes.io/os: linux"
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "nodeSelector для deployment dns-autoscaler."
  - name: dns_autoscaler_affinity
    default: "{}"
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "Правила affinity для dns-autoscaler."

  # ---- netchecker (roles/kubernetes-apps/ansible) ----
  - name: deploy_netchecker
    default: "false"
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "Включает развёртывание Netchecker (проверка сетевой связности)."
  - name: netchecker_port
    default: "31081"
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "NodePort сервиса netchecker-server."
  - name: agent_report_interval
    default: "15"
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "Интервал отправки отчётов агентами netchecker, секунды."
  - name: netcheck_namespace
    default: "default"
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "Namespace для компонентов netchecker."
  - name: netchecker_agent_cpu_limit
    default: "30m"
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "Лимит CPU для netchecker-agent."
  - name: netchecker_agent_memory_limit
    default: "100M"
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "Лимит памяти для netchecker-agent."
  - name: netchecker_agent_cpu_requests
    default: "15m"
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "Запрос CPU для netchecker-agent."
  - name: netchecker_agent_memory_requests
    default: "64M"
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "Запрос памяти для netchecker-agent."
  - name: netchecker_server_cpu_limit
    default: "100m"
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "Лимит CPU для netchecker-server."
  - name: netchecker_server_memory_limit
    default: "256M"
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "Лимит памяти для netchecker-server."
  - name: netchecker_server_cpu_requests
    default: "50m"
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "Запрос CPU для netchecker-server."
  - name: netchecker_server_memory_requests
    default: "64M"
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "Запрос памяти для netchecker-server."
  - name: netchecker_etcd_cpu_limit
    default: "200m"
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "Лимит CPU для etcd netchecker."
  - name: netchecker_etcd_memory_limit
    default: "256M"
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "Лимит памяти для etcd netchecker."
  - name: netchecker_etcd_cpu_requests
    default: "100m"
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "Запрос CPU для etcd netchecker."
  - name: netchecker_etcd_memory_requests
    default: "128M"
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "Запрос памяти для etcd netchecker."
  - name: netchecker_agent_user
    default: "1000"
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "UID пользователя контейнера netchecker-agent."
  - name: netchecker_server_user
    default: "1000"
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "UID пользователя контейнера netchecker-server."
  - name: netchecker_agent_group
    default: "1000"
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "GID группы контейнера netchecker-agent."
  - name: netchecker_server_group
    default: "1000"
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "GID группы контейнера netchecker-server."
  - name: netchecker_agent_log_level
    default: "5"
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "Уровень логирования netchecker-agent."
  - name: netchecker_server_log_level
    default: "5"
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "Уровень логирования netchecker-server."
  - name: netchecker_etcd_log_level
    default: "info"
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "Уровень логирования etcd netchecker."

  # ---- Kubernetes Dashboard (roles/kubernetes-apps/ansible) ----
  - name: dashboard_replicas
    default: "1"
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "Число реплик Kubernetes Dashboard."
  - name: dashboard_namespace
    default: "kube-system"
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "Namespace для Kubernetes Dashboard."
  - name: dashboard_cpu_limit
    default: "100m"
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "Лимит CPU для Dashboard."
  - name: dashboard_memory_limit
    default: "256M"
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "Лимит памяти для Dashboard."
  - name: dashboard_cpu_requests
    default: "50m"
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "Запрос CPU для Dashboard."
  - name: dashboard_memory_requests
    default: "64M"
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "Запрос памяти для Dashboard."
  - name: dashboard_use_custom_certs
    default: "false"
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "Использовать пользовательские TLS-сертификаты для Dashboard."
  - name: dashboard_certs_secret_name
    default: "kubernetes-dashboard-certs"
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "Имя секрета с сертификатами Dashboard."
  - name: dashboard_tls_key_file
    default: "dashboard.key"
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "Имя файла приватного ключа TLS для Dashboard."
  - name: dashboard_tls_cert_file
    default: "dashboard.crt"
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "Имя файла TLS-сертификата для Dashboard."
  - name: dashboard_master_toleration
    default: "true"
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "Разрешить запуск Dashboard на control plane (toleration)."
  - name: dashboard_token_ttl
    default: "900"
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "Время жизни токена сессии Dashboard, секунды."
  - name: dashboard_skip_login
    default: "false"
    source_path: roles/kubernetes-apps/ansible/defaults/main.yml
    description: "Разрешить пропуск экрана входа в Dashboard."

  # ============================================================
  # Argo CD (roles/kubernetes-apps/argocd)
  # ============================================================
  - name: argocd_version
    default: "2.14.5"
    source_path: roles/kubernetes-apps/argocd/defaults/main.yml
    description: "Версия устанавливаемого Argo CD."
  - name: argocd_namespace
    default: "argocd"
    source_path: roles/kubernetes-apps/argocd/defaults/main.yml
    description: "Namespace для Argo CD."

  # ============================================================
  # Gateway API CRD (roles/kubernetes-apps/common_crds/gateway_api)
  # ============================================================
  - name: gateway_api_channel
    default: '"standard"'
    source_path: roles/kubernetes-apps/common_crds/gateway_api/defaults/main.yml
    description: "Канал CRD Gateway API: standard или experimental."

  # ============================================================
  # NVIDIA GPU accelerator (roles/kubernetes-apps/container_engine_accelerator/nvidia_gpu)
  # Детально не разбирается; перечислены top-level переменные.
  # ============================================================
  - name: nvidia_driver_version
    default: '"390.87"'
    source_path: roles/kubernetes-apps/container_engine_accelerator/nvidia_gpu/defaults/main.yml
    description: "Версия драйвера NVIDIA."
  - name: nvidia_gpu_tesla_base_url
    default: "https://us.download.nvidia.com/tesla/"
    source_path: roles/kubernetes-apps/container_engine_accelerator/nvidia_gpu/defaults/main.yml
    description: "Базовый URL для скачивания драйвера Tesla."
  - name: nvidia_gpu_gtx_base_url
    default: "http://us.download.nvidia.com/XFree86/Linux-x86_64/"
    source_path: roles/kubernetes-apps/container_engine_accelerator/nvidia_gpu/defaults/main.yml
    description: "Базовый URL для скачивания драйвера GTX."
  - name: nvidia_gpu_flavor
    default: "tesla"
    source_path: roles/kubernetes-apps/container_engine_accelerator/nvidia_gpu/defaults/main.yml
    description: "Тип GPU: tesla или gtx."
  - name: nvidia_url_end
    default: "{{ nvidia_driver_version }}/NVIDIA-Linux-x86_64-{{ nvidia_driver_version }}.run"
    source_path: roles/kubernetes-apps/container_engine_accelerator/nvidia_gpu/defaults/main.yml
    description: "Окончание URL установщика драйвера."
  - name: nvidia_driver_install_container
    default: "false"
    source_path: roles/kubernetes-apps/container_engine_accelerator/nvidia_gpu/defaults/main.yml
    description: "Устанавливать драйвер через контейнер-инсталлятор."
  - name: nvidia_driver_install_centos_container
