      {"cilium-namespace": "kube-system", "ca-reuse-secret": true, "ca-secret-name": "hubble-ca-secret", "ca-generate": true, "ca-validity-duration": "94608000s", "hubble-server-cert-generate": true, "hubble-server-cert-common-name": "*.{{ cilium_cluster_name }}.hubble-grpc.cilium.io", "hubble-server-cert-validity-duration": "94608000s", "hubble-server-cert-secret-name": "hubble-server-certs", "hubble-relay-client-cert-generate": true, "hubble-relay-client-cert-common-name": "*.{{ cilium_cluster_name }}.hubble-grpc.cilium.io", "hubble-relay-client-cert-validity-duration": "94608000s", "hubble-relay-client-cert-secret-name": "hubble-relay-client-certs", "hubble-relay-server-cert-generate": false}
    source_path: roles/network_plugin/cilium/defaults/main.yml
    description: "Аргументы certgen для генерации сертификатов Hubble mTLS. ВНИМАНИЕ: в v2.30.0 не используется в шаблоне/задачах роли — фактически не применяется."
    reliability: unconfirmed

  - name: cilium_enable_host_firewall
    default: false
    source_path: roles/network_plugin/cilium/defaults/main.yml
    description: "Включает Host Firewall Cilium (hostFirewall.enabled в values.yaml.j2)."

  - name: cilium_policy_audit_mode
    default: false
    source_path: roles/network_plugin/cilium/defaults/main.yml
    description: "Режим аудита сетевых политик (policyAuditMode) — политики не блокируют трафик, а только логируют."

  - name: cilium_install_extra_flags
    default: ""
    source_path: roles/network_plugin/cilium/defaults/main.yml
    description: "Дополнительные флаги, добавляемые к команде 'cilium install/upgrade' в apply.yml."

  - name: cilium_extra_values
    default: "{}"
    source_path: roles/network_plugin/cilium/defaults/main.yml
    description: "Произвольные значения Helm-чарта Cilium. Рендерятся в отдельный файл cilium-extra-values.yaml (install.yml) и передаются как второй -f при установке."
    related: [cilium_install_extra_flags]
