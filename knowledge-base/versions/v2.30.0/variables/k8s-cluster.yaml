  - name: ssl_ca_dirs
    default: "список путей к CA в зависимости от ansible_os_family (Flatcar/RedHat/Debian)"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Каталоги системных CA-сертификатов, зависят от семейства ОС"

  # --- Эндпоинты control plane / API server (вычисляемые) ---
  - name: first_kube_control_plane
    default: "{{ groups['kube_control_plane'] | first }}"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Первый control-plane узел (для делегирования задач)"
  - name: kube_apiserver_count
    default: "{{ groups['kube_control_plane'] | length }}"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Количество control-plane узлов"
  - name: kube_apiserver_address
    default: "{{ hostvars[inventory_hostname]['main_ip'] }}"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Основной IP API-сервера текущего узла"
  - name: kube_apiserver_access_address
    default: "{{ hostvars[inventory_hostname]['main_access_ip'] }}"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Access-IP API-сервера текущего узла"
  - name: first_kube_control_plane_address
    default: "{{ hostvars[groups['kube_control_plane'][0]]['main_access_ip'] }}"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Access-IP первого control-plane узла"
  - name: loadbalancer_apiserver_localhost
    default: "{{ loadbalancer_apiserver is not defined }}"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Использовать локальный балансировщик apiserver (если внешний не задан)"
  - name: loadbalancer_apiserver_type
    default: "nginx"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Тип локального балансировщика apiserver: nginx или haproxy"
  - name: apiserver_loadbalancer_domain_name
    default: "{{ 'localhost' if loadbalancer_apiserver_localhost else (loadbalancer_apiserver.address | d(undef())) }}"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Доменное имя внешнего балансировщика apiserver"
    related: [loadbalancer_apiserver_localhost]
  - name: kube_apiserver_global_endpoint
    default: "вычисляется из loadbalancer_apiserver / localhost / first_kube_control_plane_address"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Глобальный HTTPS-эндпоинт API-сервера"
  - name: kube_apiserver_endpoint
    default: "вычисляется из loadbalancer_apiserver / group_names / bind_address"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "HTTPS-эндпоинт API-сервера для конкретного узла (с учётом роли узла)"
  - name: kube_apiserver_client_cert
    default: "{{ kube_cert_dir }}/ca.crt"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Клиентский сертификат API-сервера (CA)"
    related: [kube_cert_dir]
  - name: kube_apiserver_client_key
    default: "{{ kube_cert_dir }}/ca.key"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Клиентский ключ API-сервера (CA)"
    related: [kube_cert_dir]

  # --- etcd (эндпоинты и параметры) ---
  - name: etcd_events_cluster_enabled
    default: false
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Развернуть отдельный кластер etcd-events"
  - name: etcd_hosts
    default: "{{ groups['etcd'] | default(groups['kube_control_plane']) }}"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Список хостов etcd (может быть пуст, если etcd управляется kubeadm)"
  - name: etcd_address
    default: "{{ hostvars[inventory_hostname]['main_ip'] }}"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Основной IP etcd текущего узла"
  - name: etcd_access_address
    default: "{{ hostvars[inventory_hostname]['main_access_ip'] }}"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Access-IP etcd текущего узла"
  - name: etcd_events_access_address
    default: "{{ hostvars[inventory_hostname]['main_access_ip'] }}"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Access-IP etcd-events текущего узла"
  - name: etcd_peer_url
    default: "https://{{ etcd_access_address | ansible.utils.ipwrap }}:2380"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Peer-URL etcd (порт 2380)"
  - name: etcd_client_url
    default: "https://{{ etcd_access_address | ansible.utils.ipwrap }}:2379"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Client-URL etcd (порт 2379)"
  - name: etcd_events_peer_url
    default: "https://{{ etcd_events_access_address | ansible.utils.ipwrap }}:2382"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Peer-URL etcd-events (порт 2382)"
  - name: etcd_events_client_url
    default: "https://{{ etcd_events_access_address | ansible.utils.ipwrap }}:2383"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Client-URL etcd-events (порт 2383)"
  - name: etcd_access_addresses
    default: "список https://<access_ip>:2379 по всем etcd_hosts"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Список client-адресов всех узлов etcd"
    related: [etcd_hosts]
  - name: etcd_events_access_addresses_list
    default: "список 'https://<access_ip>:2383' по всем etcd_hosts"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Список client-адресов etcd-events (как список Python)"
    related: [etcd_hosts]
  - name: etcd_metrics_addresses
    default: "список https://<access_ip>:{{ etcd_metrics_port | default(2381) }}"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Список адресов метрик etcd (порт по умолчанию 2381)"
    related: [etcd_hosts]
  - name: etcd_events_access_addresses
    default: "{{ etcd_events_access_addresses_list | join(',') }}"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Client-адреса etcd-events через запятую"
    related: [etcd_events_access_addresses_list]
  - name: etcd_events_access_addresses_semicolon
    default: "{{ etcd_events_access_addresses_list | join(';') }}"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Client-адреса etcd-events через точку с запятой"
    related: [etcd_events_access_addresses_list]
  - name: etcd_member_name
    default: "имя члена etcd для текущего узла (etcd_member_name или etcdN)"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Имя члена кластера etcd для текущего узла"
  - name: etcd_peer_addresses
    default: "список <member>=https://<access_ip>:2380 по группе etcd"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Peer-адреса всех членов etcd"
  - name: etcd_events_peer_addresses
    default: "список <member>-events=https://<access_ip>:2382 по группе etcd"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Peer-адреса всех членов etcd-events"
  - name: etcd_heartbeat_interval
    default: '"250"'
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Интервал heartbeat etcd (мс). Дублируется в control-plane/defaults/main/etcd.yml"
  - name: etcd_election_timeout
    default: '"5000"'
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Таймаут выборов лидера etcd (мс). Дублируется в control-plane/defaults/main/etcd.yml"
  - name: etcd_snapshot_count
    default: '"100000"'
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Количество транзакций между снапшотами etcd"
  - name: certificates_key_size
    default: 2048
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Размер ключа генерируемых сертификатов (бит)"
  - name: certificates_duration
    default: 36500
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Срок действия генерируемых сертификатов (дней)"
  - name: etcd_config_dir
    default: "/etc/ssl/etcd"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Каталог конфигурации etcd"
  - name: etcd_events_data_dir
    default: "/var/lib/etcd-events"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Каталог данных etcd-events"
  - name: etcd_cert_dir
    default: "{{ etcd_config_dir }}/ssl"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Каталог сертификатов etcd"
    related: [etcd_config_dir]

  # --- CNI флаги (calico/typha) ---
  - name: typha_enabled
    default: false
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Включить Calico Typha"
  - name: calico_apiserver_enabled
    default: false
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Включить Calico API server"

  # --- Архитектура / ОС хоста (вычисляемые) ---
  - name: _host_architecture_groups
    default: "{x86_64: amd64, aarch64: arm64, armv7l: arm}"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Соответствие архитектуры ansible_architecture -> Go-архитектура"
  - name: host_architecture
    default: "маппинг ansible_architecture через _host_architecture_groups"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Нормализованная архитектура хоста (amd64/arm64/arm)"
    related: [_host_architecture_groups]
  - name: _host_os_groups
    default: "{Linux: linux, Darwin: darwin, Win32NT: windows}"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Соответствие ansible_system -> Go-ОС"
  - name: host_os
    default: "маппинг ansible_system через _host_os_groups"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Нормализованная ОС хоста (linux/darwin/windows)"
    related: [_host_os_groups]

  # --- kubelet / прокси окружения ---
  - name: kubelet_event_record_qps
    default: 50
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "eventRecordQPS в kubelet-config (0 = без лимита)"
  - name: proxy_env_defaults
    default: "{http_proxy, HTTP_PROXY, https_proxy, HTTPS_PROXY, no_proxy, NO_PROXY из соответствующих переменных}"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Базовый словарь переменных окружения прокси"
  - name: proxy_env
    default: "{{ proxy_env_defaults | combine({'SSL_CERT_FILE': https_proxy_cert_file}) if https_proxy_cert_file is defined else proxy_env_defaults }}"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Итоговый словарь окружения прокси (с опциональным SSL_CERT_FILE)"
    related: [proxy_env_defaults]
  - name: proxy_disable_env
    default: "{ALL_PROXY, FTP_PROXY, HTTPS_PROXY, HTTP_PROXY, NO_PROXY и их lowercase = ''}"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Словарь для отключения прокси-окружения"
  - name: sysctl_file_path
    default: "/etc/sysctl.d/99-sysctl.conf"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Путь к файлу sysctl-конфигурации. Дублируется в node и preinstall defaults"
  - name: sysctl_ignore_unknown_keys
    default: false
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Игнорировать ошибки sysctl о неизвестных ключах"
  - name: system_upgrade
    default: false
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Выполнять обновление системных пакетов ОС"
  - name: system_upgrade_reboot
    default: "on-upgrade"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Политика перезагрузки после обновления системы: never, on-upgrade, always"
  - name: scheduler_plugins_enabled
    default: false
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Включить плагины планировщика (scheduler-plugins)"

  # --- NTP ---
  - name: ntp_enabled
    default: false
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Запускать и включать сервис ntpd/chrony при загрузке"
  - name: ntp_package
    default: "chrony на RedHat, иначе ntp"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Пакет NTP: ntp, ntpsec или chrony (зависит от семейства ОС)"

  # =====================================================================
  # roles/kubespray_defaults/vars/main/main.yml
  # Внутренние вычисляемые переменные версий и сети
  # =====================================================================
  - name: kube_major_version
    default: "{{ (kube_version | split('.'))[:-1] | join('.') }}"
    source_path: roles/kubespray_defaults/vars/main/main.yml
    description: "Мажорная версия Kubernetes (например 1.17 из 1.17.4)"
    related: [kube_version]
  - name: kube_next
    default: "{{ ((kube_version | split('.'))[1] | int) + 1 }}"
    source_path: roles/kubespray_defaults/vars/main/main.yml
    description: "Следующий минорный номер версии Kubernetes"
    related: [kube_version]
  - name: kube_major_next_version
    default: "1.{{ kube_next }}"
    source_path: roles/kubespray_defaults/vars/main/main.yml
    description: "Следующая мажорная версия Kubernetes (1.<kube_next>)"
    related: [kube_next]
  - name: pod_infra_supported_versions
    default: "{'1.34': '3.10.1', '1.33': '3.10', '1.32': '3.10'}"
    source_path: roles/kubespray_defaults/vars/main/main.yml
    description: "Соответствие версии K8s -> версия pause-образа (pod infra)"
  - name: etcd_supported_versions
    default: "{'1.34','1.33','1.32': первая версия etcd < 3.6 из etcd_binary_checksums}"
    source_path: roles/kubespray_defaults/vars/main/main.yml
    description: "Соответствие версии K8s -> поддерживаемая версия etcd"
    reliability: unconfirmed
  - name: kube_proxy_deployed
    default: "{{ 'addon/kube-proxy' not in kubeadm_init_phases_skip }}"
    source_path: roles/kubespray_defaults/vars/main/main.yml
    description: "Развёрнут ли kube-proxy (по факту пропуска фазы addon/kube-proxy)"
    related: [kubeadm_init_phases_skip]
  - name: calico_min_version_required
    default: "3.27.0"
    source_path: roles/kubespray_defaults/vars/main/main.yml
    description: "Минимальная версия Calico для апгрейда (calico_version предыдущей ветки)"
  - name: containerd_min_version_required
    default: "1.3.7"
    source_path: roles/kubespray_defaults/vars/main/main.yml
    description: "Минимально поддерживаемая версия containerd"
  - name: kube_service_subnets
    default: >-
      {%- if ipv4_stack and ipv6_stack -%}
      {{ kube_service_addresses }},{{ kube_service_addresses_ipv6 }}
      {%- elif ipv4_stack -%}
      {{ kube_service_addresses }}
      {%- else -%}
      {{ kube_service_addresses_ipv6 }}
      {%- endif -%}
    source_path: roles/kubespray_defaults/vars/main/main.yml
    description: "Итоговые service-подсети с учётом стека (dualstack/ipv6only/ipv4only)"
    related: [kube_service_addresses, kube_service_addresses_ipv6, ipv4_stack, ipv6_stack]
  - name: kube_pods_subnets
    default: >-
      {%- if ipv4_stack and ipv6_stack -%}
      {{ kube_pods_subnet }},{{ kube_pods_subnet_ipv6 }}
      {%- elif ipv4_stack -%}
      {{ kube_pods_subnet }}
      {%- else -%}
      {{ kube_pods_subnet_ipv6 }}
      {%- endif -%}
    source_path: roles/kubespray_defaults/vars/main/main.yml
    description: "Итоговые pod-подсети с учётом стека (dualstack/ipv6only/ipv4only)"
    related: [kube_pods_subnet, kube_pods_subnet_ipv6, ipv4_stack, ipv6_stack]

  # =====================================================================
  # roles/kubernetes/control-plane/defaults/main/main.yml
  # API server, controller-manager, аудит, PodSecurity, шифрование
  # =====================================================================
  - name: upgrade_cluster_setup
    default: false
    source_path: roles/kubernetes/control-plane/defaults/main/main.yml
    description: "Флаг режима обновления кластера"
  - name: control_plane_node_become_ready_tries
    default: 24
    source_path: roles/kubernetes/control-plane/defaults/main/main.yml
    description: "Число повторов (интервал 5с) проверки готовности нового control-plane узла после join"
  - name: kube_apiserver_bind_address
    default: "::"
    source_path: roles/kubernetes/control-plane/defaults/main/main.yml
    description: "Адрес привязки внешнего API-сервера. Дублирует значение из kubespray_defaults"
  - name: kube_apiserver_node_port_range
    default: '"30000-32767"'
    source_path: roles/kubernetes/control-plane/defaults/main/main.yml
    description: "Диапазон портов NodePort. Дублируется в node/defaults/main.yml"
  - name: kube_apiserver_storage_backend
    default: "etcd3"
    source_path: roles/kubernetes/control-plane/defaults/main/main.yml
    description: "Backend-хранилище данных Kubernetes"
  - name: kube_apiserver_etcd_compaction_interval
    default: '"5m0s"'
    source_path: roles/kubernetes/control-plane/defaults/main/main.yml
    description: "Интервал запросов compaction к etcd (0 = отключено)"
  - name: kube_apiserver_service_account_lookup
    default: true
    source_path: roles/kubernetes/control-plane/defaults/main/main.yml
    description: "Проверять наличие service account токена в etcd (CIS 1.2.26)"
  - name: kube_etcd_cacert_file
    default: "ca.pem"
    source_path: roles/kubernetes/control-plane/defaults/main/main.yml
    description: "Имя файла CA-сертификата etcd для apiserver"
  - name: kube_etcd_cert_file
    default: "node-{{ inventory_hostname }}.pem"
    source_path: roles/kubernetes/control-plane/defaults/main/main.yml
    description: "Имя файла клиентского сертификата etcd для apiserver"
  - name: kube_etcd_key_file
    default: "node-{{ inventory_hostname }}-key.pem"
    source_path: roles/kubernetes/control-plane/defaults/main/main.yml
    description: "Имя файла клиентского ключа etcd для apiserver"
  - name: kube_controller_manager_bind_address
    default: "::"
    source_path: roles/kubernetes/control-plane/defaults/main/main.yml
    description: "Адрес привязки kube-controller-manager"
  - name: control_plane_health_retries
    default: 60
