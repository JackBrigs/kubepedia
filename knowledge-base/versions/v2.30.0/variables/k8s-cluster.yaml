  - name: kube_network_node_prefix
    default: 24
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Размер подсети, выделяемой каждому узлу для IP подов"
    related: [kube_pods_subnet, kubelet_max_pods]
  - name: ipv4_stack
    default: true
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Включить IPv4-стек сети"
  - name: ipv6_stack
    default: "{{ enable_dual_stack_networks | default(false) }}"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Включить IPv6-стек сети; берётся из устаревшей enable_dual_stack_networks"
    related: [ipv4_stack]
  - name: kube_service_addresses_ipv6
    default: "fd85:ee78:d8a6:8607::1000/116"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Внутренняя IPv6-сеть service-адресов (используется только при ipv6_stack=true)"
    conditions: "Только при ipv6_stack=true"
  - name: kube_pods_subnet_ipv6
    default: "fd85:ee78:d8a6:8607::1:0000/112"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Внутренняя IPv6-сеть для подов (используется только при ipv6_stack=true)"
    conditions: "Только при ipv6_stack=true"
  - name: kube_network_node_prefix_ipv6
    default: 120
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Размер IPv6-подсети на узел (только при ipv6_stack=true)"
    conditions: "Только при ipv6_stack=true"

  # --- API server (endpoint) ---
  - name: kube_apiserver_ip
    default: "{{ kube_service_subnets.split(',') | first | ansible.utils.ipaddr('net') | ansible.utils.ipaddr(1) | ansible.utils.ipaddr('address') }}"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Виртуальный cluster IP API-сервера (1-й адрес service-сети)"
    related: [kube_service_subnets]
  - name: kube_apiserver_bind_address
    default: "::"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Адрес привязки внешнего API. Дублируется в control-plane/defaults/main/main.yml"
  - name: kube_apiserver_port
    default: 6443
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "HTTPS-порт API-сервера. Дублируется (строкой) в client defaults"
  - name: kube_override_hostname
    default: "{{ inventory_hostname }}"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Если непусто — используется как идентификатор узла вместо фактического hostname"
  - name: default_kubelet_config_dir
    default: "{{ kube_config_dir }}/dynamic_kubelet_dir"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Каталог динамической конфигурации kubelet"
    related: [kube_config_dir]
  - name: kube_api_aggregator_routing
    default: false
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Включить маршрутизацию aggregator API-сервера"
  - name: kube_profiling
    default: false
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Включить профилирование компонентов кластера"

  # --- Graceful shutdown ---
  - name: kubelet_shutdown_grace_period
    default: "60s"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Общий период graceful shutdown узла для kubelet"
  - name: kubelet_shutdown_grace_period_critical_pods
    default: "20s"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Период graceful shutdown для критических подов (должен быть меньше общего)"
    related: [kubelet_shutdown_grace_period]

  # --- Cloud provider ---
  - name: cloud_provider
    default: '""'
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Провайдер облака; допустимо только 'external' или пустая строка"
  - name: external_cloud_provider
    default: '""'
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Внешний Cloud Controller Manager: openstack, vsphere, oci, huaweicloud, hcloud, manual"
    conditions: "cloud_provider должен быть 'external'"
    related: [cloud_provider]

  # --- Container runtime ---
  - name: deploy_container_engine
    default: "{{ 'k8s_cluster' in group_names or etcd_deployment_type == 'docker' }}"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Разворачивать ли контейнерный движок на узле"
    related: [etcd_deployment_type]
  - name: container_manager
    default: "containerd"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Контейнерный runtime: containerd, crio или docker"
  - name: nri_enabled
    default: "{{ container_manager == 'containerd' }}"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Включить плагин Node Resource Interface для containerd"
    related: [container_manager]
  - name: kata_containers_enabled
    default: false
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Включить Kata Containers как дополнительный runtime (требует container_manager != docker)"
  - name: gvisor_enabled
    default: false
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Включить gVisor как дополнительный runtime (docker или containerd)"
  - name: runc_enabled
    default: false
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Включить runc как дополнительный runtime (требует container_manager=crio)"
  - name: crun_enabled
    default: false
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Включить crun как дополнительный runtime (требует container_manager=crio)"
  - name: youki_enabled
    default: false
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Включить youki как дополнительный runtime (требует container_manager=crio)"
  - name: container_manager_on_localhost
    default: "{{ container_manager }}"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Контейнерный runtime на localhost (для download_localhost)"
    related: [container_manager]
  - name: cri_socket
    default: >-
      {%- if container_manager == 'crio' -%}
      unix:///var/run/crio/crio.sock
      {%- elif container_manager == 'containerd' -%}
      unix:///var/run/containerd/containerd.sock
      {%- elif container_manager == 'docker' -%}
      unix:///var/run/cri-dockerd.sock
      {%- endif -%}
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Путь к CRI-сокету в зависимости от container_manager"
    related: [container_manager]
  - name: crio_insecure_registries
    default: "[]"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Список insecure-реестров для CRI-O"

  # --- Docker ---
  - name: docker_dns_servers_strict
    default: false
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "При true использовать только первые 3 nameserver, иначе падать при их избытке"
  - name: docker_daemon_graph
    default: "/var/lib/docker"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Каталог данных Docker"
  - name: docker_iptables_enabled
    default: '"false"'
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Включить управление iptables демоном Docker"
  - name: docker_log_opts
    default: "--log-opt max-size=50m --log-opt max-file=5"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Опции ротации логов контейнеров Docker (50m, 5 файлов)"
  - name: docker_insecure_registries
    default: "[]"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Список insecure-реестров Docker"
  - name: docker_registry_mirrors
    default: "[]"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Список зеркал реестров Docker"
  - name: docker_plugins
    default: "[]"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Список плагинов Docker для установки"

  # --- containerd ---
  - name: containerd_use_systemd_cgroup
    default: true
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Использовать systemd cgroup driver в containerd"
  - name: containerd_static_binary
    default: false
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Использовать статический бинарник containerd (для старых дистрибутивов, напр. Debian 11)"
  - name: containerd_storage_dir
    default: "/var/lib/containerd"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
