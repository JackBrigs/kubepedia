  - name: k8s_image_pull_policy
    default: "IfNotPresent"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "imagePullPolicy для образов Kubernetes"

  # --- Addons (флаги включения) ---
  - name: dashboard_enabled
    default: false
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Развернуть Kubernetes Dashboard (требует RBAC)"
  - name: helm_enabled
    default: false
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Установить Helm"
  - name: registry_enabled
    default: false
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Развернуть внутренний container registry"
  - name: metrics_server_enabled
    default: false
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Развернуть metrics-server"
  - name: enable_network_policy
    default: true
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Включить поддержку NetworkPolicy"
  - name: local_path_provisioner_enabled
    default: false
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Развернуть local-path-provisioner"
  - name: local_volume_provisioner_enabled
    default: false
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Развернуть local-volume-provisioner"
  - name: local_volume_provisioner_directory_mode
    default: '"0700"'
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Права каталога local-volume-provisioner"
  - name: cinder_csi_enabled
    default: false
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Включить OpenStack Cinder CSI"
  - name: aws_ebs_csi_enabled
    default: false
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Включить AWS EBS CSI"
  - name: azure_csi_enabled
    default: false
    source_path: roles/kubespray_defaults/defaults/main/main.yml
