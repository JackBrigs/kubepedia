    description: "Накапливать резервные копии файлов конфигурации (false — отключить бэкапы)"
  - name: nameservers
    default: "[]"
    source_path: roles/kubernetes/preinstall/defaults/main.yml
    description: "Дополнительные nameserver для resolv.conf"
  - name: cloud_resolver
    default: "[]"
    source_path: roles/kubernetes/preinstall/defaults/main.yml
    description: "Cloud DNS-резолверы"
  - name: disable_host_nameservers
    default: false
    source_path: roles/kubernetes/preinstall/defaults/main.yml
    description: "Отключить nameserver'ы хоста в resolv.conf"
  - name: dns_late
    default: false
    source_path: roles/kubernetes/preinstall/defaults/main.yml
    description: "Флаг применения изменений host resolv.conf после запуска clusterDNS (выставляется Kubespray)"
  - name: disable_ipv6_dns
    default: false
    source_path: roles/kubernetes/preinstall/defaults/main.yml
    description: "Отключить IPv6 DNS (может понадобиться для GCE docker registry)"
  - name: remove_default_searchdomains
    default: false
    source_path: roles/kubernetes/preinstall/defaults/main.yml
    description: "Удалить дефолтные cluster search-домены"
  - name: kube_owner
    default: "kube"
    source_path: roles/kubernetes/preinstall/defaults/main.yml
    description: "Пользователь-владелец установки. Дублирует значение из kubespray_defaults"
  - name: kube_cert_group
    default: "kube-cert"
    source_path: roles/kubernetes/preinstall/defaults/main.yml
    description: "Группа сертификатов. Дублирует значение из kubespray_defaults"
  - name: kube_config_dir
    default: "/etc/kubernetes"
    source_path: roles/kubernetes/preinstall/defaults/main.yml
    description: "Каталог конфигурации Kubernetes. Дублирует значение из kubespray_defaults"
  - name: kube_cert_dir
    default: "{{ kube_config_dir }}/ssl"
    source_path: roles/kubernetes/preinstall/defaults/main.yml
    description: "Каталог сертификатов. Дублирует значение из kubespray_defaults"
    related: [kube_config_dir]
  - name: kube_cert_compat_dir
    default: "/etc/kubernetes/pki"
    source_path: roles/kubernetes/preinstall/defaults/main.yml
    description: "Каталог совместимости сертификатов. Дублирует значение из kubespray_defaults"
  - name: kubelet_flexvolumes_plugins_dir
    default: "/usr/libexec/kubernetes/kubelet-plugins/volume/exec"
    source_path: roles/kubernetes/preinstall/defaults/main.yml
    description: "Каталог flexvolume-плагинов kubelet"
  - name: resolveconf_cloud_init_conf
    default: "/etc/resolveconf_cloud_init.conf"
    source_path: roles/kubernetes/preinstall/defaults/main.yml
    description: "Файл cloud-init для resolv.conf на Flatcar"
  - name: sysctl_file_path
    default: "/etc/sysctl.d/99-sysctl.conf"
    source_path: roles/kubernetes/preinstall/defaults/main.yml
    description: "Путь к файлу sysctl-конфигурации. Дублирует значение из kubespray_defaults"
  - name: minimal_node_memory_mb
    default: 1024
    source_path: roles/kubernetes/preinstall/defaults/main.yml
    description: "Минимальный объём памяти узла (МБ) для проверок безопасности"
  - name: minimal_master_memory_mb
    default: 1500
    source_path: roles/kubernetes/preinstall/defaults/main.yml
    description: "Минимальный объём памяти control-plane узла (МБ)"
  - name: ntp_manage_config
    default: false
    source_path: roles/kubernetes/preinstall/defaults/main.yml
    description: "Управлять конфигурационным файлом NTP"
  - name: ntp_servers
    default: "['0.pool.ntp.org iburst', '1.pool.ntp.org iburst', '2.pool.ntp.org iburst', '3.pool.ntp.org iburst']"
    source_path: roles/kubernetes/preinstall/defaults/main.yml
    description: "Список NTP-серверов (при ntp_manage_config=true)"
    related: [ntp_manage_config]
  - name: ntp_restrict
    default: "['127.0.0.1', '::1']"
    source_path: roles/kubernetes/preinstall/defaults/main.yml
    description: "Ограничение доступа к NTP (при ntp_manage_config=true)"
    related: [ntp_manage_config]
  - name: ntp_filter_interface
    default: false
    source_path: roles/kubernetes/preinstall/defaults/main.yml
    description: "Фильтровать интерфейсы NTP"
  - name: ntp_driftfile
    default: "/var/lib/ntpsec/ntp.drift для ntpsec, иначе /var/lib/ntp/ntp.drift"
    source_path: roles/kubernetes/preinstall/defaults/main.yml
    description: "Путь к driftfile NTP (при ntp_manage_config=true)"
    related: [ntp_package, ntp_manage_config]
  - name: ntp_tinker_panic
    default: false
    source_path: roles/kubernetes/preinstall/defaults/main.yml
    description: "Параметр tinker panic NTP (при ntp_manage_config=true)"
  - name: ntp_force_sync_immediately
    default: false
    source_path: roles/kubernetes/preinstall/defaults/main.yml
    description: "Принудительная синхронизация времени сразу после установки NTP"
  - name: ntp_timezone
    default: '""'
    source_path: roles/kubernetes/preinstall/defaults/main.yml
    description: "Часовой пояс сервера (пусто = не менять)"
  - name: supported_os_distributions
    default: "список поддерживаемых дистрибутивов (RedHat, CentOS, Fedora, Ubuntu, Debian, Flatcar, Suse, ...)"
    source_path: roles/kubernetes/preinstall/defaults/main.yml
    description: "Список известных поддерживаемых дистрибутивов ОС"
  - name: redhat_os_family_extensions
    default: "['UnionTech', 'UniontechOS']"
    source_path: roles/kubernetes/preinstall/defaults/main.yml
    description: "Дистрибутивы, расширяющие семейство RedHat"
  - name: systemd_resolved_disable_stub_listener
    default: "{{ ansible_os_family in ['Flatcar', 'Flatcar Container Linux by Kinvolk'] }}"
    source_path: roles/kubernetes/preinstall/defaults/main.yml
    description: "Отключить DNSStubListener systemd-resolved (полезно при занятом 0.0.0.0:53)"
  - name: disable_fapolicyd
    default: true
    source_path: roles/kubernetes/preinstall/defaults/main.yml
    description: "Отключить File Access Policy Daemon (иначе установка CNI падает)"

  # =====================================================================
  # roles/kubernetes/preinstall/vars/main.yml
  # Вычисляемые переменные DNS/resolv.conf
  # =====================================================================
  - name: coredns_server_by_mode
    default: "{coredns, coredns_dual, manual, none: соответствующие списки серверов}"
    source_path: roles/kubernetes/preinstall/vars/main.yml
    description: "Соответствие dns_mode -> список CoreDNS-серверов"
    related: [dns_mode, skydns_server, skydns_server_secondary, manual_dns_server]
  - name: coredns_server
    default: "{{ upstream_dns_servers if dns_early else coredns_server_by_mode[dns_mode] }}"
    source_path: roles/kubernetes/preinstall/vars/main.yml
    description: "Итоговый список CoreDNS-серверов (с учётом dns_early)"
    related: [coredns_server_by_mode, dns_mode, upstream_dns_servers]
  - name: _nameserverentries
    default: "{late: [...], early: [...]} — nameserver'ы для поздней и ранней фаз DNS"
    source_path: roles/kubernetes/preinstall/vars/main.yml
    description: "Внутренние наборы nameserver-записей для ранней/поздней конфигурации DNS"
    related: [nameservers, cloud_resolver, nodelocaldns_ip, enable_nodelocaldns]
  - name: nameserverentries
    default: "{{ ((_nameserverentries['late'] if not dns_early else []) + _nameserverentries['early']) | flatten | unique }}"
    source_path: roles/kubernetes/preinstall/vars/main.yml
    description: "Итоговый уникальный список nameserver-записей для resolv.conf"
    related: [_nameserverentries]
  - name: dhclient_supersede
    default: "{domain-name-servers, domain-name, domain-search: вычисляемые}"
    source_path: roles/kubernetes/preinstall/vars/main.yml
    description: "Параметры supersede для dhclient (DNS-серверы, домен, search)"
    related: [nameservers, cloud_resolver, dns_domain, searchdomains]
  - name: configured_nameservers
    default: "nameserver'ы, извлечённые regex из существующего resolv.conf (или [])"
    source_path: roles/kubernetes/preinstall/vars/main.yml
    description: "Уже настроенные на хосте nameserver'ы (парсинг resolv.conf)"
    reliability: unconfirmed

