  - name: gcp_pd_csi_enabled
    default: false
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Включить GCP Persistent Disk CSI"
  - name: vsphere_csi_enabled
    default: false
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Включить vSphere CSI"
  - name: upcloud_csi_enabled
    default: false
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Включить UpCloud CSI"
  - name: csi_snapshot_controller_enabled
    default: false
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Развернуть CSI snapshot controller"
  - name: persistent_volumes_enabled
    default: false
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Включить поддержку Persistent Volumes"
  - name: ingress_nginx_enabled
    default: false
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Развернуть ingress-nginx"
  - name: ingress_alb_enabled
    default: false
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Развернуть AWS ALB ingress controller"
  - name: cert_manager_enabled
    default: false
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Развернуть cert-manager"
  - name: expand_persistent_volumes
    default: false
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Разрешить расширение Persistent Volumes"
  - name: metallb_enabled
    default: false
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Развернуть MetalLB"
  - name: metallb_speaker_enabled
    default: "{{ metallb_enabled }}"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Включить MetalLB speaker"
    related: [metallb_enabled]
  - name: argocd_enabled
    default: false
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Развернуть Argo CD"
  - name: gateway_api_enabled
    default: false
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Установить CRD Gateway API"
  - name: prometheus_operator_crds_enabled
    default: false
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Установить CRD Prometheus Operator"

  # --- OpenStack / внешние облака ---
  - name: openstack_blockstorage_ignore_volume_az
    default: "{{ volume_cross_zone_attachment | default('false') }}"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Игнорировать AZ тома для OpenStack block storage"
  - name: cinder_csi_ignore_volume_az
    default: "{{ volume_cross_zone_attachment | default('false') }}"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Игнорировать AZ тома для Cinder CSI (кросс-зональное монтирование)"
  - name: openstack_lbaas_enabled
    default: false
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Включить OpenStack LBaaSv2 (in-tree)"
  - name: openstack_lbaas_create_monitor
    default: '"yes"'
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Создавать health-монитор LBaaS"
  - name: openstack_lbaas_monitor_delay
    default: '"1m"'
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Интервал проверки health-монитора LBaaS"
  - name: openstack_lbaas_monitor_timeout
    default: '"30s"'
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Таймаут health-монитора LBaaS"
  - name: openstack_lbaas_monitor_max_retries
    default: '"3"'
    source_path: roles/kubespray_defaults/defaults/main/main.yml
