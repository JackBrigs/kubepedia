    default: "{hcloud_api_token: '', token_secret_name: hcloud, service_account_name: cloud-controller-manager, controller_image_tag: 'latest', controller_extra_args: {}}"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Настройки внешнего Hetzner Cloud Controller (токен, secret, service account, тег образа, extra args)"

  # --- Авторизация / RBAC ---
  - name: authorization_modes
    default: "['Node', 'RBAC']"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Режимы авторизации кластера; тестируются AlwaysAllow, AlwaysDeny, Node, RBAC. Порядок важен"
  - name: kube_apiserver_use_authorization_config_file
    default: false
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Использовать структурированный AuthorizationConfiguration вместо флага --authorization-mode; при true authorization_modes игнорируется"
    related: [authorization_modes, kube_apiserver_authorization_config_authorizers]
  - name: kube_apiserver_authorization_config_api_version
    default: "{{ 'v1alpha1' if kube_version is version('1.30.0', '<') else 'v1beta1' if kube_version is version('1.32.0', '<') else 'v1' }}"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Версия API AuthorizationConfiguration в зависимости от версии K8s"
    related: [kube_version]
  - name: kube_apiserver_authorization_config_authorizers
    default: "[{type: Node, name: node}, {type: RBAC, name: rbac}]"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Список авторизаторов для структурированной AuthorizationConfiguration"
    related: [kube_apiserver_use_authorization_config_file]
  - name: rbac_enabled
    default: "{{ ('RBAC' in authorization_modes and not kube_apiserver_use_authorization_config_file) or (kube_apiserver_use_authorization_config_file and kube_apiserver_authorization_config_authorizers | selectattr('type', 'equalto', 'RBAC') | list | length > 0) }}"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Включён ли RBAC (вычисляется из authorization_modes или authorizers)"
    related: [authorization_modes, kube_apiserver_authorization_config_authorizers]

  # --- kubelet auth / сертификаты ---
  - name: kubelet_authentication_token_webhook
    default: true
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Разрешить аутентификацию по bearer-токенам на HTTPS-эндпоинте kubelet"
  - name: kubelet_authorization_mode_webhook
    default: true
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Требовать авторизацию доступа к kubelet API делегированием на API-сервер"
  - name: kubelet_rotate_certificates
    default: true
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Автоматически ротировать клиентские сертификаты kubelet"
  - name: kubelet_rotate_server_certificates
    default: false
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Запрашивать новый серверный сертификат kubelet у API-сервера"
  - name: kubelet_protect_kernel_defaults
    default: true
    source_path: roles/kubespray_defaults/defaults/main/main.yml
