  - name: external_openstack_lbaas_enabled
    default: true
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Включить LBaaS для внешнего OpenStack Cloud Controller"
  - name: external_openstack_network_ipv6_disabled
    default: false
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Отключить IPv6 для внешнего OpenStack CCM"
  - name: external_openstack_network_internal_networks
    default: "[]"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Список внутренних сетей внешнего OpenStack CCM"
  - name: external_openstack_network_public_networks
    default: "[]"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Список публичных сетей внешнего OpenStack CCM"
