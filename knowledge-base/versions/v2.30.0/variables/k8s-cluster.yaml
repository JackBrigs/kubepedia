  - name: etcd_deployment_type
    default: "host"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Тип развёртывания etcd (legacy-режим): host, docker и др."
  - name: cert_management
    default: "script"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Механизм управления сертификатами"

  # --- kubeconfig / kubectl на Ansible-хосте ---
  - name: kubeconfig_localhost
    default: false
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Копировать kubeconfig на хост Ansible в {{ inventory_dir }}/artifacts. Дублируется в client defaults"
  - name: kubectl_localhost
    default: false
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Скачивать kubectl на хост Ansible в bin_dir. Дублируется в client defaults"
