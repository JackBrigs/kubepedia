---
project: kubespray
kubespray_version: v2.30.0
git_commit: f4ccdb5
source_type: code
source_paths:
  - roles/kubespray_defaults/defaults/main/main.yml
  - roles/kubespray_defaults/vars/main/main.yml
  - roles/kubernetes/control-plane/defaults/main/main.yml
  - roles/kubernetes/control-plane/defaults/main/kube-proxy.yml
  - roles/kubernetes/control-plane/defaults/main/etcd.yml
  - roles/kubernetes/control-plane/defaults/main/kube-scheduler.yml
  - roles/kubernetes/control-plane/vars/main.yaml
  - roles/kubernetes/node/defaults/main.yml
  - roles/kubernetes/node/vars/fedora.yml
  - roles/kubernetes/node/vars/ubuntu-18.yml
  - roles/kubernetes/node/vars/ubuntu-20.yml
  - roles/kubernetes/node/vars/ubuntu-22.yml
  - roles/kubernetes/node/vars/ubuntu-24.yml
  - roles/kubernetes/kubeadm/defaults/main.yml
  - roles/kubernetes/kubeadm_common/defaults/main.yml
  - roles/kubernetes/preinstall/defaults/main.yml
  - roles/kubernetes/preinstall/vars/main.yml
  - roles/kubernetes/client/defaults/main.yml
source_url: https://github.com/kubernetes-sigs/kubespray/tree/v2.30.0
retrieved_at: 2026-07-14
topics: [k8s-cluster, control-plane, kubelet, kube-proxy]
reliability: authoritative
notes: >
  Справочник переменных ядра кластера Kubespray на теге v2.30.0 (commit f4ccdb5).
  Роль kubespray_defaults на этом теге называется roles/kubespray_defaults/ (в v2.29.1
  так же). Роли roles/kubernetes/node-label/ и roles/kubernetes/node-taint/ содержат
  только tasks/ (без defaults/ и vars/), поэтому переменных из них здесь нет.
  Переменные загрузок (download.yml) и контрольные суммы (checksums.yml) вынесены
  в отдельные справочники. Включены только фактически определённые (не закомментированные)
  переменные. Некоторые переменные повторяются в нескольких файлах — для них указан
  каждый source_path с пометкой о дублировании.
variables:

  # =====================================================================
  # roles/kubespray_defaults/defaults/main/main.yml
  # Базовые, системные, сетевые и общекластерные переменные
  # =====================================================================

  # --- SSH / базовые настройки узлов ---
  - name: ansible_ssh_common_args
    default: "{% if 'bastion' in groups['all'] %} -o ProxyCommand='ssh -o UserKnownHostsFile=/dev/null -o StrictHostKeyChecking=no -W %h:%p -p {{ hostvars['bastion']['ansible_port'] | default(22) }} {{ hostvars['bastion']['ansible_user'] }}@{{ hostvars['bastion']['ansible_host'] }} {% if ansible_ssh_private_key_file is defined %}-i {{ ansible_ssh_private_key_file }}{% endif %} ' {% endif %}"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Автоматически добавляет SSH ProxyCommand через bastion-хост, если он есть в группе all"
    conditions: "Применяется только при наличии хоста bastion в группе all"
  - name: preinstall_selinux_state
    default: "permissive"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Целевое состояние SELinux, выставляемое на этапе preinstall (permissive/disabled)"
  - name: ping_access_ip
    default: true
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Проверять доступность access_ip через ping; отключить, если файрвол блокирует ICMP"
  - name: kube_api_anonymous_auth
    default: true
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Разрешает анонимную аутентификацию на kube-apiserver; при значении undef() флаг --anonymous-auth удаляется"
  - name: is_fedora_coreos
    default: false
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Признак Fedora CoreOS; выставляется в true автоматически при обнаружении этой ОС"

  # --- Swap ---
  - name: kubelet_fail_swap_on
    default: true
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Падать при запуске kubelet, если на узле включён swap (failSwapOn)"
  - name: kubelet_swap_behavior
    default: "LimitedSwap"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Поведение kubelet при использовании swap (LimitedSwap/NoSwap)"

  # --- Версии Kubernetes ---
  - name: kube_version
    default: "{{ (kubelet_checksums['amd64'] | dict2items)[0].key }}"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Версия Kubernetes для установки; по умолчанию берётся первая (самая свежая) версия из kubelet_checksums"
    related: [kube_version_min_required, kubelet_checksums]
  - name: kube_version_min_required
    default: "{{ (kubelet_checksums['amd64'] | dict2items)[-1].key }}"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Минимально поддерживаемая версия Kubernetes; последняя (самая старая) в списке kubelet_checksums"
    related: [kube_version]

  # --- kube-proxy режим ---
  - name: kube_proxy_mode
    default: "ipvs"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Режим работы kube-proxy: ipvs, iptables или nftables"

  # --- kubeadm ---
  - name: kubeadm_config_api_version
    default: "{{ 'v1beta4' if kube_version is version('1.31.0', '>=') else 'v1beta3' }}"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Версия API конфигурации kubeadm: v1beta4 для K8s >= 1.31, иначе v1beta3"
    related: [kube_version]
  - name: kubeadm_config_validate_enabled
    default: true
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Валидировать конфиг kubeadm командой validate; отключать только для dev/test с pre-release версиями"
  - name: kubeadm_init_timeout
    default: "300s"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Таймаут инициализации первого control-plane узла (kubeadm init)"
  - name: kube_reserved_cgroups_for_service_slice
    default: "kube.slice"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Имя systemd slice для cgroups сервисов kube (TODO помечен на удаление в коде)"
  - name: kubeadm_init_phases_skip_default
    default: '[ "addon/coredns" ]'
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Базовый список фаз kubeadm init, пропускаемых при развёртывании control plane (по умолчанию addon/coredns)"
    related: [kubeadm_init_phases_skip]
  - name: kubeadm_init_phases_skip
    default: >-
      {%- if kube_network_plugin == 'kube-router' and (kube_router_run_service_proxy is defined and kube_router_run_service_proxy) -%}
      {{ kubeadm_init_phases_skip_default + ["addon/kube-proxy"] }}
      {%- elif kube_network_plugin == 'cilium' and (cilium_kube_proxy_replacement is defined and (cilium_kube_proxy_replacement == 'strict' or (cilium_kube_proxy_replacement | bool) or (cilium_kube_proxy_replacement | string | lower == 'true') )) -%}
      {{ kubeadm_init_phases_skip_default + ["addon/kube-proxy"] }}
      {%- elif kube_network_plugin == 'calico' and (calico_bpf_enabled is defined and calico_bpf_enabled) -%}
      {{ kubeadm_init_phases_skip_default + ["addon/kube-proxy"] }}
      {%- elif kube_proxy_remove is defined and kube_proxy_remove -%}
      {{ kubeadm_init_phases_skip_default + ["addon/kube-proxy"] }}
      {%- else -%}
      {{ kubeadm_init_phases_skip_default }}
      {%- endif -%}
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Итоговый список пропускаемых фаз kubeadm init; при некоторых CNI (kube-router, cilium, calico bpf) или kube_proxy_remove добавляется addon/kube-proxy"
    related: [kubeadm_init_phases_skip_default, kube_network_plugin, kube_proxy_remove]
  - name: kubeadm_join_phases_skip_default
    default: "[]"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Базовый список фаз kubeadm join, пропускаемых при вводе нового узла; для air-gapped может понадобиться ['preflight']"
    related: [kubeadm_join_phases_skip]
  - name: kubeadm_join_phases_skip
    default: "{{ kubeadm_join_phases_skip_default }}"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Итоговый список пропускаемых фаз kubeadm join"
    related: [kubeadm_join_phases_skip_default]
  - name: kubeadm_upgrade_node_phases_skip_default
    default: "[]"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Базовый список фаз kubeadm upgrade node, пропускаемых при обновлении вторичного control-plane узла"
    related: [kubeadm_upgrade_node_phases_skip]
  - name: kubeadm_upgrade_node_phases_skip
    default: >-
      {%- if kube_version is version('1.32.0', '>=') -%}
      {{ kubeadm_upgrade_node_phases_skip_default + kubeadm_init_phases_skip }}
      {%- else -%}
      {{ kubeadm_upgrade_node_phases_skip_default }}
      {%- endif -%}
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Итоговый список пропускаемых фаз kubeadm upgrade node; для K8s >= 1.32 добавляются фазы из kubeadm_init_phases_skip"
    related: [kubeadm_upgrade_node_phases_skip_default, kubeadm_init_phases_skip, kube_version]
  - name: remove_anonymous_access
    default: false
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Удалять привязку роли к анонимным пользователям, создаваемую kubeadm"
    related: [kubeadm_use_file_discovery]

  # --- kube-proxy NodePort ---
  - name: kube_proxy_nodeport_addresses
    default: >-
      {%- if kube_proxy_nodeport_addresses_cidr is defined -%}
      [{{ kube_proxy_nodeport_addresses_cidr }}]
      {%- else -%}
      []
      {%- endif -%}
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Список адресов (CIDR) для NodePort-сервисов; пустой список означает использование всех локальных адресов. Дублируется в roles/kubernetes/control-plane/defaults/main/kube-proxy.yml"
    related: [kube_proxy_nodeport_addresses_cidr]

  - name: ignore_assert_errors
    default: false
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Разрешить продолжение деплоя при провале предварительных проверок (assert). Дублируется в preinstall и client defaults"

  # --- kube-vip / балансировщик ---
  - name: kube_vip_enabled
    default: false
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Включить kube-vip для виртуального IP control plane"
  - name: kube_vip_lb_fwdmethod
    default: "local"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Метод пересылки трафика балансировщика kube-vip (local/masquerade)"
  - name: kube_vip_address
    default: "~"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Виртуальный IP-адрес kube-vip (пусто по умолчанию)"
  - name: nginx_config_dir
    default: "/etc/nginx"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Каталог конфигурации nginx-proxy (локальный балансировщик apiserver)"
  - name: haproxy_config_dir
    default: "/etc/haproxy"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Каталог конфигурации haproxy (локальный балансировщик apiserver)"

  # --- Каталоги бинарников и релизов ---
  - name: bin_dir
    default: "/usr/local/bin"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Каталог установки бинарных файлов (kubectl, kubelet и др.)"
  - name: docker_bin_dir
    default: "/usr/bin"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Каталог бинарников Docker"
  - name: containerd_bin_dir
    default: "{{ bin_dir }}"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Каталог бинарников containerd"
    related: [bin_dir]
  - name: etcd_data_dir
    default: "/var/lib/etcd"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Каталог данных etcd"
  - name: local_release_dir
    default: "/tmp/releases"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Каталог загрузки бинарников (нужно ~1 ГБ свободного места)"
  - name: retry_stagger
    default: 5
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Случайный разброс (сек) для повторов неудачных операций загрузки/выгрузки"

  # --- DNS ---
  - name: cluster_name
    default: "cluster.local"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Имя кластера Kubernetes, также используется как DNS-домен"
    related: [dns_domain]
  - name: ndots
    default: 2
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Значение опции ndots в resolv.conf для hostnet-подов"
  - name: docker_dns_options
    default: "['ndots:{{ ndots }}', 'timeout:2', 'attempts:2']"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Опции resolv.conf по умолчанию (ndots/timeout/attempts)"
    related: [ndots]
  - name: dns_mode
    default: "coredns"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Режим DNS кластера: coredns, coredns_dual, manual или none"
    related: [kube_dns_servers, dns_servers]
  - name: enable_dns_autoscaler
    default: true
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Включить автоскейлер DNS"
  - name: upstream_dns_servers
    default: "[]"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "DNS-серверы, добавляемые после cluster DNS; используются CoreDNS как upstream для внешних запросов"
  - name: enable_nodelocaldns
    default: true
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Включить NodeLocal DNS Cache"
  - name: enable_nodelocaldns_secondary
    default: false
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Включить вторичный экземпляр NodeLocal DNS Cache"
  - name: nodelocaldns_ip
    default: "169.254.25.10"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Link-local IP NodeLocal DNS Cache"
  - name: nodelocaldns_health_port
    default: 9254
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Порт health-check NodeLocal DNS Cache"
  - name: nodelocaldns_second_health_port
    default: 9256
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Порт health-check вторичного NodeLocal DNS Cache"
  - name: nodelocaldns_bind_metrics_host_ip
    default: false
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Привязывать метрики NodeLocal DNS к host IP"
  - name: nodelocaldns_secondary_skew_seconds
    default: 5
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Сдвиг (сек) между первичным и вторичным NodeLocal DNS Cache"
  - name: manual_dns_server
    default: '""'
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Cluster IP кастомного DNS при dns_mode=manual"
    conditions: "Используется при dns_mode=manual"
  - name: resolvconf_mode
    default: "host_resolvconf"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Режим управления resolv.conf: host_resolvconf, docker_dns или none"
  - name: deploy_netchecker
    default: false
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Развернуть приложение netchecker для проверки DNS-резолвинга как HTTP-сервиса"
  - name: skydns_server
    default: "{{ kube_service_subnets.split(',') | first | ansible.utils.ipaddr('net') | ansible.utils.ipaddr(3) | ansible.utils.ipaddr('address') }}"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "IP-адрес DNS-сервиса кластера (3-й адрес service-сети); имя skydns по историческим причинам"
    related: [kube_service_subnets]
  - name: skydns_server_secondary
    default: "{{ kube_service_subnets.split(',') | first | ansible.utils.ipaddr('net') | ansible.utils.ipaddr(4) | ansible.utils.ipaddr('address') }}"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "IP вторичного DNS-сервиса кластера (4-й адрес service-сети)"
    related: [kube_service_subnets]
  - name: dns_domain
    default: "{{ cluster_name }}"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "DNS-домен кластера (равен cluster_name)"
    related: [cluster_name]
  - name: docker_dns_search_domains
    default: "['default.svc.{{ dns_domain }}', 'svc.{{ dns_domain }}']"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Search-домены resolv.conf для контейнеров"
    related: [dns_domain]
  - name: searchdomains
    default: "[]"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Дополнительные search-домены пользователя"
  - name: kube_dns_servers
    default: "{coredns: ['{{ skydns_server }}'], coredns_dual: '{{ [skydns_server] + [skydns_server_secondary] }}', manual: ['{{ manual_dns_server }}']}"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Соответствие dns_mode -> список DNS-серверов"
    related: [dns_mode, skydns_server, skydns_server_secondary, manual_dns_server]
  - name: dns_servers
    default: "{{ kube_dns_servers[dns_mode] }}"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Итоговый список DNS-серверов в зависимости от dns_mode"
    related: [kube_dns_servers, dns_mode]
  - name: enable_coredns_k8s_external
    default: false
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Включить плагин CoreDNS k8s_external"
  - name: coredns_k8s_external_zone
    default: "k8s_external.local"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "DNS-зона для плагина CoreDNS k8s_external"
  - name: enable_coredns_k8s_endpoint_pod_names
    default: false
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Включить резолвинг pod-имён в endpoint для CoreDNS"

  # --- Каталоги и владельцы конфигурации Kubernetes ---
  - name: kube_config_dir
    default: "/etc/kubernetes"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Основной каталог конфигурации Kubernetes. Дублируется в preinstall и client defaults"
  - name: kube_script_dir
    default: "{{ bin_dir }}/kubernetes-scripts"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Каталог вспомогательных скриптов Kubernetes"
    related: [bin_dir]
  - name: kube_manifest_dir
    default: "{{ kube_config_dir }}/manifests"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Каталог статических манифестов подов"
    related: [kube_config_dir]
  - name: kubectl
    default: "{{ bin_dir }}/kubectl --kubeconfig {{ kube_config_dir }}/admin.conf"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Команда kubectl с admin.conf для использования в ролях"
    related: [bin_dir, kube_config_dir]
  - name: kube_cert_dir
    default: "{{ kube_config_dir }}/ssl"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Каталог сертификатов и скриптов сертификатов. Дублируется в preinstall defaults"
    related: [kube_config_dir]
  - name: kube_cert_compat_dir
    default: "/etc/kubernetes/pki"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Каталог совместимости сертификатов для kubeadm. Дублируется в preinstall defaults"
  - name: kube_token_dir
    default: "{{ kube_config_dir }}/tokens"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Каталог хранения bearer-токенов"
    related: [kube_config_dir]
  - name: kube_owner
    default: "kube"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Пользователь-владелец установки кластера. Дублируется в preinstall defaults"
  - name: kube_cert_group
    default: "kube-cert"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Группа, назначаемая файлам сертификатов. Дублируется в preinstall defaults"
  - name: kube_external_ca_mode
    default: false
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Режим внешнего управления CA; отключает задачи манипуляции сертификатами (сертификаты и kubeconfig должны быть заранее подготовлены)"
  - name: kube_log_level
    default: 2
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Уровень логирования компонентов кластера"

