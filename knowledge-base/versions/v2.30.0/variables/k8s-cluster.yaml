    description: "Общий список feature gates кластера"
  - name: kube_apiserver_feature_gates
    default: "[]"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Feature gates kube-apiserver"
  - name: kube_controller_feature_gates
    default: "[]"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Feature gates kube-controller-manager"
  - name: kube_scheduler_feature_gates
    default: "[]"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Feature gates kube-scheduler"
  - name: kube_proxy_feature_gates
    default: "[]"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Feature gates kube-proxy"
  - name: kubelet_feature_gates
    default: "[]"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Feature gates kubelet"
  - name: kubeadm_feature_gates
    default: "[]"
    source_path: roles/kubespray_defaults/defaults/main/main.yml
    description: "Feature gates kubeadm"

  # --- Прочее (storage classes, CA-каталоги) ---
  - name: local_volume_provisioner_storage_classes
