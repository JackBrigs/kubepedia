    source_path: inventory/sample/group_vars/k8s_cluster/kube_control_plane.yml
    comment: "Резерв памяти для компонентов Kubernetes на control plane (значение в kube_control_plane.yml — 512Mi против 256Mi в k8s-cluster.yml)."
  - name: kube_cpu_reserved
    sample_value: "200m (commented)"
    is_set: false
    source_path: inventory/sample/group_vars/k8s_cluster/kube_control_plane.yml
    comment: "Резерв CPU для компонентов Kubernetes на control plane (200m против 100m в k8s-cluster.yml)."
  - name: kube_ephemeral_storage_reserved
    sample_value: "2Gi (commented)"
    is_set: false
    source_path: inventory/sample/group_vars/k8s_cluster/kube_control_plane.yml
    comment: "Резерв ephemeral-хранилища для компонентов control plane."
  - name: kube_pid_reserved
    sample_value: "\"1000\" (commented)"
    is_set: false
    source_path: inventory/sample/group_vars/k8s_cluster/kube_control_plane.yml
    comment: "Резерв PID для компонентов control plane."

