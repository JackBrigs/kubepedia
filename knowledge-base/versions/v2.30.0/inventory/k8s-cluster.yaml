    sample_value: "250m (commented)"
    is_set: false
    source_path: inventory/sample/group_vars/k8s_cluster/kube_control_plane.yml
    comment: "Резерв CPU для системы хоста control plane (250m против 500m в k8s-cluster.yml)."
  - name: system_ephemeral_storage_reserved
    sample_value: "2Gi (commented)"
    is_set: false
    source_path: inventory/sample/group_vars/k8s_cluster/kube_control_plane.yml
    comment: "Резерв ephemeral-хранилища для системы хоста control plane."
  - name: system_pid_reserved
    sample_value: "\"1000\" (commented)"
    is_set: false
    source_path: inventory/sample/group_vars/k8s_cluster/kube_control_plane.yml
