project: kubespray
kubespray_version: v2.30.0
git_commit: f4ccdb5
source_type: inventory
source_paths:
  - inventory/sample/group_vars/all/all.yml
  - inventory/sample/group_vars/all/etcd.yml
  - inventory/sample/group_vars/all/containerd.yml
  - inventory/sample/group_vars/all/cri-o.yml
  - inventory/sample/group_vars/all/docker.yml
  - inventory/sample/group_vars/all/coreos.yml
  - inventory/sample/group_vars/all/offline.yml
source_url: https://github.com/kubernetes-sigs/kubespray/tree/v2.30.0
retrieved_at: 2026-07-14
topics: [inventory, all, offline]
reliability: authoritative

# Примечания:
# - is_set: true  -> переменная в sample-inventory РАСКОММЕНТИРОВАНА (задаёт значение).
# - is_set: false -> переменная ЗАКОММЕНТИРОВАНА (пример по умолчанию), фактическое
#   значение берётся из roles/*/defaults. sample_value содержит значение из комментария.
# - Облачные файлы (aws.yml, gcp.yml, azure.yml, openstack.yml, vsphere.yml, oci.yml,
#   hcloud.yml, huaweicloud.yml, coreos на CoreOS и т.п.) в этот срез НЕ включены —
#   здесь только общие (не облачные) файлы group_vars/all.

variables:
  # ============================================================
  # inventory/sample/group_vars/all/all.yml
  # Общие параметры узлов, балансировщик apiserver, DNS, proxy,
  # сертификаты, RHEL-подписка, sysctl, webhook-auth, NTP
  # ============================================================
  - name: bin_dir
    sample_value: "/usr/local/bin"
    is_set: true
    source_path: inventory/sample/group_vars/all/all.yml
    comment: "Каталог, куда устанавливаются бинарные файлы (kubectl, kubelet и т.д.)."

  - name: access_ip
    sample_value: "commented: 1.1.1.1"
    is_set: false
    source_path: inventory/sample/group_vars/all/all.yml
    comment: "Как другие узлы обращаются к данному узлу (например, публичный IP в AWS/GCP, о котором сам узел не знает); используется, в частности, flannel."

  - name: loadbalancer_apiserver
    sample_value: "commented: {address: 1.2.3.4, port: 1234}"
    is_set: false
    source_path: inventory/sample/group_vars/all/all.yml
    comment: "Конфигурация ВНЕШНЕГО балансировщика apiserver (адрес и порт). Если задан — используется вместо локального балансировщика."

  - name: apiserver_loadbalancer_domain_name
    sample_value: "commented: elb.some.domain"
    is_set: false
    source_path: inventory/sample/group_vars/all/all.yml
    comment: "Доменное имя внешнего балансировщика apiserver (пример в комментарии к loadbalancer_apiserver)."

  - name: loadbalancer_apiserver_localhost
    sample_value: "commented: true"
    is_set: false
    source_path: inventory/sample/group_vars/all/all.yml
    comment: "Использовать локальный балансировщик apiserver на каждом узле. По умолчанию в defaults вычисляется как (loadbalancer_apiserver не задан)."

  - name: loadbalancer_apiserver_type
    sample_value: "commented: nginx"
    is_set: false
    source_path: inventory/sample/group_vars/all/all.yml
    comment: "Тип локального балансировщика apiserver. Допустимые значения: nginx или haproxy."

  - name: loadbalancer_apiserver_port
    sample_value: "6443"
    is_set: true
    source_path: inventory/sample/group_vars/all/all.yml
    comment: "Порт локального балансировщика apiserver. Должен быть 6443."

  - name: loadbalancer_apiserver_healthcheck_port
    sample_value: "8081"
    is_set: true
    source_path: inventory/sample/group_vars/all/all.yml
    comment: "Если задан — включает проверку живости (liveness) через прокси для nginx-балансировщика."

  - name: disable_host_nameservers
    sample_value: "commented: false"
    is_set: false
    source_path: inventory/sample/group_vars/all/all.yml
    comment: "Не включать nameservers хоста в nameserverentries на этапе dns_late (на dns_early они всё равно используются). Применять осторожно — иначе внешние запросы могут не работать."

  - name: upstream_dns_servers
    sample_value: "commented: [8.8.8.8, 8.8.4.4]"
    is_set: false
    source_path: inventory/sample/group_vars/all/all.yml
    comment: "Upstream-DNS-серверы, используемые CoreDNS для внешних запросов."

  - name: cloud_provider
    sample_value: "commented (пусто)"
    is_set: false
    source_path: inventory/sample/group_vars/all/all.yml
    comment: "Специфика облачного провайдера (инкапсуляция пакетов и т.п.). После K8s v1.31 допустимо только значение 'external'."

  - name: external_cloud_provider
    sample_value: "commented (пусто)"
    is_set: false
    source_path: inventory/sample/group_vars/all/all.yml
    comment: "Внешний Cloud Controller Manager. Требует cloud_provider: external. Поддерживаются: openstack, vsphere, oci, huaweicloud, hcloud, manual ('manual' не ставит CCM)."

  - name: http_proxy
    sample_value: 'commented: ""'
    is_set: false
    source_path: inventory/sample/group_vars/all/all.yml
    comment: "HTTP-прокси для пакетного менеджера и docker-демона."

  - name: https_proxy
    sample_value: 'commented: ""'
    is_set: false
    source_path: inventory/sample/group_vars/all/all.yml
    comment: "HTTPS-прокси для пакетного менеджера и docker-демона."

  - name: https_proxy_cert_file
    sample_value: 'commented: ""'
    is_set: false
    source_path: inventory/sample/group_vars/all/all.yml
    comment: "Кастомный CA-сертификат для https_proxy при необходимости."

  - name: no_proxy
    sample_value: 'commented: ""'
    is_set: false
    source_path: inventory/sample/group_vars/all/all.yml
    comment: "Список адресов, исключаемых из проксирования. Перед изменением см. roles/kubespray_defaults/defaults/main/main.yml."

  - name: download_validate_certs
    sample_value: "commented: False"
    is_set: false
    source_path: inventory/sample/group_vars/all/all.yml
    comment: "Отключить проверку SSL-сертификатов в модуле get_url (обход бага ansible#32750 при https-прокси); контрольные суммы проверяются всё равно."

  - name: additional_no_proxy
    sample_value: 'commented: ""'
    is_set: false
    source_path: inventory/sample/group_vars/all/all.yml
    comment: "Дополнительные ресурсы, исключаемые из проксирования (добавляются к no_proxy)."

  - name: skip_http_proxy_on_os_packages
    sample_value: "commented: false"
    is_set: false
    source_path: inventory/sample/group_vars/all/all.yml
    comment: "Не задавать прокси для репозиториев ОС (yum.conf/apt.conf), оставаясь за http_proxy. Для debian/ubuntu требуется задать no_proxy."

  - name: no_proxy_exclude_workers
    sample_value: "false"
    is_set: true
    source_path: inventory/sample/group_vars/all/all.yml
    comment: "Если true — в no_proxy включаются только control-plane узлы (не воркеры), чтобы добавление/удаление воркеров не перезапускало docker на всех узлах."

  - name: cert_management
    sample_value: "commented: script"
    is_set: false
    source_path: inventory/sample/group_vars/all/all.yml
    comment: "Механизм генерации сертификатов. Значения: script (по умолчанию) или none (свои сертификаты)."

  - name: ignore_assert_errors
    sample_value: "commented: false"
    is_set: false
    source_path: inventory/sample/group_vars/all/all.yml
    comment: "Разрешить провал предварительных проверок (assert) и продолжить деплой."

  - name: kube_read_only_port
    sample_value: "commented: 10255"
    is_set: false
    source_path: inventory/sample/group_vars/all/all.yml
    comment: "Read-only порт kubelet без аутентификации/авторизации. По умолчанию отключён (переменная закомментирована)."

  - name: download_container
    sample_value: "commented: true"
    is_set: false
    source_path: inventory/sample/group_vars/all/all.yml
    comment: "Скачивать и кэшировать контейнерные образы."

  - name: deploy_container_engine
    sample_value: "commented: true"
    is_set: false
    source_path: inventory/sample/group_vars/all/all.yml
    comment: "Разворачивать движок контейнеров. Установить false, чтобы поставить его вручную."

  - name: rh_subscription_username
    sample_value: 'commented: ""'
    is_set: false
    source_path: inventory/sample/group_vars/all/all.yml
    comment: "Имя пользователя подписки Red Hat Enterprise Linux."

  - name: rh_subscription_password
    sample_value: 'commented: ""'
    is_set: false
    source_path: inventory/sample/group_vars/all/all.yml
    comment: "Пароль подписки RHEL."

  - name: rh_subscription_org_id
    sample_value: 'commented: ""'
    is_set: false
    source_path: inventory/sample/group_vars/all/all.yml
    comment: "Organization ID подписки RHEL (альтернатива логину/паролю вместе с activation key)."

  - name: rh_subscription_activation_key
    sample_value: 'commented: ""'
    is_set: false
    source_path: inventory/sample/group_vars/all/all.yml
    comment: "Activation Key подписки RHEL."

  - name: rh_subscription_usage
    sample_value: 'commented: "Development"'
    is_set: false
    source_path: inventory/sample/group_vars/all/all.yml
    comment: "Назначение подписки RHEL (usage)."

  - name: rh_subscription_role
    sample_value: 'commented: "Red Hat Enterprise Server"'
    is_set: false
    source_path: inventory/sample/group_vars/all/all.yml
    comment: "Роль подписки RHEL."

  - name: rh_subscription_sla
    sample_value: 'commented: "Self-Support"'
    is_set: false
    source_path: inventory/sample/group_vars/all/all.yml
    comment: "Уровень SLA подписки RHEL."

  - name: ping_access_ip
    sample_value: "commented: true"
    is_set: false
    source_path: inventory/sample/group_vars/all/all.yml
    comment: "Проверять доступность access_ip через ping. Отключить, если файрвол блокирует ICMP."

  - name: sysctl_file_path
    sample_value: 'commented: "/etc/sysctl.d/99-sysctl.conf"'
    is_set: false
    source_path: inventory/sample/group_vars/all/all.yml
    comment: "Путь к файлу, в который записываются sysctl-настройки."

  - name: sysctl_ignore_unknown_keys
    sample_value: "commented: false"
    is_set: false
    source_path: inventory/sample/group_vars/all/all.yml
    comment: "Игнорировать ошибки sysctl о неизвестных ключах."

  - name: kube_webhook_token_auth
    sample_value: "false"
    is_set: true
    source_path: inventory/sample/group_vars/all/all.yml
    comment: "Включить webhook token authentication на apiserver."

  - name: kube_webhook_token_auth_url_skip_tls_verify
    sample_value: "false"
    is_set: true
    source_path: inventory/sample/group_vars/all/all.yml
    comment: "Пропускать проверку TLS-сертификата URL webhook token auth."

  - name: kube_webhook_token_auth_url
    sample_value: "commented: https://..."
    is_set: false
    source_path: inventory/sample/group_vars/all/all.yml
    comment: "URL сервиса webhook token authentication."

  - name: kube_webhook_token_auth_ca_data
    sample_value: 'commented: "LS0t..."'
    is_set: false
    source_path: inventory/sample/group_vars/all/all.yml
    comment: "CA-сертификат webhook (base64-строка)."

  - name: ntp_enabled
    sample_value: "false"
    is_set: true
    source_path: inventory/sample/group_vars/all/all.yml
    comment: "Запускать и включать при загрузке сервис ntpd/chrony."

  - name: ntp_manage_config
    sample_value: "false"
    is_set: true
    source_path: inventory/sample/group_vars/all/all.yml
    comment: "Управлять конфигурацией NTP (перезаписывать её значениями ntp_servers)."

  - name: ntp_servers
    sample_value: '["0.pool.ntp.org iburst", "1.pool.ntp.org iburst", "2.pool.ntp.org iburst", "3.pool.ntp.org iburst"]'
    is_set: true
    source_path: inventory/sample/group_vars/all/all.yml
    comment: "Список NTP-серверов (применяется при ntp_manage_config: true)."

  - name: unsafe_show_logs
    sample_value: "false"
    is_set: true
    source_path: inventory/sample/group_vars/all/all.yml
    comment: "Управляет атрибутом no_log. При true отладочный вывод задач может раскрывать приватные данные."

  - name: allow_unsupported_distribution_setup
    sample_value: "false"
    is_set: true
    source_path: inventory/sample/group_vars/all/all.yml
    comment: "Разрешить установку на неподдерживаемых дистрибутивах ОС (возможны непредвиденные сбои)."

  # ============================================================
  # inventory/sample/group_vars/all/etcd.yml
  # Параметры развёртывания etcd
  # ============================================================
  - name: etcd_data_dir
    sample_value: "/var/lib/etcd"
    is_set: true
    source_path: inventory/sample/group_vars/all/etcd.yml
    comment: "Каталог данных etcd (WAL и snapshot-файлы)."

  - name: container_manager
    sample_value: "commented: containerd"
    is_set: false
    source_path: inventory/sample/group_vars/all/etcd.yml
    comment: "Движок контейнеров для узлов etcd: docker/crio/containerd или kubeadm (экспериментально). Если не задан — наследуется из Kubespray defaults (containerd), а не из k8s-cluster.yml. Позволяет использовать отдельный движок именно для etcd-узлов."

  - name: etcd_deployment_type
    sample_value: "host"
    is_set: true
    source_path: inventory/sample/group_vars/all/etcd.yml
    comment: "Тип развёртывания etcd. host — бинарник как systemd-сервис; при container_manager: docker следует ставить docker."

  # ============================================================
  # inventory/sample/group_vars/all/containerd.yml
  # Все переменные закомментированы (defaults в
  # roles/container-engine/containerd/defaults/main.yml)
  # ============================================================
  - name: containerd_storage_dir
    sample_value: 'commented: "/var/lib/containerd"'
    is_set: false
    source_path: inventory/sample/group_vars/all/containerd.yml
    comment: "Каталог хранения данных containerd (root)."

  - name: containerd_state_dir
    sample_value: 'commented: "/run/containerd"'
    is_set: false
    source_path: inventory/sample/group_vars/all/containerd.yml
    comment: "Каталог runtime-состояния containerd."

  - name: containerd_oom_score
    sample_value: "commented: 0"
    is_set: false
    source_path: inventory/sample/group_vars/all/containerd.yml
    comment: "Значение OOMScoreAdjust для процесса containerd."

  - name: containerd_default_runtime
    sample_value: 'commented: "runc"'
    is_set: false
    source_path: inventory/sample/group_vars/all/containerd.yml
    comment: "Рантайм по умолчанию в конфигурации CRI containerd."

  - name: containerd_snapshotter
    sample_value: 'commented: "native"'
    is_set: false
    source_path: inventory/sample/group_vars/all/containerd.yml
    comment: "Снапшоттер containerd. ВНИМАНИЕ: пример в inventory (native) отличается от фактического default в роли (overlayfs) — см. discrepancies."

  - name: containerd_runc_runtime
    sample_value: 'commented: {name: runc, type: "io.containerd.runc.v2", options: {Root: ""}}'
    is_set: false
    source_path: inventory/sample/group_vars/all/containerd.yml
    comment: "Определение рантайма runc для CRI-плагина containerd. В inventory приведён упрощённый пример (в defaults полнее: base_runtime_spec, SystemdCgroup, BinaryName)."

  - name: containerd_additional_runtimes
    sample_value: 'commented: [{name: kata, type: "io.containerd.kata.v2", options: {Root: ""}}]'
    is_set: false
    source_path: inventory/sample/group_vars/all/containerd.yml
    comment: "Список дополнительных рантаймов (пример — Kata Containers). По умолчанию пуст."

  - name: containerd_grpc_max_recv_message_size
    sample_value: "commented: 16777216"
    is_set: false
    source_path: inventory/sample/group_vars/all/containerd.yml
    comment: "Максимальный размер принимаемого gRPC-сообщения containerd (байт)."

  - name: containerd_grpc_max_send_message_size
    sample_value: "commented: 16777216"
    is_set: false
    source_path: inventory/sample/group_vars/all/containerd.yml
    comment: "Максимальный размер отправляемого gRPC-сообщения containerd (байт)."

  - name: containerd_debug_address
    sample_value: 'commented: ""'
    is_set: false
    source_path: inventory/sample/group_vars/all/containerd.yml
    comment: "Адрес debug-сокета containerd (unix или tcp). Пусто — отключено."

  - name: containerd_debug_level
    sample_value: 'commented: "info"'
    is_set: false
    source_path: inventory/sample/group_vars/all/containerd.yml
    comment: "Уровень логирования containerd."

  - name: containerd_debug_format
    sample_value: 'commented: ""'
    is_set: false
    source_path: inventory/sample/group_vars/all/containerd.yml
    comment: "Формат логов containerd: text или json."

  - name: containerd_debug_uid
    sample_value: "commented: 0"
    is_set: false
    source_path: inventory/sample/group_vars/all/containerd.yml
    comment: "UID владельца debug-сокета containerd."

  - name: containerd_debug_gid
    sample_value: "commented: 0"
    is_set: false
    source_path: inventory/sample/group_vars/all/containerd.yml
    comment: "GID владельца debug-сокета containerd."

  - name: containerd_metrics_address
    sample_value: 'commented: ""'
    is_set: false
    source_path: inventory/sample/group_vars/all/containerd.yml
    comment: "Адрес экспорта метрик containerd. Пусто — отключено."

  - name: containerd_metrics_grpc_histogram
    sample_value: "commented: false"
    is_set: false
    source_path: inventory/sample/group_vars/all/containerd.yml
    comment: "Включить гистограммы gRPC в метриках containerd."

  - name: containerd_registries_mirrors
    sample_value: "commented: [{prefix: docker.io, mirrors: [{host: https://registry-1.docker.io, capabilities: [pull, resolve], skip_verify: false, header: {Authorization: 'Basic XXX'}}]}]"
    is_set: false
    source_path: inventory/sample/group_vars/all/containerd.yml
    comment: "Зеркала реестров для containerd (prefix, host, capabilities, skip_verify, header)."

  - name: containerd_max_container_log_line_size
    sample_value: "commented: 16384"
    is_set: false
    source_path: inventory/sample/group_vars/all/containerd.yml
    comment: "Максимальный размер строки лога контейнера (байт)."

  - name: containerd_registry_auth
    sample_value: "commented: [{registry: 10.0.0.2:5000, username: user, password: pass}]"
    is_set: false
    source_path: inventory/sample/group_vars/all/containerd.yml
    comment: "Аутентификация в реестрах containerd (registry/username/password)."

  # ============================================================
  # inventory/sample/group_vars/all/cri-o.yml
  # Все переменные закомментированы
  # ============================================================
  - name: crio_insecure_registries
    sample_value: "commented: [10.0.0.2:5000]"
    is_set: false
    source_path: inventory/sample/group_vars/all/cri-o.yml
    comment: "Список insecure-реестров для CRI-O."

  - name: crio_registry_auth
    sample_value: "commented: [{registry: 10.0.0.2:5000, username: user, password: pass}]"
    is_set: false
    source_path: inventory/sample/group_vars/all/cri-o.yml
    comment: "Аутентификация в реестрах CRI-O (registry/username/password)."

  # ============================================================
  # inventory/sample/group_vars/all/docker.yml
  # Параметры docker-движка (актуальны при container_manager: docker)
  # ============================================================
  - name: docker_storage_options
    sample_value: "commented: -s overlay2"
    is_set: false
    source_path: inventory/sample/group_vars/all/docker.yml
    comment: "Принудительно задать overlay/overlay2 как storage driver docker (overlay2 — только на новых ядрах)."

  - name: docker_container_storage_setup
    sample_value: "false"
    is_set: true
    source_path: inventory/sample/group_vars/all/docker.yml
    comment: "Настроить devicemapper через docker-storage-setup (актуально для CentOS7/RHEL7)."

  - name: docker_container_storage_setup_devs
    sample_value: "commented: /dev/vdb"
    is_set: false
    source_path: inventory/sample/group_vars/all/docker.yml
    comment: "Путь к диску для docker_container_storage_setup (обязателен при его включении)."

  - name: docker_cgroup_driver
    sample_value: "commented: systemd"
    is_set: false
    source_path: inventory/sample/group_vars/all/docker.yml
    comment: "Cgroup driver docker-демона (native.cgroupdriver): systemd или cgroupfs (по умолчанию systemd)."

  - name: docker_dns_servers_strict
    sample_value: "false"
    is_set: true
    source_path: inventory/sample/group_vars/all/docker.yml
    comment: "Если true — Kubespray использует только первые 3 nameserver, иначе при их избытке падает."

  - name: docker_daemon_graph
    sample_value: '"/var/lib/docker"'
    is_set: true
    source_path: inventory/sample/group_vars/all/docker.yml
    comment: "Каталог хранения данных Docker."

  - name: docker_iptables_enabled
    sample_value: '"false"'
    is_set: true
    source_path: inventory/sample/group_vars/all/docker.yml
    comment: "Управление iptables демоном Docker (строковое значение)."

  - name: docker_log_opts
    sample_value: '"--log-opt max-size=50m --log-opt max-file=5"'
    is_set: true
