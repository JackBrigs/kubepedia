project: kubespray
kubespray_version: v2.30.0
git_commit: f4ccdb5
source_type: inventory
source_paths:
  - inventory/sample/group_vars/k8s_cluster/addons.yml
source_url: https://github.com/kubernetes-sigs/kubespray/tree/v2.30.0
retrieved_at: 2026-07-14
topics: [inventory, addons]
reliability: authoritative
notes: >
  Разбор sample-файла addons.yml тега v2.30.0 (commit f4ccdb5). Поле is_set: true —
  переменная в файле раскомментирована и реально задаётся; is_set: false — закомментированный
  пример/дефолт для справки. Значения приведены дословно. Все реально заданные значения
  совпадают с defaults ролей kubernetes-apps (см. discrepancies.md среза). Большинство
  флагов включения аддонов заданы явно (false), тонкие параметры каждого аддона —
  закомментированы.

variables:
