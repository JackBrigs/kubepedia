  # ── Hetzner Cloud (inventory/sample/group_vars/all/hcloud.yml) — внешний CCM Hcloud ──
  - name: external_hcloud_cloud
    sample_value: "<словарь с параметрами внешнего Hcloud Cloud Controller>"
    is_set: false
    source_path: inventory/sample/group_vars/all/hcloud.yml
    provider: hcloud
    comment: >-
      Словарь настроек внешнего Hetzner Cloud Controller Manager. Вложенные ключи:
      hcloud_api_token ("") — API-токен Hetzner;
      token_secret_name (hcloud) — имя секрета с токеном;
      with_networks (false) — использовать CCM с поддержкой сетей;
      network_name — имя/ID сети (при самостоятельном управлении сетью);
      service_account_name (cloud-controller-manager) — сервис-аккаунт CCM;
      controller_image_tag ("latest") — тег образа контроллера;
      controller_extra_args ({}) — дополнительные аргументы демонсета CCM;
      load_balancers_location — локация балансировщиков (взаимоисключающа с network_zone);
      load_balancers_network_zone — сетевая зона балансировщиков;
      load_balancers_disable_private_ingress — отключить приватный ingress (для IPVS-плагинов);
      load_balancers_use_private_ip — использовать приватный IP (при приватных сетях);
      load_balancers_enabled — включить балансировщики;
      network_routes_enabled — включить сетевые маршруты.

