    sample_value: "true"
    is_set: false
    source_path: inventory/sample/group_vars/all/aws.yml
    provider: aws
    comment: "Разрешает планирование томов (topology-aware) для EBS CSI"
  - name: aws_ebs_csi_enable_volume_snapshot
    sample_value: "false"
    is_set: false
    source_path: inventory/sample/group_vars/all/aws.yml
    provider: aws
    comment: "Включает поддержку снапшотов томов EBS"
  - name: aws_ebs_csi_enable_volume_resizing
    sample_value: "false"
    is_set: false
    source_path: inventory/sample/group_vars/all/aws.yml
