    sample_value: "commented (пример: \"Mon *-*-1,2,3,4,5,6,7 03:00:00\")"
    is_set: false
    source_path: inventory/sample/group_vars/k8s_cluster/k8s-cluster.yml
    comment: "systemd-calendar расписание автообновления сертификатов (первый понедельник месяца)."

  # --- kubeadm patches ---
  - name: kubeadm_patches_dir
    sample_value: "{{ kube_config_dir }}/patches"
