    source_path: inventory/sample/group_vars/k8s_cluster/k8s-cluster.yml
    comment: "Поддерживаемые наборы шифров TLS."

  # --- Прочее: события и ротация сертификатов ---
  - name: event_ttl_duration
    sample_value: "1h0m0s"
