    description: "Имя пользователя OpenStack для внешнего CCM."
    conditions: "используется при cloud_provider: external и external_cloud_provider: openstack"
  - name: external_openstack_password
    default: "{{ lookup('env', 'OS_PASSWORD') }}"
    source_path: roles/kubernetes-apps/external_cloud_controller/openstack/defaults/main.yml
    description: "Пароль OpenStack для внешнего CCM."
    conditions: "используется при cloud_provider: external и external_cloud_provider: openstack"
  - name: external_openstack_application_credential_id
    default: "{{ lookup('env', 'OS_APPLICATION_CREDENTIAL_ID') }}"
    source_path: roles/kubernetes-apps/external_cloud_controller/openstack/defaults/main.yml
    description: "ID application credential OpenStack для внешнего CCM."
    conditions: "используется при cloud_provider: external и external_cloud_provider: openstack"
  - name: external_openstack_application_credential_name
    default: "{{ lookup('env', 'OS_APPLICATION_CREDENTIAL_NAME') }}"
    source_path: roles/kubernetes-apps/external_cloud_controller/openstack/defaults/main.yml
    description: "Имя application credential OpenStack для внешнего CCM."
    conditions: "используется при cloud_provider: external и external_cloud_provider: openstack"
  - name: external_openstack_application_credential_secret
    default: "{{ lookup('env', 'OS_APPLICATION_CREDENTIAL_SECRET') }}"
    source_path: roles/kubernetes-apps/external_cloud_controller/openstack/defaults/main.yml
    description: "Секрет application credential OpenStack для внешнего CCM."
    conditions: "используется при cloud_provider: external и external_cloud_provider: openstack"
  - name: external_openstack_region
    default: "{{ lookup('env', 'OS_REGION_NAME') }}"
    source_path: roles/kubernetes-apps/external_cloud_controller/openstack/defaults/main.yml
    description: "Регион OpenStack для внешнего CCM."
    conditions: "используется при cloud_provider: external и external_cloud_provider: openstack"
  - name: external_openstack_tenant_id
    default: "{{ lookup('env', 'OS_TENANT_ID') | default(lookup('env', 'OS_PROJECT_ID'), true) }}"
    source_path: roles/kubernetes-apps/external_cloud_controller/openstack/defaults/main.yml
    description: "ID тенанта/проекта OpenStack для внешнего CCM."
    conditions: "используется при cloud_provider: external и external_cloud_provider: openstack"
  - name: external_openstack_tenant_name
    default: "{{ lookup('env', 'OS_TENANT_NAME') | default(lookup('env', 'OS_PROJECT_NAME'), true) }}"
    source_path: roles/kubernetes-apps/external_cloud_controller/openstack/defaults/main.yml
    description: "Имя тенанта/проекта OpenStack для внешнего CCM."
    conditions: "используется при cloud_provider: external и external_cloud_provider: openstack"
  - name: external_openstack_domain_name
    default: "{{ lookup('env', 'OS_USER_DOMAIN_NAME') }}"
    source_path: roles/kubernetes-apps/external_cloud_controller/openstack/defaults/main.yml
    description: "Имя домена пользователя OpenStack для внешнего CCM."
    conditions: "используется при cloud_provider: external и external_cloud_provider: openstack"
  - name: external_openstack_domain_id
    default: "{{ lookup('env', 'OS_USER_DOMAIN_ID') }}"
    source_path: roles/kubernetes-apps/external_cloud_controller/openstack/defaults/main.yml
    description: "ID домена пользователя OpenStack для внешнего CCM."
    conditions: "используется при cloud_provider: external и external_cloud_provider: openstack"
  - name: external_openstack_cacert
    default: "{{ lookup('env', 'OS_CACERT') }}"
    source_path: roles/kubernetes-apps/external_cloud_controller/openstack/defaults/main.yml
    description: "Путь к CA-сертификату OpenStack для внешнего CCM."
    conditions: "используется при cloud_provider: external и external_cloud_provider: openstack"
  - name: external_openstack_cloud_controller_extra_args
    default: "{}"
    source_path: roles/kubernetes-apps/external_cloud_controller/openstack/defaults/main.yml
    description: "Дополнительные аргументы DaemonSet OpenStack CCM."
    conditions: "используется при cloud_provider: external и external_cloud_provider: openstack"
  - name: external_openstack_cloud_controller_image_tag
    default: "\"v1.32.0\""
    source_path: roles/kubernetes-apps/external_cloud_controller/openstack/defaults/main.yml
    description: "Тег образа OpenStack CCM."
    conditions: "используется при cloud_provider: external и external_cloud_provider: openstack"
  - name: external_openstack_cloud_controller_bind_address
    default: "127.0.0.1"
    source_path: roles/kubernetes-apps/external_cloud_controller/openstack/defaults/main.yml
    description: "Адрес привязки OpenStack CCM."
    conditions: "используется при cloud_provider: external и external_cloud_provider: openstack"
  - name: external_openstack_cloud_controller_dns_policy
    default: "ClusterFirst"
    source_path: roles/kubernetes-apps/external_cloud_controller/openstack/defaults/main.yml
    description: "dnsPolicy подов OpenStack CCM."
    conditions: "используется при cloud_provider: external и external_cloud_provider: openstack"
  - name: external_openstack_lbaas_member_subnet_id
    default: "{{ external_openstack_lbaas_subnet_id }}"
    source_path: roles/kubernetes-apps/external_cloud_controller/openstack/defaults/main.yml
    description: "ID подсети member-ов LBaaS (по умолчанию равен external_openstack_lbaas_subnet_id, который должен быть задан пользователем)."
    conditions: "используется при cloud_provider: external и external_cloud_provider: openstack"

  # --- external_cloud_controller: vsphere ---
  - name: external_vsphere_cloud_controller_extra_args
    default: "{}"
    source_path: roles/kubernetes-apps/external_cloud_controller/vsphere/defaults/main.yml
    description: "Дополнительные аргументы DaemonSet vSphere CCM."
    conditions: "используется при cloud_provider: external и external_cloud_provider: vsphere"
  - name: external_vsphere_cloud_controller_image_tag
    default: "\"v1.31.0\""
    source_path: roles/kubernetes-apps/external_cloud_controller/vsphere/defaults/main.yml
    description: "Тег образа vSphere CCM (переменные external_vsphere_vcenter_port, external_vsphere_insecure, external_vsphere_user, external_vsphere_password определены в этой роли повторно с теми же значениями, что и в csi_driver/vsphere)."
    conditions: "используется при cloud_provider: external и external_cloud_provider: vsphere"

  # --- persistent_volumes: aws-ebs-csi ---
  - name: restrict_az_provisioning
    default: "false"
    source_path: roles/kubernetes-apps/persistent_volumes/aws-ebs-csi/defaults/main.yml
    description: "Ограничить зоны доступности при создании томов EBS (требует aws_ebs_csi_enable_volume_scheduling: true)."
    conditions: "используется при persistent_volumes_enabled и aws_ebs_csi_enabled"
    related: [aws_ebs_availability_zones]
  - name: aws_ebs_availability_zones
    default: |-
      - eu-west-3c
    source_path: roles/kubernetes-apps/persistent_volumes/aws-ebs-csi/defaults/main.yml
    description: "Список разрешённых зон доступности для томов EBS."
    conditions: "используется при persistent_volumes_enabled, aws_ebs_csi_enabled и restrict_az_provisioning"

  # --- persistent_volumes: azuredisk-csi ---
  - name: storage_account_type
    default: "StandardSSD_LRS"
    source_path: roles/kubernetes-apps/persistent_volumes/azuredisk-csi/defaults/main.yml
    description: "Тип учётной записи хранения Azure Disk (Standard_LRS, Premium_LRS, StandardSSD_LRS, UltraSSD_LRS)."
    conditions: "используется при persistent_volumes_enabled и azure_csi_enabled"

  # --- persistent_volumes: cinder-csi ---
  - name: storage_classes
    default: |-
      - name: cinder-csi
        is_default: false
        parameters:
          availability: nova
          allowVolumeExpansion: false
    source_path: roles/kubernetes-apps/persistent_volumes/cinder-csi/defaults/main.yml
    description: "Список StorageClass для Cinder CSI. Внимание: одноимённая переменная с другим значением определена в persistent_volumes/upcloud-csi (см. ниже) — роли взаимоисключающие по провайдеру."
    conditions: "используется при persistent_volumes_enabled и cinder_csi_enabled"

  # --- persistent_volumes: gcp-pd-csi ---
  - name: gcp_pd_csi_volume_type
    default: "pd-standard"
    source_path: roles/kubernetes-apps/persistent_volumes/gcp-pd-csi/defaults/main.yml
    description: "Тип диска GCP PD: pd-standard или pd-ssd."
    conditions: "используется при persistent_volumes_enabled и gcp_pd_csi_enabled"
  - name: gcp_pd_regional_replication_enabled
    default: "false"
    source_path: roles/kubernetes-apps/persistent_volumes/gcp-pd-csi/defaults/main.yml
    description: "Включает региональную репликацию дисков GCP PD."
    conditions: "используется при persistent_volumes_enabled и gcp_pd_csi_enabled"
  - name: gcp_pd_restrict_zone_replication
    default: "false"
    source_path: roles/kubernetes-apps/persistent_volumes/gcp-pd-csi/defaults/main.yml
    description: "Ограничить зоны репликации дисков GCP PD."
    conditions: "используется при persistent_volumes_enabled и gcp_pd_csi_enabled"
    related: [gcp_pd_restricted_zones]
  - name: gcp_pd_restricted_zones
    default: |-
      - europe-west1-b
      - europe-west1-c
    source_path: roles/kubernetes-apps/persistent_volumes/gcp-pd-csi/defaults/main.yml
    description: "Список разрешённых зон репликации дисков GCP PD."
    conditions: "используется при persistent_volumes_enabled, gcp_pd_csi_enabled и gcp_pd_restrict_zone_replication"

  # --- persistent_volumes: upcloud-csi ---
  - name: storage_classes
    default: |-
      - name: standard
        is_default: true
        expand_persistent_volumes: true
        parameters:
          tier: maxiops
      - name: hdd
        is_default: false
        expand_persistent_volumes: true
        parameters:
          tier: hdd
    source_path: roles/kubernetes-apps/persistent_volumes/upcloud-csi/defaults/main.yml
    description: "Список StorageClass для UpCloud CSI (одноимённая переменная storage_classes с другим значением по умолчанию, чем в cinder-csi)."
    conditions: "используется при persistent_volumes_enabled и upcloud_csi_enabled"

  # --- policy_controller: calico (kube-controllers) ---
  - name: calico_policy_controller_cpu_limit
    default: "1000m"
    source_path: roles/kubernetes-apps/policy_controller/calico/defaults/main.yml
    description: "Лимит CPU calico-kube-controllers."
    conditions: "используется при kube_network_plugin: calico и enable_network_policy"
  - name: calico_policy_controller_memory_limit
    default: "256M"
    source_path: roles/kubernetes-apps/policy_controller/calico/defaults/main.yml
    description: "Лимит памяти calico-kube-controllers."
    conditions: "используется при kube_network_plugin: calico и enable_network_policy"
  - name: calico_policy_controller_cpu_requests
    default: "30m"
    source_path: roles/kubernetes-apps/policy_controller/calico/defaults/main.yml
    description: "Запрос CPU calico-kube-controllers."
    conditions: "используется при kube_network_plugin: calico и enable_network_policy"
  - name: calico_policy_controller_memory_requests
    default: "64M"
    source_path: roles/kubernetes-apps/policy_controller/calico/defaults/main.yml
    description: "Запрос памяти calico-kube-controllers."
    conditions: "используется при kube_network_plugin: calico и enable_network_policy"
  - name: calico_policy_controller_deployment_nodeselector
    default: "kubernetes.io/os: linux"
    source_path: roles/kubernetes-apps/policy_controller/calico/defaults/main.yml
    description: "nodeSelector деплоймента calico-kube-controllers."
    conditions: "используется при kube_network_plugin: calico и enable_network_policy"
  - name: calico_policy_controller_log_level
    default: "info"
    source_path: roles/kubernetes-apps/policy_controller/calico/defaults/main.yml
    description: "Уровень логирования calico-kube-controllers."
    conditions: "используется при kube_network_plugin: calico и enable_network_policy"
  - name: calico_cert_dir
    default: "\"/etc/calico/certs\""
    source_path: roles/kubernetes-apps/policy_controller/calico/defaults/main.yml
    description: "Каталог TLS-сертификатов Calico на узле (для доступа kube-controllers к etcd)."
    conditions: "используется при kube_network_plugin: calico и enable_network_policy"

  # --- snapshots: snapshot-controller ---
  - name: snapshot_controller_replicas
    default: "1"
    source_path: roles/kubernetes-apps/snapshots/snapshot-controller/defaults/main.yml
    description: "Число реплик snapshot-controller."
    conditions: "используется при csi_snapshot_controller_enabled"
  - name: snapshot_controller_namespace
    default: "kube-system"
    source_path: roles/kubernetes-apps/snapshots/snapshot-controller/defaults/main.yml
    description: "Namespace для snapshot-controller."
    conditions: "используется при csi_snapshot_controller_enabled"

  # --- snapshots: cinder-csi ---
  - name: snapshot_classes
    default: |-
      - name: cinder-csi-snapshot
        is_default: false
        force_create: true
        deletionPolicy: Delete
    source_path: roles/kubernetes-apps/snapshots/cinder-csi/defaults/main.yml
    description: "Список VolumeSnapshotClass для Cinder CSI."
    conditions: "используется при cinder_csi_enabled и csi_snapshot_controller_enabled"
