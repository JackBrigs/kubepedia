  - name: external_oracle_ratelimiter_qps_write
    default: "20.0"
    source_path: roles/kubernetes-apps/external_cloud_controller/oci/defaults/main.yml
    description: "QPS записи rate limiter OCI CCM."
    conditions: "используется при cloud_provider: external и external_cloud_provider: oci"
  - name: external_oracle_ratelimiter_bucket_write
    default: "5"
    source_path: roles/kubernetes-apps/external_cloud_controller/oci/defaults/main.yml
    description: "Размер bucket записи rate limiter OCI CCM."
    conditions: "используется при cloud_provider: external и external_cloud_provider: oci"
  - name: external_oracle_cloud_controller_image_repo
    default: "ghcr.io/oracle/cloud-provider-oci"
    source_path: roles/kubernetes-apps/external_cloud_controller/oci/defaults/main.yml
    description: "Репозиторий образа OCI CCM."
    conditions: "используется при cloud_provider: external и external_cloud_provider: oci"
  - name: external_oracle_cloud_controller_image_tag
    default: "\"v1.29.0\""
    source_path: roles/kubernetes-apps/external_cloud_controller/oci/defaults/main.yml
    description: "Тег образа OCI CCM."
    conditions: "используется при cloud_provider: external и external_cloud_provider: oci"

  # --- external_cloud_controller: openstack ---
  - name: external_openstack_auth_url
    default: "{{ lookup('env', 'OS_AUTH_URL') }}"
    source_path: roles/kubernetes-apps/external_cloud_controller/openstack/defaults/main.yml
    description: "URL аутентификации OpenStack для внешнего CCM (по умолчанию из окружения)."
