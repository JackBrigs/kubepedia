    description: "Режим управления security list балансировщика OCI."
    conditions: "используется при cloud_provider: external и external_cloud_provider: oci"
  - name: external_oracle_load_balancer_security_lists
    default: "{}"
    source_path: roles/kubernetes-apps/external_cloud_controller/oci/defaults/main.yml
    description: "Сопоставление подсетей и security list-ов балансировщика OCI."
